<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v160</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        @keyframes neon-border { 0%, 100% { box-shadow: 0 0 10px var(--n-rojo); } 50% { box-shadow: 0 0 25px var(--n-rojo); } }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 250px 130px 1fr; 
            align-items: center; gap: 20px; padding: 15px;
            background: #050505; border-bottom: 8px solid var(--n-rojo); height: 320px;
        }
        .pub-header { 
            border: 3px solid var(--n-rojo); height: 230px; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle, #1a0000 0%, #000 100%); animation: neon-border 2s infinite;
        }
        .logo-v160 { height: 250px; width: 250px; object-fit: contain; }
        .coin { width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; border: 4px solid white; cursor: pointer; }

        /* SECCIÓN SALAS: IMAGEN AL 60% (CASI EL DOBLE) */
        .seccion-salas { 
            display: grid; 
            grid-template-columns: 20% 60% 20%; 
            height: 550px; 
            border-bottom: 8px solid var(--n-rojo); 
        }
        .menu-l { background: #080808; border-right: 4px solid #333; display: flex; flex-direction: column; }
        .s-btn { 
            flex-grow: 1; display: flex; align-items: center; padding: 0 15px; 
            border-bottom: 1px solid #111; cursor: pointer; color: #555; font-size: 11px; font-weight: bold;
        }
        .s-btn.active { background: var(--n-rojo); color: white; border-left: 8px solid white; }
        
        .visor-vip { background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; border-right: 4px solid #333; }
        #sala-img { width: 100%; height: 100%; object-fit: contain; }

        .chat-sala { background: #050505; display: flex; flex-direction: column; }
        .chat-header { padding: 10px; background: #111; text-align: center; color: var(--oro); font-size: 12px; border-bottom: 1px solid #333; }
        .chat-msg-area { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 12px; color: #ccc; }

        /* SECCIÓN IA: IMÁGENES AL 75% Y CHAT AL 25% (1/4) */
        .seccion-ia { display: grid; grid-template-columns: 75% 25%; height: 500px; background: #000; }

        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); border-right: 8px solid var(--n-rojo); }
        .bot-cell { position: relative; height: 500px; background: #000; border-right: 1px solid #111; display: flex; align-items: center; justify-content: center; }
        /* SIN RECORTES: CUERPO COMPLETO */
        .bot-cell img { max-width: 100%; max-height: 100%; object-fit: contain; } 
        .bot-name { position: absolute; bottom: 0; width: 100%; text-align: center; font-size: 20px; font-weight: 900; background: rgba(0,0,0,0.8); padding: 10px 0; }

        /* CHAT BOTS (1/4 DEL ANCHO) */
        .chat-bots-wrap { display: flex; flex-direction: column; height: 500px; background: #0a0a0a; }
        #chat-bots-logs { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        .chat-bots-bar { padding: 15px; background: #111; display: flex; gap: 8px; }
        #chat-bots-in { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; font-size: 13px; }

        /* PUERTAS */
        .footer-p { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; background: #050505; border-top: 5px solid var(--n-rojo); }
        .p-box { background: #000; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; }
        .p-pre { height: 80px; background: #080808; border: 1px dashed #444; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .p-btn { width: 100%; padding: 12px; border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 5px; }
    </style>
</head>
<body onload="startImperio()">

<header>
    <div class="pub-header"><div style="color:white; font-size:20px; animation:parpadeo 2s infinite">PUBLICIDAD</div></div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v160">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="pub-header"><div style="color:white; font-size:20px; animation:parpadeo 2s infinite">PUBLICIDAD</div></div>
</header>

<div class="seccion-salas">
    <div class="menu-l" id="menu-l"></div>
    <div class="visor-vip"><img id="sala-img" src=""></div>
    <div class="chat-sala">
        <div class="chat-header" id="chat-sala-name">SALA</div>
        <div class="chat-msg-area" id="chat-sala-logs"></div>
        <div style="padding:8px; display:flex; gap:5px; background:#111;">
            <input type="text" id="in-sala" placeholder="Hablar..." style="flex-grow:1; background:#000; border:1px solid var(--n-rojo); color:white; padding:5px; font-size:11px;">
            <button onclick="enviarSala()" style="background:var(--n-rojo); border:none; color:white; cursor:pointer; padding:0 10px; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="seccion-ia">
    <div class="grid-bots">
        <div class="bot-cell"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-cell"><img src="Morocha.jpg"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-cell"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-bots-wrap">
        <div id="chat-bots-logs"></div>
        <div class="chat-bots-bar">
            <input type="text" id="chat-bots-in" placeholder="Escribe..." onkeypress="if(event.key==='Enter') enviarBots()">
            <button onclick="enviarBots()" style="background:var(--n-rojo); color:white; border:none; padding:0 15px; cursor:pointer; font-weight:bold; border-radius:5px;">OK</button>
        </div>
    </div>
</div>

<div class="footer-p">
    <div class="p-box"><div class="p-pre" id="v-h"></div><button onclick="up('v-h')" style="background:var(--n-rosa)" class="p-btn">Historias</button></div>
    <div class="p-box"><div class="p-pre" id="v-e"></div><button onclick="up('v-e')" style="background:var(--n-azul)" class="p-btn">Estados</button></div>
    <div class="p-box"><div class="p-pre" id="v-v"></div><button onclick="up('v-v')" style="background:var(--n-rojo)" class="p-btn">Videos</button></div>
</div>

<script>
    const salasData = [
        { n: "SADO Y MASO", f: "Sado y Maso.jpg" },
        { n: "SPA", f: "Spa.png" },
        { n: "BIBLIOTECA", f: "Biblioteca.png" },
        { n: "CAMARERA", f: "Camarera.png" },
        { n: "DISCOTECA", f: "Discoteca.png" },
        { n: "EL BAR", f: "El Bar.png" },
        { n: "GIMNASIO", f: "Gimnasio.png" },
        { n: "OFICINA", f: "Oficina.png" },
        { n: "PLAYA", f: "Playa.png" },
        { n: "LA TIENDITA", f: "La Tiendita.png" }
    ];
    let actualSala = 0;

    function startImperio() {
        const ml = document.getElementById('menu-l');
        salasData.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-btn'; d.id = 'sl-'+i;
            d.innerHTML = s.n;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { actualSala = (actualSala + 1) % salasData.length; ver(actualSala); }, 8000);
        msgBots("COLO", "¡v160 lista! Salas gigantes al 60%, nosotras enteras y chat al 1/4.");
    }

    function ver(i) {
        actualSala = i;
        document.querySelectorAll('.s-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        document.getElementById('sala-img').src = salasData[i].f;
        document.getElementById('chat-sala-name').innerText = "VIVO: " + salasData[i].n;
    }

    function enviarBots() {
        const i = document.getElementById('chat-bots-in');
        if(!i.value.trim()) return;
        document.getElementById('chat-bots-logs').innerHTML += `<div style="text-align:right; margin-bottom:10px; color:var(--oro)"><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
        document.getElementById('chat-bots-logs').scrollTop = document.getElementById('chat-bots-logs').scrollHeight;
    }

    function msgBots(n, m) {
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-bots-logs').innerHTML += `<div style="margin-bottom:10px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-bots-logs').scrollTop = document.getElementById('chat-bots-logs').scrollHeight;
    }

    function enviarSala() {
        const i = document.getElementById('in-sala');
        if(!i.value.trim()) return;
        document.getElementById('chat-sala-logs').innerHTML += `<div><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
    }

    function up(id) {
        let n = prompt("Archivo:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
