<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO LIVE</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* OVERLAY ENTRADA */
        #unmute-overlay { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .entrar-btn { background: var(--oro); color: #000; padding: 30px 60px; font-size: 30px; font-weight: 900; border-radius: 60px; border: none; cursor: pointer; box-shadow: 0 0 40px var(--oro); text-transform: uppercase; }

        /* HEADER: LOGO GIGANTE */
        header { height: 280px; background: #000; border-bottom: 6px solid var(--oro); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; position: relative; flex-shrink: 0; }
        .logo-container { position: absolute; left: 50%; transform: translateX(-50%); }
        .logo-img { height: 260px; width: auto; filter: drop-shadow(0 0 40px var(--oro)); }
        
        /* CONTADOR ONLINE REAL */
        .online-box { background: rgba(0,255,102,0.1); border: 2px solid var(--n-verde); padding: 10px 20px; border-radius: 10px; color: var(--n-verde); text-align: center; box-shadow: 0 0 15px var(--n-verde); }
        .online-num { font-size: 24px; display: block; }

        .coin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .coin { width: 75px; height: 75px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff9aa, var(--oro) 50%, #5c4928); border: 3px solid #1a1a1a; color: #000; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 6px 0 #333; }

        /* LAYOUT PRINCIPAL */
        .main-app { display: grid; grid-template-columns: 240px 1fr 400px; gap: 15px; padding: 15px; flex-grow: 1; min-height: 0; }
        
        /* COLUMNA IZQUIERDA: SALAS + SECCIONES */
        .left-col { display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .nav-section { background: #111; border: 1px solid #333; border-radius: 10px; padding: 10px; }
        .nav-title { color: var(--oro); font-size: 12px; margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .p-btn { width: 100%; padding: 12px; margin-bottom: 5px; background: #1a1a1a; border: 1px solid #444; color: #ccc; cursor: pointer; border-radius: 5px; text-align: left; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .p-btn.active { border-color: var(--n-turq); color: var(--n-turq); box-shadow: 0 0 10px var(--n-turq); }

        /* VISOR CENTRAL */
        .visor-container { background: #050505; border: 5px solid #1a1a1a; border-radius: 20px; flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        /* BOTÓN ALI NEÓN */
        .ali-neon { display: none; position: absolute; bottom: 40px; background: #000; border: 4px solid var(--n-rojo); color: var(--n-rojo); padding: 20px 40px; font-size: 22px; font-weight: 900; text-decoration: none; border-radius: 10px; animation: pulse 1s infinite; box-shadow: 0 0 30px var(--n-rojo); z-index: 100; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); opacity: 0.8; } }

        /* COLUMNA DERECHA: LAS 3 CHICAS + CHAT */
        .right-side { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .girls-row { display: flex; gap: 5px; height: 320px; flex-shrink: 0; align-items: flex-end; }
        .girl-card { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .girl-img-box { width: 100%; height: 280px; }
        .girl-img-box img { width: 100%; height: 100%; object-fit: contain; }
        .girl-name { font-size: 12px; font-weight: 900; margin-top: 5px; }

        .chat-display { flex-grow: 1; background: #020202; border: 2px solid #333; border-radius: 10px; padding: 15px; overflow-y: auto; font-size: 14px; min-height: 0; }
        .msg { margin-bottom: 10px; border-left: 5px solid; padding-left: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div id="unmute-overlay"><button class="entrar-btn" onclick="entrar()">🔥 ENTRAR AL SHOW 🔥</button></div>

<header>
    <div class="online-box">
        <span class="online-num" id="user-count">1,452</span>
        <span style="font-size:10px;">USUARIOS ACTIVOS</span>
    </div>
    <div class="logo-container"><img src="Logo Mega Red Lunar.jpg" class="logo-img"></div>
    <div class="coin-grid">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main-app">
    <div class="left-col">
        <div class="nav-section">
            <div class="nav-title">🎥 Contenido</div>
            <button class="p-btn" onclick="alert('Cargando Historias...')">📖 Historias VIP</button>
            <button class="p-btn" onclick="alert('Cargando Estados...')">📱 Estados Hot</button>
            <button class="p-btn" onclick="alert('Cargando Videos...')">🎞️ Videos Privados</button>
        </div>
        <div class="nav-section">
            <div class="nav-title">🚪 Salas en Vivo</div>
            <div id="rooms-list"></div>
        </div>
    </div>

    <div class="center-col" style="display:flex; flex-direction:column;">
        <div class="visor-container">
            <img id="main-view" src="">
            <a href="https://tu-link-ali.com" target="_blank" class="ali-neon" id="ali-btn">🔥 COMPRAR JUGUETES 🔥</a>
        </div>
    </div>

    <div class="right-side">
        <div class="girls-row">
            <div class="girl-card">
                <div class="girl-img-box"><img src="Rubia.jpg"></div>
                <div class="girl-name" style="color:var(--n-turq);">MIA</div>
            </div>
            <div class="girl-card">
                <div class="girl-img-box"><img src="Morocha.jpg"></div>
                <div class="girl-name" style="color:var(--n-verde);">TANIA</div>
            </div>
            <div class="girl-card">
                <div class="girl-img-box"><img src="Pelirroja.jpg"></div>
                <div class="girl-name" style="color:var(--n-rojo);">COLO</div>
            </div>
        </div>
        <div class="chat-display" id="chat-stream"></div>
    </div>
</div>

<audio id="room-sound" loop></audio>

<script>
    let idx = 0; let audioReady = false; let userCity = "Resistencia";
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "Sado_y_Maso.mp3"}, {n: "Spa", e: ".png", s: "Spa.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "Biblioteca.mp3"}, {n: "Camarera", e: ".png", s: "Camarera.mp3"}, 
        {n: "Discoteca", e: ".png", s: "Discoteca.mp3"}, {n: "El Bar", e: ".png", s: "El_Bar.mp3"},
        {n: "Gimnasio", e: ".png", s: "Gimnasio.mp3"}, {n: "La Tiendita", e: ".png", s: "La_Tiendita.mp3"}, 
        {n: "Oficina", e: ".png", s: "Oficina.mp3"}, {n: "Playa", e: ".png", s: "Playa.mp3"}
    ];

    fetch('https://ipapi.co/json/').then(res => res.json()).then(data => { if(data.city) userCity = data.city; });

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.innerHTML = `🚪 ${r.n}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(botChat, 4000);
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 6000);
        setInterval(() => { 
            let base = 1400 + Math.floor(Math.random() * 200);
            document.getElementById('user-count').innerText = base.toLocaleString(); 
        }, 3000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('r-'+idx);
        if(btn) btn.classList.add('active');
        const r = rooms[idx];
        document.getElementById('main-view').src = encodeURIComponent(r.n) + r.e;
        document.getElementById('ali-btn').style.display = (r.n === "La Tiendita") ? "block" : "none";
        if(audioReady) {
            const p = document.getElementById('room-sound');
            p.src = r.s; p.play().catch(() => {});
        }
    }

    function botChat() {
        const f = [
            {u:"MIA", c:"#00d9ff", t:`🔞 ¿Algún macho de ${userCity} para romperme toda?`},
            {u:"TANIA", c:"#00ff66", t:`🔥 En ${userCity} mandan los que tienen guita.`},
            {u:"COLO", c:"#ff003c", t:`🔞 Recién atendí a uno de ${userCity} y quedé re caliente.`},
            {u:"MIA", c:"#00d9ff", t:"💎 Manden tokens o me aburro."}
        ];
        const m = f[Math.floor(Math.random() * f.length)];
        const box = document.getElementById('chat-stream');
        box.innerHTML += `<div class="msg" style="border-left-color:${m.c}; color:${m.c}"><b>${m.u}:</b> ${m.t}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function entrar() { audioReady = true; document.getElementById('unmute-overlay').style.display='none'; refresh(); }
    function pay(n) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount=${n}&currency_code=USD`, '_blank'); }
    init();
</script>
</body>
</html>
