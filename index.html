<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | EL IMPERIO RECONSTRUIDO</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* HEADER: LOGO GIGANTE RECUPERADO */
        header { 
            height: 320px; background: #000; border-bottom: 6px solid var(--oro); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; flex-shrink: 0; position: relative; 
        }
        .logo-img { height: 300px; filter: drop-shadow(0 0 50px var(--oro)); position: absolute; left: 50%; transform: translateX(-50%); }
        
        .online-box { background: rgba(0,255,102,0.1); border: 3px solid var(--n-verde); padding: 15px; border-radius: 12px; color: var(--n-verde); text-align: center; }
        .online-num { font-size: 30px; font-weight: 900; display: block; }

        .coin-grid { display: grid; grid-template-columns: repeat(2, 75px); gap: 12px; }
        .coin { width: 75px; height: 75px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff9aa, var(--oro) 50%, #5c4928); border: 3px solid #111; color: #000; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 5px 0 #333; }

        /* CUERPO PRINCIPAL */
        .main-app { display: grid; grid-template-columns: 250px 1fr 400px; gap: 20px; padding: 20px; flex-grow: 1; min-height: 0; }

        /* COLUMNA IZQUIERDA: BOTONES */
        .left-col { display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .panel { background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 15px; }
        .p-btn { 
            width: 100%; padding: 12px; margin-bottom: 8px; background: #111; border: 1px solid #444; 
            color: #fff; cursor: pointer; border-radius: 8px; text-align: left; font-size: 11px; font-weight: 900; 
        }
        .p-btn.active { background: #fff !important; color: #000 !important; border-color: #fff; }

        /* VISOR CENTRAL: CARRUSEL DE IMÁGENES */
        .visor-container { background: #050505; border: 5px solid #1a1a1a; border-radius: 20px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        .sala-tag { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 8px 20px; border: 2px solid var(--n-turq); color: var(--n-turq); border-radius: 30px; font-size: 14px; font-weight: 900; }

        /* COLUMNA DERECHA: CHICAS Y CHAT */
        .right-side { display: flex; flex-direction: column; gap: 15px; min-height: 0; }
        .girls-row { display: flex; gap: 8px; height: 250px; flex-shrink: 0; }
        .girl-card { flex: 1; border: 2px solid #222; border-radius: 12px; overflow: hidden; position: relative; }
        .girl-card img { width: 100%; height: 100%; object-fit: cover; }
        .girl-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 5px; font-size: 12px; font-weight: 900; }

        .chat-display { 
            flex-grow: 1; background: #020202; border: 3px solid #222; border-radius: 15px; 
            padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }
        .msg { border-left: 5px solid; padding-left: 12px; font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="online-box">
        <span class="online-num" id="total-online">3,245</span>
        <span style="font-size:11px; font-weight:900;">CLIENTES VIP ONLINE</span>
    </div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    <div class="coin-grid">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main-app">
    <div class="left-col">
        <div class="panel">
            <h3 style="color:var(--oro); font-size:12px; margin-bottom:10px;">👑 CONTENIDO</h3>
            <button class="p-btn" style="color:var(--n-turq)">HISTORIAS</button>
            <button class="p-btn" style="color:var(--n-rojo)">VIDEOS</button>
            <button class="p-btn" style="color:var(--n-verde)">ESTADOS</button>
        </div>
        <div class="panel">
            <h3 style="color:var(--oro); font-size:12px; margin-bottom:10px;">🚪 SALAS</h3>
            <div id="rooms-list"></div>
        </div>
    </div>

    <div class="visor-container">
        <div class="sala-tag" id="sala-nombre">SALA</div>
        <img id="main-view" src="">
    </div>

    <div class="right-side">
        <div class="girls-row">
            <div class="girl-card"><img src="Rubia.jpg"><div class="girl-name" style="color:var(--n-turq)">MIA</div></div>
            <div class="girl-card"><img src="Morocha.jpg"><div class="girl-name" style="color:var(--n-verde)">TANIA</div></div>
            <div class="girl-card"><img src="Pelirroja.jpg"><div class="girl-name" style="color:var(--n-rojo)">COLO</div></div>
        </div>
        <div class="chat-display" id="chat-stream"></div>
    </div>
</div>

<audio id="room-sound" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "Sado_y_Maso.mp3", c: "#ff003c"}, 
        {n: "Spa", e: ".png", s: "Spa.mp3", c: "#00d9ff"}, 
        {n: "Biblioteca", e: ".png", s: "Biblioteca.mp3", c: "#bc13fe"}, 
        {n: "Camarera", e: ".png", s: "Camarera.mp3", c: "#00ff66"}, 
        {n: "Discoteca", e: ".png", s: "Discoteca.mp3", c: "#ff00ff"}, 
        {n: "El Bar", e: ".png", s: "El_Bar.mp3", c: "#d4af37"},
        {n: "Gimnasio", e: ".png", s: "Gimnasio.mp3", c: "#00ff66"}, 
        {n: "La Tiendita", e: ".png", s: "La_Tiendita.mp3", c: "#ff4500"}, 
        {n: "Oficina", e: ".png", s: "Oficina.mp3", c: "#1e90ff"}, 
        {n: "Playa", e: ".png", s: "Playa.mp3", c: "#ffff00"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.style.color = r.c; b.innerHTML = `🚪 ${r.n}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 6000);
        setInterval(botChat, 4000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('r-'+idx);
        if(activeBtn) activeBtn.classList.add('active');
        
        const r = rooms[idx];
        document.getElementById('sala-nombre').innerText = r.n.toUpperCase();
        // Carga la imagen combinando el nombre y la extensión
        document.getElementById('main-view').src = r.n + r.e;
        
        const p = document.getElementById('room-sound');
        p.src = r.s; p.play().catch(() => {});
    }

    function botChat() {
        const chatBox = document.getElementById('chat-stream');
        const msgs = [
            {u:"MIA", c:"#00d9ff", t:"🔞 ¿Algún cliente VIP de Resistencia quiere verme?"},
            {u:"TANIA", c:"#00ff66", t:"🔥 Miren mis estados, subí algo muy fuerte..."},
            {u:"COLO", c:"#ff003c", t:"🔞 Recién terminó un show privado, ¿quién es el siguiente?"},
            {u:"TANIA", c:"#00ff66", t:"💎 Manden tokens o no hay más baile."}
        ];
        const m = msgs[Math.floor(Math.random() * msgs.length)];
        chatBox.innerHTML += `<div class="msg" style="border-left-color:${m.c}; color:${m.c}"><b>${m.u}:</b> ${m.t}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function pay(n) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount=${n}&currency_code=USD`, '_blank'); }
</script>
</body>
</html>
