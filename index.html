<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v167</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 200px 130px 1fr; 
            align-items: center; gap: 15px; padding: 10px;
            background: #050505; border-bottom: 5px solid var(--n-rojo); height: 280px;
        }
        .logo-v167 { height: 200px; width: 200px; object-fit: contain; }
        .coin { width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; border: 3px solid white; cursor: pointer; }

        /* SECCIÓN SALAS (ALTURA FIJA 300PX) */
        .seccion-salas { 
            display: grid; 
            grid-template-columns: 220px 1fr; 
            height: 300px; 
            border-bottom: 5px solid var(--n-rojo); 
        }

        .menu-l { overflow-y: auto; background: #080808; border-right: 3px solid #333; display: flex; flex-direction: column; }
        
        /* BOTONES LLAMATIVOS CON ICONO REALISTA */
        .s-btn { 
            flex-grow: 1; display: flex; align-items: center; padding: 0 12px; 
            border-bottom: 1px solid #111; cursor: pointer; color: #888; font-size: 11px; 
            text-transform: uppercase; transition: 0.3s;
        }
        .s-btn:hover { color: white; background: #111; }
        
        /* Icono Realista a Color */
        .s-icon-real { 
            width: 24px; height: 24px; 
            margin-right: 10px; 
            object-fit: contain; 
            filter: grayscale(100%); /* Gris por defecto */
            transition: 0.3s;
        }

        .s-btn.active { background: var(--n-rojo); color: white; border-left: 5px solid white; }
        .s-btn.active .s-icon-real { filter: grayscale(0%); filter: drop-shadow(0 0 5px white); } /* Color real al activar */

        /* VISOR Y CHAT SIMÉTRICOS 50/50 */
        .seccion-visor-chat { 
            display: grid; 
            grid-template-columns: 50% 50%; 
            height: 300px; 
        }
        .visor-vip { background: #000; overflow: hidden; border-right: 3px solid #333; height: 300px; }
        #sala-img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .chat-sala { background: #050505; display: flex; flex-direction: column; height: 300px; }
        .chat-header { padding: 8px; background: #111; text-align: center; color: var(--oro); font-size: 11px; border-bottom: 1px solid #333; }
        .chat-msg-area { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 11px; color: #ccc; }

        /* SECCIÓN IA (ALTURA 350PX) */
        .seccion-ia { display: grid; grid-template-columns: 50% 50%; height: 350px; background: #000; }

        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); border-right: 5px solid var(--n-rojo); height: 350px; }
        .bot-cell { position: relative; height: 350px; background: #000; border-right: 1px solid #111; overflow: hidden; }
        
        .bot-cell img { width: 100%; height: 100%; object-fit: cover; } 
        
        /* CORRECCIÓN MOROCHA (CENTRO): Mover a la derecha */
        .morocha-fix { object-position: 70% center !important; }

        .bot-name { position: absolute; bottom: 0; width: 100%; text-align: center; font-size: 14px; font-weight: 900; background: rgba(0,0,0,0.8); padding: 5px 0; }

        /* CHAT BOTS SIMÉTRICO 50% */
        .chat-bots-wrap { display: flex; flex-direction: column; height: 350px; background: #0a0a0a; }
        #chat-bots-logs { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 13px; }
        .chat-bots-bar { padding: 10px; background: #111; display: flex; gap: 5px; }
        #chat-bots-in { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 8px; border-radius: 5px; font-size: 12px; }

        /* FOOTER */
        .footer-p { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; background: #050505; border-top: 4px solid var(--n-rojo); }
        .p-box { background: #000; border: 1px solid #333; border-radius: 10px; padding: 10px; text-align: center; }
        .p-pre { height: 60px; background: #080808; border: 1px dashed #444; border-radius: 5px; margin-bottom: 10px; }
        .p-btn { width: 100%; padding: 10px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 11px; border-radius: 4px; }
    </style>
</head>
<body onload="startImperio()">

<header>
    <div style="border: 2px solid var(--n-rojo); height: 200px; width: 100%; border-radius:10px;"></div>
    <div style="display:flex; flex-direction:column; gap:8px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v167">
    <div style="display:flex; flex-direction:column; gap:8px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div style="border: 2px solid var(--n-rojo); height: 200px; width: 100%; border-radius:10px;"></div>
</header>

<div class="seccion-salas">
    <div class="menu-l" id="menu-l"></div>
    <div class="seccion-visor-chat">
        <div class="visor-vip"><img id="sala-img" src=""></div>
        <div class="chat-sala">
            <div class="chat-header" id="chat-sala-name">SALA</div>
            <div class="chat-msg-area" id="chat-sala-logs"></div>
            <div style="padding:5px; display:flex; gap:5px; background:#111;">
                <input type="text" id="in-sala" placeholder="Hablar..." style="flex-grow:1; background:#000; border:1px solid var(--n-rojo); color:white; padding:5px; font-size:10px; border-radius:3px;">
                <button onclick="enviarSala()" style="background:var(--n-rojo); border:none; color:white; padding:0 10px; font-weight:bold; cursor:pointer; border-radius:3px;">OK</button>
            </div>
        </div>
    </div>
</div>

<div class="seccion-ia">
    <div class="grid-bots">
        <div class="bot-cell"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-cell"><img src="Morocha.jpg" class="morocha-fix"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-cell"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-bots-wrap">
        <div id="chat-bots-logs"></div>
        <div class="chat-bots-bar">
            <input type="text" id="chat-bots-in" placeholder="Escribe..." onkeypress="if(event.key==='Enter') enviarBots()">
            <button onclick="enviarBots()" style="background:var(--n-rojo); color:white; border:none; padding:0 15px; cursor:pointer; font-weight:bold; border-radius:5px;">OK</button>
        </div>
    </div>
</div>

<div class="footer-p">
    <div class="p-box"><div class="p-pre" id="v-h"></div><button onclick="up('v-h')" style="background:var(--n-rosa)" class="p-btn">Historias</button></div>
    <div class="p-box"><div class="p-pre" id="v-e"></div><button onclick="up('v-e')" style="background:var(--n-azul)" class="p-btn">Estados</button></div>
    <div class="p-box"><div class="p-pre" id="v-v"></div><button onclick="up('v-v')" style="background:var(--n-rojo)" class="p-btn">Videos</button></div>
</div>

<script>
    // RUTAS A ICONOS REALISTAS (Asegúrate de tener estas imágenes en tu carpeta)
    const salasData = [
        { n: "SADO Y MASO", f: "Sado y Maso.jpg", i: "icon_sado.png" },
        { n: "SPA", f: "Spa.png", i: "icon_spa.png" },
        { n: "BIBLIOTECA", f: "Biblioteca.png", i: "icon_biblio.png" },
        { n: "CAMARERA", f: "Camarera.png", i: "icon_camarera.png" },
        { n: "DISCOTECA", f: "Discoteca.png", i: "icon_disco.png" },
        { n: "EL BAR", f: "El Bar.png", i: "icon_bar.png" },
        { n: "GIMNASIO", f: "Gimnasio.png", i: "icon_gym.png" },
        { n: "OFICINA", f: "Oficina.png", i: "icon_oficina.png" },
        { n: "PLAYA", f: "Playa.png", i: "icon_playa.png" },
        { n: "LA TIENDITA", f: "La Tiendita.png", i: "icon_tienda.png" }
    ];
    let actualSala = 0;

    function startImperio() {
        const ml = document.getElementById('menu-l');
        salasData.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-btn'; d.id = 'sl-'+i;
            // Carga de Icono Realista
            d.innerHTML = `<img src="${s.i}" class="s-icon-real"><b>${s.n}</b>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { actualSala = (actualSala + 1) % salasData.length; ver(actualSala); }, 8000);
    }

    function ver(i) {
        actualSala = i;
        document.querySelectorAll('.s-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        document.getElementById('sala-img').src = salasData[i].f;
        document.getElementById('chat-sala-name').innerText = "VIVO: " + salasData[i].n;
    }

    function enviarBots() {
        const i = document.getElementById('chat-bots-in');
        if(!i.value.trim()) return;
        document.getElementById('chat-bots-logs').innerHTML += `<div style="text-align:right; margin-bottom:5px; color:var(--oro)"><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
        document.getElementById('chat-bots-logs').scrollTop = document.getElementById('chat-bots-logs').scrollHeight;
    }

    function enviarSala() {
        const i = document.getElementById('in-sala');
        if(!i.value.trim()) return;
        document.getElementById('chat-sala-logs').innerHTML += `<div><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
    }

    function up(id) {
        let n = prompt("Archivo:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
