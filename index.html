<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | NEON EMPIRE</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; min-height: 100vh; overflow-y: auto; }

        /* HEADER: Logo y Publicidad */
        header { height: 260px; background: #000; border-bottom: 5px solid var(--oro); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .header-ads-left { width: 220px; display: flex; flex-direction: column; gap: 8px; }
        .ad-mini { border: 2px solid var(--n-rojo); padding: 8px; font-size: 10px; text-align: center; color: #fff; background: #400; border-radius: 5px; text-transform: uppercase; }
        
        .logo-img { height: 220px; width: auto; filter: drop-shadow(0 0 35px var(--oro)); }
        
        /* MONEDAS 3D GIGANTES */
        .coin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; perspective: 1000px; }
        .coin { 
            width: 95px; height: 95px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff9aa, var(--oro) 50%, #5c4928); 
            border: 4px solid #222; color: #000; font-size: 26px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: 900; 
            box-shadow: 0 12px 0 #333, 0 15px 25px rgba(0,0,0,0.9);
            transform: rotateY(20deg); transition: 0.2s;
        }
        .coin:active { transform: translateY(8px) rotateY(20deg); box-shadow: 0 4px 0 #333; }

        /* NAV */
        .muro-nav { background: #111; padding: 15px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 100; }
        .up-btn { padding: 12px 25px; border: 2px solid; background: #000; font-weight: 900; cursor: pointer; border-radius: 5px; font-size: 13px; color: #fff; }

        /* LAYOUT */
        .main-app { display: grid; grid-template-columns: 240px 1fr 380px; gap: 15px; padding: 15px; }
        
        /* SALAS */
        .rooms-box { background: #080808; border: 1px solid #222; border-radius: 10px; padding: 10px; }
        .p-btn { width: 100%; padding: 15px; margin-bottom: 8px; background: #151515; border: 1px solid #444; color: #999; cursor: pointer; border-radius: 5px; text-align: left; font-size: 11px; font-weight: 900; }
        .p-btn.active { border-color: var(--n-turq); color: var(--n-turq); background: #001a1a; box-shadow: 0 0 15px var(--n-turq); }

        /* VISOR NITIDEZ TOTAL */
        .center-col { display: flex; flex-direction: column; gap: 15px; }
        .visor-container { background: #050505; border: 5px solid #1a1a1a; border-radius: 15px; height: 500px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #main-view { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: auto; }
        .sala-tag { position: absolute; top: 15px; right: 15px; background: var(--n-rojo); padding: 5px 15px; font-size: 14px; font-weight: 900; }

        /* CHAT AGRESIVO */
        .right-side { display: flex; flex-direction: column; gap: 10px; height: 80vh; position: sticky; top: 80px; }
        .chat-display { flex-grow: 1; background: #020202; border: 2px solid #333; border-radius: 10px; padding: 15px; overflow-y: auto; font-size: 14px; line-height: 1.4; }
        .msg { margin-bottom: 12px; border-left: 6px solid; padding-left: 12px; }

        /* MODAL */
        #upload-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 4px solid var(--oro); padding: 30px; z-index: 1001; width: 400px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="upload-modal">
    <h2 style="color:var(--oro); margin-bottom:15px;">SUBIR CONTENIDO VIP</h2>
    <textarea id="post-text" style="width:100%; height:100px; background:#000; color:#fff; border:1px solid var(--oro); padding:10px;"></textarea><br>
    <button class="up-btn" style="border-color:var(--n-verde); width:100%;" onclick="sendPost()">PUBLICAR AHORA</button>
</div>

<header>
    <div class="header-ads-left">
        <div class="ad-mini">🔞 TU PUBLICIDAD AQUÍ</div>
        <div class="ad-mini" style="border-color:var(--n-turq);">💎 TOKENS BARATOS</div>
        <div class="ad-mini">🔥 500 SOCIOS ONLINE</div>
    </div>

    <img src="Logo Mega Red Lunar.jpg" class="logo-img" alt="LOGO">

    <div class="coin-grid">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="muro-nav">
    <button class="up-btn" style="border-color:var(--n-rojo);" onclick="openModal()">📹 SUBIR VÍDEO</button>
    <button class="up-btn" style="border-color:var(--n-verde);" onclick="openModal()">✍️ SUBIR ESTADO</button>
    <button class="up-btn" style="border-color:var(--n-turq);" onclick="openModal()">📸 SUBIR HISTORIA</button>
</div>

<div class="main-app">
    <div class="rooms-box" id="rooms-list"></div>

    <div class="center-col">
        <div class="visor-container">
            <div class="sala-tag" id="sala-tag">SADO Y MASO</div>
            <img id="main-view" src="">
        </div>
        <div id="feed-posts" style="background:#0a0a0a; border:1px solid #222; padding:15px; border-radius:10px;">
            <h4 style="color:var(--oro); margin-bottom:10px;">📰 MURO DE RESISTENCIA</h4>
            <div id="posts-container"></div>
        </div>
    </div>

    <div class="right-side">
        <div style="display:flex; gap:5px; height:120px;">
            <div style="flex:1; border:2px solid var(--n-turq);"><img src="Rubia.jpg" style="width:100%; height:100%; object-fit:cover;"></div>
            <div style="flex:1; border:2px solid var(--n-verde);"><img src="Morocha.jpg" style="width:100%; height:100%; object-fit:cover;"></div>
            <div style="flex:1; border:2px solid var(--n-rojo);"><img src="Pelirroja.jpg" style="width:100%; height:100%; object-fit:cover;"></div>
        </div>
        <div class="chat-display" id="chat-stream"></div>
    </div>
</div>

<script>
    let idx = 0;
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];
    
    // CHAT MÁS VULGAR Y AGRESIVO
    const msgs = [
        {u: "MIA", t: "🔞 No me comparen con Tania, esa perra no sabe ni moverse. Mírenme a mí, soy la más putita de Resistencia.", c: "#00d9ff"},
        {u: "COLO", t: "🔥 ¿Quién es el macho que me va a mandar 10 tokens para que me abra de piernas ahora mismo?", c: "#ff003c"},
        {u: "TANIA", t: "💅 Mia sos una envidiosa. Todos saben que mis videos son los más calientes. ¿Quién quiere ver mi boca hoy?", c: "#00ff66"},
        {u: "COLO", t: "🔞 Basta de charla. Manden oro o me voy con los clientes VIP a la sala privada.", c: "#ff003c"},
        {u: "MIA", t: "🔥 ¿Me van a dejar ganar por estas dos? Soy la que más muestra, miren mi historia nueva si tienen huevos.", c: "#00d9ff"},
        {u: "TANIA", t: "💎 El que me mande tokens ahora decide qué juguete uso. ¡No sean maricones!", c: "#00ff66"},
        {u: "COLO", t: "🔥 Soy la pelirroja más sucia de la red. ¿Quién quiere que le haga un show guarro en el Spa?", c: "#ff003c"},
        {u: "MIA", t: "🔞 Tania, seguí participando. Los verdaderos hombres me eligen a mí. ¡Manden plata!", c: "#00d9ff"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.innerHTML = `🚪 ${r.toUpperCase()}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(botChat, 5000); // Más rápido el chat
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 12000); // Rotación más rápida
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('r-'+idx);
        if(btn) btn.classList.add('active');
        
        document.getElementById('sala-tag').innerText = rooms[idx].toUpperCase();
        const img = document.getElementById('main-view');
        
        // CORRECCIÓN TOTAL DE RUTA GITHUB
        // Asegúrate que los archivos sean .jpg (minúscula)
        let fileName = rooms[idx] + ".jpg";
        img.src = "./" + fileName;
        
        img.onerror = () => {
            img.src = "https://via.placeholder.com/800x600/111/d4af37?text=" + rooms[idx];
        };
    }

    function botChat() {
        const m = msgs[Math.floor(Math.random() * msgs.length)];
        const box = document.getElementById('chat-stream');
        box.innerHTML += `<div class="msg" style="border-color:${m.c}; color:${m.c}"><b>${m.u}:</b> ${m.t}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function openModal() { document.getElementById('overlay').style.display = 'block'; document.getElementById('upload-modal').style.display = 'block'; }
    function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('upload-modal').style.display = 'none'; }

    function sendPost() {
        const txt = document.getElementById('post-text').value;
        if(txt) {
            document.getElementById('posts-container').insertAdjacentHTML('afterbegin', `<div style="background:#1a1a1a; padding:10px; border-radius:5px; margin-bottom:10px; border-left:3px solid var(--n-viola); color:#bc13fe"><b>SOCIO VIP:</b> ${txt}</div>`);
            closeModal();
            document.getElementById('post-text').value = "";
        }
    }

    function pay(n) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount=${n}&currency_code=USD`, '_blank'); }

    init();
</script>
</body>
</html>
