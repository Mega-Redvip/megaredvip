<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | PLATAFORMA TOTAL</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; 
            --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            overflow-y: auto; min-height: 100vh; display: flex; flex-direction: column; 
        }

        /* HEADER: LOGO CENTRAL Y AUSPICIANTES A LOS LADOS */
        header { 
            height: 380px; background: #000; border-bottom: 6px solid var(--oro); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 20px 50px; flex-shrink: 0; position: relative; overflow: visible;
        }
        
        /* CUADROS DE AUSPICIANTES LATERO-SUPERIORES */
        .header-ads {
            width: 250px; height: 150px; border: 3px dashed #333; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: #555; font-size: 12px; text-transform: uppercase; cursor: pointer;
            transition: 0.3s; background: #050505;
        }
        .header-ads:hover { border-color: var(--n-viola); color: var(--n-viola); box-shadow: 0 0 20px var(--n-viola); }

        .logo-container { height: 320px; display: flex; align-items: center; justify-content: center; overflow: visible; }
        .logo-img { 
            height: 300px; /* Ajustado para no tocar el borde superior */
            filter: drop-shadow(0 0 50px var(--oro)); 
            object-fit: contain;
        }
        
        /* MONEDAS: 1, 3, 5, 10 */
        .coin-tools { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .coin { 
            width: 75px; height: 75px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 50%, #5c4928); 
            border: 3px solid #111; color: #000; font-size: 20px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: 900; box-shadow: 0 6px 0 #333; transition: 0.1s;
        }
        .coin:active { transform: translateY(3px); box-shadow: 0 3px 0 #333; }

        /* ESTRUCTURA PRINCIPAL REORGANIZADA */
        .main-app { display: grid; grid-template-columns: 350px 1fr; gap: 25px; padding: 25px; flex-grow: 1; }

        /* COLUMNA IZQUIERDA: SALAS CON IMAGEN */
        .rooms-panel { background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 15px; overflow-y: auto; height: 800px; }
        .rooms-h { color: var(--oro); font-size: 14px; margin-bottom: 20px; border-left: 4px solid var(--oro); padding-left: 10px; text-transform: uppercase; }
        
        .room-item { 
            display: flex; align-items: center; gap: 10px; background: #111; border: 1px solid #333; 
            border-radius: 10px; padding: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.3s;
        }
        .room-item:hover { background: #222; border-color: var(--n-turq); }
        .room-item.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px #fff; }
        .room-thumb { width: 80px; height: 60px; border-radius: 5px; object-fit: cover; border: 1px solid #444; }
        .room-name { font-size: 11px; font-weight: 900; text-transform: uppercase; }

        /* COLUMNA DERECHA: VISOR, CHICAS Y CHAT FUERTE */
        .center-col { display: flex; flex-direction: column; gap: 20px; }
        
        .visor-row { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        
        .visor { 
            background: #000; border: 5px solid #1a1a1a; border-radius: 20px; 
            height: 550px; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; position: relative;
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        .sala-tag { 
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.9); 
            padding: 12px 25px; border: 2px solid var(--n-turq); color: var(--n-turq); 
            border-radius: 30px; font-size: 14px; font-weight: 900; z-index: 10;
        }
        .users-live { color: var(--n-verde); font-size: 12px; margin-top: 4px; display: block; }
        .ali-neon { 
            display: none; position: absolute; bottom: 30px; background: #ff003c; 
            color: #fff; padding: 15px 30px; font-size: 18px; font-weight: 900; 
            text-decoration: none; border-radius: 10px; animation: pulse 1.5s infinite; z-index: 20;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 10px #ff003c; } 50% { box-shadow: 0 0 40px #ff003c; } 100% { box-shadow: 0 0 10px #ff003c; } }

        /* CHICAS Y CHAT JUNTOS ARRIBA */
        .side-panel { display: flex; flex-direction: column; gap: 10px; }
        .girls-grid { display: flex; gap: 8px; height: 180px; }
        .girl-card { flex: 1; border: 1px solid #333; border-radius: 10px; overflow: hidden; position: relative; }
        .girl-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .chat-area { 
            background: #020202; border: 2px solid #222; border-radius: 15px; 
            padding: 15px; height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }
        .msg { border-left: 4px solid; padding-left: 10px; font-size: 13px; color: #eee; }

        /* ZONA INFERIOR: MUROS DE CONTENIDO (LO QUE ERA ESPACIO VACÍO) */
        .bottom-app { padding: 25px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; border-top: 4px solid #111; }
        
        .content-panel { background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 15px; }
        .content-wall { height: 250px; background: #050505; border: 1px dashed #333; border-radius: 10px; margin-bottom: 15px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; gap: 8px; }
        
        .content-item { font-size: 11px; background: #111; padding: 8px; border-radius: 5px; color: #ccc; border-left: 3px solid; }
        
        .up-btn { 
            width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #555; 
            color: var(--oro); font-size: 12px; cursor: pointer; font-weight: bold; border-radius: 8px;
            text-transform: uppercase; transition: 0.3s;
        }
        .up-btn:hover { background: var(--oro); color: #000; }

    </style>
</head>
<body onload="init()">

<header>
    <div class="header-ads" onclick="alert('Contacto: publicidad@megaredvip.com')">PUBLICITE AQUÍ</div>
    <div class="logo-container">
        <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    </div>
    <div class="header-ads" onclick="alert('Contacto: publicidad@megaredvip.com')">PUBLICITE AQUÍ</div>
    
    <div class="coin-tools">
        <div class="coin" onclick="pay(1)">$1</div>
        <div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div>
        <div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main-app">
    <div id="rooms-list" class="rooms-panel">
        <div class="rooms-h">🚪 SALAS MEGA RED</div>
        </div>

    <div class="center-col">
        <div class="visor-row">
            <div class="visor">
                <div class="sala-tag">
                    📍 <span id="s-nom">CARGANDO...</span>
                    <span class="users-live">👤 <span id="s-users">0</span> ONLINE</span>
                </div>
                <img id="main-view" src="">
                <a href="https://tu-link-ali.com" target="_blank" class="ali-neon" id="ali-btn">🔥 COMPRAR JUGUETES 🔥</a>
            </div>
            
            <div class="side-panel">
                <div class="girls-grid">
                    <div class="girl-card"><img src="Rubia.jpg"></div>
                    <div class="girl-card"><img src="Morocha.jpg"></div>
                    <div class="girl-card"><img src="Pelirroja.jpg"></div>
                </div>
                <div id="chat-stream" class="chat-area"></div>
            </div>
        </div>
    </div>
</div>

<div class="bottom-app">
    <div class="content-panel">
        <div class="panel-h" style="color:var(--n-turq); border-color:var(--n-turq)">📖 HISTORIAS VIP</div>
        <div id="wall-historias" class="content-wall"></div>
        <button class="up-btn" onclick="upload('Historias')">📤 SUBIR HISTORIA</button>
    </div>
    <div class="content-panel">
        <div class="panel-h" style="color:var(--n-rojo); border-color:var(--n-rojo)">🎬 VIDEOS PRIVADOS</div>
        <div id="wall-videos" class="content-wall"></div>
        <button class="up-btn" onclick="upload('Videos')">📤 SUBIR VIDEO</button>
    </div>
    <div class="content-panel">
        <div class="panel-h" style="color:var(--n-verde); border-color:var(--n-verde)">📱 ESTADOS HOT</div>
        <div id="wall-estados" class="content-wall"></div>
        <button class="up-btn" onclick="upload('Estados')">📤 SUBIR ESTADO</button>
    </div>
</div>

<audio id="room-sound" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", c: "#ff003c"}, {n: "Spa", e: ".png", c: "#00d9ff"}, 
        {n: "Biblioteca", e: ".png", c: "#bc13fe"}, {n: "Camarera", e: ".png", c: "#00ff66"}, 
        {n: "Discoteca", e: ".png", c: "#ff00ff"}, {n: "El Bar", e: ".png", c: "#d4af37"},
        {n: "Gimnasio", e: ".png", c: "#00ff66"}, {n: "La Tiendita", e: ".png", c: "#ff4500"}, 
        {n: "Oficina", e: ".png", c: "#1e90ff"}, {n: "Playa", e: ".png", c: "#ffff00"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const item = document.createElement('div');
            item.className = 'room-item'; item.id = 'r-'+i;
            // Usamos encodeURI para GitHubPages en la miniatura
            const imgSrc = encodeURI(r.n + r.e);
            item.innerHTML = `
                <img src="${imgSrc}" class="room-thumb">
                <span class="room-name" style="color:${r.c}">${r.n}</span>
            `;
            item.onclick = () => { idx = i; refresh(); };
            list.appendChild(item);
        });
        refresh();
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 7000);
        setInterval(botChat, 4000);
    }

    function refresh() {
        document.querySelectorAll('.room-item').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        const r = rooms[idx];
        document.getElementById('s-nom').innerText = r.n.toUpperCase();
        document.getElementById('main-view').src = encodeURI(r.n + r.e);
        document.getElementById('ali-btn').style.display = (r.n === "La Tiendita") ? "block" : "none";
        // Contador realista por sala
        document.getElementById('s-users').innerText = 150 + Math.floor(Math.random()*400);
    }

    function botChat() {
        const chat = document.getElementById('chat-stream');
        const names = ["MIA", "TANIA", "COLO", "Admin_VIP", "User_Resistencia", "Pajero_Oro"];
        const texts = ["🔞 Show privado en 2 min!", "🔥 Chequeen mi muro inferior!", "💎 Tokens para baile hot", "Recién subí video a mi sección"];
        const n = names[Math.floor(Math.random()*names.length)];
        const t = texts[Math.floor(Math.random()*texts.length)];
        
        // Chat color oro
        chat.innerHTML += `<div class="msg" style="border-left-color:var(--oro)"><b>${n}:</b> ${t}</div>`;
        chat.scrollTop = chat.scrollHeight;
        
        // Agregar contenido automático a los MUROS INFERIORES
        updateWalls(n);
    }

    function updateWalls(user) {
        const walls = ["wall-historias", "wall-estados", "wall-videos"];
        const borderColors = ["var(--n-turq)", "var(--n-rojo)", "var(--n-verde)"];
        const rIdx = Math.floor(Math.random()*3);
        const wall = document.getElementById(walls[rIdx]);
        wall.innerHTML += `<div class="content-item" style="border-color:${borderColors[rIdx]}"><b>${user}</b> subió contenido nuevo...</div>`;
        wall.scrollTop = wall.scrollHeight;
    }

    function upload(sec) { alert("Accediendo a cámara/archivos para subir contenido a " + sec + " - MEGA RED VIP"); }
    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
