<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v120</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* 1. CABEZAL */
        header { 
            display: flex; justify-content: center; align-items: center; gap: 40px;
            padding: 10px; background: #050505; border-bottom: 5px solid var(--n-rojo);
            height: 280px;
        }
        .logo-img { height: 260px; filter: drop-shadow(0 0 20px var(--n-rojo)); }
        .coin-box { display: flex; flex-direction: column; gap: 5px; }
        .coin { 
            width: 65px; height: 65px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 18px; cursor: pointer; border: 3px solid white;
            box-shadow: 0 0 10px var(--oro);
        }

        /* 2. SALAS Y VISOR */
        .rooms-area { display: grid; grid-template-columns: 250px 1fr; gap: 10px; padding: 10px; height: 420px; }
        .rooms-nav { display: flex; flex-direction: column; gap: 3px; background: #0a0a0a; border: 2px solid #222; border-radius: 10px; padding: 5px; }
        .r-opt { 
            padding: 12px; background: #111; border-radius: 5px; border: 1px solid #333;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: white; font-size: 12px;
        }
        .r-opt.active { background: var(--n-rojo); border-color: white; box-shadow: inset 0 0 10px #000; }

        .r-viewer { border: 5px solid var(--n-rojo); border-radius: 20px; background: #000; overflow: hidden; }
        #sala-img-box { width: 100%; height: 100%; object-fit: cover; }

        /* 3. BOTS Y CHAT (SIN ESPACIOS - ALTURA FIJA) */
        .main-content { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr) 250px; /* 3 bots + chat flaco */
            gap: 0; /* ELIMINA EL ESPACIO ENTRE IMÁGENES */
            padding: 0; 
            height: 500px;
            border-bottom: 5px solid var(--n-rojo);
        }
        
        .unit { position: relative; background: #000; overflow: hidden; height: 100%; border-right: 1px solid #222; }
        .unit img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            image-rendering: -webkit-optimize-contrast; /* MEJORA PIXELACIÓN */
        }
        .unit-name { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, black, transparent); text-align: center; padding: 15px; font-size: 22px; font-weight: 900; }

        .chat-unit { 
            background: #050505; border-left: 3px solid var(--n-rojo); 
            display: flex; flex-direction: column; height: 100%; 
        }
        #chat-window { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 13px; }
        .chat-input-box { padding: 10px; background: #111; display: flex; gap: 5px; }
        #chat-text { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 8px; border-radius: 5px; outline: none; }

        /* 4. PUERTAS ATRACTIVAS (ESTILO NEÓN) */
        .doors-footer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px 20px; background: #080808; }
        .door-item { 
            background: #111; border: 3px solid #333; border-radius: 15px; padding: 20px; 
            text-align: center; transition: 0.3s; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .door-item:hover { transform: translateY(-10px); border-color: var(--oro); }
        
        .neon-text { font-size: 24px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .btn-neon { 
            width: 100%; padding: 12px; border: none; border-radius: 30px; 
            font-weight: bold; color: white; cursor: pointer; font-size: 16px;
            text-shadow: 0 0 5px black;
        }
    </style>
</head>
<body onload="startup()">

<header>
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div>
        <div class="coin" onclick="pay(5)">$5</div>
    </div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    <div class="coin-box">
        <div class="coin" onclick="pay(10)">$10</div>
        <div class="coin" onclick="pay(20)">$20</div>
    </div>
</header>

<div class="rooms-area">
    <div class="rooms-nav" id="salas-list"></div>
    <div class="r-viewer">
        <img id="sala-img-box" src="">
    </div>
</div>

<div class="main-content">
    <div class="unit"><img src="Rubia.jpg"><div class="unit-name" style="color:var(--n-rosa)">MIA</div></div>
    <div class="unit"><img src="Morocha.jpg"><div class="unit-name" style="color:var(--n-azul)">TANIA</div></div>
    <div class="unit"><img src="Pelirroja.jpg"><div class="unit-name" style="color:var(--n-rojo)">COLO</div></div>
    
    <div class="chat-unit">
        <div id="chat-window"></div>
        <div class="chat-input-box">
            <input type="text" id="chat-text" placeholder="Habla..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--n-rojo); color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">OK</button>
        </div>
    </div>
</div>

<div class="doors-footer">
    <div class="door-item" style="border-color: var(--n-rosa);">
        <h5 class="neon-text" style="color: var(--n-rosa); text-shadow: 0 0 10px var(--n-rosa);">Historias</h5>
        <button class="btn-neon" style="background: var(--n-rosa); box-shadow: 0 0 20px var(--n-rosa);" onclick="upImg()">VER AHORA</button>
    </div>
    <div class="door-item" style="border-color: var(--n-azul);">
        <h5 class="neon-text" style="color: var(--n-azul); text-shadow: 0 0 10px var(--n-azul);">Estados</h5>
        <button class="btn-neon" style="background: var(--n-azul); box-shadow: 0 0 20px var(--n-azul);" onclick="upImg()">EXPLORAR</button>
    </div>
    <div class="door-item" style="border-color: var(--n-rojo);">
        <h5 class="neon-text" style="color: var(--n-rojo); text-shadow: 0 0 10px var(--n-rojo);">Videos</h5>
        <button class="btn-neon" style="background: var(--n-rojo); box-shadow: 0 0 20px var(--n-rojo);" onclick="upImg()">PLAY</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function startup() {
        const nav = document.getElementById('salas-list');
        salas.forEach((s, i) => {
            let div = document.createElement('div');
            div.className = 'r-opt'; div.id = 'room-'+i;
            div.innerHTML = `<b>${s}</b>`;
            div.onclick = () => setRoom(i);
            nav.appendChild(div);
        });
        setRoom(0);
    }

    function setRoom(i) {
        document.querySelectorAll('.r-opt').forEach(x => x.classList.remove('active'));
        document.getElementById('room-'+i).classList.add('active');
        const visor = document.getElementById('sala-img-box');
        
        // SISTEMA DE CARGA DIRECTA:
        // Asegúrate de que los archivos SPA.jpg, DISCOTECA.jpg, etc. estén en la carpeta.
        visor.src = salas[i] + ".jpg";
    }

    function sendMsg() {
        const input = document.getElementById('chat-text');
        if(!input.value) return;
        document.getElementById('chat-window').innerHTML += `<div style="text-align:right; color:var(--oro); margin-bottom:10px;"><b>Tú:</b> ${input.value}</div>`;
        input.value = "";
    }

    function upImg() { alert("Acceso restringido a miembros VIP"); }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
