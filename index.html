<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | INTERACCIÓN TOTAL</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        header { height: 180px; background: #000; border-bottom: 4px solid var(--oro); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; flex-shrink: 0; position: relative; }
        .logo-img { height: 160px; filter: drop-shadow(0 0 30px var(--oro)); position: absolute; left: 50%; transform: translateX(-50%); }
        
        .stats-header { display: flex; flex-direction: column; gap: 5px; }
        .online-box { background: rgba(0,255,102,0.1); border: 2px solid var(--n-verde); padding: 8px 15px; border-radius: 8px; color: var(--n-verde); text-align: center; }
        .online-num { font-size: 20px; font-weight: 900; }

        .coin-grid { display: grid; grid-template-columns: repeat(2, 60px); gap: 10px; }
        .coin { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff9aa, var(--oro) 50%, #5c4928); border: 2px solid #111; color: #000; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 4px 0 #333; }

        /* MAIN LAYOUT */
        .main-app { display: grid; grid-template-columns: 250px 1fr 400px; gap: 15px; padding: 15px; flex-grow: 1; min-height: 0; }

        /* IZQUIERDA: CONTENIDO Y SUBIDA */
        .left-col { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .panel { background: #0a0a0a; border: 1px solid #333; border-radius: 10px; padding: 12px; }
        .panel-h { color: var(--oro); font-size: 11px; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        .upload-btn { width: 100%; padding: 8px; margin-bottom: 5px; background: #1a1a1a; border: 1px dashed #555; color: #888; cursor: pointer; border-radius: 5px; font-size: 10px; }
        .upload-btn:hover { border-color: var(--n-turq); color: #fff; }

        .p-btn { width: 100%; padding: 10px; margin-bottom: 5px; background: #111; border: 1px solid #333; color: #fff; cursor: pointer; border-radius: 5px; text-align: left; font-size: 11px; font-weight: 900; }
        .p-btn.active { background: #fff !important; color: #000 !important; }

        /* CENTRO: VISOR */
        .visor-container { background: #000; border: 4px solid #1a1a1a; border-radius: 15px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        .sala-info { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--n-turq); font-size: 12px; color: var(--n-turq); }

        /* DERECHA: CHICAS Y CHAT INTERACTIVO */
        .right-side { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .girls-row { display: flex; gap: 5px; height: 200px; flex-shrink: 0; }
        .girl-card { flex: 1; position: relative; border-radius: 8px; overflow: hidden; border: 1px solid #222; }
        .girl-card img { width: 100%; height: 100%; object-fit: cover; }
        .girl-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); text-align: center; font-size: 10px; padding: 3px 0; }

        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #050505; border: 2px solid #222; border-radius: 10px; overflow: hidden; }
        #chat-stream { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 13px; }
        .msg { margin-bottom: 8px; border-left: 4px solid; padding-left: 10px; }
        
        .chat-input { display: flex; padding: 10px; background: #111; border-top: 1px solid #222; }
        .chat-input input { flex-grow: 1; background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px; outline: none; }
        .chat-input button { background: var(--oro); color: #000; border: none; padding: 0 15px; margin-left: 5px; border-radius: 5px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body onclick="document.getElementById('room-sound').play()">

<header>
    <div class="stats-header">
        <div class="online-box">
            <span class="online-num" id="total-online">2,415</span>
            <div style="font-size:9px;">GLOBAL ONLINE</div>
        </div>
    </div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    <div class="coin-grid">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main-app">
    <div class="left-col">
        <div class="panel">
            <div class="panel-h">📤 SUBIR CONTENIDO</div>
            <button class="upload-btn" onclick="document.getElementById('file-up').click()">➕ SUBIR HISTORIA</button>
            <button class="upload-btn" onclick="document.getElementById('file-up').click()">➕ SUBIR VIDEO</button>
            <button class="upload-btn" onclick="document.getElementById('file-up').click()">➕ SUBIR ESTADO</button>
            <input type="file" id="file-up" style="display:none">
        </div>
        <div class="panel">
            <div class="panel-h">👑 SECCIONES VIP</div>
            <button class="p-btn" style="color:var(--n-turq)">⭐ VER HISTORIAS</button>
            <button class="p-btn" style="color:var(--n-rojo)">🎬 VER VIDEOS</button>
        </div>
        <div class="panel">
            <div class="panel-h">📍 SALAS EN VIVO</div>
            <div id="rooms-list"></div>
        </div>
    </div>

    <div class="visor-container">
        <div class="sala-info">📍 <span id="current-room-name">SALA</span> | 👤 <span id="room-users">0</span> ONLINE</div>
        <img id="main-view" src="">
        <a href="https://ali-link.com" id="ali-btn" style="position:absolute; bottom:20px; background:var(--n-rojo); color:#fff; padding:15px; border-radius:10px; font-weight:900; text-decoration:none; display:none; box-shadow:0 0 20px var(--n-rojo)">🛒 IR A LA TIENDITA ALI</a>
    </div>

    <div class="right-side">
        <div class="girls-row">
            <div class="girl-card"><img src="Rubia.jpg"><div class="girl-name">MIA</div></div>
            <div class="girl-card"><img src="Morocha.jpg"><div class="girl-name">TANIA</div></div>
            <div class="girl-card"><img src="Pelirroja.jpg"><div class="girl-name">COLO</div></div>
        </div>
        <div class="chat-area">
            <div id="chat-stream"></div>
            <div class="chat-input">
                <input type="text" id="user-msg" placeholder="Escribe a las chicas...">
                <button onclick="sendMsg()">ENVIAR</button>
            </div>
        </div>
    </div>
</div>

<audio id="room-sound" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "Sado_y_Maso.mp3", c: "#ff003c"}, 
        {n: "Spa", e: ".png", s: "Spa.mp3", c: "#00d9ff"}, 
        {n: "Biblioteca", e: ".png", s: "Biblioteca.mp3", c: "#bc13fe"}, 
        {n: "Camarera", e: ".png", s: "Camarera.mp3", c: "#00ff66"}, 
        {n: "Discoteca", e: ".png", s: "Discoteca.mp3", c: "#ff00ff"}, 
        {n: "El Bar", e: ".png", s: "El_Bar.mp3", c: "#d4af37"},
        {n: "Gimnasio", e: ".png", s: "Gimnasio.mp3", c: "#00ff66"}, 
        {n: "La Tiendita", e: ".png", s: "La_Tiendita.mp3", c: "#ff4500"}, 
        {n: "Oficina", e: ".png", s: "Oficina.mp3", c: "#1e90ff"}, 
        {n: "Playa", e: ".png", s: "Playa.mp3", c: "#ffff00"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.style.color = r.c; b.innerHTML = `🚪 ${r.n}`;
            b.onclick = (e) => { e.stopPropagation(); idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 8000); // Más lento: 8 segundos
        setInterval(botChat, 6000); // Chat más lento: 6 segundos
        setInterval(updateOnline, 3000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('r-'+idx);
        if(activeBtn) activeBtn.classList.add('active');
        
        const r = rooms[idx];
        document.getElementById('current-room-name').innerText = r.n.toUpperCase();
        document.getElementById('main-view').src = encodeURIComponent(r.n) + r.e;
        document.getElementById('ali-btn').style.display = (r.n === "La Tiendita") ? "block" : "none";
        document.getElementById('room-users').innerText = 50 + Math.floor(Math.random() * 100);
        
        const p = document.getElementById('room-sound');
        p.src = r.s; p.play().catch(() => {});
    }

    function botChat() {
        const msgs = [
            {u:"MIA", c:var(--n-turq), t:"🔞 ¿Quién quiere verme en la sala privada?"},
            {u:"TANIA", c:var(--n-verde), t:"🔥 Acabo de subir un video nuevo, ¿ya lo vieron?"},
            {u:"COLO", c:var(--n-rojo), t:"🔞 El chat está muy callado hoy... ¿son todos secos?"}
        ];
        const m = msgs[Math.floor(Math.random() * msgs.length)];
        addChat(m.u, m.c, m.t);
    }

    function sendMsg() {
        const input = document.getElementById('user-msg');
        if(input.value.trim()) {
            addChat("CLIENTE", "#fff", input.value);
            input.value = "";
        }
    }

    function addChat(user, color, text) {
        const box = document.getElementById('chat-stream');
        box.innerHTML += `<div class="msg" style="border-left-color:${color}; color:${color}"><b>${user}:</b> ${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function updateOnline() {
        let total = 2400 + Math.floor(Math.random() * 200);
        document.getElementById('total-online').innerText = total.toLocaleString();
    }

    function pay(n) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount=${n}&currency_code=USD`, '_blank'); }
    init();
</script>
</body>
</html>
