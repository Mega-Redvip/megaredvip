<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v88</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

        /* HEADER REDISEÑADO - SIN ENCIMAR */
        header { 
            background: #050505; border-bottom: 5px solid var(--n-rojo); 
            padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .header-top { display: grid; grid-template-columns: 1fr 2fr 1fr; width: 100%; align-items: center; gap: 20px; }
        .publi-banner { height: 120px; border: 2px solid var(--n-rojo); background: #0a0a0a; display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 20px; box-shadow: inset 0 0 15px var(--n-rojo); }
        .logo-box img { height: 220px; filter: drop-shadow(0 0 30px var(--n-rojo)); }

        .coins-container { display: flex; justify-content: center; gap: 25px; width: 100%; padding: 10px 0; }
        .coin { 
            width: 75px; height: 75px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 18px; cursor: pointer; border: 4px solid white; transition: 0.3s;
        }
        .coin:hover { transform: scale(1.1) rotate(10deg); box-shadow: 0 0 20px var(--oro); }

        /* CUERPO PRINCIPAL */
        .main-layout { display: grid; grid-template-columns: 320px 1fr 450px; gap: 20px; padding: 20px; flex-grow: 1; }

        /* COLUMNA IZQUIERDA: SALAS */
        .sidebar { background: #0a0a0a; border: 2px solid #222; border-radius: 15px; display: flex; flex-direction: column; height: 600px; padding: 15px; }
        .rooms-scroll { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .room-btn { 
            padding: 15px; background: #111; border: 1px solid #333; border-radius: 8px; 
            cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; transition: 0.2s;
        }
        .room-btn.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 15px var(--n-rojo); }
        .ali-btn { background: #000; color: #fff; border: 3px solid var(--n-rojo); padding: 15px; text-align: center; text-decoration: none; font-weight: 900; border-radius: 8px; margin-top: 15px; box-shadow: 0 0 15px var(--n-rojo); }

        /* COLUMNA CENTRAL: VISOR */
        .viewer { border: 5px solid var(--n-rojo); border-radius: 20px; background: #000; position: relative; overflow: hidden; height: 600px; }
        #main-img { width: 100%; height: 100%; object-fit: contain; }
        .geo-label { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: var(--oro); padding: 10px 20px; border: 2px solid var(--oro); border-radius: 10px; font-weight: 900; }

        /* COLUMNA DERECHA: CHAT */
        .chat-area { background: #080808; border: 4px solid var(--n-rojo); border-radius: 20px; display: flex; flex-direction: column; height: 600px; }
        #chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 15px; display: flex; flex-direction: column; gap: 15px; }
        #typing { color: #666; font-style: italic; padding: 0 20px 10px; display: none; }
        .chat-input-box { display: flex; padding: 20px; background: #111; gap: 10px; border-top: 2px solid #222; }
        #user-input { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 15px; border-radius: 10px; outline: none; }
        .send-btn { background: var(--n-rojo); border: none; padding: 0 25px; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; }

        /* LAS 3 PUERTAS (NIVEL INFERIOR) */
        .doors-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 30px; background: #050505; border-top: 5px solid var(--n-rojo); }
        .door-panel { background: #0a0a0a; border-radius: 20px; padding: 25px; text-align: center; border: 3px solid #333; transition: 0.3s; }
        .door-hist { border-color: var(--n-rosa); box-shadow: 0 0 20px var(--n-rosa); }
        .door-est { border-color: var(--n-azul); box-shadow: 0 0 20px var(--n-azul); }
        .door-vid { border-color: var(--n-rojo); box-shadow: 0 0 20px var(--n-rojo); }
        .door-content { height: 250px; background: #000; margin-bottom: 20px; border-radius: 10px; overflow-y: auto; padding: 10px; }
        .upload-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; color: white; font-weight: 900; cursor: pointer; }

    </style>
</head>
<body onload="iniciarImperio()">

<header>
    <div class="header-top">
        <div class="publi-banner">ANUNCIO VIP $50</div>
        <div class="logo-box"><img src="Logo Mega Red Lunar.jpg"></div>
        <div class="publi-banner">ANUNCIO VIP $100</div>
    </div>
    <div class="coins-container">
        <div class="coin" onclick="pagar(1)">$1</div>
        <div class="coin" onclick="pagar(5)">$5</div>
        <div class="coin" onclick="pagar(10)">$10</div>
        <div class="coin" onclick="pagar(20)">$20</div>
    </div>
</header>

<div class="main-layout">
    <div class="sidebar">
        <div class="rooms-scroll" id="rooms-list"></div>
        <a href="https://best.aliexpress.com/" target="_blank" class="ali-btn">🛒 TIENDA DE JUGUETES VIP</a>
    </div>

    <div class="viewer">
        <div class="geo-label">📍 TRANSMITIENDO EN VIVO: RESISTENCIA</div>
        <img id="main-img" src="">
    </div>

    <div class="chat-area">
        <div id="chat-window"></div>
        <div id="typing">Alguien está escribiendo...</div>
        <div class="chat-input-box">
            <input type="text" id="user-input" placeholder="Escríbele algo a la chica..." onkeypress="if(event.key==='Enter') enviarMensaje()">
            <button class="send-btn" onclick="enviarMensaje()">OK</button>
        </div>
    </div>
</div>

<div class="doors-container">
    <div class="door-panel door-hist">
        <h3 style="color:var(--n-rosa); margin-bottom:15px;">🔥 HISTORIAS</h3>
        <div class="door-content" id="cont-h"></div>
        <button class="upload-btn" style="background:var(--n-rosa)" onclick="subir('cont-h')">SUBIR HISTORIA</button>
    </div>
    <div class="door-panel door-est">
        <h3 style="color:var(--n-azul); margin-bottom:15px;">💬 ESTADOS</h3>
        <div class="door-content" id="cont-e"></div>
        <button class="upload-btn" style="background:var(--n-azul)" onclick="subir('cont-e')">SUBIR ESTADO</button>
    </div>
    <div class="door-panel door-vid">
        <h3 style="color:var(--n-rojo); margin-bottom:15px;">🔞 VIDEOS VIP</h3>
        <div class="door-content" id="cont-v"></div>
        <button class="upload-btn" style="background:var(--n-rojo)" onclick="subir('cont-v')">SUBIR VIDEO</button>
    </div>
</div>

<script>
    const salas = [
        {n: "Sado y Maso", e: ".jpg", b: "COLO", cl: "var(--n-rojo)"}, 
        {n: "Spa", e: ".png", b: "MIA", cl: "var(--n-rosa)"}, 
        {n: "Biblioteca", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Camarera", e: ".png", b: "MIA", cl: "var(--n-rosa)"},
        {n: "Discoteca", e: ".png", b: "COLO", cl: "var(--n-rojo)"},
        {n: "El Bar", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Gimnasio", e: ".png", b: "MIA", cl: "var(--n-rosa)"},
        {n: "Oficina", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Playa", e: ".png", b: "COLO", cl: "var(--n-rojo)"},
        {n: "La Tiendita", e: ".png", b: "MIA", cl: "var(--n-rosa)"}
    ];

    let indice = 0;
    let manual = false;

    function iniciarImperio() {
        const lista = document.getElementById('rooms-list');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'room-btn'; d.id = 'room-' + i;
            d.innerHTML = `<span>${s.n}</span><span style="color:#555">👥 0</span>`;
            d.onclick = () => { manual = true; activarSala(i); };
            lista.appendChild(d);
        });
        activarSala(0);

        setInterval(() => {
            if(!manual) {
                indice = (indice + 1) % salas.length;
                activarSala(indice);
            }
        }, 6000);
    }

    function activarSala(i) {
        indice = i;
        const s = salas[i];
        document.querySelectorAll('.room-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('room-' + i).classList.add('active');
        document.getElementById('main-img').src = encodeURI(s.n + s.e);
        
        if(manual) {
            const chat = document.getElementById('chat-window');
            chat.innerHTML = `<div style="text-align:center; color:#555; font-size:12px;">--- CHAT PRIVADO CON ${s.b} ---</div>`;
            botResponde(`¡Hola! Te vi entrar a mi sala de ${s.n}... justo hoy que estoy tan sola acá en Resistencia. ¿Cómo estás?`);
        }
    }

    function enviarMensaje() {
        const input = document.getElementById('user-input');
        const chat = document.getElementById('chat-window');
        if(!input.value) return;

        chat.innerHTML += `<div style="align-self:flex-end; background:#222; padding:10px 15px; border-radius:10px; border-left:4px solid var(--oro);"><b>Tú:</b> ${input.value}</div>`;
        const txt = input.value.toLowerCase();
        input.value = "";
        chat.scrollTop = chat.scrollHeight;

        let res = "Mmm... me gusta cómo suena eso. ¿Por qué no me regalas unas monedas y te cumplo un deseo?";
        if(txt.includes("hola") || txt.includes("buen")) res = `¡Hola bombón! Qué lindo que me hables. ¿Sos de acá de Resistencia?`;
        else if(txt.includes("nombre") || txt.includes("quien")) res = `Soy ${salas[indice].b}. Un placer... me suena que vamos a ser muy buenos amigos.`;
        else if(txt.includes("haces") || txt.includes("haciendo")) res = `Acá, aburrida... esperando que un hombre como vos me invite algo para empezar la fiesta.`;
        else if(txt.includes("donde") || txt.includes("vives")) res = `Estoy en Resistencia, Chaco. Si querés que nos veamos, demostrame que sos VIP arriba...`;
        else if(txt.includes("foto") || txt.includes("ver") || txt.includes("desnud")) res = "Uff, qué directo... me encanta. Pero esas cositas solo las muestro en privado por monedas.";
        else if(txt.includes("cuanto") || txt.includes("moneda") || txt.includes("pagar")) res = "Con 10 monedas doradas de las de arriba hacemos lo que vos quieras. ¿Te animás?";
        else if(txt.includes("linda") || txt.includes("hermosa")) res = "¡Ay, gracias! Me ponés roja... ¿siempre sos tan tierno?";

        botResponde(res);
    }

    function botResponde(t) {
        const typing = document.getElementById('typing');
        typing.innerText = `${salas[indice].b} está escribiendo...`;
        typing.style.display = "block";
        setTimeout(() => {
            typing.style.display = "none";
            const chat = document.getElementById('chat-window');
            chat.innerHTML += `<div><b style="color:${salas[indice].cl}">${salas[indice].b}:</b> ${t}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 1500);
    }

    function subir(id) {
        const link = prompt("Pega el link de la imagen o video:");
        if(link) {
            const div = document.getElementById(id);
            div.innerHTML = `<img src="${link}" style="width:100%; border-radius:10px; margin-top:10px; border:2px solid gold;">` + div.innerHTML;
        }
    }

    function pagar(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&item_name=VIP_Credits&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
