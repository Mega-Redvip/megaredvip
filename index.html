<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v66</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            overflow-y: auto; overflow-x: hidden;
        }

        /* HEADER ORIGINAL REESTABLECIDO */
        header { 
            display: grid; grid-template-columns: 350px 1fr 350px; 
            align-items: center; padding: 30px; border-bottom: 5px solid var(--n-rojo); 
            background: #050505; box-shadow: 0 0 35px var(--n-rojo);
        }
        .header-side { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .publi-box { width: 300px; height: 110px; border: 3px solid var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 14px; box-shadow: inset 0 0 15px var(--n-rojo); }
        .logo-center img { height: 280px; filter: drop-shadow(0 0 30px var(--n-rojo)); }
        
        .coins { display: flex; gap: 25px; margin-top: 10px; }
        .coin { 
            width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 3px solid white; font-size: 1.2em;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* CUERPO: SALAS IZQUIERDA (NOMBRE + IMAGEN ABAJO) */
        .main-container { 
            display: grid; grid-template-columns: 280px 1fr 480px; 
            gap: 25px; padding: 30px;
        }

        .rooms-list { display: flex; flex-direction: column; gap: 15px; }
        .room-item { 
            display: flex; flex-direction: column; gap: 5px; cursor: pointer;
            transition: 0.3s; padding: 5px; border-radius: 10px;
        }
        .room-name { 
            background: #111; border: 1px solid #333; padding: 10px; 
            text-align: center; font-size: 11px; text-transform: uppercase; border-radius: 5px;
        }
        .room-img-small { 
            width: 100%; height: 140px; object-fit: cover; border: 2px solid #222; border-radius: 5px; 
        }
        .room-item.active .room-name { background: var(--n-rojo); color: white; border-color: white; }
        .room-item.active .room-img-small { border-color: var(--n-rojo); box-shadow: 0 0 15px var(--n-rojo); }

        /* VISOR CENTRAL */
        .main-screen { 
            border: 6px solid var(--n-rojo); border-radius: 20px; height: 650px; 
            background: #000; overflow: hidden; box-shadow: 0 0 45px rgba(255,0,60,0.4);
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }

        /* BOTS NITIDEZ Y CUERPO COMPLETO */
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        .bots-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .bot-unit { height: 480px; display: flex; flex-direction: column; }
        .bot-img-box { 
            flex-grow: 1; border: 3px solid #222; border-radius: 15px; 
            overflow: hidden; background: #080808; 
        }
        .bot-img-box img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* ESTO ASEGURA CUERPO COMPLETO SIN PIXELAR */
            object-position: center; 
        }
        .bot-label { text-align: center; font-size: 13px; font-weight: 900; padding: 8px; border-radius: 6px; margin-top: 8px; }

        /* CHAT INTERACTIVO */
        .chat-container { 
            background: #050505; border: 3px solid var(--n-rojo); border-radius: 15px; 
            display: flex; flex-direction: column; height: 320px; box-shadow: inset 0 0 20px rgba(255,0,60,0.2);
        }
        #chat-stream { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-input-area { display: flex; padding: 12px; background: #111; border-radius: 0 0 12px 12px; gap: 10px; }
        .chat-input-area input { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 12px; border-radius: 8px; }
        .chat-input-area button { background: var(--n-rojo); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: 900; }

        /* ESTILOS DE MENSAJE */
        .m-bot { padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.03); border-bottom: 1px solid #1a1a1a; }
        .m-user { color: var(--oro); padding-left: 10px; border-left: 3px solid var(--oro); margin: 5px 0; font-size: 0.9em; }

        /* MUROS INFERIORES */
        .bottom-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 40px; border-top: 6px solid var(--n-rojo); }
        .wall-card { background: #0a0a0a; border: 2px solid var(--n-rojo); padding: 20px; border-radius: 20px; text-align: center; }
        .wall-display { height: 250px; background: #000; margin: 15px 0; border-radius: 10px; overflow-y: auto; padding: 10px; border: 1px solid #222; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="header-side">
        <div class="publi-box">ANUNCIO VIP $20</div>
        <div class="coins">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(3)">$3</div>
        </div>
    </div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg" alt="LOGO"></div>
    <div class="header-side">
        <div class="publi-box">ANUNCIO VIP $50</div>
        <div class="coins">
            <div class="coin" onclick="pay(5)">$5</div>
            <div class="coin" onclick="pay(10)">$10</div>
        </div>
    </div>
</header>

<div class="main-container">
    <div id="rooms-side" class="rooms-list"></div>

    <div class="viewer-area">
        <div class="main-screen"><img id="main-view" src=""></div>
    </div>

    <div class="right-panel">
        <div class="bots-row">
            <div class="bot-unit">
                <div class="bot-img-box"><img src="Rubia.jpg"></div>
                <div class="bot-label" style="background: rgba(255,0,255,0.1); color: var(--n-rosa);">MIA</div>
            </div>
            <div class="bot-unit">
                <div class="bot-img-box"><img src="Morocha.jpg"></div>
                <div class="bot-label" style="background: rgba(0,217,255,0.1); color: var(--n-azul);">TANIA</div>
            </div>
            <div class="bot-unit">
                <div class="bot-img-box"><img src="Pelirroja.jpg"></div>
                <div class="bot-label" style="background: rgba(255,0,60,0.1); color: var(--n-rojo);">COLO</div>
            </div>
        </div>
        <div class="chat-container">
            <div id="chat-stream"></div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Escribe aquí...">
                <button onclick="sendMessage()">ENVIAR</button>
            </div>
        </div>
    </div>
</div>

<div class="bottom-section">
    <div class="wall-card"><h3>📱 ESTADOS</h3><div class="wall-display" id="w-e"></div><button onclick="upload('w-e','img')">SUBIR FOTO</button></div>
    <div class="wall-card"><h3>📖 HISTORIAS</h3><div class="wall-display" id="w-h"></div><button onclick="upload('w-h','img')">SUBIR FOTO</button></div>
    <div class="wall-card"><h3>🎬 VIDEOS</h3><div class="wall-display" id="w-v"></div><button onclick="upload('w-v','video')">SUBIR VIDEO</button></div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"}
    ];

    function init() {
        const side = document.getElementById('rooms-side');
        rooms.forEach((r, i) => {
            const item = document.createElement('div');
            item.className = 'room-item'; item.id = 'r-' + i;
            item.innerHTML = `<div class="room-name">${r.n}</div><img src="${encodeURI(r.n + r.e)}" class="room-img-small">`;
            item.onclick = () => { selectRoom(i); };
            side.appendChild(item);
        });
        selectRoom(0);
        setInterval(() => { idx = (idx + 1) % rooms.length; selectRoom(idx); }, 7000);
        setInterval(botChat, 5000);
    }

    function selectRoom(i) {
        idx = i;
        document.querySelectorAll('.room-item').forEach(b => b.classList.remove('active'));
        document.getElementById('r-' + i).classList.add('active');
        document.getElementById('main-view').src = encodeURI(rooms[i].n + rooms[i].e);
        const p = document.getElementById('audio-player');
        p.src = rooms[i].s; p.play().catch(()=>{});
    }

    function sendMessage() {
        const inp = document.getElementById('user-input');
        if(!inp.value) return;
        const chat = document.getElementById('chat-stream');
        chat.innerHTML += `<div class="m-user"><b>Tú:</b> ${inp.value}</div>`;
        inp.value = ""; chat.scrollTop = chat.scrollHeight;
    }

    function botChat() {
        const chat = document.getElementById('chat-stream');
        const bots = [
            {n: "MIA", c: "var(--n-rosa)", m: "¡Hola! ¿Viste mi nueva foto abajo? 😍"},
            {n: "TANIA", c: "var(--n-azul)", m: "Si quieres un trago, ¡invítame con monedas! 💎"},
            {n: "COLO", c: "var(--n-rojo)", m: "Estoy por subir un video exclusivo... 🔥"}
        ];
        const b = bots[Math.floor(Math.random()*3)];
        chat.innerHTML += `<div class="m-bot"><b style="color:${b.c}">${b.n}:</b> ${b.m}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    function upload(id, type) {
        const url = prompt("Pega el enlace de la imagen o video:");
        if(url) {
            const wall = document.getElementById(id);
            wall.innerHTML = (type === 'img' ? `<img src="${url}" style="width:100%; border-radius:8px; margin-top:10px;">` : `<video controls src="${url}" style="width:100%; margin-top:10px;"></video>`) + wall.innerHTML;
        }
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
