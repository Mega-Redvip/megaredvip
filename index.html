<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | ARMONÍA TOTAL</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; 
            --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--fondo); color: white; font-family: 'Segoe UI', 'Arial Black', sans-serif; 
            overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;
        }

        /* HEADER COMPACTO Y ELEGANTE */
        header { 
            height: 320px; background: linear-gradient(to bottom, #111, #000); 
            border-bottom: 4px solid var(--oro); 
            display: grid; grid-template-columns: 280px 1fr 280px; align-items: center; 
            padding: 10px 30px; position: sticky; top: 0; z-index: 100;
        }

        .header-side { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .ads-box {
            width: 220px; height: 100px; border: 2px dashed #444; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #777; font-size: 11px; text-align: center; background: #080808;
        }

        /* MONEDAS 3D EN FILA DEBAJO DE PUBLICIDAD */
        .coin-pair { display: flex; gap: 15px; }
        .coin { 
            width: 65px; height: 65px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            border: 3px solid #111; color: #000; font-size: 18px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: 900; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.8), inset 0 -3px 4px rgba(0,0,0,0.6);
            transition: 0.1s;
        }
        .coin:active { transform: translateY(3px); box-shadow: 0 3px 6px rgba(0,0,0,1); }

        .logo-center { display: flex; justify-content: center; align-items: center; }
        .logo-img { height: 260px; filter: drop-shadow(0 0 30px rgba(212,175,55,0.5)); object-fit: contain; }

        /* CONTENEDOR PRINCIPAL: EQUILIBRIO DE 3 COLUMNAS */
        .main-app { 
            display: grid; 
            grid-template-columns: 320px 1fr 380px; 
            gap: 20px; padding: 20px; 
            max-width: 1800px; margin: 0 auto; width: 100%;
        }
        
        /* COLUMNA 1: SALAS (TARJETAS HORIZONTALES) */
        .rooms-panel { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 15px; height: 750px; overflow-y: auto; }
        .room-item { 
            display: flex; align-items: center; gap: 12px; background: #111; border: 1px solid #333; 
            border-radius: 10px; padding: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s;
        }
        .room-item:hover { border-color: var(--oro); background: #161616; }
        .room-item.active { background: var(--oro); color: #000; border-color: #fff; box-shadow: 0 0 15px var(--oro); }
        .room-thumb { width: 90px; height: 65px; border-radius: 6px; object-fit: cover; background: #000; }
        .room-name { font-size: 14px; font-weight: 800; text-transform: uppercase; }

        /* COLUMNA 2: EL CORAZÓN (VISOR) */
        .visor-container { display: flex; flex-direction: column; gap: 15px; }
        .visor { 
            background: #000; border: 4px solid #1a1a1a; border-radius: 20px; 
            height: 550px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        .sala-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--n-turq); z-index: 10; font-size: 14px; }

        /* COLUMNA 3: CHICAS Y CHAT (INTEGRADOS) */
        .right-panel { display: flex; flex-direction: column; gap: 15px; height: 750px; }
        .girls-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; height: 160px; }
        .girl-box { border: 1px solid #222; border-radius: 10px; overflow: hidden; position: relative; background: #050505; }
        .girl-box img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .girl-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 4px; font-size: 11px; color: var(--oro); }

        .chat-area { 
            background: #050505; border: 1px solid #222; border-radius: 12px; 
            padding: 15px; flex-grow: 1; overflow-y: auto; 
            display: flex; flex-direction: column-reverse; gap: 10px;
        }
        .msg { font-size: 13px; border-left: 3px solid var(--oro); padding-left: 10px; color: #ccc; }

        /* SECCIÓN INFERIOR: MUROS (COMPACTOS) */
        .bottom-walls { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; 
            padding: 20px 40px 40px; border-top: 2px solid #111; 
        }
        .wall-box { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 15px; }
        .wall-title { font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .wall-content { height: 150px; overflow-y: auto; margin-bottom: 10px; font-size: 12px; color: #888; display: flex; flex-direction: column-reverse; gap: 5px; }
        .up-btn { width: 100%; padding: 10px; background: #111; color: var(--oro); border: 1px solid var(--oro); cursor: pointer; border-radius: 8px; font-weight: 800; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        .up-btn:hover { background: var(--oro); color: #000; }

        /* SCROLLBAR PERSONALIZADA */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="header-side">
        <div class="ads-box">PUBLICITE AQUÍ</div>
        <div class="coin-pair">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(3)">$3</div>
        </div>
    </div>

    <div class="logo-center">
        <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    </div>

    <div class="header-side">
        <div class="ads-box">PUBLICITE AQUÍ</div>
        <div class="coin-pair">
            <div class="coin" onclick="pay(5)">$5</div>
            <div class="coin" onclick="pay(10)">$10</div>
        </div>
    </div>
</header>

<div class="main-app">
    <div id="rooms-list" class="rooms-panel">
        <div style="color:var(--oro); font-size: 16px; font-weight: 900; margin-bottom: 15px; padding-left: 5px;">🚪 SALAS VIP</div>
    </div>

    <div class="visor-container">
        <div class="visor">
            <div class="sala-tag">
                <span style="color:var(--n-verde)">●</span> 📍 <span id="s-nom">SALA</span> | 👤 <span id="s-users">0</span>
            </div>
            <img id="main-view" src="">
        </div>
        <div style="background:#0a0a0a; padding: 10px; border-radius: 10px; border: 1px solid #1a1a1a; font-size: 12px; color: #555; text-align: center;">
            SISTEMA DE MONETIZACIÓN ACTIVO | © 2026 MEGA RED VIP
        </div>
    </div>

    <div class="right-panel">
        <div class="girls-row">
            <div class="girl-box"><img src="Rubia.jpg"><div class="girl-label">MIA</div></div>
            <div class="girl-box"><img src="Morocha.jpg"><div class="girl-label">TANIA</div></div>
            <div class="girl-box"><img src="Pelirroja.jpg"><div class="girl-label">COLO</div></div>
        </div>
        <div id="chat-stream" class="chat-area"></div>
    </div>
</div>

<div class="bottom-walls">
    <div class="wall-box">
        <div class="wall-title" style="color:var(--n-turq)">📖 HISTORIAS</div>
        <div class="wall-content" id="wall-h"></div>
        <button class="up-btn">📤 SUBIR</button>
    </div>
    <div class="wall-box">
        <div class="wall-title" style="color:var(--n-rojo)">🎬 VIDEOS</div>
        <div class="wall-content" id="wall-v"></div>
        <button class="up-btn">📤 SUBIR</button>
    </div>
    <div class="wall-box">
        <div class="wall-title" style="color:var(--n-verde)">📱 ESTADOS</div>
        <div class="wall-content" id="wall-e"></div>
        <button class="up-btn">📤 SUBIR</button>
    </div>
</div>

<audio id="audio-player" autoPlay loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym_movimiento.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda_musica.mp3"}, 
        {n: "Oficina", e: ".png", s: "oficina_ambiente.mp3"}, {n: "Playa", e: ".png", s: "playa_olas.mp3"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const d = document.createElement('div');
            d.className = 'room-item'; d.id = 'r-'+i;
            d.innerHTML = `<img src="${encodeURI(r.n+r.e)}" class="room-thumb"> <span class="room-name">${r.n}</span>`;
            d.onclick = () => { idx = i; refresh(); };
            list.appendChild(d);
        });
        refresh();
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 9000);
        setInterval(botChat, 2500);
    }

    function refresh() {
        document.querySelectorAll('.room-item').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        const r = rooms[idx];
        document.getElementById('s-nom').innerText = r.n.toUpperCase();
        document.getElementById('main-view').src = encodeURI(r.n + r.e);
        document.getElementById('s-users').innerText = 200 + Math.floor(Math.random()*800);
        
        const player = document.getElementById('audio-player');
        player.src = r.s;
        player.play().catch(e => {});
    }

    function botChat() {
        const chat = document.getElementById('chat-stream');
        const msgs = ["🔞 Show privado!", "🔥 Mira mi muro!", "💎 Dame tokens!", "Subí video nuevo!", "Hola Resistencia!"];
        const n = ["MIA", "TANIA", "COLO", "Admin", "User_77"][Math.floor(Math.random()*5)];
        chat.innerHTML = `<div class="msg"><b>${n}:</b> ${msgs[Math.floor(Math.random()*5)]}</div>` + chat.innerHTML;
        updateWalls(n);
    }

    function updateWalls(u) {
        const walls = ['wall-h', 'wall-v', 'wall-e'];
        const w = document.getElementById(walls[Math.floor(Math.random()*3)]);
        w.innerHTML = `<div><b>${u}</b> actualizó...</div>` + w.innerHTML;
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
