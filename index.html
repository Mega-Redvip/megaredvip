<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v140</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 250px 130px 1fr; 
            align-items: center; gap: 20px; padding: 20px;
            background: #050505; border-bottom: 8px solid var(--n-rojo); height: 350px;
        }
        .logo-v140 { height: 250px; width: 250px; object-fit: contain; filter: drop-shadow(0 0 25px var(--n-rojo)); }
        .coin { width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; border: 5px solid white; cursor: pointer; }
        .publi-box { border: 4px solid var(--n-rojo); height: 240px; border-radius: 20px; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: 0 0 15px var(--n-rojo); font-size: 20px; }

        /* SECCIÓN SUPERIOR: SALAS */
        .seccion-salas { display: grid; grid-template-columns: 300px 1fr; height: 550px; border-bottom: 8px solid var(--n-rojo); }
        .menu-salas { overflow-y: auto; background: #080808; border-right: 2px solid #333; }
        .btn-s { padding: 20px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.3s; color: #555; }
        .btn-s.active { background: var(--n-rojo); color: white; }
        
        .visor-vip { background: #000; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #img-sala { width: 100%; height: 100%; object-fit: cover; display: none; }
        .msg-status { position: absolute; text-align: center; padding: 30px; border: 2px dashed #333; }

        /* SECCIÓN 50/50: BOTS IGUALADAS Y CHAT */
        .seccion-ia { display: grid; grid-template-columns: 50% 50%; height: 550px; }

        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; border-right: 5px solid var(--n-rojo); }
        .bot-container { 
            position: relative; 
            height: 550px; /* ALTURA FIJA PARA EVITAR ESCALERA */
            overflow: hidden; 
            border-right: 1px solid #111; 
            background: #050505;
        }
        .bot-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Recorta el sobrante para que todas sean iguales */
            object-position: top; /* Prioriza que se vea la cara */
        }
        .nombre-tag { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 28px; font-weight: 900; text-shadow: 0 0 10px #000; }

        .chat-container { display: flex; flex-direction: column; background: #0a0a0a; height: 550px; }
        #box-mensajes { flex-grow: 1; padding: 25px; overflow-y: auto; font-size: 16px; border-bottom: 2px solid #222; }
        .zona-input { padding: 20px; display: flex; gap: 10px; background: #111; }
        #input-chat { flex-grow: 1; background: #000; border: 3px solid var(--n-rojo); color: white; padding: 15px; border-radius: 10px; outline: none; }

        /* PUERTAS */
        .footer-puertas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px; background: #000; }
        .puerta { background: #080808; border: 2px solid #222; padding: 20px; border-radius: 20px; text-align: center; }
        .preview-area { height: 100px; background: #000; border: 1px dashed #444; margin-bottom: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .btn-puerta { width: 100%; padding: 20px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; }
    </style>
</head>
<body onload="imperioStart()">

<header>
    <div class="publi-box">AUSPICIANTE<br>VIP</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pago(1)">$1</div><div class="coin" onclick="pago(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v140">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pago(10)">$10</div><div class="coin" onclick="pago(20)">$20</div></div>
    <div class="publi-box">ANÚNCIATE<br>AQUÍ</div>
</header>

<div class="seccion-salas">
    <div class="menu-salas" id="menu-s"></div>
    <div class="visor-vip">
        <div id="status-visor" class="msg-status">
            <p>CONECTANDO...</p>
            <small id="debug-file" style="color:#555"></small>
        </div>
        <img id="img-sala" src="" onerror="reintentarCarga(this)">
    </div>
</div>

<div class="seccion-ia">
    <div class="grid-bots">
        <div class="bot-container"><img src="Rubia.jpg"><div class="nombre-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-container"><img src="Morocha.jpg"><div class="nombre-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-container"><img src="Pelirroja.jpg"><div class="nombre-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-container">
        <div id="box-mensajes"></div>
        <div class="zona-input">
            <input type="text" id="input-chat" placeholder="Escribe a las chicas..." onkeypress="if(event.key==='Enter') enviarMsg()">
            <button onclick="enviarMsg()" style="background:var(--n-rojo); color:white; border:none; padding:0 25px; border-radius:10px; cursor:pointer; font-weight:bold;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-puertas">
    <div class="puerta">
        <div class="preview-area" id="p-historia">HISTORIA</div>
        <button class="btn-puerta" style="background:var(--n-rosa)" onclick="subir('p-historia')">Historias</button>
    </div>
    <div class="puerta">
        <div class="preview-area" id="p-estado">ESTADO</div>
        <button class="btn-puerta" style="background:var(--n-azul)" onclick="subir('p-estado')">Estados</button>
    </div>
    <div class="puerta">
        <div class="preview-area" id="p-video">VIDEO</div>
        <button class="btn-puerta" style="background:var(--n-rojo)" onclick="subir('p-video')">Videos</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    let idS = 0;

    function imperioStart() {
        const ms = document.getElementById('menu-s');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'btn-s'; d.id = 's-'+i;
            d.innerHTML = `<b>${s}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => cargarSala(i);
            ms.appendChild(d);
        });
        cargarSala(0);
        setInterval(() => { idS = (idS + 1) % salas.length; cargarSala(idS); }, 6000);
        escribirChat("TANIA", "¡Hola! He ajustado las fotos para que todas midan lo mismo. ¿Te gusta cómo nos vemos?");
    }

    function cargarSala(i) {
        idS = i;
        document.querySelectorAll('.btn-s').forEach(x => x.classList.remove('active'));
        document.getElementById('s-'+i).classList.add('active');
        
        const img = document.getElementById('img-sala');
        const st = document.getElementById('status-visor');
        const dbg = document.getElementById('debug-file');
        
        img.style.display = "none";
        st.style.display = "block";
        dbg.innerText = "Buscando: " + salas[i] + ".jpg";
        
        img.dataset.retry = "0";
        img.src = salas[i] + ".jpg";
    }

    function reintentarCarga(img) {
        let r = parseInt(img.dataset.retry);
        const nom = salas[idS];
        if(r === 0) { 
            img.dataset.retry = "1"; 
            img.src = nom.replace(/\s/g, "") + ".jpg"; // Intenta "SPA.jpg" o "ELBAR.jpg"
        } else {
            document.getElementById('debug-file').innerHTML = `<span style="color:red">ERROR:</span> Archivo "${nom}.jpg" no encontrado.`;
        }
    }

    document.getElementById('img-sala').onload = function() {
        this.style.display = "block";
        document.getElementById('status-visor').style.display = "none";
    };

    function enviarMsg() {
        const input = document.getElementById('input-chat');
        if(!input.value.trim()) return;
        document.getElementById('box-mensajes').innerHTML += `<div style="text-align:right; margin-bottom:15px; color:var(--oro)"><b>Tú:</b> ${input.value}</div>`;
        setTimeout(() => {
            const girls = ["MIA", "TANIA", "COLO"];
            escribirChat(girls[Math.floor(Math.random()*3)], "¡Estamos listas para ti!");
        }, 800);
        input.value = "";
        const box = document.getElementById('box-mensajes');
        box.scrollTop = box.scrollHeight;
    }

    function escribirChat(n, m) {
        const box = document.getElementById('box-mensajes');
        const color = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        box.innerHTML += `<div style="margin-bottom:15px;"><b style="color:${color}">${n}:</b> ${m}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function subir(id) {
        let n = prompt("Nombre del archivo a subir:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pago(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
