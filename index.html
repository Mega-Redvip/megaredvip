<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | LIVE & PROFIT</title>
    <style>
        :root { --oro: #d4af37; --oro-l: #fff9aa; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-azul: #00d9ff; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; }
        
        /* LOGO AGRANDADO: +1.5cm aprox son 60px extra a cada lado */
        header { height: 180px; background: #000; border-bottom: 4px solid var(--oro); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .logo-box { flex: 1; display: flex; justify-content: center; }
        .logo-img { height: 160px; width: auto; max-width: 900px; filter: drop-shadow(0 0 20px var(--oro)); transition: 0.3s; }
        
        .ad-slot-header { width: 280px; height: 130px; border: 3px dashed var(--n-verde); background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; }
        .live-global { color: var(--n-rojo); font-size: 12px; margin-top: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .coin-box { width: 200px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .coin { width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--oro-l), var(--oro) 60%, #8a6d3b); border: 2px solid #b8860b; color: #3d2b00; font-weight: 900; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.8); transition: 0.2s; }
        .coin:hover { transform: scale(1.1); filter: brightness(1.2); }
        .main { display: grid; grid-template-columns: 300px 1fr 420px; height: calc(100vh - 180px); gap: 12px; padding: 12px; }
        .puertas { background: #080808; border-radius: 10px; overflow-y: auto; padding: 10px; border: 1px solid #222; }
        .p-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #111; border: 1px solid #333; color: #999; cursor: pointer; text-align: left; font-size: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .p-btn.active { border-color: var(--oro); color: var(--oro); background: #1a1500; border-width: 2px; }
        .visor { height: 55%; background: #000; border-radius: 15px; border: 2px solid #151515; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #main-view { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* BOTÓN ALI EXPRESS EN LA TIENDITA */
        #shop-link { position: absolute; bottom: 20px; background: #ff4747; color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-size: 18px; font-weight: bold; display: none; box-shadow: 0 0 20px #ff4747; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .muro-clientes { height: 45%; background: #050505; border: 1px solid #222; border-radius: 15px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .chat-p { flex: 1; background: #020202; border: 1px solid #333; border-radius: 10px; padding: 15px; overflow-y: auto; }
        .msg { margin-bottom: 10px; font-size: 13px; border-left: 4px solid; padding-left: 10px; }
        .sys-msg { color: var(--oro); font-weight: bold; text-align: center; background: #1a1500; border: none; padding: 5px; }
        .m-msg { color: var(--n-verde); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="ad-slot-header">
        <b>SLOT PUBLICITARIO</b>
        <div class="live-global">🔴 <span id="global-count">14,520</span> SOCIOS ONLINE</div>
    </div>
    <div class="logo-box"><img src="Logo Mega Red Lunar.jpg" class="logo-img" onerror="this.src='https://via.placeholder.com/1000x300/000/d4af37?text=MEGA+RED+VIP'"></div>
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main">
    <div class="puertas" id="p-list"></div>
    <div class="center">
        <div class="visor">
            <img id="main-view" src="">
            <a href="https://s.click.aliexpress.com/e/_tu_id_aqui" id="shop-link" target="_blank">🛒 VER OFERTAS VIP (AliExpress)</a>
        </div>
        <div class="muro-clientes">
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <button onclick="alert('Subiendo video...')" style="color:var(--n-rojo); border:2px solid; background:0; padding:8px; font-weight:bold; cursor:pointer;">📹 VÍDEO</button>
                <button onclick="alert('Escribiendo...')" style="color:var(--n-verde); border:2px solid; background:0; padding:8px; font-weight:bold; cursor:pointer;">✍️ ESTADO</button>
                <button onclick="alert('Cámara abierta')" style="color:var(--n-azul); border:2px solid; background:0; padding:8px; font-weight:bold; cursor:pointer;">📸 HISTORIA</button>
            </div>
            <div id="feed-box" style="font-size: 11px; color: #666; padding: 10px;">Conectando con el servidor de medios...</div>
        </div>
    </div>
    <div class="right">
        <div class="chat-p" id="chat-win"></div>
    </div>
</div>

<script>
    let idx = 0; let userCity = "tu zona";
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];

    async function getGeo() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            userCity = data.city || "tu zona";
            addMsg("SISTEMA", `📍 SOCIO DETECTADO EN: ${userCity.toUpperCase()}`, "sys-msg");
            
            // CHAT MÁS HUMANO
            setTimeout(() => {
                addMsg("MIA", `🔥 ¿Hay alguien de ${userCity} conectado ahora? Me dijeron que los de ahí son tremendos...`, "m-msg");
            }, 3000);
        } catch (e) { userCity = "esta zona"; }
    }

    function init() {
        getGeo();
        const menu = document.getElementById('p-list');
        rooms.forEach((name, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = "btn-" + i;
            b.innerHTML = `<span>🚪 ${name.toUpperCase()}</span> <span style="color:red">●</span>`;
            b.onclick = () => { idx = i; refresh(); };
            menu.appendChild(b);
        });
        refresh();
        setInterval(warChat, 4000);
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 15000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        document.getElementById("btn-" + idx).classList.add('active');
        document.getElementById('main-view').src = "./" + rooms[idx] + ".jpg";
        
        // MOSTRAR LINK DE ALIEXPRESS SOLO EN LA TIENDITA
        document.getElementById('shop-link').style.display = (rooms[idx] === "La Tiendita") ? "block" : "none";
    }

    function pay(n) {
        addMsg("SISTEMA", `🔥 ¡Socio envió $${n} USD a MEGA RED VIP! 🔥`, "sys-msg");
        window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&item_name=TOKENS_MEGA_RED_VIP&amount=${n}&currency_code=USD`, '_blank');
    }

    function addMsg(name, txt, cl) {
        const win = document.getElementById('chat-win');
        win.innerHTML += `<div class="msg ${cl}"><b>${name}:</b> ${txt}</div>`;
        win.scrollTop = win.scrollHeight;
    }

    function warChat() {
        const msgs = [
            `¿Algún socio de ${userCity} quiere ver algo especial?`,
            `¡Uff, que calor hace en ${userCity} hoy!`,
            `Si alguien de ${userCity} me da 5 tokens, bailo.`,
            "¡Vayan a la Tiendita, hay ofertas nuevas!"
        ];
        const r = msgs[Math.floor(Math.random()*msgs.length)];
        addMsg("BOT", r, "m-msg");
    }

    init();
</script>
</body>
</html>
