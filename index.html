<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v154</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 250px 130px 1fr; 
            align-items: center; gap: 20px; padding: 15px;
            background: #050505; border-bottom: 8px solid var(--n-rojo); height: 300px;
        }
        .pub-box { border: 3px solid var(--n-rojo); height: 220px; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #222; font-size: 30px; }
        .logo-v154 { height: 220px; width: 220px; object-fit: contain; }
        .coin { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; border: 4px solid white; cursor: pointer; }

        /* SECCIÓN SALAS: TRIPLE COLUMNA */
        .seccion-salas { 
            display: grid; 
            grid-template-columns: 250px 1fr 350px; 
            height: 550px; 
            border-bottom: 8px solid var(--n-rojo); 
        }
        .menu-l { overflow-y: auto; background: #080808; border-right: 2px solid #222; }
        .s-btn { padding: 15px; border-bottom: 1px solid #111; cursor: pointer; color: #555; font-size: 13px; }
        .s-btn.active { background: var(--n-rojo); color: white; }
        
        .visor-vip { background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #sala-img { width: 100%; height: 100%; object-fit: cover; } /* QUITA RELLENO NEGRO */

        /* CHAT INDIVIDUAL POR SALA */
        .chat-sala { background: #050505; border-left: 2px solid #222; display: flex; flex-direction: column; }
        .chat-header { padding: 10px; background: #111; text-align: center; color: var(--oro); font-size: 12px; border-bottom: 1px solid #222; }
        .chat-msg-area { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 13px; font-family: sans-serif; }
        .chat-input-sala { padding: 10px; display: flex; gap: 5px; }
        .chat-input-sala input { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 8px; border-radius: 4px; font-size: 12px; }

        /* SECCIÓN IA: 750PX (MÁS ALTO) */
        .seccion-ia { display: grid; grid-template-columns: 50% 50%; height: 750px; }

        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); border-right: 8px solid var(--n-rojo); }
        .bot-cell { position: relative; height: 750px; overflow: hidden; }
        .bot-cell img { width: 100%; height: 100%; object-fit: cover; object-position: top; } /* SIN RELLENO NEGRO */
        .bot-name { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 32px; font-weight: 900; text-shadow: 0 0 15px #000; }

        /* CHAT BOTS AJUSTADO A 750PX */
        .chat-bots-wrap { display: flex; flex-direction: column; height: 750px; background: #0a0a0a; }
        #chat-bots-logs { flex-grow: 1; padding: 30px; overflow-y: auto; font-size: 18px; }
        .chat-bots-bar { padding: 25px; background: #111; display: flex; gap: 15px; }
        #chat-bots-in { flex-grow: 1; background: #000; border: 4px solid var(--n-rojo); color: white; padding: 15px; border-radius: 10px; outline: none; font-size: 16px; }

        /* PUERTAS */
        .footer-p { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; background: #000; }
        .p-box { background: #080808; border: 1px solid #333; border-radius: 20px; padding: 20px; text-align: center; }
        .p-pre { height: 120px; background: #000; border: 2px dashed #444; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-btn { width: 100%; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body onload="startImperio()">

<header>
    <div class="pub-box">AD</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v154">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="pub-box">AD</div>
</header>

<div class="seccion-salas">
    <div class="menu-l" id="menu-l"></div>
    <div class="visor-vip"><img id="sala-img" src=""></div>
    <div class="chat-sala">
        <div class="chat-header" id="chat-sala-name">CHAT SALA</div>
        <div class="chat-msg-area" id="chat-sala-logs"></div>
        <div class="chat-input-sala">
            <input type="text" id="in-sala" placeholder="Habla en la sala..." onkeypress="if(event.key==='Enter') enviarSala()">
            <button onclick="enviarSala()" style="background:var(--n-rojo); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">OK</button>
        </div>
    </div>
</div>

<div class="seccion-ia">
    <div class="grid-bots">
        <div class="bot-cell"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-cell"><img src="Morocha.jpg"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-cell"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-bots-wrap">
        <div id="chat-bots-logs"></div>
        <div class="chat-bots-bar">
            <input type="text" id="chat-bots-in" placeholder="Habla con Mia, Tania y Colo..." onkeypress="if(event.key==='Enter') enviarBots()">
            <button onclick="enviarBots()" style="background:var(--n-rojo); color:white; border:none; padding:0 30px; border-radius:10px; cursor:pointer; font-weight:bold;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-p">
    <div class="p-box">
        <div class="p-pre" id="v-h"></div>
        <button onclick="up('v-h')" style="background:var(--n-rosa)" class="p-btn">Historias</button>
    </div>
    <div class="p-box">
        <div class="p-pre" id="v-e"></div>
        <button onclick="up('v-e')" style="background:var(--n-azul)" class="p-btn">Estados</button>
    </div>
    <div class="p-box">
        <div class="p-pre" id="v-v"></div>
        <button onclick="up('v-v')" style="background:var(--n-rojo)" class="p-btn">Videos</button>
    </div>
</div>

<script>
    const salasData = [
        { n: "SADO Y MASO", f: "Sado y Maso.jpg" },
        { n: "SPA", f: "Spa.png" },
        { n: "BIBLIOTECA", f: "Biblioteca.png" },
        { n: "CAMARERA", f: "Camarera.png" },
        { n: "DISCOTECA", f: "Discoteca.png" },
        { n: "EL BAR", f: "El Bar.png" },
        { n: "GIMNASIO", f: "Gimnasio.png" },
        { n: "OFICINA", f: "Oficina.png" },
        { n: "PLAYA", f: "Playa.png" },
        { n: "LA TIENDITA", f: "La Tiendita.png" }
    ];
    let actual = 0;

    function startImperio() {
        const ml = document.getElementById('menu-l');
        salasData.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-btn'; d.id = 'sl-'+i;
            d.innerHTML = `<b>${s.n}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        msgBots("TANIA", "¡Diseño v154 activado! Ahora cada sala tiene su propio chat y nosotras medimos 750px.");
    }

    function ver(i) {
        actual = i;
        document.querySelectorAll('.s-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        document.getElementById('sala-img').src = salasData[i].f;
        document.getElementById('chat-sala-name').innerText = "CHAT EN VIVO: " + salasData[i].n;
        document.getElementById('chat-sala-logs').innerHTML = `<div style="color:#444 italic">Te has unido a la sala ${salasData[i].n}...</div>`;
    }

    // CHAT DE LAS BOTS (ABAJO)
    function enviarBots() {
        const i = document.getElementById('chat-bots-in');
        if(!i.value.trim()) return;
        document.getElementById('chat-bots-logs').innerHTML += `<div style="text-align:right; margin-bottom:15px; color:var(--oro)"><b>Tú:</b> ${i.value}</div>`;
        setTimeout(() => msgBots("MIA", "¡Nos encanta este nuevo tamaño de 750px!"), 800);
        i.value = "";
        document.getElementById('chat-bots-logs').scrollTop = document.getElementById('chat-bots-logs').scrollHeight;
    }

    function msgBots(n, m) {
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-bots-logs').innerHTML += `<div style="margin-bottom:15px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-bots-logs').scrollTop = document.getElementById('chat-bots-logs').scrollHeight;
    }

    // CHAT DE LAS SALAS (ARRIBA)
    function enviarSala() {
        const i = document.getElementById('in-sala');
        if(!i.value.trim()) return;
        document.getElementById('chat-sala-logs').innerHTML += `<div style="margin-bottom:10px;"><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
        document.getElementById('chat-sala-logs').scrollTop = document.getElementById('chat-sala-logs').scrollHeight;
    }

    function up(id) {
        let n = prompt("Nombre de la imagen:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
