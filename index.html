<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v119</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* 1. CABEZAL */
        header { 
            display: flex; justify-content: center; align-items: center; gap: 30px;
            padding: 15px; background: #050505; border-bottom: 6px solid var(--n-rojo);
            height: 300px;
        }
        .logo-img { height: 280px; filter: drop-shadow(0 0 25px var(--n-rojo)); }
        .coin-box { display: flex; flex-direction: column; gap: 8px; }
        .coin { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 20px; cursor: pointer; border: 4px solid white;
            box-shadow: 0 0 10px var(--oro);
        }

        /* 2. SALAS Y VISOR */
        .rooms-area { display: grid; grid-template-columns: 280px 1fr; gap: 15px; padding: 15px; height: 450px; }
        .rooms-nav { display: flex; flex-direction: column; gap: 4px; background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 10px; overflow-y: auto; }
        .r-opt { 
            padding: 10px; background: #111; border-radius: 6px; border: 1px solid #444;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: white; font-size: 13px;
        }
        .r-opt.active { background: var(--n-rojo); border-color: white; }

        .r-viewer { border: 6px solid var(--n-rojo); border-radius: 25px; background: #000; overflow: hidden; }
        #sala-img-box { width: 100%; height: 100%; object-fit: cover; }

        /* 3. BOTS Y CHAT (REDUCIDOS A LA MITAD) */
        .main-content { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; padding: 15px; 
            height: 500px; /* ALTURA REDUCIDA A LA MITAD */
        }
        
        .unit { position: relative; background: #050505; border: 3px solid #222; border-radius: 20px; overflow: hidden; height: 100%; }
        .unit img { width: 100%; height: 100%; object-fit: cover; }
        .unit-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 10px; font-size: 20px; font-weight: 900; }

        .chat-unit { 
            background: #050505; border: 5px solid var(--n-rojo); border-radius: 20px; 
            display: flex; flex-direction: column; height: 100%; 
        }
        #chat-window { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 13px; }
        .chat-input-box { padding: 10px; background: #111; display: flex; gap: 5px; }
        #chat-text { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 8px; border-radius: 5px; outline: none; font-size: 12px; }

        /* 4. PUERTAS */
        .doors-footer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 15px; border-top: 6px solid var(--n-rojo); }
        .door-item { background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 10px; text-align: center; }
    </style>
</head>
<body onload="startup()">

<header>
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div>
        <div class="coin" onclick="pay(5)">$5</div>
    </div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    <div class="coin-box">
        <div class="coin" onclick="pay(10)">$10</div>
        <div class="coin" onclick="pay(20)">$20</div>
    </div>
</header>

<div class="rooms-area">
    <div class="rooms-nav" id="salas-list"></div>
    <div class="r-viewer">
        <img id="sala-img-box" src="">
    </div>
</div>

<div class="main-content">
    <div class="unit"><img src="Rubia.jpg"><div class="unit-name" style="color:var(--n-rosa)">MIA</div></div>
    <div class="unit"><img src="Morocha.jpg"><div class="unit-name" style="color:var(--n-azul)">TANIA</div></div>
    <div class="unit"><img src="Pelirroja.jpg"><div class="unit-name" style="color:var(--n-rojo)">COLO</div></div>
    
    <div class="chat-unit">
        <div id="chat-window"></div>
        <div class="chat-input-box">
            <input type="text" id="chat-text" placeholder="Habla..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--n-rojo); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">OK</button>
        </div>
    </div>
</div>

<div class="doors-footer">
    <div class="door-item"><h5 style="color:var(--n-rosa)">HISTORIAS</h5><button onclick="upImg('p1')">SUBIR</button></div>
    <div class="door-item"><h5 style="color:var(--n-azul)">ESTADOS</h5><button onclick="upImg('p2')">SUBIR</button></div>
    <div class="door-item"><h5 style="color:var(--n-rojo)">VIDEOS</h5><button onclick="upImg('p3')">SUBIR</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function startup() {
        const nav = document.getElementById('salas-list');
        salas.forEach((s, i) => {
            let div = document.createElement('div');
            div.className = 'r-opt'; div.id = 'room-'+i;
            div.innerHTML = `<b>${s}</b>`;
            div.onclick = () => setRoom(i);
            nav.appendChild(div);
        });
        setRoom(0);
    }

    function setRoom(i) {
        document.querySelectorAll('.r-opt').forEach(x => x.classList.remove('active'));
        document.getElementById('room-'+i).classList.add('active');
        const visor = document.getElementById('sala-img-box');
        
        // SISTEMA ANTIFALLO DE IMAGEN:
        // Intentamos cargar la imagen directamente. 
        // Asegúrate de que el archivo se llame exactamente como la sala.
        let nombre = salas[i] + ".jpg";
        visor.src = nombre;
        
        console.log("Intentando cargar: " + nombre);
    }

    function sendMsg() {
        const input = document.getElementById('chat-text');
        if(!input.value) return;
        document.getElementById('chat-window').innerHTML += `<div style="text-align:right; color:var(--oro); margin-bottom:8px;"><b>Tú:</b> ${input.value}</div>`;
        input.value = "";
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
