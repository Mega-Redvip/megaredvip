<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | EL IMPERIO</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; 
            --n-verde: #00ff66; --n-turq: #00d9ff; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Diseño que se adapta a tu pantalla sin romperse */
        body { 
            background: var(--fondo); color: white; font-family: 'Arial', sans-serif; 
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* HEADER: Logo central protegido */
        header { 
            height: 250px; background: #000; border-bottom: 4px solid var(--oro); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; flex-shrink: 0;
        }
        .header-ads { width: 220px; height: 100px; border: 1px dashed #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #444; }
        .logo-img { height: 200px; filter: drop-shadow(0 0 20px var(--oro)); object-fit: contain; }

        /* CONTENEDOR PRINCIPAL */
        .main-content { 
            display: grid; grid-template-columns: 350px 1fr 320px; 
            gap: 20px; padding: 20px; flex-grow: 1;
        }

        /* COLUMNA IZQUIERDA: 10 SALAS (Entran todas, imagen clara) */
        .rooms-sidebar { 
            background: #0a0a0a; border: 1px solid #222; border-radius: 15px; 
            padding: 10px; display: flex; flex-direction: column; gap: 8px;
            max-height: 850px; overflow-y: auto;
        }
        .room-card { 
            display: flex; align-items: center; gap: 10px; background: #151515; 
            border: 1px solid #333; border-radius: 10px; padding: 8px; cursor: pointer;
            transition: 0.2s;
        }
        .room-card:hover { border-color: var(--oro); background: #222; }
        .room-card.active { border-color: #fff; background: var(--oro); color: #000; }
        .room-card img { width: 90px; height: 60px; border-radius: 5px; object-fit: cover; }
        .room-card span { font-size: 13px; font-weight: 900; text-transform: uppercase; }

        /* CENTRO: VISOR PROTAGONISTA */
        .visor-box { display: flex; flex-direction: column; gap: 15px; }
        .screen { 
            background: #000; border: 5px solid #1a1a1a; border-radius: 25px; 
            aspect-ratio: 16/9; width: 100%; position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        /* MONETIZACIÓN DEBAJO DEL VISOR */
        .pay-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .pay-btn { background: var(--oro); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; text-align: center; }

        /* COLUMNA DERECHA: CHICAS Y CHAT */
        .social-sidebar { display: flex; flex-direction: column; gap: 15px; }
        .girls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .girl { aspect-ratio: 1/1; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .girl img { width: 100%; height: 100%; object-fit: cover; }
        
        .chat-box { 
            background: #050505; border: 1px solid #222; border-radius: 15px; 
            flex-grow: 1; padding: 15px; overflow-y: auto; height: 400px;
            display: flex; flex-direction: column-reverse; gap: 8px; font-size: 12px;
        }
        .msg { border-left: 3px solid var(--oro); padding-left: 10px; margin-bottom: 5px; }

        /* MUROS AL PIE */
        .muros-footer { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; 
            padding: 20px 40px; border-top: 2px solid #111;
        }
        .muro-item { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 12px; text-align: center; }

        /* SCROLL FINO */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--oro); border-radius: 10px; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="header-ads">PUBLICIDAD $20</div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    <div class="header-ads">PUBLICIDAD $50</div>
</header>

<div class="main-content">
    <div id="rooms-list" class="rooms-sidebar"></div>

    <div class="visor-box">
        <div class="screen">
            <img id="main-view" src="">
        </div>
        <div class="pay-bar">
            <div class="pay-btn" onclick="pay(1)">APOYAR $1</div>
            <div class="pay-btn" onclick="pay(5)">REGALO $5</div>
            <div class="pay-btn" onclick="pay(10)">VIP $10</div>
            <div class="pay-btn" style="background:var(--n-rojo); color:#fff" onclick="pay(20)">SHOW $20</div>
        </div>
    </div>

    <div class="social-sidebar">
        <div class="girls-grid">
            <div class="girl"><img src="Rubia.jpg"></div>
            <div class="girl"><img src="Morocha.jpg"></div>
            <div class="girl"><img src="Pelirroja.jpg"></div>
        </div>
        <div id="chat-stream" class="chat-box"></div>
    </div>
</div>

<div class="muros-footer">
    <div class="muro-item" onclick="pay(5)">📖 HISTORIAS VIP</div>
    <div class="muro-item" onclick="pay(10)">🎬 VIDEOS PRIVADOS</div>
    <div class="muro-item" onclick="pay(30)">💎 PASE MENSUAL</div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym_movimiento.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda_musica.mp3"}, 
        {n: "Oficina", e: ".png", s: "oficina_ambiente.mp3"}, {n: "Playa", e: ".png", s: "playa_olas.mp3"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const d = document.createElement('div');
            d.className = 'room-card'; d.id = 'r-'+i;
            d.innerHTML = `<img src="${encodeURI(r.n+r.e)}"> <span>${r.n}</span>`;
            d.onclick = () => { idx = i; refresh(); };
            list.appendChild(d);
        });
        refresh();
        setInterval(botChat, 2000);
    }

    function refresh() {
        document.querySelectorAll('.room-card').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        document.getElementById('main-view').src = encodeURI(rooms[idx].n + rooms[idx].e);
        const player = document.getElementById('audio-player');
        player.src = rooms[idx].s;
        player.play().catch(e => {});
    }

    function botChat() {
        const chat = document.getElementById('chat-stream');
        const msgs = ["🔥 ¡Qué hot!", "Tokens enviados", "Show privado ya", "💎 VIP", "Hola desde Resistencia"];
        const n = ["Mia", "Tania", "Socio_Chaco", "Admin"][Math.floor(Math.random()*4)];
        chat.innerHTML = `<div class="msg"><b>${n}:</b> ${msgs[Math.floor(Math.random()*5)]}</div>` + chat.innerHTML;
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
