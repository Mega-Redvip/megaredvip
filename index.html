<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v153</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 250px 130px 1fr; 
            align-items: center; gap: 20px; padding: 15px;
            background: #050505; border-bottom: 8px solid var(--n-rojo); height: 320px;
        }
        .pub-box { border: 3px solid var(--n-rojo); height: 240px; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #222; font-size: 30px; background: #080808; }
        .logo-v153 { height: 240px; width: 240px; object-fit: contain; }
        .coin { width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; border: 4px solid white; cursor: pointer; box-shadow: 0 0 15px var(--oro); }

        /* SECCIÓN SALAS (CON RUTA FIJA) */
        .seccion-salas { display: grid; grid-template-columns: 280px 1fr; height: 500px; border-bottom: 8px solid var(--n-rojo); }
        .menu-l { overflow-y: auto; background: #080808; border-right: 3px solid #222; }
        .s-btn { padding: 18px; border-bottom: 1px solid #111; cursor: pointer; color: #666; font-size: 14px; }
        .s-btn.active { background: var(--n-rojo); color: white; }
        
        .visor-vip { background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        #sala-img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .st-msg { position: absolute; text-align: center; color: #444; font-size: 18px; }

        /* SECCIÓN IA: 690PX (3CM MÁS GRANDES) */
        .seccion-ia { display: grid; grid-template-columns: 50% 50%; height: 690px; background: #000; }

        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); border-right: 8px solid var(--n-rojo); background: #000; }
        .bot-cell { 
            position: relative; 
            height: 690px; 
            border-right: 1px solid #111;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
        }
        /* MANTIENE NITIDEZ Y EVITA ESCALERA */
        .bot-cell img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
        .bot-name { position: absolute; bottom: 25px; width: 100%; text-align: center; font-size: 30px; font-weight: 900; text-shadow: 0 0 15px #000; }

        .chat-wrap { display: flex; flex-direction: column; height: 690px; background: #0a0a0a; }
        #chat-window { flex-grow: 1; padding: 25px; overflow-y: auto; font-size: 16px; border-bottom: 1px solid #222; }
        .chat-bar { padding: 20px; background: #111; display: flex; gap: 10px; }
        #chat-in { flex-grow: 1; background: #000; border: 3px solid var(--n-rojo); color: white; padding: 15px; border-radius: 8px; outline: none; }

        /* PUERTAS */
        .footer-p { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; background: #000; }
        .p-box { background: #080808; border: 1px solid #333; border-radius: 20px; padding: 15px; text-align: center; }
        .p-pre { height: 110px; background: #000; border: 2px dashed #444; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-btn { width: 100%; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body onload="startImperio()">

<header>
    <div class="pub-box">ANUNCIO</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v153">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="pub-box">ANUNCIO</div>
</header>

<div class="seccion-salas">
    <div class="menu-l" id="menu-l"></div>
    <div class="visor-vip">
        <div id="st-sala" class="st-msg">
            <p id="main-txt">CONECTANDO...</p>
            <small id="db-msg"></small>
        </div>
        <img id="sala-img" src="">
    </div>
</div>

<div class="seccion-ia">
    <div class="grid-bots">
        <div class="bot-cell"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-cell"><img src="Morocha.jpg"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-cell"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-wrap">
        <div id="chat-window"></div>
        <div class="chat-bar">
            <input type="text" id="chat-in" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 25px; border-radius:8px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="footer-p">
    <div class="p-box">
        <div class="p-pre" id="v-h"></div>
        <button onclick="up('v-h')" style="background:var(--n-rosa)" class="p-btn">Historias</button>
    </div>
    <div class="p-box">
        <div class="p-pre" id="v-e"></div>
        <button onclick="up('v-e')" style="background:var(--n-azul)" class="p-btn">Estados</button>
    </div>
    <div class="p-box">
        <div class="p-pre" id="v-v"></div>
        <button onclick="up('v-v')" style="background:var(--n-rojo)" class="p-btn">Videos</button>
    </div>
</div>

<script>
    // MAPEO EXACTO DE TUS ARCHIVOS
    const salasData = [
        { n: "SADO Y MASO", f: "Sado y Maso.jpg" },
        { n: "SPA", f: "Spa.png" },
        { n: "BIBLIOTECA", f: "Biblioteca.png" },
        { n: "CAMARERA", f: "Camarera.png" },
        { n: "DISCOTECA", f: "Discoteca.png" },
        { n: "EL BAR", f: "El Bar.png" },
        { n: "GIMNASIO", f: "Gimnasio.png" },
        { n: "OFICINA", f: "Oficina.png" },
        { n: "PLAYA", f: "Playa.png" },
        { n: "LA TIENDITA", f: "La Tiendita.png" }
    ];
    let actual = 0;

    function startImperio() {
        const ml = document.getElementById('menu-l');
        salasData.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-btn'; d.id = 'sl-'+i;
            d.innerHTML = `<b>${s.n}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { actual = (actual + 1) % salasData.length; ver(actual); }, 8000);
        msg("TANIA", "¡Ahora sí! He cargado los nombres de archivos tal cual los tienes en tu carpeta.");
    }

    function ver(i) {
        actual = i;
        document.querySelectorAll('.s-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        const img = document.getElementById('sala-img');
        img.style.display = "none";
        document.getElementById('st-sala').style.display = "block";
        document.getElementById('db-msg').innerText = "Buscando: " + salasData[i].f;
        
        // Carga directa con el nombre de archivo que me pasaste
        img.src = salasData[i].f;
    }

    document.getElementById('sala-img').onload = function() {
        this.style.display = "block";
        document.getElementById('st-sala').style.display = "none";
    };

    document.getElementById('sala-img').onerror = function() {
        document.getElementById('main-txt').innerText = "ERROR DE NOMBRE";
        document.getElementById('db-msg').innerHTML = `<span style="color:red">Renombra el archivo a:</span><br>${salasData[actual].f}`;
    };

    function enviar() {
        const i = document.getElementById('chat-in');
        if(!i.value.trim()) return;
        document.getElementById('chat-window').innerHTML += `<div style="text-align:right; margin-bottom:15px; color:var(--oro)"><b>Tú:</b> ${i.value}</div>`;
        setTimeout(() => msg("MIA", "¡Recibido! ¿Qué te parece el tamaño de 690px?"), 800);
        i.value = "";
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function msg(n, m) {
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-window').innerHTML += `<div style="margin-bottom:15px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function up(id) {
        let n = prompt("Nombre de la imagen:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
