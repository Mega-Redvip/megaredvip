<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | NEON EMPIRE</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; min-height: 100vh; overflow-y: auto; }

        /* HEADER */
        header { height: 260px; background: #000; border-bottom: 5px solid var(--oro); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .header-ads-left { width: 220px; display: flex; flex-direction: column; gap: 8px; }
        .ad-mini { border: 2px solid var(--n-rojo); padding: 8px; font-size: 10px; text-align: center; color: #fff; background: #400; border-radius: 5px; text-transform: uppercase; }
        .logo-img { height: 220px; width: auto; filter: drop-shadow(0 0 35px var(--oro)); }
        
        /* MONEDAS 3D */
        .coin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; perspective: 1000px; }
        .coin { 
            width: 95px; height: 95px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff9aa, var(--oro) 50%, #5c4928); 
            border: 4px solid #222; color: #000; font-size: 26px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: 900; 
            box-shadow: 0 12px 0 #333, 0 15px 25px rgba(0,0,0,0.9);
            transform: rotateY(20deg); transition: 0.2s;
        }

        /* LAYOUT */
        .main-app { display: grid; grid-template-columns: 240px 1fr 380px; gap: 15px; padding: 15px; }
        
        /* SALAS */
        .rooms-box { background: #080808; border: 1px solid #222; border-radius: 10px; padding: 10px; }
        .p-btn { width: 100%; padding: 15px; margin-bottom: 8px; background: #151515; border: 1px solid #444; color: #999; cursor: pointer; border-radius: 5px; text-align: left; font-size: 11px; font-weight: 900; }
        .p-btn.active { border-color: var(--n-turq); color: var(--n-turq); background: #001a1a; box-shadow: 0 0 15px var(--n-turq); }

        /* VISOR */
        .visor-container { background: #050505; border: 5px solid #1a1a1a; border-radius: 15px; height: 500px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #main-view { max-width: 100%; max-height: 100%; object-fit: contain; }
        .sala-tag { position: absolute; top: 15px; right: 15px; background: var(--n-rojo); padding: 5px 15px; font-size: 14px; font-weight: 900; z-index: 10; }

        /* CHATS Y AVATARES CON NOMBRE */
        .right-side { display: flex; flex-direction: column; gap: 10px; height: 80vh; position: sticky; top: 20px; }
        .girls-container { display: flex; gap: 5px; height: 140px; }
        .girl-card { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .girl-img-box { width: 100%; height: 100px; border: 2px solid; border-radius: 8px; overflow: hidden; position: relative; }
        .girl-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .girl-label { font-size: 11px; font-weight: 900; margin-top: 5px; text-transform: uppercase; }
        
        .chat-display { flex-grow: 1; background: #020202; border: 2px solid #333; border-radius: 10px; padding: 15px; overflow-y: auto; font-size: 14px; }
        .msg { margin-bottom: 12px; border-left: 6px solid; padding-left: 12px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-ads-left">
        <div class="ad-mini">🔞 TU PUBLICIDAD AQUÍ</div>
        <div class="ad-mini" style="border-color:var(--n-turq);">💎 TOKENS BARATOS</div>
        <div class="ad-mini">🔥 500 SOCIOS ONLINE</div>
    </div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img" alt="LOGO">
    <div class="coin-grid">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main-app">
    <div class="rooms-box" id="rooms-list"></div>

    <div class="center-col">
        <div class="visor-container">
            <div class="sala-tag" id="sala-tag">CARGANDO...</div>
            <img id="main-view" src="">
        </div>
        <div style="background:#0a0a0a; border:1px solid #222; padding:15px; border-radius:10px; margin-top:15px;">
            <h4 style="color:var(--oro); margin-bottom:10px;">📰 MURO DE RESISTENCIA</h4>
            <div id="posts-container" style="color:#bc13fe; font-size:13px;"><b>Socio VIP:</b> ¡Este sitio es fuego! 🔥</div>
        </div>
    </div>

    <div class="right-side">
        <div class="girls-container">
            <div class="girl-card">
                <div class="girl-img-box" style="border-color:var(--n-turq);"><img src="Rubia.jpg"></div>
                <div class="girl-label" style="color:var(--n-turq); text-shadow:0 0 5px var(--n-turq);">MIA</div>
            </div>
            <div class="girl-card">
                <div class="girl-img-box" style="border-color:var(--n-verde);"><img src="Morocha.jpg"></div>
                <div class="girl-label" style="color:var(--n-verde); text-shadow:0 0 5px var(--n-verde);">TANIA</div>
            </div>
            <div class="girl-card">
                <div class="girl-img-box" style="border-color:var(--n-rojo);"><img src="Pelirroja.jpg"></div>
                <div class="girl-label" style="color:var(--n-rojo); text-shadow:0 0 5px var(--n-rojo);">COLO</div>
            </div>
        </div>
        <div class="chat-display" id="chat-stream"></div>
    </div>
</div>

<script>
    let idx = 0;
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];
    
    const msgs = [
        {u: "MIA", t: "🔞 No me comparen con Tania, esa perra no sabe ni moverse. Mírenme a mí, soy la más putita.", c: "#00d9ff"},
        {u: "COLO", t: "🔥 ¿Quién es el macho que me va a mandar 10 tokens para que me abra de piernas ahora?", c: "#ff003c"},
        {u: "TANIA", t: "💅 Mia sos una envidiosa. Todos saben que mis videos son los más calientes.", c: "#00ff66"},
        {u: "COLO", t: "🔞 Basta de charla. Manden oro o me voy con los clientes VIP.", c: "#ff003c"},
        {u: "MIA", t: "🔥 Soy la que más muestra, miren mi historia nueva si tienen huevos.", c: "#00d9ff"},
        {u: "TANIA", t: "💎 El que me mande tokens ahora decide qué juguete uso.", c: "#00ff66"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.innerHTML = `🚪 ${r.toUpperCase()}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(botChat, 5000);
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 15000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('r-'+idx);
        if(activeBtn) activeBtn.classList.add('active');
        
        document.getElementById('sala-tag').innerText = rooms[idx].toUpperCase();
        const img = document.getElementById('main-view');
        
        // TRUCO DE CARGA DE IMÁGENES:
        // Intentamos cargar el nombre exacto.
        const fileName = rooms[idx] + ".jpg";
        img.src = "./" + fileName;

        // Si falla por minúsculas/mayúsculas, GitHub a veces es traicionero.
        img.onerror = () => {
            // Intento 2: Todo minúsculas
            img.src = "./" + rooms[idx].toLowerCase() + ".jpg";
            img.onerror = () => {
                // Intento 3: Placeholder si no existe el archivo en GitHub
                img.src = "https://via.placeholder.com/800x600/111/d4af37?text=" + rooms[idx];
            };
        };
    }

    function botChat() {
        const m = msgs[Math.floor(Math.random() * msgs.length)];
        const box = document.getElementById('chat-stream');
        box.innerHTML += `<div class="msg" style="border-color:${m.c}; color:${m.c}"><b>${m.u}:</b> ${m.t}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function pay(n) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount=${n}&currency_code=USD`, '_blank'); }

    init();
</script>
</body>
</html>
