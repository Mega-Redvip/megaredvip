<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | LIVE & PROFIT</title>
    <style>
        :root { --oro: #d4af37; --oro-l: #fff9aa; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-azul: #00d9ff; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; }
        
        /* LOGO: Agrandado a lo ancho, sin pisar la línea */
        header { height: 160px; background: #000; border-bottom: 4px solid var(--oro); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: relative; }
        .logo-box { flex: 1; display: flex; justify-content: center; align-items: center; height: 100%; }
        .logo-img { height: 130px; width: auto; min-width: 600px; /* Ancho extra */ object-fit: contain; filter: drop-shadow(0 0 15px var(--oro)); margin-bottom: 5px; }
        
        .ad-slot-header { width: 250px; height: 110px; border: 2px dashed var(--n-verde); background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 10px; }
        .coin-box { width: 180px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .coin { width: 55px; height: 55px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--oro-l), var(--oro) 60%, #8a6d3b); border: 2px solid #b8860b; color: #3d2b00; font-weight: 900; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .main { display: grid; grid-template-columns: 280px 1fr 400px; height: calc(100vh - 160px); gap: 10px; padding: 10px; }
        .puertas { background: #080808; border-radius: 10px; overflow-y: auto; padding: 10px; border: 1px solid #222; }
        .p-btn { width: 100%; padding: 10px; margin-bottom: 5px; background: #111; border: 1px solid #333; color: #777; cursor: pointer; font-size: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        .p-btn.active { border-color: var(--oro); color: var(--oro); background: #1a1500; border-width: 2px; }

        .visor { height: 55%; background: #000; border-radius: 15px; border: 2px solid #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #main-view { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* BOTÓN COMPRA: Rojo Neón Pequeño */
        #shop-link { position: absolute; top: 15px; right: 15px; background: #000; color: #ff003c; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: bold; display: none; border: 2px solid #ff003c; box-shadow: 0 0 10px #ff003c; text-transform: uppercase; letter-spacing: 1px; }

        .muro-clientes { height: 45%; background: #050505; border: 1px solid #222; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; }
        .chat-p { flex: 1; background: #020202; border: 1px solid #333; border-radius: 10px; padding: 15px; overflow-y: auto; }
        .msg { margin-bottom: 8px; font-size: 13px; border-left: 3px solid; padding-left: 10px; }
        .sys-msg { color: var(--oro); text-align: center; font-size: 11px; margin-bottom: 10px; }
        .m-msg { color: var(--n-verde); border-color: var(--n-verde); }
    </style>
</head>
<body>

<audio id="audio-player" loop></audio>
<audio id="sfx-latico" src="https://www.myinstants.com/media/sounds/whip-crack-01.mp3"></audio>

<header>
    <div class="ad-slot-header"><b>AD SLOT VIP</b><div class="live-global">🔴 <span id="global-count">14,520</span> ONLINE</div></div>
    <div class="logo-box"><img src="Logo Mega Red Lunar.jpg" class="logo-img" onerror="this.src='https://via.placeholder.com/1000x300/000/d4af37?text=MEGA+RED+VIP'"></div>
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main">
    <div class="puertas" id="p-list"></div>
    <div class="center">
        <div class="visor">
            <img id="main-view" src="">
            <a href="https://s.click.aliexpress.com/e/_c30NBdsF" id="shop-link" target="_blank" onclick="playWhip()">¡SUPER OFERTA!!!</a>
        </div>
        <div class="muro-clientes"><div id="chat-win" class="chat-p"></div></div>
    </div>
    <div class="right">
        <div style="height:40%; display:flex; gap:5px; padding-bottom:10px;">
            <img src="Rubia.jpg" style="width:33%; border:1px solid var(--oro); border-radius:5px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/100x200/222/fff?text=Mia'">
            <img src="Morocha.jpg" style="width:33%; border:1px solid var(--oro); border-radius:5px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/100x200/222/fff?text=Tania'">
            <img src="Pelirroja.jpg" style="width:33%; border:1px solid var(--oro); border-radius:5px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/100x200/222/fff?text=La+Colo'">
        </div>
        <div class="chat-p" id="social-chat"></div>
    </div>
</div>

<script>
    let idx = 0; let userCity = "tu zona";
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];
    const sounds = {
        "Sado y Maso": "https://www.myinstants.com/media/sounds/dungeon-ambience.mp3",
        "Biblioteca": "https://www.myinstants.com/media/sounds/library-ambience.mp3",
        "Camarera": "https://stream.zeno.fm/0r0xa792808uv", // Smooth Jazz
        "Discoteca": "https://stream.zeno.fm/f96v66as408uv", // Techno
        "Playa": "https://www.myinstants.com/media/sounds/beach-waves.mp3",
        "Spa": "https://www.myinstants.com/media/sounds/spa-relaxing.mp3",
        "El Bar": "https://www.myinstants.com/media/sounds/bar-crowd.mp3",
        "Oficina": "https://www.myinstants.com/media/sounds/office-ambience.mp3",
        "Gimnasio": "https://www.myinstants.com/media/sounds/rock-music.mp3"
    };

    async function getGeo() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            userCity = data.city || "tu zona";
            addMsg("SISTEMA", `📍 SOCIO DETECTADO EN: ${userCity.toUpperCase()}`, "sys-msg");
            setTimeout(() => addMsg("MIA", `🔥 ¿Hay algún socio de ${userCity} aquí? Me dijeron que son de los más potentes...`, "m-msg"), 3000);
        } catch (e) {}
    }

    function init() {
        getGeo();
        const menu = document.getElementById('p-list');
        rooms.forEach((name, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = "btn-" + i;
            b.innerHTML = `<span>🚪 ${name}</span> <span style="color:red">●</span>`;
            b.onclick = () => { idx = i; refresh(); };
            menu.appendChild(b);
        });
        refresh();
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 20000);
        setInterval(autoChat, 5000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        document.getElementById("btn-" + idx).classList.add('active');
        
        // CORRECCIÓN IMÁGENES: Usa la ruta ./ para buscar en tu GitHub
        const img = document.getElementById('main-view');
        img.src = "./" + rooms[idx] + ".jpg";
        img.onerror = () => { img.src = "./" + rooms[idx] + ".png"; };

        // SONIDOS
        const player = document.getElementById('audio-player');
        player.src = sounds[rooms[idx]] || "";
        if(player.src) player.play().catch(() => console.log("Click para activar audio"));
        if(rooms[idx] === "Sado y Maso") playWhip();

        // BOTÓN ALIEXPRESS
        document.getElementById('shop-link').style.display = (rooms[idx] === "La Tiendita") ? "block" : "none";
    }

    function playWhip() { document.getElementById('sfx-latico').play(); }

    function addMsg(name, txt, cl) {
        const win = document.getElementById('chat-win');
        win.innerHTML += `<div class="msg ${cl}"><b>${name}:</b> ${txt}</div>`;
        win.scrollTop = win.scrollHeight;
    }

    function autoChat() {
        const msgs = [`¿Algún socio de ${userCity} conectado?`, `Socio de ${userCity}, mándame 5 tokens y te abro mi cámara...`, "¡Vayan a la Tiendita, hay SÚPER OFERTAS!"];
        addMsg("MIA", msgs[Math.floor(Math.random()*msgs.length)], "m-msg");
    }

    function pay(n) {
        window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&item_name=TOKENS_MEGA_RED_VIP&amount=${n}&currency_code=USD`, '_blank');
    }

    init();
</script>
</body>
</html>
