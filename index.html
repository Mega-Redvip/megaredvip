<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | LIVE</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER: Logo Gigante Centrado */
        header { height: 240px; background: #000; border-bottom: 6px solid var(--oro); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .logo-img { height: 190px; width: auto; filter: drop-shadow(0 0 25px var(--oro)); object-fit: contain; } 
        
        .coin-box { position: absolute; right: 20px; bottom: 15px; display: flex; gap: 10px; }
        .coin { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, #fff9aa, var(--oro)); border: 3px solid #333; color: #000; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 0 15px var(--oro); }

        /* CONTENIDO */
        .main { display: grid; grid-template-columns: 240px 1fr 340px; height: calc(100vh - 240px); padding: 15px; gap: 15px; }
        
        .rooms { background: #0a0a0a; border: 1px solid #333; border-radius: 15px; overflow-y: auto; padding: 15px; }
        .p-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #1a1a1a; border: 1px solid #444; color: #777; cursor: pointer; border-radius: 8px; text-align: left; font-size: 10px; font-weight: bold; }
        .p-btn.active { border-color: var(--oro); color: var(--oro); background: #221a00; border-width: 2px; }

        .visor { background: #000; border: 2px solid #1a1a1a; border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; height: 100%; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        .right { display: flex; flex-direction: column; gap: 15px; height: 100%; }
        .girls { display: flex; gap: 8px; height: 140px; }
        .g-card { width: 33.3%; position: relative; border: 2px solid var(--oro); border-radius: 10px; overflow: hidden; }
        .g-img { width: 100%; height: 100%; object-fit: cover; }
        .g-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: var(--oro); font-size: 9px; text-align: center; padding: 2px 0; }
        
        .chat { flex: 1; background: #020202; border: 1px solid #333; border-radius: 15px; padding: 15px; overflow-y: auto; font-size: 12px; font-family: sans-serif; }
        .msg { margin-bottom: 10px; border-left: 4px solid; padding-left: 10px; line-height: 1.3; }
    </style>
</head>
<body>

<header>
    <div style="position:absolute; left:20px; top:20px; color:var(--n-rojo); font-size:12px;">🔴 LIVE: 14,520 SOCIOS</div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img" alt="LOGO">
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main">
    <div class="rooms" id="rooms-list"></div>
    <div class="visor"><img id="main-view" src=""></div>
    <div class="right">
        <div class="girls">
            <div class="g-card"><img src="Rubia.jpg" class="g-img"><div class="g-name">MIA</div></div>
            <div class="g-card"><img src="Morocha.jpg" class="g-img"><div class="g-name">TANIA</div></div>
            <div class="g-card"><img src="Pelirroja.jpg" class="g-img"><div class="g-name">COLO</div></div>
        </div>
        <div class="chat" id="chat-box"></div>
    </div>
</div>

<script>
    let idx = 0;
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];
    const botMsgs = [
        {u: "MIA", t: "🔥 ¿Hay alguien de **Resistencia** activo? ¡Manden tokens!", c: "#00ff66"},
        {u: "TANIA", t: "💎 Acabo de entrar a la sala de SPA... ¿vienen?", c: "#ff003c"},
        {u: "SOCIO_43", t: "¡La Colo está prendida fuego en la Discoteca!", c: "#00d9ff"},
        {u: "MIA", t: "💰 ¡Gracias por los 5 tokens, bombón de Resistencia!", c: "#00ff66"},
        {u: "COLO", t: "🔞 ¿Quién quiere ver lo que estoy haciendo en el Gimnasio?", c: "#ffa500"},
        {u: "SISTEMA", t: "📍 Nuevo socio conectado desde Chaco", c: "#d4af37"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((name, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.innerHTML = `🚪 ${name.toUpperCase()}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(() => {
            const m = botMsgs[Math.floor(Math.random() * botMsgs.length)];
            addChat(m.u, m.t, m.c);
        }, 5000);
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 20000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        const img = document.getElementById('main-view');
        img.src = "./" + encodeURIComponent(rooms[idx]) + ".jpg";
        img.onerror = () => { img.src = "https://via.placeholder.com/800x600/111/d4af37?text=" + rooms[idx]; };
    }

    function addChat(user, txt, color) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg" style="border-color:${color}"><b>${user}:</b> ${txt}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function pay(n) {
        window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&item_name=TOKENS_VIP&amount=" + n + "&currency_code=USD", '_blank');
    }

    init();
</script>
</body>
</html>
