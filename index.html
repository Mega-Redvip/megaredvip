<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v111</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; }

        /* 1. CABEZAL CON PUBLICIDAD Y LOGO */
        header { 
            display: grid; grid-template-columns: 250px 1fr 250px; 
            padding: 15px; background: #050505; border-bottom: 5px solid var(--n-rojo);
            align-items: center; gap: 20px;
        }
        .ads-box { 
            height: 120px; border: 3px dashed var(--n-rojo); color: var(--n-rojo);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 14px; text-align: center; border-radius: 10px;
        }
        .logo-mid img { width: 100%; max-height: 220px; object-fit: contain; filter: drop-shadow(0 0 20px var(--n-rojo)); }
        .coins { display: flex; gap: 8px; margin-top: 10px; justify-content: center; }
        .coin { 
            width: 60px; height: 60px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 18px; cursor: pointer; border: 3px solid white;
            box-shadow: 0 0 10px var(--oro);
        }

        /* 2. FILA SALAS Y VISOR (ALTURA REDUCIDA) */
        .mid-grid { display: grid; grid-template-columns: 280px 1fr; gap: 15px; padding: 15px; height: 420px; }
        .rooms-sidebar { 
            display: flex; flex-direction: column; gap: 4px; 
            background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 8px;
        }
        .r-btn { 
            flex: 1; padding: 0 12px; background: #111; border-radius: 6px; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid #333; font-size: 12px;
        }
        .r-btn.active { background: var(--n-rojo); border-color: white; }

        .viewer-room { border: 5px solid var(--n-rojo); border-radius: 20px; background: #000; overflow: hidden; position: relative; }
        #sala-img { width: 100%; height: 100%; object-fit: cover; } /* COVER para que no haya negro */
        .shop-link { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; background: var(--n-rojo); color: white; font-size: 24px; border-radius: 50px; text-decoration: none; border: 4px solid white; display: none; z-index: 5; }

        /* 3. BOTS Y CHAT (MISMO TAMAÑO Y ALTURA RECORTADA) */
        .bots-chat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px 15px; height: 500px; }
        
        .bots-subgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .bot-card { position: relative; background: #050505; border: 2px solid #222; border-radius: 15px; overflow: hidden; }
        .bot-card img { width: 100%; height: 100%; object-fit: contain; } /* Para que salgan enteras */
        .bot-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 10px; font-size: 20px; font-weight: 900; }

        .chat-panel { background: #050505; border: 5px solid var(--n-rojo); border-radius: 20px; display: flex; flex-direction: column; }
        #chat-window { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 15px; }
        .chat-input { padding: 12px; display: flex; gap: 8px; border-top: 1px solid #222; }
        #chat-in { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 10px; border-radius: 8px; outline: none; }

        /* 4. FINAL: PUERTAS */
        .footer-doors { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 15px; border-top: 5px solid var(--n-rojo); }
        .door-box { background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 10px; text-align: center; }
        .door-pre { height: 100px; background: #000; margin-bottom: 8px; border-radius: 8px; overflow: hidden; }
        .door-pre img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="ads-box">PUBLICIDAD $50<div class="coins"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div></div>
    <div class="logo-mid" style="text-align:center;"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="ads-box">PUBLICIDAD $100<div class="coins"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div></div>
</header>

<div class="mid-grid">
    <div class="rooms-sidebar" id="menu-salas"></div>
    <div class="viewer-room">
        <img id="sala-img" src="">
        <a href="https://best.aliexpress.com/" target="_blank" class="shop-link" id="btn-t">🔱 TIENDITA 🔱</a>
    </div>
</div>

<div class="bots-chat-grid">
    <div class="bots-subgrid">
        <div class="bot-card"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-card"><img src="Morocha.jpg"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-card"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-panel">
        <div id="chat-window"></div>
        <div class="chat-input">
            <input type="text" id="chat-in" placeholder="Háblales..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--n-rojo); color:white; border:none; padding:0 15px; border-radius:8px; cursor:pointer;">OK</button>
        </div>
    </div>
</div>

<div class="footer-doors">
    <div class="door-box"><h6 style="color:var(--n-rosa)">HISTORIAS</h6><div class="door-pre" id="d-h"></div><button style="width:100%; background:var(--n-rosa); color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;" onclick="up('d-h')">SUBIR</button></div>
    <div class="door-box"><h6 style="color:var(--n-azul)">ESTADOS</h6><div class="door-pre" id="d-e"></div><button style="width:100%; background:var(--n-azul); color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;" onclick="up('d-e')">SUBIR</button></div>
    <div class="door-box"><h6 style="color:var(--n-rojo)">VIDEOS</h6><div class="door-pre" id="d-v"></div><button style="width:100%; background:var(--n-rojo); color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;" onclick="up('d-v')">SUBIR</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function init() {
        const m = document.getElementById('menu-salas');
        salas.forEach((s, i) => {
            let b = document.createElement('div');
            b.className = 'r-btn'; b.id = 's-'+i;
            b.innerHTML = `<span>${s}</span><span style="color:lime; font-size:9px;">LIVE</span>`;
            b.onclick = () => ver(i);
            m.appendChild(b);
        });
        ver(0);
        msg("MIA", "Hola amor... bienvenida al Imperio. ¿Qué me vas a regalar hoy?");
    }

    function ver(i) {
        document.querySelectorAll('.r-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('s-'+i).classList.add('active');
        const img = document.getElementById('sala-img');
        const btn = document.getElementById('btn-t');
        if(salas[i] === "LA TIENDITA") {
            btn.style.display = 'block'; img.style.opacity = '0.3';
        } else {
            btn.style.display = 'none'; img.style.opacity = '1';
            img.src = encodeURI(salas[i] + ".jpg");
        }
    }

    function up(id) {
        const url = prompt("Enlace de imagen:");
        if(url) document.getElementById(id).innerHTML = `<img src="${url}">`;
    }

    function send() {
        const i = document.getElementById('chat-in');
        if(!i.value) return;
        document.getElementById('chat-window').innerHTML += `<div style="text-align:right; color:var(--oro); margin-bottom:8px;"><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
        setTimeout(() => { msg("TANIA", "No seas tacaño amor, mandame una moneda."); }, 1000);
    }

    function msg(n, m) {
        const w = document.getElementById('chat-window');
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        w.innerHTML += `<div style="margin-bottom:8px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        w.scrollTop = w.scrollHeight;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
