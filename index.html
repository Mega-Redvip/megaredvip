<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER: LOGO GIGANTE (300px) */
        header { 
            height: 320px; background: #000; border-bottom: 6px solid var(--oro); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; flex-shrink: 0; position: relative; 
        }
        .logo-img { height: 300px; filter: drop-shadow(0 0 50px var(--oro)); position: absolute; left: 50%; transform: translateX(-50%); }
        
        .online-box { border: 3px solid var(--n-verde); padding: 15px; border-radius: 12px; color: var(--n-verde); text-align: center; }
        .coin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .coin { width: 75px; height: 75px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; }

        /* CUERPO */
        .main-app { display: grid; grid-template-columns: 240px 1fr 400px; gap: 15px; padding: 15px; flex-grow: 1; min-height: 0; }
        
        .panel { background: #0a0a0a; border: 1px solid #333; border-radius: 10px; padding: 10px; overflow-y: auto; }
        .p-btn { width: 100%; padding: 12px; margin-bottom: 5px; background: #111; border: 1px solid #444; color: #fff; cursor: pointer; text-align: left; font-size: 11px; font-weight: 900; }
        .p-btn.active { background: #fff !important; color: #000 !important; }

        /* VISOR */
        .visor { background: #000; border: 5px solid #1a1a1a; border-radius: 20px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        .sala-tag { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border: 2px solid var(--n-turq); color: var(--n-turq); border-radius: 30px; font-size: 14px; font-weight: 900; z-index: 10; }

        /* CHAT */
        .right { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .girls { display: flex; gap: 5px; height: 220px; flex-shrink: 0; }
        .girl-card { flex: 1; border: 1px solid #222; border-radius: 10px; overflow: hidden; }
        .girl-card img { width: 100%; height: 100%; object-fit: cover; }
        .chat { flex-grow: 1; background: #020202; border: 2px solid #333; border-radius: 10px; padding: 12px; overflow-y: auto; }
        .msg { border-left: 4px solid; padding-left: 10px; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="online-box"><span style="font-size:30px;font-weight:900;">4,102</span><br><small>ONLINE</small></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    <div class="coin-grid">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main-app">
    <div class="panel">
        <h3 style="color:var(--oro); font-size:10px; margin-bottom:10px;">🚪 SALAS</h3>
        <div id="rooms-list"></div>
    </div>
    <div class="visor">
        <div class="sala-tag" id="s-nom">SALA</div>
        <img id="main-view" src="">
    </div>
    <div class="right">
        <div class="girls">
            <div class="girl-card"><img src="Rubia.jpg"></div>
            <div class="girl-card"><img src="Morocha.jpg"></div>
            <div class="girl-card"><img src="Pelirroja.jpg"></div>
        </div>
        <div id="chat-stream" class="chat"></div>
    </div>
</div>

<script>
    let idx = 0;
    // IMPORTANTE: Los nombres deben ser EXACTOS a como subiste los archivos a GitHub
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", c: "#ff003c"}, 
        {n: "Spa", e: ".png", c: "#00d9ff"}, 
        {n: "Biblioteca", e: ".png", c: "#bc13fe"}, 
        {n: "Camarera", e: ".png", c: "#00ff66"}, 
        {n: "Discoteca", e: ".png", c: "#ff00ff"}, 
        {n: "El Bar", e: ".png", c: "#d4af37"},
        {n: "Gimnasio", e: ".png", c: "#00ff66"}, 
        {n: "La Tiendita", e: ".png", c: "#ff4500"}, 
        {n: "Oficina", e: ".png", c: "#1e90ff"}, 
        {n: "Playa", e: ".png", c: "#ffff00"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.style.color = r.c; b.innerHTML = "🚪 " + r.n;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 6000);
        setInterval(botChat, 4000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById('r-'+idx);
        if(activeBtn) activeBtn.classList.add('active');
        
        const r = rooms[idx];
        document.getElementById('s-nom').innerText = r.n.toUpperCase();
        // Usamos encodeURI para que GitHub entienda los espacios
        document.getElementById('main-view').src = encodeURI(r.n + r.e);
    }

    function botChat() {
        const chat = document.getElementById('chat-stream');
        const msgs = [
            {u:"MIA", c:"#00d9ff", t:"🔞 ¿Algún cliente de Resistencia conectado?"},
            {u:"TANIA", c:"#00ff66", t:"🔥 Miren mis estados, están que arden..."},
            {u:"COLO", c:"#ff003c", t:"🔞 ¿Quién paga el próximo show privado?"}
        ];
        const m = msgs[Math.floor(Math.random()*msgs.length)];
        chat.innerHTML += `<div class="msg" style="border-left-color:${m.c}; color:${m.c}"><b>${m.u}:</b> ${m.t}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    function pay(n) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount=${n}&currency_code=USD`, '_blank'); }
</script>
</body>
</html>
