<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | LA VISIÓN</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER: LOGO AL MEDIO, PUBLICIDAD Y MONEDAS A LOS LADOS */
        header { 
            display: grid; grid-template-columns: 300px 1fr 300px; 
            align-items: center; padding: 20px; border-bottom: 4px solid var(--oro); background: #050505;
        }
        .header-side { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .publi-box { width: 250px; height: 100px; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; color: #555; font-size: 12px; }
        .coins { display: flex; gap: 20px; }
        .coin { 
            width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }
        .logo-center img { height: 250px; filter: drop-shadow(0 0 30px var(--oro)); }

        /* CUERPO: SALAS -> IMAGEN SALA -> BOTS CUERPO COMPLETO */
        .main-content { 
            display: grid; grid-template-columns: 180px 1fr 400px; 
            gap: 20px; padding: 20px; align-items: start;
        }

        /* 1. Las 10 salas en hilera hacia abajo */
        .rooms-list { display: flex; flex-direction: column; gap: 8px; }
        .room-btn { 
            padding: 12px; background: #111; border: 1px solid #333; color: #aaa; 
            font-size: 11px; text-transform: uppercase; cursor: pointer; text-align: center;
        }
        .room-btn.active { background: var(--oro); color: #000; border-color: #fff; }

        /* 2. Imagen de la sala a la derecha de la lista */
        .viewer-container { display: flex; flex-direction: column; gap: 15px; }
        .main-screen { 
            border: 5px solid #1a1a1a; border-radius: 15px; height: 550px; 
            background: #000; overflow: hidden; position: relative;
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }

        /* 3. Bots cuerpo completo y chat debajo */
        .right-panel { display: flex; flex-direction: column; gap: 15px; }
        .bots-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; height: 450px; }
        .bot-img { width: 100%; height: 100%; object-fit: cover; object-position: top; border: 2px solid #222; border-radius: 10px; }
        
        .chat-box { 
            background: #050505; border: 1px solid #222; border-radius: 10px; 
            height: 250px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 8px; font-size: 13px;
        }
        .msg-bot { color: var(--n-verde); border-left: 2px solid var(--oro); padding-left: 10px; }

        /* ABAJO: TRES RECUADROS ESTADOS, HISTORIAS, VIDEOS */
        .bottom-section { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 20px; padding: 30px; border-top: 3px solid #111;
        }
        .wall-card { background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 15px; text-align: center; }
        .wall-display { height: 150px; background: #050505; margin: 15px 0; border-radius: 10px; overflow-y: auto; padding: 10px; font-size: 12px; color: #666; }
        .action-btn { 
            width: 100%; padding: 12px; background: var(--oro); color: #000; 
            border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body onload="init()">

<header>
    <div class="header-side">
        <div class="publi-box">PUBLICIDAD $20</div>
        <div class="coins">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(3)">$3</div>
        </div>
    </div>
    <div class="logo-center">
        <img src="Logo Mega Red Lunar.jpg" alt="MEGA RED VIP">
    </div>
    <div class="header-side">
        <div class="publi-box">PUBLICIDAD $50</div>
        <div class="coins">
            <div class="coin" onclick="pay(5)">$5</div>
            <div class="coin" onclick="pay(10)">$10</div>
        </div>
    </div>
</header>

<div class="main-content">
    <div id="rooms-side" class="rooms-list"></div>

    <div class="viewer-container">
        <div class="main-screen">
            <img id="main-view" src="">
        </div>
    </div>

    <div class="right-panel">
        <div class="bots-row">
            <img src="Rubia.jpg" class="bot-img">
            <img src="Morocha.jpg" class="bot-img">
            <img src="Pelirroja.jpg" class="bot-img">
        </div>
        <div id="chat-stream" class="chat-box"></div>
    </div>
</div>

<div class="bottom-section">
    <div class="wall-card">
        <h3>📱 ESTADOS</h3>
        <div class="wall-display" id="wall-e"></div>
        <button class="action-btn" onclick="pay(2)">SUBIR ESTADO</button>
    </div>
    <div class="wall-card">
        <h3>📖 HISTORIAS</h3>
        <div class="wall-display" id="wall-h"></div>
        <button class="action-btn" onclick="pay(5)">SUBIR HISTORIA</button>
    </div>
    <div class="wall-card">
        <h3>🎬 VIDEOS</h3>
        <div class="wall-display" id="wall-v"></div>
        <button class="action-btn" onclick="pay(10)">SUBIR VIDEO</button>
    </div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym_movimiento.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda_musica.mp3"}, 
        {n: "Oficina", e: ".png", s: "oficina_ambiente.mp3"}, {n: "Playa", e: ".png", s: "playa_olas.mp3"}
    ];

    function init() {
        const side = document.getElementById('rooms-side');
        rooms.forEach((r, i) => {
            const b = document.createElement('div');
            b.className = 'room-btn'; b.id = 'r-'+i;
            b.innerText = r.n;
            b.onclick = () => { idx = i; refresh(); };
            side.appendChild(b);
        });
        refresh();
        setInterval(botCycle, 3000);
    }

    function refresh() {
        document.querySelectorAll('.room-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        document.getElementById('main-view').src = encodeURI(rooms[idx].n + rooms[idx].e);
        const player = document.getElementById('audio-player');
        player.src = rooms[idx].s;
        player.play().catch(e => {});
    }

    function botCycle() {
        const chat = document.getElementById('chat-stream');
        const msgs = [
            "🔥 ¡Mira mi nuevo video exclusivo abajo!",
            "💎 ¿Me regalas un tip de $5? Te espero...",
            "🔞 Show privado disponible ahora.",
            "💰 ¡Alguien acaba de desbloquear una historia!",
            "✨ Subí contenido nuevo, ¡no te lo pierdas!"
        ];
        const n = ["MIA", "TANIA", "COLO"][Math.floor(Math.random()*3)];
        chat.innerHTML = `<div class="msg-bot"><b>${n}:</b> ${msgs[Math.floor(Math.random()*5)]}</div>` + chat.innerHTML;
        
        // Simular actividad en muros
        const walls = ['wall-e', 'wall-h', 'wall-v'];
        document.getElementById(walls[Math.floor(Math.random()*3)]).innerHTML = `<div>Nueva actualización de ${n}...</div>` + document.getElementById(walls[Math.floor(Math.random()*3)]).innerHTML;
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
