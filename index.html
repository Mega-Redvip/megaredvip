<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v184</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        @keyframes neon-flicker { 0%, 100% { filter: drop-shadow(0 0 12px var(--n-rojo)); } 50% { filter: drop-shadow(0 0 25px var(--n-rojo)); opacity: 0.9; } }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 280px 130px 1fr; 
            align-items: center; gap: 10px; padding: 15px;
            background: #050505; border-bottom: 5px solid var(--n-rojo); height: 320px;
        }
        .logo-v184 { height: 260px; width: 260px; object-fit: contain; animation: neon-flicker 2s infinite; }
        .pub-neon { border: 2px solid var(--n-rojo); height: 180px; border-radius: 8px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 12px; color: var(--n-rojo); animation: neon-flicker 3s infinite; }
        .coin { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; border: 4px solid white; box-shadow: 0 0 15px var(--oro); cursor: pointer; }

        /* BLOQUE SUPERIOR (ALTURA NIVELADA) */
        .top-container { display: grid; grid-template-columns: 33.33% 33.33% 33.33%; height: 500px; border-bottom: 5px solid var(--n-rojo); }

        /* MENÚ */
        .menu-l { background: #080808; border-right: 2px solid #333; display: flex; flex-direction: column; height: 500px; }
        .s-card { background: #111; border-bottom: 1px solid #222; height: 60px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .s-card.active { background: var(--n-rojo); color: white; }
        .s-card img { width: 65px; height: 100%; object-fit: cover; }

        /* LA TIENDITA (CENTRAL) */
        .btn-tiendita { height: 70px; background: url('La Tiendita.png') center; background-size: cover; border: 2px solid var(--oro); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .tiendita-txt { color: white; text-shadow: 0 0 10px var(--n-rojo), 0 0 20px var(--n-rojo); font-size: 13px; font-weight: bold; }

        /* VISOR (AGRANDADO +1CM FIJO) */
        .visor-box { background: #000; border-right: 2px solid #333; height: 500px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #sala-img-big { width: 100%; height: 100%; object-fit: contain; transform: scale(1.1); }

        /* CHAT (ACHICADO -1CM FIJO PARA NIVELAR) */
        .chat-box { background: #050505; height: 500px; display: flex; flex-direction: column; }
        .chat-logs { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 12px; color: #ccc; }

        /* BLOQUE INFERIOR BOTS (SIMETRÍA ANTI-DEFORMACIÓN) */
        .bot-container { display: grid; grid-template-columns: 25% 25% 25% 25%; height: 450px; border-bottom: 5px solid var(--n-rojo); background: #000; }
        .bot-card { border-right: 2px solid #222; position: relative; height: 450px; overflow: hidden; }
        .bot-card img { width: 100%; height: 100%; object-fit: cover; object-position: top; } /* NO SE DEFORMAN */
        .bot-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 8px; font-size: 14px; }

        /* CHAT BOTS */
        .chat-bots-wrap { background: #080808; display: flex; flex-direction: column; height: 450px; }
        #chat-ia-logs { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 13px; border-bottom: 1px solid #222; }

        /* ZONA DE CARGA (NUEVA UBICACIÓN VISIBLE) */
        .upload-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; background: #0a0a0a; }
        .up-item { background: #111; border: 1px solid #333; padding: 10px; text-align: center; border-radius: 5px; }
        .btn-up { width: 100%; padding: 8px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 11px; }

    </style>
</head>
<body onload="init()">

<header>
    <div class="pub-neon">ADS VIP<br>SADO & MASO</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v184">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="pub-neon">SOCIOS<br>IMPERIO</div>
</header>

<div class="top-container">
    <div class="menu-l">
        <div id="salas-1"></div>
        <div class="btn-tiendita" onclick="window.open('https://www.aliexpress.com')">
            <span class="tiendita-txt">LA TIENDITA SHOP</span>
        </div>
        <div id="salas-2"></div>
    </div>

    <div class="visor-box">
        <img id="sala-img-big" src="">
    </div>

    <div class="chat-box">
        <div id="logs-sala" class="chat-logs"></div>
        <input type="text" id="in-sala" onkeypress="if(event.key==='Enter') sendSala()" placeholder="Chat público..." style="background:#000; color:white; border:none; border-top:1px solid var(--n-rojo); padding:15px;">
    </div>
</div>

<div class="bot-container">
    <div class="bot-card"><img src="Rubia.jpg"><div class="bot-label" style="color:var(--n-rosa)">MIA</div></div>
    <div class="bot-card"><img src="Morocha.jpg"><div class="bot-label" style="color:var(--n-azul)">TANIA</div></div>
    <div class="bot-card"><img src="Pelirroja.jpg"><div class="bot-label" style="color:var(--n-rojo)">COLO</div></div>
    <div class="chat-bots-wrap">
        <div id="chat-ia-logs"></div>
        <input type="text" id="in-ia" onkeypress="if(event.key==='Enter') sendIA()" placeholder="Privado con ellas..." style="background:#000; color:white; border:none; padding:15px; border-top:1px solid var(--n-rojo);">
    </div>
</div>

<div class="upload-bar">
    <div class="up-item">HISTORIAS<br><button onclick="up('H')" style="background:var(--n-rosa)" class="btn-up">SUBIR FOTO</button></div>
    <div class="up-item">ESTADOS<br><button onclick="up('E')" style="background:var(--n-azul)" class="btn-up">SUBIR TEXTO</button></div>
    <div class="up-item">VIDEOS<br><button onclick="up('V')" style="background:var(--n-rojo)" class="btn-up">SUBIR VIDEO</button></div>
</div>

<script>
    const salas = [
        {n:"SADO Y MASO", f:"Sado y Maso.jpg", i:"🔥"},
        {n:"BIBLIOTECA", f:"Biblioteca.png", i:"📚"},
        {n:"DISCOTECA", f:"Discoteca.png", i:"🔊"},
        {n:"EL BAR", f:"El Bar.png", i:"🍸"},
        {n:"OFICINA", f:"Oficina.png", i:"💼"},
        {n:"PLAYA", f:"Playa.png", i:"⛱️"}
    ];

    function init() {
        const s1 = document.getElementById('salas-1');
        const s2 = document.getElementById('salas-2');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-card'; d.id = 'sc-'+i;
            d.innerHTML = `<img src="${s.f}"> <span style="padding-left:12px; font-size:11px;">${s.i} ${s.n}</span>`;
            d.onclick = () => setS(i);
            (i < 3) ? s1.appendChild(d) : s2.appendChild(d);
        });
        setS(0);
        setInterval(autoChat, 5000);
    }

    function setS(i) {
        document.querySelectorAll('.s-card').forEach(c => c.classList.remove('active'));
        document.getElementById('sc-'+i).classList.add('active');
        document.getElementById('sala-img-big').src = salas[i].f;
    }

    function autoChat() {
        const names = ["VIP_Hunter", "Socio_22", "Marcos", "Linda_Hot"];
        const texts = ["¿Hay alguien en el Bar?", "Tania te ves increible", "Subiendo video!", "Amo el Imperio"];
        const log = document.getElementById('chat-ia-logs');
        log.innerHTML += `<div><b style="color:var(--oro)">${names[Math.floor(Math.random()*names.length)]}:</b> ${texts[Math.floor(Math.random()*texts.length)]}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function sendIA() {
        let i = document.getElementById('in-ia');
        if(i.value) {
            document.getElementById('chat-ia-logs').innerHTML += `<div><b style="color:#fff">Tú:</b> ${i.value}</div>`;
            i.value = "";
            document.getElementById('chat-ia-logs').scrollTop = document.getElementById('chat-ia-logs').scrollHeight;
        }
    }

    function sendSala() {
        let i = document.getElementById('in-sala');
        if(i.value) {
            document.getElementById('logs-sala').innerHTML += `<div><b>Tú:</b> ${i.value}</div>`;
            i.value = "";
            document.getElementById('logs-sala').scrollTop = document.getElementById('logs-sala').scrollHeight;
        }
    }

    function up(t) { prompt("URL de archivo para " + t + ":"); }
    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
