<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v106</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--fondo); 
            color: white; 
            font-family: 'Arial Black', sans-serif; 
            line-height: 1.2;
        }

        /* HEADER COMPACTO - MÁS ALTO PERO SIN ESPACIOS */
        header { 
            display: grid; grid-template-columns: 1fr 2fr 1fr; 
            padding: 10px 20px; background: #050505; border-bottom: 4px solid var(--n-rojo);
            align-items: center; gap: 10px;
        }
        .logo-box img { width: 100%; max-height: 220px; object-fit: contain; filter: drop-shadow(0 0 20px var(--n-rojo)); }
        
        .coin-wrap { display: flex; gap: 10px; justify-content: center; }
        .coin { 
            width: 85px; height: 85px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 24px; cursor: pointer; border: 4px solid white;
            box-shadow: 0 0 15px var(--oro);
        }

        /* FILA 1: SALAS Y VISOR (REDUCIDO PARA EVITAR NEGRO) */
        .grid-top { display: grid; grid-template-columns: 300px 1fr; gap: 15px; padding: 15px; height: 420px; }
        .side-rooms { background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 10px; overflow-y: auto; }
        .btn-s { 
            padding: 10px; background: #111; border-radius: 8px; margin-bottom: 5px; 
            cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #333; font-size: 12px;
        }
        .btn-s.active { background: var(--n-rojo); border-color: white; }

        .room-view { border: 5px solid var(--n-rojo); border-radius: 20px; background: #050505; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        #main-img { width: 100%; height: 100%; object-fit: cover; }
        
        .shop-neon { 
            position: absolute; padding: 20px 40px; background: var(--n-rojo); color: white;
            font-size: 22px; border-radius: 50px; text-decoration: none; border: 3px solid white;
            box-shadow: 0 0 30px var(--n-rojo); display: none; animation: p 1s infinite alternate;
        }
        @keyframes p { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* FILA 2: BOTS Y CHAT (EL CORAZÓN DE LA PÁGINA) */
        .grid-bot { display: grid; grid-template-columns: 1fr 400px; gap: 15px; padding: 0 15px 15px; }
        
        /* BOTS: +3CM Y MISMO TAMAÑO */
        .bot-triple { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            height: 780px; /* Agrandadas pero contenidas */
            border: 4px solid #222; border-radius: 25px; overflow: hidden; background: #080808;
        }
        .bot-item { position: relative; border-right: 2px solid #222; background: #050505; }
        .bot-item img { 
            width: 100%; height: 100%; object-fit: contain; 
            image-rendering: -webkit-optimize-contrast;
            filter: brightness(1.1) contrast(1.1);
        }
        .bot-tag { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); text-align: center; padding: 15px; font-size: 24px; font-weight: 900; }

        /* CHAT INTEGRADO */
        .chat-side { background: #050505; border: 5px solid var(--n-rojo); border-radius: 25px; height: 780px; display: flex; flex-direction: column; }
        #chat-flow { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 15px; }
        .chat-input { padding: 15px; background: #111; display: flex; gap: 10px; border-radius: 0 0 20px 20px; }
        #chat-in { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 10px; border-radius: 8px; outline: none; }

        /* PUERTAS DE CARGA - COMPACTAS */
        .grid-footer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 15px; border-top: 5px solid var(--n-rojo); }
        .door { background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 10px; text-align: center; }
        .door-thumb { height: 130px; background: #000; margin-bottom: 8px; border-radius: 10px; overflow: hidden; }
        .door-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .door-btn { width: 100%; padding: 8px; border: none; border-radius: 6px; color: white; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<header>
    <div>
        <div style="width:100%; height:70px; border:2px dashed var(--n-rojo); color:var(--n-rojo); display:flex; align-items:center; justify-content:center; font-size:14px;">ADS $50</div>
        <div class="coin-wrap"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    </div>
    <div class="logo-box" style="text-align:center;"><img src="Logo Mega Red Lunar.jpg"></div>
    <div>
        <div style="width:100%; height:70px; border:2px dashed var(--n-rojo); color:var(--n-rojo); display:flex; align-items:center; justify-content:center; font-size:14px;">ADS $100</div>
        <div class="coin-wrap"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    </div>
</header>

<div class="grid-top">
    <div class="side-rooms" id="rooms-menu"></div>
    <div class="room-view">
        <img id="main-img" src="">
        <a href="https://best.aliexpress.com/" target="_blank" class="shop-neon" id="shop-btn">TIENDITA VIP 🔱</a>
    </div>
</div>

<div class="grid-bot">
    <div class="bot-triple">
        <div class="bot-item"><img src="Rubia.jpg"><div class="bot-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-item"><img src="Morocha.jpg"><div class="bot-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-item"><img src="Pelirroja.jpg"><div class="bot-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-side">
        <div id="chat-flow"></div>
        <div class="chat-input">
            <input type="text" id="chat-in" placeholder="Escribe algo..." onkeypress="if(event.key==='Enter') hablar()">
            <button onclick="hablar()" style="background:var(--n-rojo); color:white; border:none; padding:0 15px; border-radius:8px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="grid-footer">
    <div class="door"><h5 style="color:var(--n-rosa)">HISTORIAS</h5><div class="door-thumb" id="d-h"></div><button class="door-btn" style="background:var(--n-rosa)" onclick="up('d-h')">SUBIR</button></div>
    <div class="door"><h5 style="color:var(--n-azul)">ESTADOS</h5><div class="door-thumb" id="d-e"></div><button class="door-btn" style="background:var(--n-azul)" onclick="up('d-e')">SUBIR</button></div>
    <div class="door"><h5 style="color:var(--n-rojo)">VIDEOS</h5><div class="door-thumb" id="d-v"></div><button class="door-btn" style="background:var(--n-rojo)" onclick="up('d-v')">SUBIR</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function init() {
        const m = document.getElementById('rooms-menu');
        salas.forEach((s, i) => {
            let b = document.createElement('div');
            b.className = 'btn-s'; b.id = 's-'+i;
            b.innerHTML = `<span>${s}</span><span style="color:lime; font-size:9px;">0 ONLINE</span>`;
            b.onclick = () => ver(i);
            m.appendChild(b);
        });
        ver(0);
        msg("MIA", "Hola amor... bienvenida al Imperio de Resistencia. ¿Viste qué gatas estamos hoy?");
    }

    function ver(i) {
        document.querySelectorAll('.btn-s').forEach(x => x.classList.remove('active'));
        document.getElementById('s-'+i).classList.add('active');
        const img = document.getElementById('main-img');
        const btn = document.getElementById('shop-btn');
        
        if(salas[i] === "LA TIENDITA") {
            btn.style.display = 'block';
            img.style.opacity = '0';
        } else {
            btn.style.display = 'none';
            img.style.opacity = '1';
            // SOLUCIÓN: Usamos encodeURIComponent para los espacios
            img.src = encodeURIComponent(salas[i]) + ".jpg";
        }
    }

    function up(id) {
        const url = prompt("Pega el enlace de la imagen:");
        if(url) document.getElementById(id).innerHTML = `<img src="${url}">`;
    }

    function hablar() {
        const i = document.getElementById('chat-in');
        if(!i.value) return;
        const f = document.getElementById('chat-flow');
        f.innerHTML += `<div style="text-align:right; color:var(--oro); margin-bottom:8px;"><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
        setTimeout(() => {
            msg("TANIA", "No seas tacaño, mandame una moneda y te muestro todo.");
        }, 1500);
    }

    function msg(n, m) {
        const f = document.getElementById('chat-flow');
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        f.innerHTML += `<div style="margin-bottom:8px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        f.scrollTop = f.scrollHeight;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
