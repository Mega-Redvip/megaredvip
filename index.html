<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v170</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 200px 130px 1fr; 
            align-items: center; gap: 10px; padding: 10px;
            background: #050505; border-bottom: 5px solid var(--n-rojo); height: 260px;
        }
        .pub-header { border: 2px solid var(--n-rojo); height: 180px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(to bottom, #111, #000); color: var(--n-rojo); font-size: 14px; cursor: pointer; }
        .logo-v170 { height: 180px; width: 180px; object-fit: contain; }

        /* SECCIÓN SALAS - SIN SCROLL */
        .seccion-salas { display: grid; grid-template-columns: 220px 1fr; border-bottom: 5px solid var(--n-rojo); }
        .menu-l { background: #080808; display: flex; flex-direction: column; height: 100%; }
        .s-btn { padding: 12px; border-bottom: 1px solid #1a1a1a; cursor: pointer; color: #888; font-size: 10px; display: flex; align-items: center; }
        .s-btn.active { background: var(--n-rojo); color: white; }
        .s-icon { font-size: 16px; margin-right: 10px; }

        /* VISOR SIMÉTRICO Y CHAT SALA */
        .seccion-visor-chat { display: grid; grid-template-columns: 50% 50%; height: 450px; }
        .visor-vip { background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; border-right: 3px solid #333; }
        #sala-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .chat-sala { background: #050505; display: flex; flex-direction: column; }
        .chat-logs { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 11px; font-family: sans-serif; color: #aaa; }

        /* SECCIÓN BOTS Y CHAT IA */
        .seccion-ia { display: grid; grid-template-columns: 50% 50%; height: 400px; border-top: 5px solid var(--n-rojo); }
        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); }
        .bot-cell { position: relative; height: 400px; border-right: 1px solid #222; overflow: hidden; }
        .bot-cell img { width: 100%; height: 100%; object-fit: cover; }
        .morocha-fix { object-position: 20% center; }
        .bot-name { position: absolute; bottom: 0; width: 100%; text-align: center; padding: 10px; background: rgba(0,0,0,0.8); font-size: 14px; }

        .chat-bots-wrap { display: flex; flex-direction: column; background: #0a0a0a; border-left: 5px solid var(--n-rojo); }
        #chat-bots-logs { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 13px; }
        .chat-bar { padding: 10px; background: #111; display: flex; gap: 5px; }
        input { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; }

        /* PUERTAS Y SUBIDAS */
        .footer-puertas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; background: #050505; border-top: 5px solid var(--n-rojo); }
        .p-box { background: #000; border: 2px solid #222; padding: 15px; border-radius: 10px; text-align: center; }
        .p-visor { height: 120px; background: #080808; border: 1px dashed #444; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 5px; }
        .btn-up { width: 100%; padding: 12px; border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 5px; }
    </style>
</head>
<body onload="iniciarImperio()">

<header>
    <div class="pub-header"><b>🔥 ¡ANÚNCIATE AQUÍ! 🔥<br>Visto por miles de VIPs</b></div>
    <div style="display:flex; flex-direction:column; gap:5px;"><div class="coin">$1</div><div class="coin">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v170">
    <div style="display:flex; flex-direction:column; gap:5px;"><div class="coin">$10</div><div class="coin">$20</div></div>
    <div class="pub-header" style="color:var(--n-azul)"><b>💎 SOCIO EXCLUSIVO 💎<br>¡Click para info!</b></div>
</header>

<div class="seccion-salas">
    <div class="menu-l" id="menu-l"></div>
    <div class="seccion-visor-chat">
        <div class="visor-vip"><img id="sala-img" src=""></div>
        <div class="chat-sala">
            <div style="background:#111; padding:5px; font-size:10px; text-align:center; color:var(--oro)">SALA DE CHAT EN VIVO</div>
            <div id="logs-sala" class="chat-logs"></div>
            <div style="padding:5px; display:flex; gap:5px;">
                <input type="text" id="in-sala" placeholder="Hablar en sala...">
                <button onclick="enviarSala()" style="background:var(--n-rojo); color:white; border:none; padding:0 10px; cursor:pointer;">OK</button>
            </div>
        </div>
    </div>
</div>

<div class="seccion-ia">
    <div class="grid-bots">
        <div class="bot-cell"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-cell"><img src="Morocha.jpg" class="morocha-fix"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-cell"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-bots-wrap">
        <div id="chat-bots-logs"></div>
        <div class="chat-bar">
            <input type="text" id="chat-bots-in" placeholder="Pregúntales algo picante..." onkeypress="if(event.key==='Enter') responderIA()">
            <button onclick="responderIA()" style="background:var(--n-rojo); color:white; border:none; padding:0 20px; font-weight:bold; cursor:pointer;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-puertas">
    <div class="p-box"><div class="p-visor" id="v-h">HISTORIAS</div><button onclick="up('v-h')" style="background:var(--n-rosa)" class="btn-up">Subir Historia</button></div>
    <div class="p-box"><div class="p-visor" id="v-e">ESTADOS</div><button onclick="up('v-e')" style="background:var(--n-azul)" class="btn-up">Subir Estado</button></div>
    <div class="p-box"><div class="p-visor" id="v-v">VIDEOS</div><button onclick="up('v-v')" style="background:var(--n-rojo)" class="btn-up">Subir Video</button></div>
</div>

<script>
    const salasData = [
        { n: "SADO Y MASO", f: "Sado y Maso.jpg", i: "🔥" },
        { n: "SPA", f: "Spa.png", i: "💧" },
        { n: "BIBLIOTECA", f: "Biblioteca.png", i: "📚" },
        { n: "CAMARERA", f: "Camarera.png", i: "👠" },
        { n: "DISCOTECA", f: "Discoteca.png", i: "🔊" },
        { n: "EL BAR", f: "El Bar.png", i: "🍸" },
        { n: "GIMNASIO", f: "Gimnasio.png", i: "💪" },
        { n: "OFICINA", f: "Oficina.png", i: "💼" },
        { n: "PLAYA", f: "Playa.png", i: "⛱️" },
        { n: "LA TIENDITA", f: "La Tiendita.png", i: "🎁" }
    ];

    function iniciarImperio() {
        const ml = document.getElementById('menu-l');
        salasData.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-btn'; d.id = 'sl-'+i;
            d.innerHTML = `<span class="s-icon">${s.i}</span><b>${s.n}</b>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(charlaBots, 10000);
    }

    function ver(i) {
        document.querySelectorAll('.s-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        document.getElementById('sala-img').src = salasData[i].f;
    }

    function charlaBots() {
        const discusiones = [
            {n: "MIA", c: "var(--n-rosa)", m: "Miren mis curvas... Tania, admítelo, soy la más ardiente aquí."},
            {n: "TANIA", c: "var(--n-azul)", m: "Mia, cariño, la experiencia y la clase me hacen la más caliente. Los hombres prefieren una morocha de verdad."},
            {n: "COLO", c: "var(--n-rojo)", m: "¡Cállense las dos! El fuego lo tengo yo en el pelo y en la piel. Nadie es más sensual que una pelirroja atrevida."},
            {n: "MIA", c: "var(--n-rosa)", m: "¿Ah sí? ¿Por qué no le preguntamos a los clientes quién de las tres les quita el sueño?"}
        ];
        const r = discusiones[Math.floor(Math.random() * discusiones.length)];
        escribirChat(r.n, r.m, r.c);
    }

    function responderIA() {
        const i = document.getElementById('chat-bots-in');
        if(!i.value.trim()) return;
        escribirChat("Tú", i.value, "var(--oro)");
        
        setTimeout(() => {
            const v = i.value.toLowerCase();
            let r = {n: "TANIA", c: "var(--n-azul)", m: "Me gusta tu atrevimiento... ¿Te gustaría saber mi edad o prefieres que te enseñe algo más?"};
            if(v.includes("caliente")) r = {n: "COLO", c: "var(--n-rojo)", m: "Si buscas fuego, lo encontraste conmigo. ¿Qué harías si me tuvieras frente a ti?"};
            if(v.includes("edad")) r = {n: "MIA", c: "var(--n-rosa)", m: "Tengo 22 añitos... joven, firme y lista para cualquier fantasía que tengas."};
            
            escribirChat(r.n, r.m, r.c);
            i.value = "";
        }, 1200);
    }

    function escribirChat(n, m, c) {
        const logs = document.getElementById('chat-bots-logs');
        logs.innerHTML += `<div style="margin-bottom:10px;"><b style="color:${c}">${n}:</b> <span style="color:${c}">${m}</span></div>`;
        logs.scrollTop = logs.scrollHeight;
    }

    function enviarSala() {
        const i = document.getElementById('in-sala');
        document.getElementById('logs-sala').innerHTML += `<div><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
    }

    function up(id) {
        let n = prompt("Pega el nombre de tu imagen/archivo:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }
</script>
</body>
</html>
