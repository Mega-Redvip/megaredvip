<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v102</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--fondo); 
            color: white; 
            font-family: 'Arial Black', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER SUPREMO - MONEDAS Y LOGO GIGANTES */
        header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 50px; background: #050505; border-bottom: 6px solid var(--n-rojo);
            flex-shrink: 0;
        }
        .ads { width: 300px; height: 180px; border: 4px dashed var(--n-rojo); display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--n-rojo); background: #0a0a0a; }
        .logo-center img { max-height: 300px; width: auto; filter: drop-shadow(0 0 30px var(--n-rojo)); }
        
        .coin-box { display: flex; gap: 30px; margin-top: 15px; }
        .coin { 
            width: 120px; height: 120px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 36px; cursor: pointer; border: 6px solid white;
            box-shadow: 0 0 30px var(--oro); transition: 0.3s;
        }

        /* SECCIÓN CENTRAL: 10 SALAS Y VISOR */
        .content-top { display: grid; grid-template-columns: 400px 1fr; gap: 20px; padding: 20px; flex-shrink: 0; }
        .room-sidebar { background: #0a0a0a; border: 3px solid #222; border-radius: 20px; padding: 15px; }
        .room-item { 
            padding: 15px; background: #151515; border-radius: 10px; margin-bottom: 8px; 
            cursor: pointer; display: flex; justify-content: space-between; border: 2px solid #333;
        }
        .room-item.active { background: var(--n-rojo); border-color: #fff; }
        
        .viewer-main { 
            border: 8px solid var(--n-rojo); border-radius: 25px; height: 500px; 
            background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        #img-sala { width: 100%; height: 100%; object-fit: cover; }

        /* EL BOTÓN NEÓN DE LA TIENDITA */
        #btn-neon-tienda {
            padding: 25px 60px; background: var(--n-rojo); color: white;
            font-size: 30px; font-weight: 900; border-radius: 60px;
            text-decoration: none; border: 5px solid white;
            box-shadow: 0 0 50px var(--n-rojo); display: none;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* SECCIÓN BOTS: CUERPO COMPLETO SIN PIXELAR */
        .bot-area { 
            display: grid; grid-template-columns: 1fr 500px; 
            gap: 20px; padding: 20px; flex-grow: 1;
        }
        .bot-triple { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            height: 900px; /* ALTURA MÁXIMA PARA CUERPO COMPLETO */
            background: #080808; border-radius: 30px; overflow: hidden; border: 4px solid #222;
        }
        .bot-col { position: relative; border-right: 3px solid #222; background: #050505; }
        .bot-col img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* Esto asegura que se vea de pies a cabeza sin cortes */
            object-position: center;
            image-rendering: -webkit-optimize-contrast; /* Forzar nitidez */
        }
        .bot-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); text-align: center; padding: 25px; font-size: 32px; font-weight: 900; }

        /* CHAT SENSAL */
        .chat-container { background: #050505; border: 6px solid var(--n-rojo); border-radius: 30px; height: 900px; display: flex; flex-direction: column; }
        #chat-box { flex-grow: 1; padding: 25px; overflow-y: auto; font-size: 18px; line-height: 1.6; }
        .input-area { display: flex; padding: 20px; background: #111; gap: 15px; }
        #text-in { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 15px; border-radius: 15px; font-size: 18px; }

        /* PUERTAS DE CARGA */
        .footer-gates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; padding: 30px; border-top: 8px solid var(--n-rojo); }
        .gate { background: #0a0a0a; border: 3px solid #333; border-radius: 20px; padding: 20px; text-align: center; }
        .preview { height: 200px; background: #000; margin-bottom: 15px; border-radius: 10px; border: 1px solid #222; overflow: hidden; }
        .preview img { width: 100%; height: 100%; object-fit: cover; }
        .up-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body onload="start()">

<header>
    <div>
        <div class="ads">ANUNCIO VIP</div>
        <div class="coin-box"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    </div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg"></div>
    <div>
        <div class="ads">ANUNCIO VIP</div>
        <div class="coin-box"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    </div>
</header>

<div class="content-top">
    <div class="room-sidebar" id="side-menu"></div>
    <div class="viewer-main">
        <img id="img-sala" src="">
        <a href="https://best.aliexpress.com/" target="_blank" id="btn-neon-tienda">IR A LA TIENDITA 🔱</a>
    </div>
</div>

<div class="bot-area">
    <div class="bot-triple">
        <div class="bot-col"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-col"><img src="Morocha.jpg"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-col"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-container">
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="text-in" placeholder="Diles algo a las gatitas..." onkeypress="if(event.key==='Enter') hablar()">
            <button onclick="hablar()" style="background:var(--n-rojo); color:white; border:none; padding:0 30px; border-radius:15px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="footer-gates">
    <div class="gate">
        <h3 style="color:var(--n-rosa)">HISTORIAS</h3>
        <div class="preview" id="p-h"></div>
        <button class="up-btn" style="background:var(--n-rosa)" onclick="cargar('p-h')">SUBIR ARCHIVO</button>
    </div>
    <div class="gate">
        <h3 style="color:var(--n-azul)">ESTADOS</h3>
        <div class="preview" id="p-e"></div>
        <button class="up-btn" style="background:var(--n-azul)" onclick="cargar('p-e')">SUBIR ARCHIVO</button>
    </div>
    <div class="gate">
        <h3 style="color:var(--n-rojo)">VIDEOS</h3>
        <div class="preview" id="p-v"></div>
        <button class="up-btn" style="background:var(--n-rojo)" onclick="cargar('p-v')">SUBIR ARCHIVO</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function start() {
        const menu = document.getElementById('side-menu');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'room-item'; d.id = 'r-'+i;
            d.innerHTML = `<span>${s}</span><span style="color:#00ff00; font-size:11px;">0 PERSONAS ONLINE</span>`;
            d.onclick = () => setSala(i);
            menu.appendChild(d);
        });
        setSala(0);
        msg("MIA", "Hola mi amor... ¿Viste qué gatona que soy hoy? Las otras dos están celosas porque soy la más divina de Resistencia.");
    }

    function setSala(i) {
        document.querySelectorAll('.room-item').forEach(x => x.classList.remove('active'));
        document.getElementById('r-'+i).classList.add('active');
        
        const btn = document.getElementById('btn-neon-tienda');
        const img = document.getElementById('img-sala');
        
        if(salas[i] === "LA TIENDITA") {
            btn.style.display = 'block';
            img.style.display = 'none';
        } else {
            btn.style.display = 'none';
            img.style.display = 'block';
            // IMPORTANTE: Asegúrate de que el nombre del archivo sea igual a la sala.
            img.src = salas[i] + ".jpg";
        }
    }

    function cargar(id) {
        const url = prompt("Pega el enlace de la imagen:");
        if(url) document.getElementById(id).innerHTML = `<img src="${url}">`;
    }

    function hablar() {
        const input = document.getElementById('text-in');
        if(!input.value) return;
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div style="text-align:right; color:var(--oro); margin:10px 0;"><b>Tú:</b> ${input.value}</div>`;
        input.value = "";
        
        setTimeout(() => {
            const bot = ["MIA", "TANIA", "COLO"][Math.floor(Math.random()*3)];
            const msgs = ["No seas tacaño amor, mandame una moneda y te muestro todo.", "Tania es una pendeja, yo soy la que manda acá.", "Soy pretenciosa porque puedo, bombón.", "Qué cariñoso... me ponés juguetona."];
            msg(bot, msgs[Math.floor(Math.random()*msgs.length)]);
        }, 1500);
    }

    function msg(n, m) {
        const box = document.getElementById('chat-box');
        const col = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        box.innerHTML += `<div style="margin:10px 0;"><b style="color:${col}">${n}:</b> ${m}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
