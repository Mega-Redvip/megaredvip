<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v144</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 250px 130px 1fr; 
            align-items: center; gap: 20px; padding: 15px;
            background: #050505; border-bottom: 8px solid var(--n-rojo); height: 340px;
        }
        .logo-v144 { height: 250px; width: 250px; object-fit: contain; filter: drop-shadow(0 0 25px var(--n-rojo)); }
        .coin { width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; border: 5px solid white; cursor: pointer; }

        /* SECCIÓN SALAS */
        .seccion-salas { display: grid; grid-template-columns: 280px 1fr; height: 500px; border-bottom: 8px solid var(--n-rojo); }
        .menu-lat { overflow-y: auto; background: #0a0a0a; border-right: 2px solid #333; }
        .s-btn { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; color: #555; font-size: 14px; }
        .s-btn.active { background: var(--n-rojo); color: white; }
        
        .visor-vip { background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        #sala-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .status-vip { position: absolute; text-align: center; color: #555; font-size: 18px; border: 2px dashed #333; padding: 20px; }

        /* SECCIÓN 50/50: BOTS IGUALADAS (SIN ESCALERA) */
        .seccion-media { display: grid; grid-template-columns: 50% 50%; height: 550px; }

        .bots-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; border-right: 6px solid var(--n-rojo); }
        .bot-frame { 
            position: relative; 
            height: 550px; /* Altura fija para todas */
            overflow: hidden; 
            border-right: 1px solid #222;
        }
        /* ESTO ELIMINA LA ESCALERA Y MANTIENE NITIDEZ */
        .bot-frame img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Llena el cuadro exacto */
            object-position: top center; /* Prioriza que se vea la cara */
        }
        .bot-tag { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 28px; font-weight: 900; text-shadow: 0 0 15px #000; }

        .chat-frame { display: flex; flex-direction: column; height: 550px; background: #080808; }
        #chat-logs { flex-grow: 1; padding: 25px; overflow-y: auto; font-size: 16px; border-bottom: 2px solid #222; }
        .chat-input { padding: 20px; display: flex; gap: 10px; background: #111; }
        #msg-in { flex-grow: 1; background: #000; border: 3px solid var(--n-rojo); color: white; padding: 15px; border-radius: 10px; outline: none; }

        /* PUERTAS */
        .footer-puertas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 35px; background: #000; }
        .p-card { background: #0a0a0a; border: 1px solid #333; border-radius: 20px; padding: 20px; text-align: center; }
        .p-preview { height: 120px; background: #000; border: 2px dashed #444; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-preview img { width: 100%; height: 100%; object-fit: cover; }
        .p-btn { width: 100%; padding: 20px; border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body onload="init()">

<header>
    <div style="border:3px solid var(--n-rojo); height:220px; border-radius:15px; display:flex; align-items:center; justify-content:center; text-align:center;">PUB</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v144">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div style="border:3px solid var(--n-rojo); height:220px; border-radius:15px; display:flex; align-items:center; justify-content:center; text-align:center;">PUB</div>
</header>

<div class="seccion-salas">
    <div class="menu-lat" id="menu-lat"></div>
    <div class="visor-vip">
        <div id="st-sala" class="status-vip">
            <p>CONECTANDO...</p>
            <small id="db-sala"></small>
        </div>
        <img id="sala-img" src="" onerror="repararSala(this)">
    </div>
</div>

<div class="seccion-media">
    <div class="bots-grid">
        <div class="bot-frame"><img src="Rubia.jpg"><div class="bot-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-frame"><img src="Morocha.jpg"><div class="bot-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-frame"><img src="Pelirroja.jpg"><div class="bot-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-frame">
        <div id="chat-logs"></div>
        <div class="chat-input">
            <input type="text" id="msg-in" placeholder="Habla con ellas..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 30px; border-radius:10px; cursor:pointer; font-weight:bold;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-puertas">
    <div class="p-card">
        <div class="p-preview" id="v-h">HISTORIA</div>
        <button class="p-btn" style="background:var(--n-rosa)" onclick="subir('v-h')">Historias</button>
    </div>
    <div class="p-card">
        <div class="p-preview" id="v-e">ESTADO</div>
        <button class="p-btn" style="background:var(--n-azul)" onclick="subir('v-e')">Estados</button>
    </div>
    <div class="p-card">
        <div class="p-preview" id="v-v">VIDEO</div>
        <button class="p-btn" style="background:var(--n-rojo)" onclick="subir('v-v')">Videos</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    let sIdx = 0;

    function init() {
        const ml = document.getElementById('menu-lat');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-btn'; d.id = 'sl-'+i;
            d.innerHTML = `<b>${s}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { sIdx = (sIdx + 1) % salas.length; ver(sIdx); }, 6000);
        mensaje("TANIA", "¡Hola! He unificado nuestras fotos. Ahora todas medimos lo mismo para que la web se vea impecable.");
    }

    function ver(i) {
        sIdx = i;
        document.querySelectorAll('.s-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        const img = document.getElementById('sala-img');
        const db = document.getElementById('db-sala');
        img.style.display = "none";
        document.getElementById('st-sala').style.display = "block";
        db.innerText = "Buscando: " + salas[i] + ".jpg";
        img.dataset.retry = "0";
        img.src = salas[i] + ".jpg";
    }

    function repararSala(img) {
        let r = parseInt(img.dataset.retry);
        const n = salas[sIdx];
        if(r === 0) { img.dataset.retry = "1"; img.src = n.replace(/\s/g, "") + ".jpg"; }
        else if(r === 1) { img.dataset.retry = "2"; img.src = n.toLowerCase() + ".jpg"; }
        else { document.getElementById('db-sala').innerHTML = `<span style="color:red">ERROR:</span> Verifica que <b>${n}.jpg</b> esté en la carpeta.`; }
    }

    document.getElementById('sala-img').onload = function() {
        this.style.display = "block";
        document.getElementById('st-sala').style.display = "none";
    };

    function enviar() {
        const input = document.getElementById('msg-in');
        if(!input.value.trim()) return;
        document.getElementById('chat-logs').innerHTML += `<div style="text-align:right; margin-bottom:15px; color:var(--oro)"><b>Tú:</b> ${input.value}</div>`;
        setTimeout(() => {
            const g = ["MIA", "TANIA", "COLO"];
            mensaje(g[Math.floor(Math.random()*3)], "¡Te leemos fuerte y claro!");
        }, 1000);
        input.value = "";
        document.getElementById('chat-logs').scrollTop = document.getElementById('chat-logs').scrollHeight;
    }

    function mensaje(n, m) {
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-logs').innerHTML += `<div style="margin-bottom:15px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-logs').scrollTop = document.getElementById('chat-logs').scrollHeight;
    }

    function subir(id) {
        let n = prompt("Nombre del archivo:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
