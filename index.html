<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v75</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            overflow-y: auto; overflow-x: hidden;
        }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 350px 1fr 350px; 
            align-items: center; padding: 20px; border-bottom: 5px solid var(--n-rojo); 
            background: #050505;
        }
        .logo-center img { height: 260px; filter: drop-shadow(0 0 30px var(--n-rojo)); }
        
        .coins { display: flex; gap: 20px; margin-top: 10px; }
        .coin { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; border: 3px solid white;
        }

        /* NIVEL 1: SALAS Y AVATARES */
        .level-1 { display: grid; grid-template-columns: 300px 1fr; gap: 15px; padding: 20px; height: 500px; }
        
        .rooms-grid { 
            background: #0a0a0a; border: 2px solid #222; border-radius: 12px; padding: 10px;
            display: flex; flex-direction: column; gap: 4px; height: 100%;
        }
        .rooms-list-scroll { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        
        .room-unit { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; background: #111; border: 1px solid #333; border-radius: 5px;
            cursor: pointer; font-size: 10px; text-transform: uppercase;
        }
        .room-unit.active { background: var(--n-rojo); border-color: white; }

        /* BOTÓN COMPRAR JUGUETES VIP - PEQUEÑO Y NEÓN DESTELLANTE */
        .btn-ali-flash {
            background: #000;
            color: #fff;
            border: 2px solid var(--n-rojo);
            border-radius: 5px;
            text-align: center;
            padding: 10px;
            font-size: 11px;
            font-weight: 900;
            text-decoration: none;
            margin-top: 5px;
            text-transform: uppercase;
            box-shadow: 0 0 5px var(--n-rojo);
            animation: flash-red 1s infinite alternate;
            display: block;
        }
        @keyframes flash-red {
            from { box-shadow: 0 0 2px var(--n-rojo); border-color: #500; color: #aaa; }
            to { box-shadow: 0 0 15px var(--n-rojo); border-color: var(--n-rojo); color: #fff; }
        }

        /* AVATARES CONTROLADOS */
        .avatars-battle { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .avatar-card { border: 2px solid #222; border-radius: 15px; overflow: hidden; background: #000; position: relative; }
        .avatar-card img { 
            width: 100%; height: 100%; object-fit: cover; object-position: top center;
            image-rendering: -webkit-optimize-contrast;
        }
        .name-tag { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 8px; font-size: 13px; font-weight: 900; }

        /* NIVEL 2: VISOR Y CHAT */
        .level-2 { display: grid; grid-template-columns: 1fr 450px; gap: 15px; padding: 0 20px 20px 20px; height: 450px; }
        .viewer-box { border: 4px solid var(--n-rojo); border-radius: 15px; overflow: hidden; background: #000; }
        #room-img { width: 100%; height: 100%; object-fit: contain; }

        .chat-box { background: #050505; border: 3px solid var(--n-rojo); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
        #chat-content { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

        /* NIVEL 3: PUERTAS */
        .level-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px; border-top: 5px solid var(--n-rojo); }
        .gate-door { background: #0a0a0a; border: 2px solid var(--n-rojo); border-radius: 20px; padding: 20px; text-align: center; }
        .gate-display { height: 180px; background: #000; margin-bottom: 15px; border-radius: 10px; overflow-y: auto; padding: 10px; }
    </style>
</head>
<body onload="initImperio()">

<header>
    <div class="header-side">
        <div class="publi-box" style="border:1px solid var(--n-rojo); padding:20px;">ADS $20</div>
        <div class="coins">
            <div class="coin" onclick="irAPagar(1)">$1</div>
            <div class="coin" onclick="irAPagar(3)">$3</div>
        </div>
    </div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="header-side">
        <div class="publi-box" style="border:1px solid var(--n-rojo); padding:20px;">ADS $50</div>
        <div class="coins">
            <div class="coin" onclick="irAPagar(5)">$5</div>
            <div class="coin" onclick="irAPagar(10)">$10</div>
        </div>
    </div>
</header>

<div class="level-1">
    <div class="rooms-grid">
        <div class="rooms-list-scroll" id="rooms-list"></div>
        <a href="TU_LINK_DE_ALI_AQUÍ" target="_blank" class="btn-ali-flash">🛒 COMPRAR JUGUETES VIP</a>
    </div>
    <div class="avatars-battle">
        <div class="avatar-card"><img src="Rubia.jpg"><div class="name-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="avatar-card"><img src="Morocha.jpg"><div class="name-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="avatar-card"><img src="Pelirroja.jpg"><div class="name-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
</div>

<div class="level-2">
    <div class="viewer-box"><img id="room-img" src=""></div>
    <div class="chat-box">
        <div id="chat-content"></div>
        <div style="display:flex; padding:10px; gap:5px;">
            <input type="text" id="msg-in" style="flex-grow:1; background:#000; border:1px solid var(--n-rojo); color:white; padding:10px;">
            <button onclick="send()" style="background:var(--n-rojo); color:white; border:none; padding:10px; cursor:pointer;">OK</button>
        </div>
    </div>
</div>

<div class="level-3">
    <div class="gate-door"><h3>HISTORIAS</h3><div class="gate-display" id="d-h"></div><button onclick="post('d-h')">SUBIR</button></div>
    <div class="gate-door"><h3>ESTADOS</h3><div class="gate-display" id="d-e"></div><button onclick="post('d-e')">SUBIR</button></div>
    <div class="gate-door"><h3>VIDEOS</h3><div class="gate-display" id="d-v"></div><button onclick="post('d-v')">SUBIR</button></div>
</div>

<script>
    let pos = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg"}, {n: "Spa", e: ".png"}, {n: "Biblioteca", e: ".png"}, 
        {n: "Camarera", e: ".png"}, {n: "Discoteca", e: ".png"}, {n: "El Bar", e: ".png"},
        {n: "Gimnasio", e: ".png"}, {n: "Oficina", e: ".png"}, {n: "Playa", e: ".png"}, {n: "La Tiendita", e: ".png"}
    ];

    const MI_CORREO_PAYPAL = "jp_herraez@hotmail.com";

    function irAPagar(monto) {
        window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${MI_CORREO_PAYPAL}&item_name=CreditsVIP&amount=${monto}&currency_code=USD`, "_blank");
    }

    function initImperio() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const d = document.createElement('div');
            d.className = 'room-unit'; d.id = 'u-' + i;
            d.innerHTML = `<span>${r.n}</span><span style="color:var(--n-azul)">LIVE</span>`;
            d.onclick = () => select(i);
            list.appendChild(d);
        });
        select(0);
        setInterval(iaChat, 4000);
    }

    function select(i) {
        pos = i;
        document.querySelectorAll('.room-unit').forEach(x => x.classList.remove('active'));
        document.getElementById('u-' + i).classList.add('active');
        document.getElementById('room-img').src = encodeURI(rooms[i].n + rooms[i].e);
    }

    function iaChat() {
        const c = document.getElementById('chat-content');
        const m = ["¡Hola guapo!", "¿Quieres ver más?", "Invítame algo...", "Soy Colo 🔥"];
        const b = [{n:"MIA",cl:"var(--n-rosa)"},{n:"TANIA",cl:"var(--n-azul)"},{n:"COLO",cl:"var(--n-rojo)"}][Math.floor(Math.random()*3)];
        c.innerHTML += `<div style="font-size:13px;"><b style="color:${b.cl}">${b.n}:</b> ${m[Math.floor(Math.random()*4)]}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    function send() {
        const i = document.getElementById('msg-in');
        document.getElementById('chat-content').innerHTML += `<div style="font-size:13px;"><b style="color:var(--oro)">TÚ:</b> ${i.value}</div>`;
        i.value = "";
    }

    function post(id) {
        const url = prompt("Escribe texto o pega link:");
        if(url) document.getElementById(id).innerHTML = `<p>${url}</p>` + document.getElementById(id).innerHTML;
    }
</script>
</body>
</html>
