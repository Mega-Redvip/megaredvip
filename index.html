<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v149</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: flex; justify-content: space-around; align-items: center; 
            padding: 10px; background: #050505; border-bottom: 6px solid var(--n-rojo); height: 280px;
        }
        .logo-v149 { height: 230px; width: 230px; object-fit: contain; }
        .coin { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; border: 4px solid white; cursor: pointer; }

        /* SECCIÓN SALAS */
        .seccion-salas { display: grid; grid-template-columns: 280px 1fr; height: 500px; border-bottom: 6px solid var(--n-rojo); }
        .menu-l { overflow-y: auto; background: #080808; border-right: 2px solid #222; }
        .s-btn { padding: 18px; border-bottom: 1px solid #111; cursor: pointer; color: #444; font-size: 14px; transition: 0.2s; }
        .s-btn.active { background: var(--n-rojo); color: white; }
        
        .visor-vip { background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        #sala-img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .st-msg { position: absolute; text-align: center; color: #666; font-size: 18px; }

        /* SECCIÓN 50/50: ALTURA 555PX SIN ESCALERA */
        .seccion-ia { display: grid; grid-template-columns: 1fr 1fr; height: 555px; }

        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; border-right: 6px solid var(--n-rojo); }
        .bot-cell { 
            position: relative; 
            height: 555px; /* ALTURA SOLICITADA */
            background: #050505; 
            border-right: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        /* ELIMINA ESCALERA: Fuerza a todas a medir 555px de alto */
        .bot-cell img { 
            width: auto;
            height: 100%; 
            max-width: 100%;
            object-fit: contain; /* Se ven enteras de pies a cabeza */
            z-index: 2;
        }
        .bot-tag { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 26px; font-weight: 900; text-shadow: 0 0 15px #000; z-index: 3; }

        .chat-wrap { display: flex; flex-direction: column; height: 555px; background: #0a0a0a; }
        #chat-logs { flex-grow: 1; padding: 25px; overflow-y: auto; font-size: 16px; border-bottom: 1px solid #222; }
        .chat-bar { padding: 15px; background: #111; display: flex; gap: 10px; }
        #chat-in { flex-grow: 1; background: #000; border: 3px solid var(--n-rojo); color: white; padding: 15px; border-radius: 8px; outline: none; }

        /* PUERTAS */
        .footer-p { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; background: #000; }
        .p-card { background: #080808; border: 1px solid #333; border-radius: 20px; padding: 20px; text-align: center; }
        .p-pre { height: 110px; background: #000; border: 2px dashed #444; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-btn { width: 100%; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; }
    </style>
</head>
<body onload="start()">

<header>
    <div class="coin" onclick="pay(1)">$1</div>
    <div class="coin" onclick="pay(5)">$5</div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v149">
    <div class="coin" onclick="pay(10)">$10</div>
    <div class="coin" onclick="pay(20)">$20</div>
</header>

<div class="seccion-salas">
    <div class="menu-l" id="menu-l"></div>
    <div class="visor-vip">
        <div id="st-sala" class="st-msg">
            <p>CONECTANDO CÁMARA...</p>
            <small id="db-msg"></small>
        </div>
        <img id="sala-img" src="" onerror="repararRuta(this)">
    </div>
</div>

<div class="seccion-ia">
    <div class="grid-bots">
        <div class="bot-cell"><img src="Rubia.jpg"><div class="bot-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-cell"><img src="Morocha.jpg"><div class="bot-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-cell"><img src="Pelirroja.jpg"><div class="bot-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-wrap">
        <div id="chat-logs"></div>
        <div class="chat-bar">
            <input type="text" id="chat-in" placeholder="Escribe a las chicas..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 30px; border-radius:8px; cursor:pointer; font-weight:bold;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-p">
    <div class="p-card">
        <div class="p-pre" id="v-h"></div>
        <button onclick="up('v-h')" style="background:var(--n-rosa)" class="p-btn">Historias</button>
    </div>
    <div class="p-card">
        <div class="p-pre" id="v-e"></div>
        <button onclick="up('v-e')" style="background:var(--n-azul)" class="p-btn">Estados</button>
    </div>
    <div class="p-card">
        <div class="p-pre" id="v-v"></div>
        <button onclick="up('v-v')" style="background:var(--n-rojo)" class="p-btn">Videos</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    let actual = 0;

    function start() {
        const ml = document.getElementById('menu-l');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-btn'; d.id = 'sl-'+i;
            d.innerHTML = `<b>${s}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { actual = (actual + 1) % salas.length; ver(actual); }, 7000);
        msg("TANIA", "¡Listo! He ajustado el tamaño a 555px. Ahora nos verás alineadas y completas.");
    }

    function ver(i) {
        actual = i;
        document.querySelectorAll('.s-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        const img = document.getElementById('sala-img');
        img.style.display = "none";
        document.getElementById('st-sala').style.display = "block";
        document.getElementById('db-msg').innerText = "Archivo: " + salas[i] + ".jpg";
        img.dataset.tento = "0";
        img.src = salas[i] + ".jpg";
    }

    function repararRuta(img) {
        let t = parseInt(img.dataset.tento);
        const n = salas[actual];
        const ext = [".png", ".JPG", ".PNG", ".jpeg", ".JPEG"];
        if(t < ext.length) {
            img.dataset.tento = t + 1;
            img.src = n + ext[t];
        } else {
            document.getElementById('db-msg').innerHTML = `<span style="color:red">ERROR:</span> No está el archivo <b>${n}</b> (.jpg o .png)`;
        }
    }

    document.getElementById('sala-img').onload = function() {
        this.style.display = "block";
        document.getElementById('st-sala').style.display = "none";
    };

    function enviar() {
        const input = document.getElementById('chat-in');
        if(!input.value.trim()) return;
        document.getElementById('chat-logs').innerHTML += `<div style="text-align:right; margin-bottom:15px; color:var(--oro)"><b>Tú:</b> ${input.value}</div>`;
        setTimeout(() => msg("MIA", "¡Hola! ¿Qué tal el nuevo tamaño de 555px?"), 800);
        input.value = "";
        document.getElementById('chat-logs').scrollTop = document.getElementById('chat-logs').scrollHeight;
    }

    function msg(n, m) {
        const color = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-logs').innerHTML += `<div style="margin-bottom:15px;"><b style="color:${color}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-logs').scrollTop = document.getElementById('chat-logs').scrollHeight;
    }

    function up(id) {
        let n = prompt("Nombre del archivo:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
