<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v183</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* NEÓN ANIMADO PARA LOGO Y ADS */
        @keyframes neon-pulse { 0%, 100% { filter: drop-shadow(0 0 10px var(--n-rojo)); border-color: var(--n-rojo); } 50% { filter: drop-shadow(0 0 25px var(--n-rojo)); border-color: #fff; } }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 280px 130px 1fr; 
            align-items: center; gap: 10px; padding: 15px;
            background: #050505; border-bottom: 5px solid var(--n-rojo); height: 320px;
        }
        .pub-header { border: 3px solid var(--n-rojo); height: 200px; border-radius: 10px; animation: neon-pulse 2s infinite; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 14px; }
        .logo-v183 { height: 260px; width: 260px; object-fit: contain; animation: neon-pulse 2s infinite; }
        .coin { width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; border: 4px solid white; cursor: pointer; box-shadow: 0 0 15px var(--oro); }

        /* BLOQUE SUPERIOR (33.3% cada uno) */
        .top-container { display: grid; grid-template-columns: 33.33% 33.33% 33.33%; height: 450px; border-bottom: 5px solid var(--n-rojo); }

        .menu-l { background: #080808; border-right: 2px solid #333; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; }
        .s-card { background: #111; border: 1px solid #333; height: 50px; display: flex; align-items: center; margin-bottom: 3px; cursor: pointer; transition: 0.3s; }
        .s-card.active { background: var(--n-rojo); border-left: 6px solid white; }
        .s-card img { width: 50px; height: 100%; object-fit: cover; }

        /* LA TIENDITA NEÓN */
        .btn-tiendita { height: 55px; background: url('La Tiendita.png') center; background-size: cover; border: 2px solid var(--oro); position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 5px 0; }
        .tiendita-txt { z-index: 2; color: #fff; text-shadow: 0 0 10px var(--n-rojo), 0 0 20px var(--n-rojo); font-size: 11px; font-weight: bold; animation: pulse 1s infinite; }

        /* VISOR (1 CM MÁS GRANDE / NÍTIDO) */
        .visor-box { background: #000; border-right: 2px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #sala-img-big { max-width: 100%; max-height: 100%; object-fit: contain; transform: scale(1.15); }

        /* CHAT SALA */
        .chat-box { background: #050505; display: flex; flex-direction: column; }
        .chat-logs { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 11px; font-family: sans-serif; }

        /* BLOQUE INFERIOR (25% cada uno - SIMETRÍA TOTAL) */
        .bot-container { display: grid; grid-template-columns: 25% 25% 25% 25%; height: 450px; border-bottom: 5px solid var(--n-rojo); }
        .bot-card { border-right: 2px solid #222; position: relative; background: #000; overflow: hidden; display: flex; align-items: flex-start; justify-content: center; }
        .bot-card img { height: 100%; width: 100%; object-fit: cover; object-position: center; }
        .bot-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 10px; font-weight: bold; }

        /* CHAT BOTS DINÁMICO */
        .chat-bots-wrap { background: #0a0a0a; display: flex; flex-direction: column; }
        #chat-ia-logs { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 13px; color: #ccc; }

        /* FOOTER CARGAS */
        .footer-sec { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; padding: 15px; background: #050505; }
        .p-box { background: #000; border: 2px solid #333; padding: 10px; text-align: center; border-radius: 10px; }
        .btn-up { width: 100%; padding: 10px; border: none; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 5px; }

    </style>
</head>
<body onload="init()">

<header>
    <div class="pub-header">TU ANUNCIO<br>AQUÍ<br>Rojo Neón</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v183">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="pub-header">ADS VIP<br>SOCIOS<br>IMPERIO</div>
</header>

<div class="top-container">
    <div class="menu-l">
        <div id="salas-top"></div>
        <div class="btn-tiendita" onclick="window.open('https://www.aliexpress.com')">
            <span class="tiendita-txt">LA TIENDITA SHOP</span>
        </div>
        <div id="salas-bottom"></div>
    </div>

    <div class="visor-box">
        <img id="sala-img-big" src="">
    </div>

    <div class="chat-box">
        <div id="logs-sala" class="chat-logs"></div>
        <input type="text" id="in-sala" onkeypress="if(event.key==='Enter') sendSala()" placeholder="Chat público..." style="background:#000; color:white; border:none; border-top:2px solid var(--n-rojo); padding:10px;">
    </div>
</div>

<div class="bot-container">
    <div class="bot-card"><img src="Rubia.jpg"><div class="bot-label" style="color:var(--n-rosa)">MIA</div></div>
    <div class="bot-card"><img src="Morocha.jpg"><div class="bot-label" style="color:var(--n-azul)">TANIA</div></div>
    <div class="bot-card"><img src="Pelirroja.jpg"><div class="bot-label" style="color:var(--n-rojo)">COLO</div></div>
    <div class="chat-bots-wrap">
        <div id="chat-ia-logs"></div>
        <input type="text" id="in-ia" onkeypress="if(event.key==='Enter') sendIA()" placeholder="Privado con ellas..." style="background:#000; color:white; border:none; border-top:2px solid var(--n-rojo); padding:15px;">
    </div>
</div>

<div class="footer-sec">
    <div class="p-box"><div style="font-size:12px; color:var(--n-rosa)">HISTORIAS</div><button onclick="up('h')" class="btn-up" style="background:var(--n-rosa)">SUBIR FOTO</button></div>
    <div class="p-box"><div style="font-size:12px; color:var(--n-azul)">ESTADOS</div><button onclick="up('e')" class="btn-up" style="background:var(--n-azul)">SUBIR ESTADO</button></div>
    <div class="p-box"><div style="font-size:12px; color:var(--n-rojo)">VIDEOS</div><button onclick="up('v')" class="btn-up" style="background:var(--n-rojo)">SUBIR VIDEO</button></div>
</div>

<script>
    const salas = [
        {n:"SADO Y MASO", f:"Sado y Maso.jpg", i:"🔥"},
        {n:"BIBLIOTECA", f:"Biblioteca.png", i:"📚"},
        {n:"DISCOTECA", f:"Discoteca.png", i:"🔊"},
        {n:"EL BAR", f:"El Bar.png", i:"🍸"},
        {n:"OFICINA", f:"Oficina.png", i:"💼"},
        {n:"PLAYA", f:"Playa.png", i:"⛱️"}
    ];

    const nombresFalsos = ["Juan_VIP", "GamerPro", "Carlos_88", "Linda_69", "MarcosImperio", "Socio_Gold"];
    const frases = ["Hola Tania!", "Mia estas hermosa", "Alguien en sado?", "Como entro al VIP?", "Amo este sitio", "Colo mira mi mensaje"];

    function init() {
        const top = document.getElementById('salas-top');
        const bot = document.getElementById('salas-bottom');
        salas.forEach((s, i) => {
            let div = document.createElement('div');
            div.className = 's-card'; div.id = 'sc-'+i;
            div.innerHTML = `<img src="${s.f}"> <span style="padding-left:10px; font-size:10px;">${s.i} ${s.n}</span>`;
            div.onclick = () => setS(i);
            (i < 3) ? top.appendChild(div) : bot.appendChild(div);
        });
        setS(0);
        setInterval(simularMovimiento, 4000); // Movimiento automático cada 4 segundos
    }

    function setS(i) {
        document.querySelectorAll('.s-card').forEach(c => c.classList.remove('active'));
        document.getElementById('sc-'+i).classList.add('active');
        document.getElementById('sala-img-big').src = salas[i].f;
    }

    function simularMovimiento() {
        const log = document.getElementById('chat-ia-logs');
        const randomNombre = nombresFalsos[Math.floor(Math.random()*nombresFalsos.length)];
        const randomFrase = frases[Math.floor(Math.random()*frases.length)];
        log.innerHTML += `<div><b style="color:#0f0">● ONLINE</b> <b style="color:var(--oro)">${randomNombre}:</b> ${randomFrase}</div>`;
        log.scrollTop = log.scrollHeight;
        if(log.childElementCount > 15) log.removeChild(log.firstChild);
    }

    function sendIA() {
        const i = document.getElementById('in-ia');
        if(i.value) {
            document.getElementById('chat-ia-logs').innerHTML += `<div><b style="color:#fff">Tú:</b> ${i.value}</div>`;
            i.value = "";
            setTimeout(() => {
                document.getElementById('chat-ia-logs').innerHTML += `<div><b style="color:var(--n-azul)">TANIA:</b> ¡Dime más guapo, te leo!</div>`;
                document.getElementById('chat-ia-logs').scrollTop = document.getElementById('chat-ia-logs').scrollHeight;
            }, 1000);
        }
    }

    function sendSala() {
        const i = document.getElementById('in-sala');
        if(i.value) {
            document.getElementById('logs-sala').innerHTML += `<div><b>Tú:</b> ${i.value}</div>`;
            i.value = "";
            document.getElementById('logs-sala').scrollTop = document.getElementById('logs-sala').scrollHeight;
        }
    }

    function up(type) { prompt("URL del archivo para " + type + ":"); }
    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
