<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v121</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* ANIMACIONES DE VIDA */
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .logo-img { height: 250px; filter: drop-shadow(0 0 20px var(--n-rojo)); animation: parpadeo 3s infinite ease-in-out; }

        header { 
            display: flex; justify-content: center; align-items: center; gap: 40px;
            padding: 10px; background: #050505; border-bottom: 5px solid var(--n-rojo);
            height: 270px;
        }

        .coin { 
            width: 60px; height: 60px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 18px; cursor: pointer; border: 3px solid white;
            box-shadow: 0 0 15px var(--oro); transition: 0.3s;
        }
        .coin:hover { transform: scale(1.1) rotate(15deg); }

        /* SECCIÓN SALAS */
        .rooms-area { display: grid; grid-template-columns: 240px 1fr; gap: 10px; padding: 10px; height: 400px; }
        .rooms-nav { display: flex; flex-direction: column; gap: 3px; background: #0a0a0a; border: 2px solid #222; border-radius: 10px; padding: 5px; }
        .r-opt { 
            padding: 10px; background: #111; border-radius: 5px; border: 1px solid #333;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
            color: #888; font-size: 11px; transition: 0.3s;
        }
        .r-opt:hover { color: white; border-color: var(--n-rojo); }
        .r-opt.active { background: var(--n-rojo); border-color: white; color: white; box-shadow: 0 0 15px var(--n-rojo); }

        .r-viewer { border: 5px solid var(--n-rojo); border-radius: 20px; background: #000; overflow: hidden; box-shadow: inset 0 0 50px #ff000033; }
        #sala-img-box { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }

        /* BOTS Y CHAT (REDUCIDOS Y AMPLIADOS) */
        .main-content { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr) 400px; /* Chat más ancho: 400px */
            gap: 0; 
            padding: 0; 
            height: 460px; /* Reducidas 1cm (aprox 40px) */
            border-bottom: 5px solid var(--n-rojo);
        }
        
        .unit { position: relative; background: #000; overflow: hidden; height: 100%; }
        .unit img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            filter: contrast(1.1);
            image-rendering: -webkit-optimize-contrast;
        }
        .unit-name { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, black 60%, transparent); text-align: center; padding: 10px; font-size: 18px; font-weight: 900; }

        /* CHAT FUNCIONAL */
        .chat-unit { 
            background: #050505; border-left: 4px solid var(--n-rojo); 
            display: flex; flex-direction: column; height: 100%; 
        }
        #chat-window { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 13px; color: #ccc; }
        .chat-msg { margin-bottom: 10px; line-height: 1.4; }
        .chat-input-box { padding: 15px; background: #111; display: flex; gap: 8px; border-top: 1px solid #222; }
        #chat-text { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 10px; border-radius: 8px; outline: none; }

        /* PUERTAS DINÁMICAS */
        .doors-footer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; }
        .door-item { 
            background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 15px; 
            text-align: center; transition: 0.4s;
        }
        .door-item:hover { border-color: white; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .neon-btn { 
            width: 100%; padding: 10px; border: none; border-radius: 5px; 
            font-weight: bold; color: white; cursor: pointer; transition: 0.3s;
        }
    </style>
</head>
<body onload="startup()">

<header>
    <div class="coin-box"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    <div class="coin-box"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
</header>

<div class="rooms-area">
    <div class="rooms-nav" id="salas-list"></div>
    <div class="r-viewer"><img id="sala-img-box" src=""></div>
</div>

<div class="main-content">
    <div class="unit"><img src="Rubia.jpg"><div class="unit-name" style="color:var(--n-rosa)">MIA</div></div>
    <div class="unit"><img src="Morocha.jpg"><div class="unit-name" style="color:var(--n-azul)">TANIA</div></div>
    <div class="unit"><img src="Pelirroja.jpg"><div class="unit-name" style="color:var(--n-rojo)">COLO</div></div>
    
    <div class="chat-unit">
        <div id="chat-window"></div>
        <div class="chat-input-box">
            <input type="text" id="chat-text" placeholder="Escribe a las chicas..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--n-rojo); color:white; border:none; padding:0 15px; border-radius:5px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="doors-footer">
    <div class="door-item"><h5 style="color:var(--n-rosa); margin-bottom:10px;">HISTORIAS</h5><button class="neon-btn" style="background:var(--n-rosa);" onclick="botTalk('MIA','¡Mira lo que subí hoy! Solo para VIPs.')">VER AHORA</button></div>
    <div class="door-item"><h5 style="color:var(--n-azul); margin-bottom:10px;">ESTADOS</h5><button class="neon-btn" style="background:var(--n-azul);" onclick="botTalk('TANIA','Estoy conectada ahora... ¿vienes?')">EXPLORAR</button></div>
    <div class="door-item"><h5 style="color:var(--n-rojo); margin-bottom:10px;">VIDEOS</h5><button class="neon-btn" style="background:var(--n-rojo);" onclick="botTalk('COLO','Acabo de grabar algo prohibido...')">PLAY</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function startup() {
        const nav = document.getElementById('salas-list');
        salas.forEach((s, i) => {
            let div = document.createElement('div');
            div.className = 'r-opt'; div.id = 'room-'+i;
            div.innerHTML = `<b>${s}</b> <span style="color:lime">●</span>`;
            div.onclick = () => setRoom(i);
            nav.appendChild(div);
        });
        setRoom(0);
        botTalk("MIA", "Hola bombón... bienvenida al Imperio. Las diosas te estábamos esperando.");
    }

    function setRoom(i) {
        document.querySelectorAll('.r-opt').forEach(x => x.classList.remove('active'));
        document.getElementById('room-'+i).classList.add('active');
        const visor = document.getElementById('sala-img-box');
        visor.style.opacity = 0;
        setTimeout(() => {
            visor.src = salas[i] + ".jpg";
            visor.style.opacity = 1;
        }, 200);
    }

    function sendMsg() {
        const input = document.getElementById('chat-text');
        if(!input.value) return;
        
        const win = document.getElementById('chat-window');
        win.innerHTML += `<div class="chat-msg" style="text-align:right;"><b style="color:var(--oro);">Tú:</b> ${input.value}</div>`;
        
        const userText = input.value;
        input.value = "";
        win.scrollTop = win.scrollHeight;

        // RESPUESTA AUTOMÁTICA (SIMULACIÓN DE VIDA)
        setTimeout(() => {
            botTalk("TANIA", "Eso suena interesante... pero para hablar más necesito una monedita de oro. 😉");
        }, 1500);
    }

    function botTalk(n, m) {
        const win = document.getElementById('chat-window');
        const col = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        win.innerHTML += `<div class="chat-msg"><b style="color:${col};">${n}:</b> ${m}</div>`;
        win.scrollTop = win.scrollHeight;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
