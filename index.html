<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v79</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        /* HEADER COMPACTO */
        header { 
            display: grid; grid-template-columns: 350px 1fr 350px; 
            padding: 10px 20px; border-bottom: 3px solid var(--n-rojo); 
            background: #050505; align-items: center;
        }
        .publi-box { 
            width: 350px; height: 140px; border: 2px solid var(--n-rojo); 
            display: flex; align-items: center; justify-content: center; 
            color: var(--n-rojo); font-size: 18px; background: #0a0a0a;
        }
        .logo-center { text-align: center; }
        .logo-center img { height: 160px; filter: drop-shadow(0 0 20px var(--n-rojo)); }
        
        .coins-bar { 
            grid-column: 1 / span 3; display: flex; justify-content: center; 
            gap: 30px; padding: 10px 0; background: rgba(255,0,0,0.1);
        }
        .coin { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; border: 3px solid white; transition: 0.2s;
        }
        .coin:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--oro); }

        /* CONTENEDOR PRINCIPAL - NO SE ESTIRA */
        main { 
            display: grid; grid-template-columns: 300px 1fr 400px; 
            gap: 15px; padding: 15px; flex-grow: 1; height: 500px; 
        }

        /* COLUMNA IZQUIERDA: SALAS Y BOTON */
        .rooms-col { display: flex; flex-direction: column; height: 100%; }
        .rooms-grid { 
            flex-grow: 1; background: #0a0a0a; border: 2px solid #222; 
            border-radius: 10px; padding: 10px; overflow-y: hidden;
        }
        .room-unit { 
            padding: 10px; background: #111; margin-bottom: 5px; 
            border-radius: 5px; font-size: 11px; cursor: pointer; 
        }
        .room-unit.active { background: var(--n-rojo); border: 1px solid white; }

        /* VISOR CENTRAL */
        .viewer-box { 
            border: 4px solid var(--n-rojo); border-radius: 15px; 
            background: #000; height: 100%; position: relative; overflow: hidden;
        }
        #room-img { width: 100%; height: 100%; object-fit: cover; }

        /* CHAT DERECHA */
        .chat-col { 
            display: flex; flex-direction: column; background: #050505; 
            border: 3px solid var(--n-rojo); border-radius: 15px; height: 100%;
        }
        #chat-content { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 13px; }
        .chat-input { display: flex; padding: 10px; gap: 5px; background: #111; }

        /* LAS TRES PUERTAS - ABAJO */
        footer { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 15px; padding: 15px; background: #000; border-top: 3px solid var(--n-rojo);
        }
        .gate { background: #0a0a0a; border: 1px solid var(--n-rojo); border-radius: 10px; padding: 10px; }
        .gate-scroll { height: 150px; overflow-y: auto; margin-bottom: 10px; background: #000; padding: 5px; }
        .gate-btn { width: 100%; padding: 8px; background: var(--n-rojo); color: white; border: none; font-weight: 900; cursor: pointer; }

        /* ANIMACIÓN BOTON ALI */
        .btn-vip-ali {
            background: #000; color: white; border: 2px solid var(--n-rojo);
            padding: 12px; text-align: center; text-decoration: none; font-size: 12px;
            font-weight: 900; margin-top: 10px; display: block;
            box-shadow: 0 0 10px var(--n-rojo); animation: vibe 0.5s infinite alternate;
        }
        @keyframes vibe { from { transform: scale(1); } to { transform: scale(1.03); } }
    </style>
</head>
<body onload="initImperio()">

<header>
    <div class="publi-box">AD VIP $50</div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="publi-box">AD VIP $100</div>
    <div class="coins-bar">
        <div class="coin" onclick="irAPagar(1)">$1</div>
        <div class="coin" onclick="irAPagar(5)">$5</div>
        <div class="coin" onclick="irAPagar(10)">$10</div>
        <div class="coin" onclick="irAPagar(20)">$20</div>
    </div>
</header>

<main>
    <div class="rooms-col">
        <div class="rooms-grid" id="rooms-list"></div>
        <a href="TU_LINK_ALI" target="_blank" class="btn-vip-ali">🛒 COMPRAR JUGUETES VIP 🔞</a>
    </div>

    <div class="viewer-box">
        <img id="room-img" src="">
        <div style="position:absolute; bottom:10px; left:10px; background:rgba(255,0,0,0.7); padding:5px 10px; border-radius:5px; font-size:12px;">🔴 EN VIVO</div>
    </div>

    <div class="chat-col">
        <div id="chat-content"></div>
        <div class="chat-input">
            <input type="text" id="msg-in" style="flex-grow:1; background:#000; border:1px solid var(--n-rojo); color:white; padding:8px;">
            <button onclick="handleChat()" style="background:var(--n-rojo); color:white; border:none; padding:8px; cursor:pointer;">OK</button>
        </div>
    </div>
</main>

<footer>
    <div class="gate">
        <h4 style="color:var(--n-rosa)">HISTORIAS</h4>
        <div class="gate-scroll" id="d-h"></div>
        <button class="gate-btn" onclick="subir('d-h')">SUBIR</button>
    </div>
    <div class="gate">
        <h4 style="color:var(--n-azul)">ESTADOS</h4>
        <div class="gate-scroll" id="d-e"></div>
        <button class="gate-btn" onclick="subir('d-e')">SUBIR</button>
    </div>
    <div class="gate">
        <h4 style="color:var(--n-rojo)">VIDEOS</h4>
        <div class="gate-scroll" id="d-v"></div>
        <button class="gate-btn" onclick="subir('d-v')">SUBIR</button>
    </div>
</footer>

<script>
    let pos = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg"}, {n: "Spa", e: ".png"}, {n: "Biblioteca", e: ".png"}, 
        {n: "Camarera", e: ".png"}, {n: "Discoteca", e: ".png"}, {n: "El Bar", e: ".png"},
        {n: "Gimnasio", e: ".png"}, {n: "Oficina", e: ".png"}, {n: "Playa", e: ".png"}, {n: "La Tiendita", e: ".png"}
    ];

    function initImperio() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const d = document.createElement('div');
            d.className = 'room-unit'; d.id = 'u-' + i;
            d.innerHTML = `<span>${r.n}</span><span style="color:var(--n-azul)">LIVE</span>`;
            d.onclick = () => select(i);
            list.appendChild(d);
        });
        select(0);
        setInterval(() => { pos = (pos + 1) % rooms.length; select(pos); }, 6000);
    }

    function select(i) {
        pos = i;
        document.querySelectorAll('.room-unit').forEach(x => x.classList.remove('active'));
        document.getElementById('u-' + i).classList.add('active');
        document.getElementById('room-img').src = encodeURI(rooms[i].n + rooms[i].e);
    }

    function handleChat() {
        const input = document.getElementById('msg-in');
        const chat = document.getElementById('chat-content');
        if(!input.value) return;
        chat.innerHTML += `<div><b style="color:var(--oro)">CLIENTE:</b> ${input.value}</div>`;
        setTimeout(() => {
            chat.innerHTML += `<div><b style="color:var(--n-rojo)">COLO:</b> ¡Me encanta que hables! Invítame una moneda...</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 1000);
        input.value = "";
        chat.scrollTop = chat.scrollHeight;
    }

    function subir(id) {
        const link = prompt("Escribe texto o pega link de imagen:");
        if(!link) return;
        const d = document.getElementById(id);
        const item = link.includes("http") ? `<img src="${link}" style="width:100%; margin-top:5px;">` : `<p style="font-size:12px; border-bottom:1px solid #222; padding:5px;">${link}</p>`;
        d.innerHTML = item + d.innerHTML;
    }

    function irAPagar(monto) {
        window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&item_name=VIP&amount=${monto}&currency_code=USD`, "_blank");
    }
</script>
</body>
</html>
