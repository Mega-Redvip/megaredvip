<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v180</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 280px 130px 1fr; 
            align-items: center; gap: 10px; padding: 10px;
            background: #050505; border-bottom: 5px solid var(--n-rojo); height: 300px;
        }
        .pub-neon { border: 3px solid var(--n-rojo); height: 180px; border-radius: 10px; display:flex; align-items:center; justify-content:center; text-align:center; animation: flicker 2s infinite alternate; font-size: 12px; }
        @keyframes flicker { 0%, 100% { box-shadow: 0 0 10px var(--n-rojo); color: var(--n-rojo); } 50% { box-shadow: 0 0 20px var(--oro); color: var(--oro); border-color: var(--oro); } }
        
        .logo-v180 { height: 260px; width: 260px; object-fit: contain; }
        .coin { width: 75px; height: 75px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; border: 4px solid white; cursor: pointer; box-shadow: 0 0 10px var(--oro); }

        /* GRID PRINCIPAL SIMÉTRICO (33.3% cada uno) */
        .main-container { 
            display: grid; 
            grid-template-columns: 33.33% 33.33% 33.33%; 
            border-bottom: 5px solid var(--n-rojo); 
            height: 600px;
        }

        /* 1. MENÚ DE SALAS (33.33%) */
        .menu-visual { 
            background: #080808; 
            border-right: 3px solid #333; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden; 
        }
        .s-card { background: #111; border: 1px solid #333; border-radius: 8px; cursor: pointer; overflow: hidden; flex: 1; margin-bottom: 5px; display: flex; align-items: center; transition: 0.2s; }
        .s-card:last-child { margin-bottom: 0; }
        .s-card:hover { border-color: var(--n-rojo); background: #1a1a1a; }
        .s-card.active { background: var(--n-rojo); border-color: white; }
        
        /* LLENADO TOTAL DE MINIATURAS */
        .s-card img { width: 100px; height: 100%; object-fit: cover; opacity: 0.7; }
        .s-card-info { padding-left: 15px; flex-grow: 1; }

        /* BOTÓN LA TIENDITA SHOP NEÓN (NUEVO DISEÑO) */
        .btn-tiendita-neon { 
            position: relative;
            background-image: url('La Tiendita.png'); /* Fondo de la imagen */
            background-size: cover;
            background-position: center;
            height: 80px;
            border-radius: 10px;
            margin: 10px 0;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid var(--oro);
            display: flex; align-items: center; justify-content: center;
        }
        .btn-tiendita-neon::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); /* Capa oscura para legibilidad */
            z-index: 1;
        }
        .tiendita-txt {
            position: relative; z-index: 2;
            font-size: 16px; font-weight: 900; text-transform: uppercase;
            color: var(--n-rojo);
            text-shadow: 0 0 10px var(--n-rojo), 0 0 20px var(--n-rojo);
            animation: neonDestello 1.5s infinite alternate;
        }
        @keyframes neonDestello { 
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--n-rojo), 0 0 20px var(--n-rojo); } 
            50% { opacity: 0.8; text-shadow: 0 0 5px var(--n-rojo); } 
        }

        /* 2. VISOR DE IMÁGENES (33.33% - LLENADO TOTAL) */
        .v-img-box { 
            background: #000; 
            display: flex; align-items: center; justify-content: center; 
            border-right: 3px solid #333; 
            overflow: hidden; 
        }
        #sala-img-big { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* LLENA EL 33.3% SIN BORDES */
            object-position: center;
        }

        /* 3. CHAT DE SALA (33.33%) */
        .chat-box { 
            display: flex; 
            flex-direction: column; 
            background: #050505; 
        }
        .chat-logs { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 13px; font-family: sans-serif; color: #ccc; }

        /* IA AREA */
        .ia-strip { display: grid; grid-template-columns: 1fr 1fr; height: 350px; border-top: 5px solid var(--n-rojo); border-bottom: 5px solid var(--n-rojo); }
        .bot-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
        .bot-item { position: relative; overflow: hidden; border-right: 1px solid #222; }
        .bot-item img { width: 100%; height: 100%; object-fit: cover; }

        /* PUERTAS */
        .puertas-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; background: #000; }
        .puerta-box { background: #080808; border: 2px solid #222; border-radius: 12px; padding: 15px; text-align: center; }
        .visor-mini { height: 120px; background: #000; border: 1px dashed #444; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .btn-up { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="pub-neon">ANÚNCIATE<br>AQUÍ</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v180">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="pub-neon">SOCIO<br>VIP</div>
</header>

<div class="main-container">
    <div class="menu-visual">
        <div id="target-salas-top"></div>
        <div class="btn-tiendita-neon" onclick="window.open('https://www.aliexpress.com','_blank')">
            <span class="tiendita-txt">LA TIENDITA SHOP</span>
        </div>
        <div id="target-salas-bottom"></div>
    </div>
    
    <div class="v-img-box">
        <img id="sala-img-big" src="">
    </div>

    <div class="chat-box">
        <div id="logs-sala" class="chat-logs"></div>
        <div style="padding:10px; background:#111; display:flex; gap:5px;">
            <input type="text" id="in-sala" placeholder="Escribe y pulsa Enter..." onkeypress="if(event.key==='Enter') enviarSala()" style="flex-grow:1; background:#000; border:1px solid var(--n-rojo); color:white; padding:12px;">
            <button onclick="enviarSala()" style="background:var(--n-rojo); color:white; border:none; padding:0 15px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="ia-strip">
    <div class="bot-grid">
        <div class="bot-item"><img src="Rubia.jpg"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); text-align:center; color:var(--n-rosa); padding:5px;">MIA</div></div>
        <div class="bot-item"><img src="Morocha.jpg"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); text-align:center; color:var(--n-azul); padding:5px;">TANIA</div></div>
        <div class="bot-item"><img src="Pelirroja.jpg"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); text-align:center; color:var(--n-rojo); padding:5px;">COLO</div></div>
    </div>
    <div style="display:flex; flex-direction:column;">
        <div id="chat-ia-privado" style="flex-grow:1; background:#050505; padding:15px; overflow-y:auto; font-size:14px;"></div>
        <div style="padding:10px; background:#111; display:flex; gap:5px;">
            <input type="text" id="in-ia-privado" placeholder="Chat privado (Enter para enviar)..." onkeypress="if(event.key==='Enter') responderIAPrivado()" style="flex-grow:1; background:#000; border:1px solid var(--n-rojo); color:white; padding:12px;">
            <button onclick="responderIAPrivado()" style="background:var(--n-rojo); color:white; border:none; padding:0 20px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="puertas-section">
    <div class="puerta-box"><div class="visor-mini" id="v-hist">HISTORIAS</div><button onclick="up('v-hist')" style="background:var(--n-rosa)" class="btn-up">SUBIR HISTORIA</button></div>
    <div class="puerta-box"><div class="visor-mini" id="v-est">ESTADOS</div><button onclick="up('v-est')" style="background:var(--n-azul)" class="btn-up">SUBIR ESTADO</button></div>
    <div class="puerta-box"><div class="visor-mini" id="v-vid">VIDEOS</div><button onclick="up('v-vid')" style="background:var(--n-rojo)" class="btn-up">SUBIR VIDEO</button></div>
</div>

<script>
    // Salas divididas para poner la tienda al medio
    const salasTop = [
        { n: "SADO Y MASO", f: "Sado y Maso.jpg", i: "🔥", chat: "" },
        { n: "BIBLIOTECA", f: "Biblioteca.png", i: "📚", chat: "" },
        { n: "DISCOTECA", f: "Discoteca.png", i: "🔊", chat: "" }
    ];
    const salasBottom = [
        { n: "EL BAR", f: "El Bar.png", i: "🍸", chat: "" },
        { n: "OFICINA", f: "Oficina.png", i: "💼", chat: "" },
        { n: "PLAYA", f: "Playa.png", i: "⛱️", chat: "" }
    ];
    
    let allSalas = [...salasTop, ...salasBottom];
    let actualIdx = 0;

    function init() {
        // Inyectar salas superiores
        const targetTop = document.getElementById('target-salas-top');
        salasTop.forEach((s, i) => injectCard(s, i, targetTop));
        
        // Inyectar salas inferiores (el índice continua)
        const targetBottom = document.getElementById('target-salas-bottom');
        salasBottom.forEach((s, i) => injectCard(s, i + salasTop.length, targetBottom));

        setSala(0);
    }

    function injectCard(s, i, target) {
        let card = document.createElement('div');
        card.className = 's-card'; card.id = 'scard-'+i;
        card.innerHTML = `<img src="${s.f}"><div class="s-card-info"><b style="font-size:11px;">${s.i} ${s.n}</b><br><span style="color:#0f0; font-size:10px;">● 0 ONLINE</span></div>`;
        card.onclick = () => { actualIdx = i; setSala(i); };
        target.appendChild(card);
    }

    function setSala(i) {
        document.querySelectorAll('.s-card').forEach(c => c.classList.remove('active'));
        document.getElementById('scard-'+i).classList.add('active');
        document.getElementById('sala-img-big').src = allSalas[i].f;
        document.getElementById('logs-sala').innerHTML = allSalas[i].chat;
        document.getElementById('logs-sala').scrollTop = document.getElementById('logs-sala').scrollHeight;
    }

    function enviarSala() {
        const input = document.getElementById('in-sala');
        if(!input.value.trim()) return;
        const msg = `<div><b style="color:var(--oro)">Tú:</b> ${input.value}</div>`;
        allSalas[actualIdx].chat += msg;
        document.getElementById('logs-sala').innerHTML = allSalas[actualIdx].chat;
        const val = input.value.toLowerCase();
        input.value = "";
        
        setTimeout(() => {
            let b = {n:"COLO", c:"var(--n-rojo)", m:"¡Me encanta cuando te pones así en esta sala! ¿Qué sigue?"};
            if(val.includes("edad")) b = {n:"MIA", c:"var(--n-rosa)", m:"Tengo 22 añitos... ¿quieres jugar?"};
            const rMsg = `<div><b style="color:${b.c}">${b.n}:</b> <span style="color:${b.c}">${b.m}</span></div>`;
            allSalas[actualIdx].chat += rMsg;
            document.getElementById('logs-sala').innerHTML = allSalas[actualIdx].chat;
            document.getElementById('logs-sala').scrollTop = document.getElementById('logs-sala').scrollHeight;
        }, 1000);
    }

    function responderIAPrivado() {
        const input = document.getElementById('in-ia-privado');
        const logs = document.getElementById('chat-ia-privado');
        if(!input.value.trim()) return;
        logs.innerHTML += `<div><b style="color:var(--oro)">Tú:</b> ${input.value}</div>`;
        const val = input.value.toLowerCase();
        input.value = "";

        setTimeout(() => {
            let r = {n:"TANIA", c:"var(--n-azul)", m:"Mmm... esa pregunta me pone traviesa. ¿Quieres saber más?"};
            if(val.includes("hola")) r = {n:"MIA", c:"var(--n-rosa)", m:"¡Hola guapo! Estaba esperando tu mensaje."};
            logs.innerHTML += `<div style="margin-top:5px;"><b style="color:${r.c}">${r.n}:</b> <span style="color:${r.c}">${r.m}</span></div>`;
            logs.scrollTop = logs.scrollHeight;
        }, 1000);
    }

    function up(id) {
        let n = prompt("URL o nombre de archivo de la imagen:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
