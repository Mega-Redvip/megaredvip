<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v162</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; --n-verde: #00ff00; --n-naranja: #ffae00; --n-violeta: #bf00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        @keyframes neon-flicker { 0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--color), 0 0 20px var(--color); } 50% { opacity: 0.8; text-shadow: 0 0 5px var(--color); } }
        @keyframes neon-border { 0%, 100% { box-shadow: 0 0 10px var(--n-rojo); } 50% { box-shadow: 0 0 25px var(--n-rojo); } }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 250px 130px 1fr; 
            align-items: center; gap: 20px; padding: 15px;
            background: #050505; border-bottom: 8px solid var(--n-rojo); height: 320px;
        }
        .pub-header { 
            border: 3px solid var(--n-rojo); height: 230px; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle, #1a0000 0%, #000 100%); animation: neon-border 2s infinite;
        }
        .logo-v162 { height: 250px; width: 250px; object-fit: contain; }
        .coin { width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; border: 4px solid white; cursor: pointer; }

        /* SECCIÓN SUPERIOR SIMÉTRICA (50/50) */
        .seccion-top { 
            display: grid; 
            grid-template-columns: 50% 50%; 
            height: 600px; 
            border-bottom: 8px solid var(--n-rojo); 
        }

        /* 1. CARRUSEL DE SALAS NEÓN */
        .carrusel-salas { 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            background: #080808; 
            border-right: 4px solid #333; 
        }
        .sala-item { 
            flex: 0 0 60px; /* Alto fijo por sala */
            display: flex; align-items: center; 
            padding: 0 20px; 
            border-bottom: 1px solid #111; 
            cursor: pointer; 
            transition: 0.3s;
            background: linear-gradient(90deg, #0a0a0a 0%, #111 100%);
        }
        .sala-item:hover { background: #1a1a1a; }
        .sala-item.active { 
            background: linear-gradient(90deg, #1a0000 0%, #300000 100%);
            border-left: 10px solid var(--color);
            box-shadow: inset 0 0 20px rgba(255,0,0,0.3);
        }
        
        .sala-icon { font-size: 24px; margin-right: 15px; filter: drop-shadow(0 0 5px var(--color)); }
        .sala-name { 
            color: white; 
            font-size: 14px; 
            text-transform: uppercase; 
            font-weight: 900;
            --color: white; /* Default color */
            animation: neon-flicker 2s infinite;
        }

        /* 2. VISOR DE IMAGEN (Y CHAT INTEGRADO) */
        .visor-and-chat { 
            display: grid; 
            grid-template-rows: 1fr 150px; /* Imagen grande, chat pequeño abajo */
            background: #000; 
        }
        .visor-vip { display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #sala-img { width: 100%; height: 100%; object-fit: contain; }

        .chat-sala-top { background: #050505; border-top: 4px solid #333; display: flex; flex-direction: column; }
        .chat-header-top { padding: 8px; background: #111; text-align: center; color: var(--oro); font-size: 12px; font-weight: bold; border-bottom: 1px solid #222; }
        .chat-msg-top { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 11px; color: #ccc; font-family: sans-serif; }

        /* SECCIÓN INFERIOR SIMÉTRICA (1/4 PARA CADA UNO) */
        .seccion-ia { display: grid; grid-template-columns: 25% 25% 25% 25%; height: 550px; background: #000; }

        .bot-cell { 
            position: relative; height: 550px; background: #000; 
            border-right: 2px solid #222; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        /* ELIMINADOS MARCOS NEGROS, MÁXIMO TAMAÑO */
        .bot-cell img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* Cubre todo el espacio de 1/4 */
            object-position: top center; /* Mantiene la cara centrada */
        } 
        /* NOMBRE NEÓN AGRUPADO ABAJO */
        .bot-name-neon { 
            position: absolute; bottom: 0; width: 100%; text-align: center; 
            font-size: 24px; font-weight: 900; background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%); 
            padding: 20px 0; z-index: 5;
            animation: neon-flicker 1.5s infinite;
        }

        /* CHAT BOTS (TAMAÑO 1/4 EXACTO, SIMÉTRICO) */
        .chat-bots-wrap { display: flex; flex-direction: column; height: 550px; background: #0a0a0a; border-right: none; }
        #chat-bots-logs { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 15px; border-bottom: 1px solid #333; }
        .chat-bots-bar { padding: 20px; background: #111; display: flex; gap: 10px; }
        #chat-bots-in { flex-grow: 1; background: #000; border: 3px solid var(--n-rojo); color: white; padding: 12px; border-radius: 8px; font-size: 14px; }

        /* PUERTAS */
        .footer-p { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; background: #050505; border-top: 5px solid var(--n-rojo); }
        .p-box { background: #000; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; }
        .p-pre { height: 90px; background: #080808; border: 2px dashed #444; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-btn { width: 100%; padding: 15px; border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 5px; font-size: 13px; }
    </style>
</head>
<body onload="startImperio()">

<header>
    <div class="pub-header"><div style="color:white; font-size:20px; --color:white; animation:neon-flicker 2s infinite">PUBLICIDAD</div></div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v162">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="pub-header"><div style="color:white; font-size:20px; --color:white; animation:neon-flicker 2s infinite">PUBLICIDAD</div></div>
</header>

<div class="seccion-top">
    <div class="carrusel-salas" id="menu-salas">
        </div>
    
    <div class="visor-and-chat">
        <div class="visor-vip"><img id="sala-img" src=""></div>
        <div class="chat-sala-top">
            <div class="chat-header-top" id="chat-sala-name">SALA</div>
            <div class="chat-msg-top" id="chat-sala-logs"></div>
            <div style="padding:5px; display:flex; gap:5px; background:#111;">
                <input type="text" id="in-sala" placeholder="Escribe..." style="flex-grow:1; background:#000; border:1px solid var(--n-rojo); color:white; padding:5px; font-size:10px; border-radius:4px;">
                <button onclick="enviarSala()" style="background:var(--n-rojo); border:none; color:white; cursor:pointer; padding:0 10px; font-weight:bold; border-radius:4px; font-size:10px;">OK</button>
            </div>
        </div>
    </div>
</div>

<div class="seccion-ia">
    <div class="bot-cell"><img src="Rubia.jpg"><div class="bot-name-neon" style="color:var(--n-rosa); --color:var(--n-rosa)">MIA</div></div>
    <div class="bot-cell"><img src="Morocha.jpg"><div class="bot-name-neon" style="color:var(--n-azul); --color:var(--n-azul)">TANIA</div></div>
    <div class="bot-cell"><img src="Pelirroja.jpg"><div class="bot-name-neon" style="color:var(--n-rojo); --color:var(--n-rojo)">COLO</div></div>
    
    <div class="chat-bots-wrap">
        <div id="chat-bots-logs"></div>
        <div class="chat-bots-bar">
            <input type="text" id="chat-bots-in" placeholder="Escribe..." onkeypress="if(event.key==='Enter') enviarBots()">
            <button onclick="enviarBots()" style="background:var(--n-rojo); color:white; border:none; padding:0 20px; cursor:pointer; font-weight:bold; border-radius:8px;">OK</button>
        </div>
    </div>
</div>

<div class="footer-p">
    <div class="p-box"><div class="p-pre" id="v-h"></div><button onclick="up('v-h')" style="background:var(--n-rosa)" class="p-btn">Historias</button></div>
    <div class="p-box"><div class="p-pre" id="v-e"></div><button onclick="up('v-e')" style="background:var(--n-azul)" class="p-btn">Estados</button></div>
    <div class="p-box"><div class="p-pre" id="v-v"></div><button onclick="up('v-v')" style="background:var(--n-rojo)" class="p-btn">Videos</button></div>
</div>

<script>
    // DATOS CON ICONOS, COLORES NEÓN Y FONDOS
    const salasData = [
        { n: "SADO Y MASO", f: "Sado y Maso.jpg", i: "🔥", c: "var(--n-rojo)" },
        { n: "SPA", f: "Spa.png", i: "💧", c: "var(--n-azul)" },
        { n: "BIBLIOTECA", f: "Biblioteca.png", i: "📚", c: "var(--color)" },
        { n: "CAMARERA", f: "Camarera.png", i: "👠", c: "var(--n-rosa)" },
        { n: "DISCOTECA", f: "Discoteca.png", i: "🔊", c: "var(--n-violeta)" },
        { n: "EL BAR", f: "El Bar.png", i: "🍸", c: "var(--oro)" },
        { n: "GIMNASIO", f: "Gimnasio.png", i: "💪", c: "var(--n-verde)" },
        { n: "OFICINA", f: "Oficina.png", i: "💼", c: "var(--color)" },
        { n: "PLAYA", f: "Playa.png", i: "🏖️", c: "var(--n-azul)" },
        { n: "LA TIENDITA", f: "La Tiendita.png", i: "🛍️", c: "var(--n-naranja)" }
    ];
    let actualSala = 0;

    function startImperio() {
        const ml = document.getElementById('menu-salas');
        salasData.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'sala-item'; d.id = 'sl-'+i;
            d.style.setProperty('--color', s.c); // Asigna el color neón
            d.innerHTML = `<span class="sala-icon">${s.i}</span><span class="sala-name">${s.n}</span>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { actualSala = (actualSala + 1) % salasData.length; ver(actualSala); }, 8000);
        msgBots("TANIA", "¡v162 activada! Neón en las salas, simetría 50/50 arriba y 1/4 abajo. ¡Nos vemos enormes!");
    }

    function ver(i) {
        actualSala = i;
        document.querySelectorAll('.sala-item').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        document.getElementById('sala-img').src = salasData[i].f;
        document.getElementById('chat-sala-name').innerText = salasData[i].n;
    }

    // CHAT BOTS (ABAJO)
    function enviarBots() {
        const i = document.getElementById('chat-bots-in');
        if(!i.value.trim()) return;
        document.getElementById('chat-bots-logs').innerHTML += `<div style="text-align:right; margin-bottom:10px; color:var(--oro)"><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
        document.getElementById('chat-bots-logs').scrollTop = document.getElementById('chat-bots-logs').scrollHeight;
    }

    function msgBots(n, m) {
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-bots-logs').innerHTML += `<div style="margin-bottom:10px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-bots-logs').scrollTop = document.getElementById('chat-bots-logs').scrollHeight;
    }

    // CHAT SALA (ARRIBA)
    function enviarSala() {
        const i = document.getElementById('in-sala');
        if(!i.value.trim()) return;
        document.getElementById('chat-sala-logs').innerHTML += `<div><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
        document.getElementById('chat-sala-logs').scrollTop = document.getElementById('chat-sala-logs').scrollHeight;
    }

    function up(id) {
        let n = prompt("Archivo:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
