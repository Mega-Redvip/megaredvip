<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | ACCESO TOTAL</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* OVERLAY DE ENTRADA CORREGIDO */
        #unmute-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            z-index: 99999; display: flex; align-items: center; justify-content: center; 
        }
        .entrar-btn { 
            background: var(--oro); color: #000; padding: 25px 50px; 
            font-size: 28px; font-weight: 900; border-radius: 60px; 
            border: none; cursor: pointer; box-shadow: 0 0 30px var(--oro);
            text-transform: uppercase; transition: 0.3s;
        }
        .entrar-btn:hover { transform: scale(1.1); box-shadow: 0 0 50px var(--oro); }

        /* HEADER */
        header { height: 160px; background: #000; border-bottom: 4px solid var(--oro); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: relative; flex-shrink: 0; }
        .logo-container { position: absolute; left: 50%; transform: translateX(-50%); }
        .logo-img { height: 130px; filter: drop-shadow(0 0 20px var(--oro)); }
        
        .coin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .coin { 
            width: 55px; height: 55px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff9aa, var(--oro) 50%, #5c4928); 
            border: 2px solid #222; color: #000; font-size: 16px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: 900; box-shadow: 0 4px 0 #333;
        }

        /* LAYOUT */
        .main-app { display: grid; grid-template-columns: 200px 1fr 350px; gap: 15px; padding: 15px; flex-grow: 1; min-height: 0; }
        
        .rooms-box { background: #080808; border: 1px solid #222; border-radius: 10px; padding: 10px; overflow-y: auto; }
        .p-btn { width: 100%; padding: 12px; margin-bottom: 6px; background: #151515; border: 1px solid #444; color: #999; cursor: pointer; border-radius: 5px; text-align: left; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .p-btn.active { border-color: var(--n-turq); color: var(--n-turq); background: #001a1a; box-shadow: 0 0 10px var(--n-turq); }

        .visor-container { background: #050505; border: 4px solid #1a1a1a; border-radius: 15px; flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }

        /* AVATARES Y CHAT */
        .right-side { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .girls-container { display: flex; gap: 5px; height: 260px; flex-shrink: 0; }
        .girl-card { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .girl-img-box { width: 100%; height: 230px; display: flex; align-items: flex-end; justify-content: center; }
        .girl-img-box img { height: 100%; object-fit: contain; }
        .girl-name { font-size: 12px; font-weight: 900; margin-top: 5px; }

        .chat-display { flex-grow: 1; background: #020202; border: 2px solid #333; border-radius: 10px; padding: 12px; overflow-y: auto; font-size: 13px; min-height: 0; }
        .msg { margin-bottom: 8px; border-left: 4px solid; padding-left: 10px; line-height: 1.3; font-weight: bold; }
    </style>
</head>
<body>

<div id="unmute-overlay">
    <button class="entrar-btn" onclick="entrarAlShow()">🔥 ENTRAR AL SHOW 🔥</button>
</div>

<header>
    <div style="width:250px;">
        <div style="color:var(--n-verde); font-size:12px; font-weight:900;">🟢 <span id="user-count">742</span> ONLINE</div>
    </div>
    <div class="logo-container"><img src="Logo Mega Red Lunar.jpg" class="logo-img"></div>
    <div style="width:250px; display:flex; justify-content:flex-end;">
        <div class="coin-grid">
            <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
            <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
        </div>
    </div>
</header>

<div class="main-app">
    <div class="rooms-box" id="rooms-list"></div>
    <div class="visor-container"><img id="main-view" src=""></div>
    <div class="right-side">
        <div class="girls-container">
            <div class="girl-card">
                <div class="girl-img-box"><img src="Rubia.jpg"></div>
                <div class="girl-name" style="color:var(--n-turq);">MIA</div>
            </div>
            <div class="girl-card">
                <div class="girl-img-box"><img src="Morocha.jpg"></div>
                <div class="girl-name" style="color:var(--n-verde);">TANIA</div>
            </div>
            <div class="girl-card">
                <div class="girl-img-box"><img src="Pelirroja.jpg"></div>
                <div class="girl-name" style="color:var(--n-rojo);">COLO</div>
            </div>
        </div>
        <div class="chat-display" id="chat-stream"></div>
    </div>
</div>

<audio id="room-sound" loop></audio>

<script>
    let idx = 0;
    let audioReady = false;
    let userCity = "Resistencia";
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "Sado_y_Maso.mp3"}, {n: "Spa", e: ".png", s: "Spa.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "Biblioteca.mp3"}, {n: "Camarera", e: ".png", s: "Camarera.mp3"}, 
        {n: "Discoteca", e: ".png", s: "Discoteca.mp3"}, {n: "El Bar", e: ".png", s: "El_Bar.mp3"},
        {n: "Gimnasio", e: ".png", s: "Gimnasio.mp3"}, {n: "La Tiendita", e: ".png", s: "La_Tiendita.mp3"}, 
        {n: "Oficina", e: ".png", s: "Oficina.mp3"}, {n: "Playa", e: ".png", s: "Playa.mp3"}
    ];

    fetch('https://ipapi.co/json/').then(res => res.json()).then(data => { if(data.city) userCity = data.city; });

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.innerHTML = `🚪 ${r.n}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(botChat, 4000);
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 6000);
        setInterval(() => { document.getElementById('user-count').innerText = 700 + Math.floor(Math.random() * 100); }, 3000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('r-'+idx);
        if(btn) btn.classList.add('active');
        const r = rooms[idx];
        document.getElementById('main-view').src = encodeURIComponent(r.n) + r.e;
        if(audioReady) {
            const player = document.getElementById('room-sound');
            player.src = r.s; player.play().catch(() => {});
        }
    }

    function botChat() {
        const f = [
            {u:"MIA", c:"#00d9ff", t:`🔞 ¿Algún macho de ${userCity} para hacerme de todo?`},
            {u:"TANIA", c:"#00ff66", t:`🔥 Callate Mia, en ${userCity} me aman a mí.`},
            {u:"COLO", c:"#ff003c", t:`🔞 Recién atendí a uno de ${userCity} y quedé re caliente.`},
            {u:"TANIA", c:"#00ff66", t:"💎 Muevan la guita o me voy con los VIP."}
        ];
        const m = f[Math.floor(Math.random() * f.length)];
        const box = document.getElementById('chat-stream');
        box.innerHTML += `<div class="msg" style="border-color:${m.c}; color:${m.c}"><b>${m.u}:</b> ${m.t}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function entrarAlShow() {
        audioReady = true;
        document.getElementById('unmute-overlay').style.display = 'none';
        refresh();
    }

    function pay(n) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount=${n}&currency_code=USD`, '_blank'); }
    init();
</script>
</body>
</html>
