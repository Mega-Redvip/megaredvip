<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v113</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* 1. HEADER: LOGO GIGANTE Y MONEDAS EXTERNAS */
        header { 
            display: grid; grid-template-columns: 200px 100px 1fr 100px 200px; 
            padding: 20px; background: #050505; border-bottom: 6px solid var(--n-rojo);
            align-items: center; gap: 15px;
        }
        .publi-box { height: 160px; border: 3px dashed var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 14px; border-radius: 15px; }
        .logo-main img { width: 100%; max-height: 320px; object-fit: contain; filter: drop-shadow(0 0 35px var(--n-rojo)); }
        
        .coin-col { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .coin { 
            width: 90px; height: 90px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 26px; cursor: pointer; border: 5px solid white;
            box-shadow: 0 0 25px var(--oro); transition: 0.3s;
        }
        .coin:hover { transform: scale(1.1) rotate(10deg); }

        /* 2. CARRUSEL DE 10 SALAS Y VISOR */
        .middle-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; padding: 20px; height: 550px; }
        .rooms-menu { 
            display: flex; flex-direction: column; gap: 6px; 
            background: #0a0a0a; border: 3px solid #222; border-radius: 20px; padding: 12px;
        }
        .room-btn { 
            flex: 1; padding: 0 15px; background: #111; border-radius: 10px; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
            border: 2px solid #333; font-size: 14px; transition: 0.2s;
        }
        .room-btn.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 15px var(--n-rojo); }

        .viewer-frame { border: 8px solid var(--n-rojo); border-radius: 30px; background: #050505; overflow: hidden; position: relative; }
        #sala-actual-img { width: 100%; height: 100%; object-fit: cover; }
        .tienda-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            padding: 30px 60px; background: var(--n-rojo); color: white; font-size: 30px; 
            border-radius: 60px; text-decoration: none; border: 6px solid white; 
            display: none; z-index: 10; box-shadow: 0 0 60px var(--n-rojo);
        }

        /* 3. SECCIÓN BOTS (+3CM) Y CHAT (IGUALES) */
        .main-interact { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px 20px; height: 850px; }
        
        /* BOTS: ALTURA AGRANDADA PARA CUERPO ENTERO */
        .bots-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .bot-profile { position: relative; background: #000; border: 4px solid #222; border-radius: 25px; overflow: hidden; }
        .bot-profile img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* Para que la imagen se vea completa y nítida */
            image-rendering: -webkit-optimize-contrast;
        }
        .bot-label { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, #000 50%, transparent); text-align: center; padding: 30px 10px 20px; font-size: 28px; font-weight: 900; }

        /* CHAT: MISMA ALTURA Y ANCHO QUE EL BLOQUE BOTS */
        .chat-wrap { background: #050505; border: 8px solid var(--n-rojo); border-radius: 30px; display: flex; flex-direction: column; }
        #chat-flow { flex-grow: 1; padding: 25px; overflow-y: auto; font-size: 18px; }
        .chat-input-box { padding: 20px; background: #111; display: flex; gap: 15px; border-radius: 0 0 25px 25px; }
        #msg-in { flex-grow: 1; background: #000; border: 3px solid var(--n-rojo); color: white; padding: 15px; border-radius: 15px; outline: none; font-size: 16px; }

        /* 4. FOOTER: LAS 3 PUERTAS */
        .footer-doors { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; border-top: 8px solid var(--n-rojo); }
        .door-box { background: #0a0a0a; border: 4px solid #333; border-radius: 20px; padding: 15px; text-align: center; }
        .door-thumb { height: 140px; background: #000; margin-bottom: 12px; border-radius: 15px; overflow: hidden; border: 2px solid #222; }
        .door-thumb img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="publi-box">PUBLICIDAD $50</div>
    <div class="coin-col"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <div class="logo-main" style="text-align:center;"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="coin-col"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="publi-box">PUBLICIDAD $100</div>
</header>

<div class="middle-grid">
    <div class="rooms-menu" id="menu-salas"></div>
    <div class="viewer-frame">
        <img id="sala-actual-img" src="">
        <a href="https://best.aliexpress.com/" target="_blank" class="tienda-overlay" id="overlay-tienda">🔱 TIENDITA VIP 🔱</a>
    </div>
</div>

<div class="main-interact">
    <div class="bots-wrap">
        <div class="bot-profile"><img src="Rubia.jpg"><div class="bot-label" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-profile"><img src="Morocha.jpg"><div class="bot-label" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-profile"><img src="Pelirroja.jpg"><div class="bot-label" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-wrap">
        <div id="chat-flow"></div>
        <div class="chat-input-box">
            <input type="text" id="msg-in" placeholder="Escribe a las diosas..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 30px; border-radius:15px; cursor:pointer; font-weight:bold; font-size:16px;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-doors">
    <div class="door-box"><h4 style="color:var(--n-rosa)">HISTORIAS</h4><div class="door-thumb" id="h-box"></div><button style="width:100%; padding:12px; background:var(--n-rosa); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;" onclick="up('h-box')">SUBIR ARCHIVO</button></div>
    <div class="door-box"><h4 style="color:var(--n-azul)">ESTADOS</h4><div class="door-thumb" id="e-box"></div><button style="width:100%; padding:12px; background:var(--n-azul); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;" onclick="up('e-box')">SUBIR ARCHIVO</button></div>
    <div class="door-box"><h4 style="color:var(--n-rojo)">VIDEOS</h4><div class="door-thumb" id="v-box"></div><button style="width:100%; padding:12px; background:var(--n-rojo); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;" onclick="up('v-box')">SUBIR ARCHIVO</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function init() {
        const menu = document.getElementById('menu-salas');
        salas.forEach((s, i) => {
            let b = document.createElement('div');
            b.className = 'room-btn'; b.id = 'sala-'+i;
            b.innerHTML = `<span>${s}</span><span style="color:lime; font-size:11px;">LIVE</span>`;
            b.onclick = () => cambiarSala(i);
            menu.appendChild(b);
        });
        cambiarSala(0);
        hablar("MIA", "Hola bombón... bienvenida al Imperio de Resistencia. ¿Viste qué gatas estamos hoy?");
    }

    function cambiarSala(i) {
        document.querySelectorAll('.room-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('sala-'+i).classList.add('active');
        const img = document.getElementById('sala-actual-img');
        const btn = document.getElementById('overlay-tienda');
        
        if(salas[i] === "LA TIENDITA") {
            btn.style.display = 'block';
            img.style.opacity = '0.3';
        } else {
            btn.style.display = 'none';
            img.style.opacity = '1';
            // Las imágenes deben llamarse exactamente como las salas (ej: SPA.jpg)
            img.src = encodeURI(salas[i] + ".jpg");
        }
    }

    function up(id) {
        const url = prompt("Pega el enlace de la imagen o video:");
        if(url) document.getElementById(id).innerHTML = `<img src="${url}">`;
    }

    function enviar() {
        const i = document.getElementById('msg-in');
        if(!i.value) return;
        const f = document.getElementById('chat-flow');
        f.innerHTML += `<div style="text-align:right; color:var(--oro); margin-bottom:15px;"><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
        setTimeout(() => { hablar("TANIA", "No seas tacaño amor, mandame una moneda."); }, 1200);
    }

    function hablar(n, m) {
        const f = document.getElementById('chat-flow');
        const col = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        f.innerHTML += `<div style="margin-bottom:15px;"><b style="color:${col}">${n}:</b> ${m}</div>`;
        f.scrollTop = f.scrollHeight;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
