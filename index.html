<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v139</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 120px 250px 120px 1fr; 
            align-items: center; gap: 20px; padding: 15px;
            background: #050505; border-bottom: 6px solid var(--n-rojo); height: 320px;
        }
        .logo-v139 { height: 250px; width: 250px; object-fit: contain; filter: drop-shadow(0 0 20px var(--n-rojo)); }
        .coin { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; border: 4px solid white; cursor: pointer; }
        .publi { border: 3px solid var(--n-rojo); height: 200px; border-radius: 15px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px; }

        /* SALAS */
        .seccion-salas { display: grid; grid-template-columns: 280px 1fr; height: 500px; border-bottom: 6px solid var(--n-rojo); }
        .menu-v { overflow-y: auto; background: #0a0a0a; border-right: 2px solid #222; }
        .opcion-sala { padding: 15px; border-bottom: 1px solid #111; cursor: pointer; font-size: 13px; color: #777; }
        .opcion-sala.active { background: var(--n-rojo); color: white; }
        
        .visor { background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        #sala-img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .info-error { position: absolute; text-align: center; border: 2px dashed #444; padding: 20px; }

        /* SECCIÓN 50/50: BOTS Y CHAT (ALTURA REDUCIDA A LA MITAD) */
        .seccion-media { display: grid; grid-template-columns: 50% 50%; height: 450px; }

        .bots-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; border-right: 4px solid var(--n-rojo); }
        .bot-wrap { position: relative; border-right: 1px solid #111; display: flex; align-items: center; justify-content: center; background: #050505; }
        .bot-wrap img { width: 100%; height: 100%; object-fit: contain; } /* 'contain' para que no se corte ni pixele */
        .bot-tag { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 20px; font-weight: 900; text-shadow: 2px 2px 5px #000; }

        .chat-wrap { display: flex; flex-direction: column; background: #080808; height: 450px; }
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 14px; border-bottom: 1px solid #222; }
        .chat-in { padding: 15px; display: flex; gap: 10px; background: #111; }
        #user-txt { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; outline: none; }

        /* PUERTAS */
        .footer-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; background: #000; }
        .p-box { background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 15px; text-align: center; }
        .p-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body onload="iniciar()">

<header>
    <div class="publi">ANUNCIANTE<br>DISPONIBLE</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pago(1)">$1</div><div class="coin" onclick="pago(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v139">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pago(10)">$10</div><div class="coin" onclick="pago(20)">$20</div></div>
    <div class="publi">PUBLICIDAD<br>AQUÍ</div>
</header>

<div class="seccion-salas">
    <div class="menu-v" id="lista-s"></div>
    <div class="visor">
        <div id="error-visor" class="info-error">
            <p>CONECTANDO...</p>
            <small id="debug-name"></small>
        </div>
        <img id="sala-img" src="" onerror="falloImagen(this)">
    </div>
</div>

<div class="seccion-media">
    <div class="bots-grid">
        <div class="bot-wrap"><img src="Rubia.jpg"><div class="bot-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-wrap"><img src="Morocha.jpg"><div class="bot-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-wrap"><img src="Pelirroja.jpg"><div class="bot-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-wrap">
        <div id="chat-box"></div>
        <div class="chat-in">
            <input type="text" id="user-txt" placeholder="Habla con ellas..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 20px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="footer-btns">
    <div class="p-box">
        <div style="height:80px; background:#111; margin-bottom:10px; border-radius:5px; border:1px dashed #444;" id="view-h"></div>
        <button class="p-btn" style="background:var(--n-rosa)" onclick="cargar('view-h')">Subir Historias</button>
    </div>
    <div class="p-box">
        <div style="height:80px; background:#111; margin-bottom:10px; border-radius:5px; border:1px dashed #444;" id="view-e"></div>
        <button class="p-btn" style="background:var(--n-azul)" onclick="cargar('view-e')">Subir Estados</button>
    </div>
    <div class="p-box">
        <div style="height:80px; background:#111; margin-bottom:10px; border-radius:5px; border:1px dashed #444;" id="view-v"></div>
        <button class="p-btn" style="background:var(--n-rojo)" onclick="cargar('view-v')">Subir Videos</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    let actual = 0;

    function iniciar() {
        const m = document.getElementById('lista-s');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'opcion-sala'; d.id = 'sala-'+i;
            d.innerHTML = `<b>${s}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => ver(i);
            m.appendChild(d);
        });
        ver(0);
        setInterval(() => { actual = (actual + 1) % salas.length; ver(actual); }, 6000);
        mensaje("TANIA", "¡Hola! He ajustado las fotos para que nos veas de cuerpo completo sin que se corte nada.");
    }

    function ver(i) {
        actual = i;
        document.querySelectorAll('.opcion-sala').forEach(x => x.classList.remove('active'));
        document.getElementById('sala-'+i).classList.add('active');
        const img = document.getElementById('sala-img');
        const err = document.getElementById('error-visor');
        const dbg = document.getElementById('debug-name');
        
        img.style.display = "none";
        err.style.display = "block";
        dbg.innerText = "Archivo necesario: " + salas[i] + ".jpg";
        
        img.src = salas[i] + ".jpg";
    }

    function falloImagen(img) {
        const dbg = document.getElementById('debug-name');
        dbg.innerHTML = `<span style="color:var(--n-rojo)">FALTA ARCHIVO:</span><br>${salas[actual]}.jpg`;
    }

    document.getElementById('sala-img').onload = function() {
        this.style.display = "block";
        document.getElementById('error-visor').style.display = "none";
    }

    function enviar() {
        const inpt = document.getElementById('user-txt');
        if(!inpt.value.trim()) return;
        document.getElementById('chat-box').innerHTML += `<div style="text-align:right; margin-bottom:10px; color:var(--oro)"><b>Tú:</b> ${inpt.value}</div>`;
        setTimeout(() => {
            const girls = ["MIA", "TANIA", "COLO"];
            mensaje(girls[Math.floor(Math.random()*3)], "¡Te leo fuerte y claro!");
        }, 800);
        inpt.value = "";
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    function mensaje(n, m) {
        const cb = document.getElementById('chat-box');
        const color = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        cb.innerHTML += `<div style="margin-bottom:10px;"><b style="color:${color}">${n}:</b> ${m}</div>`;
        cb.scrollTop = cb.scrollHeight;
    }

    function cargar(id) {
        let f = prompt("Ingresa el nombre de la imagen o video:");
        if(f) document.getElementById(id).innerHTML = `<img src="${f}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pago(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
