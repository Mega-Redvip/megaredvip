<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGA RED VIP | LA RED SOCIAL DEFINITIVA</title>
    <style>
        :root { --oro: #d4af37; --oro-l: #fff9aa; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-azul: #00d9ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s; }
        body, html { height: 100vh; background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; }

        /* CABECERA GIGANTE CON LOGO XL */
        header { height: 260px; background: #000; border-bottom: 6px solid var(--oro); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 100; }
        .stats { position: absolute; left: 20px; top: 20px; color: var(--n-rojo); font-size: 14px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* EL LOGO: Centrado y de gran tamaño */
        .logo-box { width: 100%; display: flex; justify-content: center; padding-top: 10px; }
        .logo-img { height: 200px; width: auto; filter: drop-shadow(0 0 30px var(--oro)); object-fit: contain; }

        .coin-box { position: absolute; right: 30px; bottom: 20px; display: flex; gap: 12px; }
        .coin { width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--oro-l), var(--oro) 70%, #8a6d3b); border: 3px solid #333; color: #000; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .coin:hover { transform: scale(1.1) rotate(5deg); filter: brightness(1.2); }

        /* CUERPO DE LA PAGINA */
        .app-grid { display: grid; grid-template-columns: 280px 1fr 380px; height: calc(100vh - 260px); gap: 15px; padding: 15px; }
        
        /* IZQUIERDA: PUERTAS */
        .sidebar { background: #080808; border: 1px solid #222; border-radius: 15px; overflow-y: auto; padding: 15px; }
        .room-btn { width: 100%; padding: 14px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #666; cursor: pointer; border-radius: 10px; text-align: left; font-size: 11px; text-transform: uppercase; font-weight: bold; border-left: 5px solid transparent; }
        .room-btn:hover { background: #1a1a1a; color: #fff; }
        .room-btn.active { border-color: var(--oro); color: var(--oro); background: #1a1500; border-left: 5px solid var(--oro); }

        /* CENTRO: VISOR */
        .visor-box { background: #000; border: 2px solid #1a1a1a; border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; height: 100%; position: relative; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        /* DERECHA: AVATARES Y CHAT */
        .right-panel { display: flex; flex-direction: column; gap: 15px; height: 100%; }
        .girls-row { display: flex; gap: 10px; height: 160px; flex-shrink: 0; }
        .girl-card { flex: 1; position: relative; border: 2px solid var(--oro); border-radius: 12px; overflow: hidden; background: #111; }
        .girl-img { width: 100%; height: 100%; object-fit: cover; }
        .girl-label { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, black); color: var(--oro-l); font-size: 11px; text-align: center; padding: 10px 0; font-weight: bold; }
        
        .chat-box { flex: 1; background: #020202; border: 1px solid #333; border-radius: 15px; padding: 15px; overflow-y: auto; font-family: 'Segoe UI', sans-serif; font-size: 13px; border-top: 3px solid #222; }
        .msg { margin-bottom: 12px; border-left: 4px solid; padding-left: 12px; line-height: 1.4; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="stats">🔴 VIP LIVE: 14,520 SOCIOS EN RESISTENCIA</div>
    <div class="logo-box">
        <img src="Logo Mega Red Lunar.jpg" class="logo-img" alt="LOGO MEGA RED VIP" onerror="this.src='https://via.placeholder.com/800x200/000/d4af37?text=MEGA+RED+VIP'">
    </div>
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div>
        <div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div>
        <div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="app-grid">
    <div class="sidebar" id="rooms-nav"></div>
    <div class="visor-box">
        <img id="main-view" src="">
    </div>
    <div class="right-panel">
        <div class="girls-row">
            <div class="girl-card"><img src="Rubia.jpg" class="girl-img" onerror="this.src='https://via.placeholder.com/150x200/222/fff?text=Mia'"><div class="girl-label">MIA</div></div>
            <div class="girl-card"><img src="Morocha.jpg" class="girl-img" onerror="this.src='https://via.placeholder.com/150x200/222/fff?text=Tania'"><div class="girl-label">TANIA</div></div>
            <div class="girl-card"><img src="Pelirroja.jpg" class="girl-img" onerror="this.src='https://via.placeholder.com/150x200/222/fff?text=Colo'"><div class="girl-label">COLO</div></div>
        </div>
        <div class="chat-box" id="chat-stream"></div>
    </div>
</div>

<script>
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];
    let currentRoom = 0;

    const chatData = [
        { u: "MIA", m: "🔥 ¿Algún socio de **Resistencia** activo ahora? Me siento sola...", c: "#00ff66" },
        { u: "TANIA", m: "💎 Acabo de subir contenido nuevo al muro de historias, ¡vayan a ver!", c: "#ff003c" },
        { u: "SOCIO_Resis22", m: "¡MIA mandame un privado, ya te mandé 10 tokens!", c: "#00d9ff" },
        { u: "SISTEMA", m: "📍 Nuevo usuario conectado desde Chaco, Argentina.", c: "#d4af37" },
        { u: "COLO", m: "🔞 ¿Quién se anima a entrar a la sala Sado conmigo?", c: "#ffa500" },
        { u: "Admin_Red", m: "Recuerden que los pagos por PayPal se acreditan al instante.", c: "#fff" },
        { u: "MIA", m: "💰 ¡Gracias por esos 5 tokens! Así me gusta...", c: "#00ff66" }
    ];

    function init() {
        const nav = document.getElementById('rooms-nav');
        rooms.forEach((r, i) => {
            const btn = document.createElement('button');
            btn.className = 'room-btn'; btn.id = 'btn-' + i;
            btn.innerHTML = `🚪 ${r.toUpperCase()} <span style="float:right; color:red">●</span>`;
            btn.onclick = () => { currentRoom = i; render(); };
            nav.appendChild(btn);
        });

        render();
        // Bucle de chat infinito
        setInterval(() => {
            const msg = chatData[Math.floor(Math.random() * chatData.length)];
            postMsg(msg.u, msg.m, msg.c);
        }, 5000);

        // Bucle de salas cada 25 segundos
        setInterval(() => {
            currentRoom = (currentRoom + 1) % rooms.length;
            render();
        }, 25000);
    }

    function render() {
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + currentRoom).classList.add('active');
        const view = document.getElementById('main-view');
        // Usamos la ruta directa y el nombre exacto
        view.src = "./" + rooms[currentRoom] + ".jpg";
        view.onerror = () => { view.src = "https://via.placeholder.com/800x600/111/d4af37?text=" + rooms[currentRoom]; };
    }

    function postMsg(user, txt, color) {
        const box = document.getElementById('chat-stream');
        box.innerHTML += `<div class="msg" style="border-color:${color}"><b>${user}:</b> ${txt}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function pay(n) {
        // Link directo de PayPal corregido
        window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&item_name=TOKENS_MEGA_RED&amount=" + n + "&currency_code=USD", "_blank");
    }

    init();
</script>
</body>
</html>
