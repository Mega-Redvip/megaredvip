<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPACTO TOTAL</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; 
            --n-verde: #00ff66; --n-turq: #00d9ff; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            height: 180px; background: #000; border-bottom: 4px solid var(--oro); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 50px; flex-shrink: 0;
        }
        .logo-img { height: 150px; filter: drop-shadow(0 0 20px var(--oro)); }

        /* --- ESTRUCTURA DE 3 COLUMNAS --- */
        .main-container { 
            display: grid; 
            grid-template-columns: 180px 1fr 450px; /* Salas finitas | Visor | BOTS GIGANTES */
            gap: 15px; padding: 15px; flex-grow: 1; overflow: hidden;
        }

        /* 1. COLUMNA IZQUIERDA: Nombres de salas achicados */
        .side-rooms { 
            background: #0a0a0a; border: 1px solid #222; border-radius: 15px; 
            display: flex; flex-direction: column; gap: 5px; padding: 10px;
        }
        .room-btn { 
            padding: 10px; background: #111; border: 1px solid #333; border-radius: 8px;
            font-size: 10px; text-transform: uppercase; cursor: pointer; text-align: center;
        }
        .room-btn.active { background: var(--oro); color: #000; font-weight: 900; }

        /* 2. COLUMNA CENTRAL: Visor y Galería Inferior */
        .center-area { display: flex; flex-direction: column; gap: 15px; overflow: hidden; }
        
        .main-screen { 
            background: #000; border: 5px solid #1a1a1a; border-radius: 20px; 
            flex-grow: 1; position: relative; overflow: hidden;
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }

        /* GALERÍA DEBAJO DEL VISOR: Imágenes de las salas */
        .bottom-gallery { 
            height: 150px; display: flex; gap: 10px; overflow-x: auto; 
            background: #080808; padding: 10px; border-radius: 15px; border: 1px solid #222;
        }
        .gal-img { 
            flex: 0 0 180px; height: 100%; border-radius: 10px; border: 2px solid #333;
            object-fit: cover; cursor: pointer; transition: 0.3s;
        }
        .gal-img.active { border-color: #fff; box-shadow: 0 0 15px #fff; transform: scale(0.95); }

        /* 3. COLUMNA DERECHA: BOTS GIGANTES Y CHAT */
        .side-bots { display: flex; flex-direction: column; gap: 15px; }
        
        .bot-massive { 
            flex-grow: 1; display: flex; flex-direction: column; gap: 10px;
        }
        .bot-frame { 
            flex: 1; border-radius: 15px; overflow: hidden; border: 3px solid #222; 
            position: relative; background: #050505;
        }
        .bot-frame img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .bot-tag { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 5px; color: var(--oro); font-weight: 900; border-top: 1px solid var(--oro); }

        .chat-slim { 
            height: 200px; background: #020202; border: 1px solid #222; 
            border-radius: 15px; padding: 10px; overflow-y: auto; font-size: 11px;
            display: flex; flex-direction: column-reverse; gap: 5px;
        }
        .msg { border-left: 3px solid var(--n-turq); padding-left: 8px; }

        /* Scrollbar estilo Oro */
        ::-webkit-scrollbar { height: 8px; width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--oro); border-radius: 10px; }
    </style>
</head>
<body onload="init()">

<header>
    <div style="color:#333; font-size:10px;">AD_SPACE_LEFT</div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    <div style="color:#333; font-size:10px;">AD_SPACE_RIGHT</div>
</header>

<div class="main-container">
    <div id="side-list" class="side-rooms"></div>

    <div class="center-area">
        <div class="main-screen">
            <img id="main-view" src="">
        </div>
        <div id="bottom-gal" class="bottom-gallery"></div>
    </div>

    <div class="side-bots">
        <div class="bot-massive">
            <div class="bot-frame"><img src="Rubia.jpg"><div class="bot-tag">MIA</div></div>
            <div class="bot-frame"><img src="Morocha.jpg"><div class="bot-tag">TANIA</div></div>
            <div class="bot-frame"><img src="Pelirroja.jpg"><div class="bot-tag">COLO</div></div>
        </div>
        <div id="chat-box" class="chat-slim"></div>
    </div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym_movimiento.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda_musica.mp3"}, 
        {n: "Oficina", e: ".png", s: "oficina_ambiente.mp3"}, {n: "Playa", e: ".png", s: "playa_olas.mp3"}
    ];

    function init() {
        const side = document.getElementById('side-list');
        const gal = document.getElementById('bottom-gal');

        rooms.forEach((r, i) => {
            // Botones izquierda
            const b = document.createElement('div');
            b.className = 'room-btn'; b.id = 'btn-'+i;
            b.innerText = r.n;
            b.onclick = () => { idx = i; refresh(); };
            side.appendChild(b);

            // Imágenes abajo
            const img = document.createElement('img');
            img.className = 'gal-img'; img.id = 'gal-'+i;
            img.src = encodeURI(r.n + r.e);
            img.onclick = () => { idx = i; refresh(); };
            gal.appendChild(img);
        });
        refresh();
        setInterval(botChat, 2000);
    }

    function refresh() {
        document.querySelectorAll('.room-btn, .gal-img').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-'+idx).classList.add('active');
        document.getElementById('gal-'+idx).classList.add('active');
        
        document.getElementById('main-view').src = encodeURI(rooms[idx].n + rooms[idx].e);
        const player = document.getElementById('audio-player');
        player.src = rooms[idx].s;
        player.play().catch(e => {});
    }

    function botChat() {
        const chat = document.getElementById('chat-box');
        const m = ["🔥 PRIVADO!", "Tip $5", "Hola!", "VIP", "Socio Chaco"];
        const n = ["Mia", "Tania", "Colo", "User"][Math.floor(Math.random()*4)];
        chat.innerHTML = `<div class="msg"><b>${n}:</b> ${m[Math.floor(Math.random()*5)]}</div>` + chat.innerHTML;
    }
</script>
</body>
</html>
