<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v143</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 250px 130px 1fr; 
            align-items: center; gap: 20px; padding: 15px;
            background: #050505; border-bottom: 6px solid var(--n-rojo); height: 320px;
        }
        .logo-v143 { height: 250px; width: 250px; object-fit: contain; filter: drop-shadow(0 0 20px var(--n-rojo)); }
        .coin { width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; border: 4px solid white; cursor: pointer; }
        .publi-r { border: 3px solid var(--n-rojo); height: 210px; border-radius: 15px; display: flex; align-items: center; justify-content: center; text-align: center; }

        /* SECCIÓN SALAS */
        .seccion-salas { display: grid; grid-template-columns: 280px 1fr; height: 450px; border-bottom: 6px solid var(--n-rojo); }
        .menu-l { overflow-y: auto; background: #0a0a0a; border-right: 2px solid #222; }
        .s-item { padding: 15px; border-bottom: 1px solid #111; cursor: pointer; color: #555; font-size: 13px; }
        .s-item.active { background: var(--n-rojo); color: white; }
        
        .visor-f { background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        #sala-pic { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .status-f { position: absolute; text-align: center; color: #444; }

        /* SECCIÓN 50/50: BOTS ENTERAS (SIN ESCALERA) */
        .seccion-interactiva { display: grid; grid-template-columns: 50% 50%; height: 500px; background: #050505; }

        .bots-box { display: grid; grid-template-columns: repeat(3, 1fr); border-right: 5px solid var(--n-rojo); }
        .bot-card { 
            position: relative; height: 500px; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            border-right: 1px solid #111;
            background: radial-gradient(circle, #1a1a1a 0%, #000 70%);
        }
        /* ESTO HACE QUE SE VEAN ENTERAS Y NÍTIDAS */
        .bot-card img { 
            max-height: 95%; 
            max-width: 95%; 
            object-fit: contain; 
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }
        .bot-nom { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 22px; font-weight: 900; text-shadow: 2px 2px 5px #000; }

        .chat-box { display: flex; flex-direction: column; height: 500px; background: #080808; }
        #chat-content { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 15px; }
        .chat-ctrl { padding: 15px; display: flex; gap: 10px; background: #111; }
        #chat-in { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; outline: none; }

        /* PUERTAS */
        .footer-p { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; background: #000; }
        .p-card { background: #0a0a0a; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; }
        .p-view { height: 100px; background: #000; border: 1px dashed #444; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-view img { width: 100%; height: 100%; object-fit: cover; }
        .p-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body onload="boot()">

<header>
    <div class="publi-r">PUBLICIDAD<br>DISPONIBLE</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v143">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="publi-r">ANÚNCIATE<br>AQUÍ</div>
</header>

<div class="seccion-salas">
    <div class="menu-l" id="menu-l"></div>
    <div class="visor-f">
        <div id="st-sala" class="status-f">
            <p>CONECTANDO...</p>
            <small id="db-sala"></small>
        </div>
        <img id="sala-pic" src="" onerror="repararRuta(this)">
    </div>
</div>

<div class="seccion-interactiva">
    <div class="bots-box">
        <div class="bot-card"><img src="Rubia.jpg"><div class="bot-nom" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-card"><img src="Morocha.jpg"><div class="bot-nom" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-card"><img src="Pelirroja.jpg"><div class="bot-nom" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-box">
        <div id="chat-content"></div>
        <div class="chat-ctrl">
            <input type="text" id="chat-in" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 20px; border-radius:5px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="footer-p">
    <div class="p-card">
        <div class="p-view" id="v-h"></div>
        <button class="p-btn" style="background:var(--n-rosa)" onclick="up('v-h')">Historias</button>
    </div>
    <div class="p-card">
        <div class="p-view" id="v-e"></div>
        <button class="p-btn" style="background:var(--n-azul)" onclick="up('v-e')">Estados</button>
    </div>
    <div class="p-card">
        <div class="p-view" id="v-v"></div>
        <button class="p-btn" style="background:var(--n-rojo)" onclick="up('v-v')">Videos</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    let curr = 0;

    function boot() {
        const ml = document.getElementById('menu-l');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-item'; d.id = 'sl-'+i;
            d.innerHTML = `<b>${s}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { curr = (curr + 1) % salas.length; ver(curr); }, 6000);
        msg("TANIA", "¡Hola! He ajustado el tamaño para que nos veas de cuerpo completo y sin cortes. ¡Mira qué bien salimos!");
    }

    function ver(i) {
        curr = i;
        document.querySelectorAll('.s-item').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        const img = document.getElementById('sala-pic');
        const db = document.getElementById('db-sala');
        
        img.style.display = "none";
        document.getElementById('st-sala').style.display = "block";
        db.innerText = "Buscando: " + salas[i] + ".jpg";
        
        img.dataset.step = "0";
        img.src = salas[i] + ".jpg";
    }

    function repararRuta(img) {
        let step = parseInt(img.dataset.step);
        const name = salas[curr];
        if(step === 0) {
            img.dataset.step = "1";
            img.src = name.replace(/\s/g, "") + ".jpg"; // Intenta sin espacios
        } else if(step === 1) {
            img.dataset.step = "2";
            img.src = name.toLowerCase().replace(/\s/g, "") + ".jpg"; // Minúsculas sin espacios
        } else {
            document.getElementById('db-sala').innerHTML = `<span style="color:red">ERROR:</span> Verifica que el archivo se llame <b>${name}.jpg</b>`;
        }
    }

    document.getElementById('sala-pic').onload = function() {
        this.style.display = "block";
        document.getElementById('st-sala').style.display = "none";
    };

    function enviar() {
        const input = document.getElementById('chat-in');
        if(!input.value.trim()) return;
        document.getElementById('chat-content').innerHTML += `<div style="text-align:right; margin-bottom:10px; color:var(--oro)"><b>Tú:</b> ${input.value}</div>`;
        setTimeout(() => {
            const g = ["MIA", "TANIA", "COLO"];
            msg(g[Math.floor(Math.random()*3)], "¡Te escuchamos fuerte y claro!");
        }, 800);
        input.value = "";
        document.getElementById('chat-content').scrollTop = document.getElementById('chat-content').scrollHeight;
    }

    function msg(n, m) {
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-content').innerHTML += `<div style="margin-bottom:10px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-content').scrollTop = document.getElementById('chat-content').scrollHeight;
    }

    function up(id) {
        let n = prompt("Nombre del archivo (ej: foto1.jpg):");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
