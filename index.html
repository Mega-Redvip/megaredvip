<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v91</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* SECCIÓN SUPERIOR: PUBLICIDAD - LOGO - MONEDAS */
        header { 
            display: grid; grid-template-columns: 1fr 2fr 1fr; 
            padding: 20px; align-items: center; gap: 20px; background: #050505;
            border-bottom: 5px solid var(--n-rojo);
        }
        .side-col { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .publi-box { 
            width: 100%; height: 120px; border: 3px dashed var(--n-rojo); 
            display: flex; align-items: center; justify-content: center; 
            background: #0a0a0a; color: var(--n-rojo); font-size: 18px; text-align: center;
        }
        .logo-box img { width: 100%; max-height: 280px; object-fit: contain; filter: drop-shadow(0 0 30px var(--n-rojo)); }
        
        .coins-row { display: flex; gap: 20px; }
        .coin { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 20px; cursor: pointer; border: 4px solid white; transition: 0.3s;
        }

        /* SECCIÓN MEDIA: SALAS Y VISOR */
        .middle-section { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 20px; }
        .rooms-sidebar { background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 15px; height: 500px; display: flex; flex-direction: column; }
        .rooms-scroll { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .room-unit { 
            padding: 12px; background: #151515; border-radius: 8px; cursor: pointer; 
            border: 1px solid #333; display: flex; justify-content: space-between; font-size: 12px;
        }
        .room-unit.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 15px var(--n-rojo); }

        .viewer-box { border: 5px solid var(--n-rojo); border-radius: 15px; background: #000; height: 500px; overflow: hidden; position: relative; }
        #main-img { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .geo-info { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); color: var(--oro); padding: 8px 15px; border-radius: 5px; font-size: 12px; z-index: 10; border: 1px solid var(--oro); }

        /* SECCIÓN BOTS Y CHAT */
        .chat-section { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 0 20px 20px; align-items: start; }
        .bots-column { display: flex; flex-direction: column; gap: 15px; }
        
        /* FIX: BOTS COMPLETAS Y FOTOGRÁFICAS */
        .bot-mini { 
            height: 250px; /* Aumentado para que quepa el cuerpo entero */
            border: 3px solid #222; border-radius: 12px; overflow: hidden; 
            position: relative; background: #000;
        }
        .bot-mini img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* FIX: Imagen COMPLETA, sin recortar */
            background: #000; /* Fondo negro para rellenar si la foto es estrecha */
            image-rendering: high-quality; /* Ayuda a mantener nitidez visual */
        }
        .bot-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); text-align: center; font-size: 14px; padding: 5px; font-weight: bold; }

        .chat-box { background: #080808; border: 4px solid var(--n-rojo); border-radius: 15px; height: 780px; /* Ajustado a la altura de las 3 bots */ display: flex; flex-direction: column; overflow: hidden; }
        #chat-stream { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .chat-input { display: flex; padding: 15px; background: #111; gap: 10px; }
        #msg-in { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; outline: none; }
        .btn-send { background: var(--n-rojo); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* PUERTAS INFERIORES */
        .bottom-gates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; background: #050505; border-top: 5px solid var(--n-rojo); }
        .gate { background: #0a0a0a; border-radius: 15px; padding: 20px; text-align: center; border: 3px solid #333; }
        .gate-h { border-color: var(--n-rosa); } .gate-e { border-color: var(--n-azul); } .gate-v { border-color: var(--n-rojo); }
        .gate-content { height: 180px; background: #000; margin-bottom: 15px; border-radius: 8px; overflow-y: auto; }
        .btn-up { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="side-col">
        <div class="publi-box">PUBLICITE AQUÍ</div>
        <div class="coins-row">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(5)">$5</div>
        </div>
    </div>
    
    <div class="logo-box">
        <img src="Logo Mega Red Lunar.jpg" alt="Logo Imperio">
    </div>

    <div class="side-col">
        <div class="publi-box">PUBLICITE AQUÍ</div>
        <div class="coins-row">
            <div class="coin" onclick="pay(10)">$10</div>
            <div class="coin" onclick="pay(20)">$20</div>
        </div>
    </div>
</header>

<div class="middle-section">
    <div class="rooms-sidebar">
        <div class="rooms-scroll" id="rooms-list"></div>
        <a href="https://best.aliexpress.com/" target="_blank" style="background:#000; color:#fff; border:2px solid var(--n-rojo); padding:10px; text-align:center; text-decoration:none; font-size:12px; font-weight:900; margin-top:10px; border-radius:5px;">🛒 COMPRAR JUGUETES 🔞</a>
    </div>
    <div class="viewer-box">
        <div class="geo-info" id="geo">📍 RESISTENCIA, CHACO</div>
        <img id="main-img" src="">
    </div>
</div>

<div class="chat-section">
    <div class="bots-column">
        <div class="bot-mini"><img src="Rubia.jpg"><div class="bot-label" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-mini"><img src="Morocha.jpg"><div class="bot-label" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-mini"><img src="Pelirroja.jpg"><div class="bot-label" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-box">
        <div id="chat-stream"></div>
        <div class="chat-input">
            <input type="text" id="msg-in" placeholder="Dile algo atrevido a la bot..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-send" onclick="send()">OK</button>
        </div>
    </div>
</div>

<div class="bottom-gates">
    <div class="gate gate-h">
        <h4 style="color:var(--n-rosa)">HISTORIAS</h4>
        <div class="gate-content" id="f-h"></div>
        <button class="btn-up" style="background:var(--n-rosa)" onclick="up('f-h')">SUBIR HISTORIA</button>
    </div>
    <div class="gate gate-e">
        <h4 style="color:var(--n-azul)">ESTADOS</h4>
        <div class="gate-content" id="f-e"></div>
        <button class="btn-up" style="background:var(--n-azul)" onclick="up('f-e')">SUBIR ESTADO</button>
    </div>
    <div class="gate gate-v">
        <h4 style="color:var(--n-rojo)">VIDEOS</h4>
        <div class="gate-content" id="f-v"></div>
        <button class="btn-up" style="background:var(--n-rojo)" onclick="up('f-v')">SUBIR VIDEO</button>
    </div>
</div>

<script>
    const salas = [
        {n: "Sado y Maso", e: ".jpg", b: "COLO", cl: "var(--n-rojo)"}, 
        {n: "Spa", e: ".png", b: "MIA", cl: "var(--n-rosa)"}, 
        {n: "Biblioteca", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Camarera", e: ".png", b: "MIA", cl: "var(--n-rosa)"},
        {n: "Discoteca", e: ".png", b: "COLO", cl: "var(--n-rojo)"},
        {n: "El Bar", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Gimnasio", e: ".png", b: "MIA", cl: "var(--n-rosa)"},
        {n: "Oficina", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Playa", e: ".png", b: "COLO", cl: "var(--n-rojo)"},
        {n: "La Tiendita", e: ".png", b: "MIA", cl: "var(--n-rosa)"}
    ];

    let idx = 0;
    let manual = false;

    function init() {
        const list = document.getElementById('rooms-list');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'room-unit'; d.id = 's-' + i;
            d.innerHTML = `<span>${s.n}</span><span style="color:lime">● ONLINE</span>`;
            d.onclick = () => { manual = true; setRoom(i, true); };
            list.appendChild(d);
        });
        setRoom(0, false);
        setInterval(() => { if(!manual) { idx = (idx+1)%salas.length; setRoom(idx, false); } }, 5000);
    }

    function setRoom(i, m) {
        idx = i;
        document.querySelectorAll('.room-unit').forEach(x => x.classList.remove('active'));
        document.getElementById('s-' + i).classList.add('active');
        document.getElementById('main-img').src = encodeURI(salas[i].n + salas[i].e);
        if(m) {
            const stream = document.getElementById('chat-stream');
            stream.innerHTML = `<div style="text-align:center; color:gray; font-size:10px;">[SALA PRIVADA CON ${salas[idx].b}]</div>`;
            bot(`Hola papi... me gusta que me elijas. ¿Sos de acá de Resistencia o viniste de visita?`);
        }
    }

    function send() {
        const input = document.getElementById('msg-in');
        const stream = document.getElementById('chat-stream');
        if(!input.value) return;
        stream.innerHTML += `<div style="align-self:flex-end; background:#222; padding:10px; border-radius:8px; border-right:4px solid var(--oro);"><b>Tú:</b> ${input.value}</div>`;
        const txt = input.value.toLowerCase();
        input.value = "";
        stream.scrollTop = stream.scrollHeight;

        let r = "Me estás calentando mucho... ¿por qué no me invitás unas monedas y te hago un show privado?";
        if(txt.includes("hola")) r = "¡Hola bombón! Qué rico que me hables así de entrada.";
        if(txt.includes("quien") || txt.includes("nombre")) r = `Soy ${salas[idx].b}, tu perrita favorita de Resistencia.`;
        if(txt.includes("ver") || txt.includes("desnud")) r = "Uff... regalame 10 monedas arriba y me quito lo que vos quieras.";
        if(txt.includes("haces")) r = "Acá, tocándome un poquito mientras espero que un hombre de verdad me mande un regalo...";
        bot(r);
    }

    function bot(t) {
        setTimeout(() => {
            const stream = document.getElementById('chat-stream');
            stream.innerHTML += `<div><b style="color:${salas[idx].cl}">${salas[idx].b}:</b> ${t}</div>`;
            stream.scrollTop = stream.scrollHeight;
        }, 1000);
    }

    function up(id) {
        const link = prompt("Enlace de imagen/video:");
        if(link) document.getElementById(id).innerHTML = `<img src="${link}" style="width:100%; border-radius:8px; margin-top:10px; border:1px solid gold;">` + document.getElementById(id).innerHTML;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&item_name=VIP&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
