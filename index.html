<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v145</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 250px 130px 1fr; 
            align-items: center; gap: 20px; padding: 15px;
            background: #050505; border-bottom: 6px solid var(--n-rojo); height: 300px;
        }
        .logo-v145 { height: 250px; width: 250px; object-fit: contain; }
        .coin { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; border: 4px solid white; cursor: pointer; }

        /* SECCIÓN SALAS */
        .seccion-salas { display: grid; grid-template-columns: 280px 1fr; height: 450px; border-bottom: 6px solid var(--n-rojo); }
        .lista-salas { overflow-y: auto; background: #0a0a0a; border-right: 2px solid #222; }
        .s-item { padding: 15px; border-bottom: 1px solid #111; cursor: pointer; color: #444; font-size: 13px; }
        .s-item.active { background: var(--n-rojo); color: white; }
        
        .visor-vip { background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        #sala-img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .error-txt { position: absolute; text-align: center; color: #555; }

        /* SECCIÓN 50/50: BOTS AL 50% (ENTERAS) */
        .seccion-ia { display: grid; grid-template-columns: 50% 50%; height: 400px; }

        .bots-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; border-right: 5px solid var(--n-rojo); }
        .bot-wrap { 
            position: relative; height: 400px; background: #050505; 
            border-right: 1px solid #111; display: flex; align-items: center; justify-content: center; 
        }
        /* USA CONTAIN PARA QUE NO SE RECORTEN */
        .bot-wrap img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
        .bot-name { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 20px; font-weight: 900; text-shadow: 2px 2px 5px #000; }

        .chat-wrap { display: flex; flex-direction: column; height: 400px; background: #080808; }
        #chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 14px; }
        .chat-input { padding: 15px; background: #111; display: flex; gap: 10px; }
        #msg-in { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; outline: none; }

        /* PUERTAS */
        .footer-puertas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; background: #000; }
        .puerta-box { background: #0a0a0a; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; }
        .p-view { height: 90px; background: #000; border: 1px dashed #444; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body onload="iniciar()">

<header>
    <div style="border:2px solid var(--n-rojo); height:180px; border-radius:15px;"></div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v145">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div style="border:2px solid var(--n-rojo); height:180px; border-radius:15px;"></div>
</header>

<div class="seccion-salas">
    <div class="lista-salas" id="menu-salas"></div>
    <div class="visor-vip">
        <div id="st-sala" class="error-txt">
            <p>SALA OFFLINE</p>
            <small id="db-txt"></small>
        </div>
        <img id="sala-img" src="" onerror="retry(this)">
    </div>
</div>

<div class="seccion-ia">
    <div class="bots-grid">
        <div class="bot-wrap"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-wrap"><img src="Morocha.jpg"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-wrap"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-wrap">
        <div id="chat-window"></div>
        <div class="chat-input">
            <input type="text" id="msg-in" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 20px; border-radius:5px; cursor:pointer;">OK</button>
        </div>
    </div>
</div>

<div class="footer-puertas">
    <div class="puerta-box">
        <div class="p-view" id="v-h"></div>
        <button class="p-btn" style="background:var(--n-rosa)" onclick="up('v-h')">Historias</button>
    </div>
    <div class="puerta-box">
        <div class="p-view" id="v-e"></div>
        <button class="p-btn" style="background:var(--n-azul)" onclick="up('v-e')">Estados</button>
    </div>
    <div class="puerta-box">
        <div class="p-view" id="v-v"></div>
        <button class="p-btn" style="background:var(--n-rojo)" onclick="up('v-v')">Videos</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    let curr = 0;

    function iniciar() {
        const ml = document.getElementById('menu-salas');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-item'; d.id = 'sl-'+i;
            d.innerHTML = `<b>${s}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { curr = (curr + 1) % salas.length; ver(curr); }, 6000);
        msg("TANIA", "¡Hola! He ajustado el tamaño para que nos veas de cuerpo completo y sin recortes.");
    }

    function ver(i) {
        curr = i;
        document.querySelectorAll('.s-item').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        const img = document.getElementById('sala-img');
        img.style.display = "none";
        document.getElementById('st-sala').style.display = "block";
        document.getElementById('db-txt').innerText = "Archivo: " + salas[i] + ".jpg";
        img.dataset.r = "0";
        img.src = salas[i] + ".jpg";
    }

    function retry(img) {
        let r = parseInt(img.dataset.r);
        if(r === 0) { img.dataset.r = "1"; img.src = salas[curr].replace(/\s/g, "") + ".jpg"; }
        else { document.getElementById('db-txt').innerHTML = `<span style="color:red">FALTA:</span> ${salas[curr]}.jpg`; }
    }

    document.getElementById('sala-img').onload = function() {
        this.style.display = "block";
        document.getElementById('st-sala').style.display = "none";
    };

    function enviar() {
        const i = document.getElementById('msg-in');
        if(!i.value.trim()) return;
        document.getElementById('chat-window').innerHTML += `<div style="text-align:right; margin-bottom:10px; color:var(--oro)"><b>Tú:</b> ${i.value}</div>`;
        setTimeout(() => {
            const g = ["MIA", "TANIA", "COLO"];
            msg(g[Math.floor(Math.random()*3)], "¡Te leemos!");
        }, 800);
        i.value = "";
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function msg(n, m) {
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-window').innerHTML += `<div style="margin-bottom:10px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function up(id) {
        let n = prompt("Nombre del archivo:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
