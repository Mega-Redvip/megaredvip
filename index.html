<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v137</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; }

        /* HEADER MONUMENTAL */
        header { 
            display: grid; grid-template-columns: 1fr 120px 250px 120px 1fr; 
            align-items: center; gap: 20px; padding: 20px;
            background: #050505; border-bottom: 8px solid var(--n-rojo); height: 350px;
        }
        .vibrant-ad { 
            height: 250px; border: 5px solid var(--n-rojo); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px; text-align: center;
            box-shadow: 0 0 20px var(--n-rojo);
        }
        /* LOGO FIJO A 250PX */
        .logo-v137 { height: 250px; width: 250px; object-fit: contain; filter: drop-shadow(0 0 30px var(--n-rojo)); }
        .coin { width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; border: 4px solid white; box-shadow: 0 0 20px var(--oro); cursor: pointer; }

        /* SECCIÓN SALAS */
        .seccion-salas { display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 20px; height: 600px; }
        .panel-salas { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; background: #0a0a0a; padding: 15px; border: 2px solid #333; border-radius: 15px; }
        .btn-sala { padding: 15px; background: #151515; border: 1px solid #444; color: #888; cursor: pointer; border-radius: 8px; font-size: 14px; }
        .btn-sala.active { background: var(--n-rojo); color: white; border-color: white; box-shadow: 0 0 15px var(--n-rojo); }

        .visor-marco { border: 10px solid var(--n-rojo); border-radius: 30px; background: #000; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
        #webcam-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .error-msg { position: absolute; text-align: center; color: var(--n-rojo); font-size: 18px; padding: 20px; border: 2px dashed var(--n-rojo); }

        /* SECCIÓN 50/50: GIGANTE (ALTURA 1000PX) */
        .seccion-gigante { 
            display: grid; grid-template-columns: 50% 50%; 
            height: 1000px; /* DUPLICADO EL ALTO */
            border-top: 8px solid var(--n-rojo); border-bottom: 8px solid var(--n-rojo);
        }

        /* BOTS CUERPO COMPLETO */
        .bots-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; border-right: 4px solid var(--n-rojo); }
        .bot-col { position: relative; height: 100%; overflow: hidden; border-right: 2px solid #111; display: flex; align-items: center; justify-content: center; background: #050505; }
        .bot-col img { width: 100%; height: 100%; object-fit: contain; }
        .tag-nombre { position: absolute; bottom: 40px; width: 100%; text-align: center; font-size: 35px; font-weight: 900; text-shadow: 0 0 20px #000; }

        /* CHAT SIMÉTRICO */
        .chat-container { display: flex; flex-direction: column; background: #080808; height: 100%; }
        #logs { flex-grow: 1; padding: 30px; overflow-y: auto; font-size: 18px; color: #eee; }
        .input-area { padding: 30px; background: #111; display: flex; gap: 15px; border-top: 2px solid #222; }
        #msg { flex-grow: 1; background: #000; border: 3px solid var(--n-rojo); color: white; padding: 20px; border-radius: 12px; font-size: 18px; outline: none; }

        /* PUERTAS FINALES */
        .footer-puertas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 40px; background: #000; }
        .btn-puerta { width: 100%; padding: 25px; border: none; border-radius: 20px; color: white; font-weight: 900; font-size: 20px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .p-h { background: var(--n-rosa); box-shadow: 0 0 20px var(--n-rosa); }
        .p-e { background: var(--n-azul); box-shadow: 0 0 20px var(--n-azul); }
        .p-v { background: var(--n-rojo); box-shadow: 0 0 20px var(--n-rojo); }
    </style>
</head>
<body onload="boot()">

<header>
    <div class="vibrant-ad">AUSPICIANTE<br>GOLD</div>
    <div style="display:flex; flex-direction:column; gap:15px;"><div class="coin" onclick="pago(1)">$1</div><div class="coin" onclick="pago(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v137">
    <div style="display:flex; flex-direction:column; gap:15px;"><div class="coin" onclick="pago(10)">$10</div><div class="coin" onclick="pago(20)">$20</div></div>
    <div class="vibrant-ad">ANÚNCIATE<br>AQUÍ</div>
</header>

<div class="seccion-salas">
    <div class="panel-salas" id="lista-salas"></div>
    <div class="visor-marco">
        <div id="status" class="error-msg">CONECTANDO AL IMPERIO...</div>
        <img id="webcam-img" src="" onerror="intentarRutaAlternativa(this)">
    </div>
</div>

<div class="seccion-gigante">
    <div class="bots-grid">
        <div class="bot-col"><img src="Rubia.jpg"><div class="tag-nombre" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-col"><img src="Morocha.jpg"><div class="tag-nombre" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-col"><img src="Pelirroja.jpg"><div class="tag-nombre" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-container">
        <div id="logs"></div>
        <div class="input-area">
            <input type="text" id="msg" placeholder="Habla con las chicas..." onkeypress="if(event.key==='Enter') chatear()">
            <button onclick="chatear()" style="background:var(--n-rojo); color:white; border:none; padding:0 30px; border-radius:12px; cursor:pointer; font-weight:bold; font-size:18px;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-puertas">
    <button class="btn-puerta p-h" onclick="subir()">HISTORIAS</button>
    <button class="btn-puerta p-e" onclick="subir()">ESTADOS</button>
    <button class="btn-puerta p-v" onclick="subir()">VIDEOS</button>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    let salaActual = 0;

    function boot() {
        const menu = document.getElementById('lista-salas');
        salas.forEach((s, i) => {
            let b = document.createElement('div');
            b.className = 'btn-sala'; b.id = 's-'+i;
            b.innerHTML = `<b>${s}</b> <span style="float:right; color:lime">●</span>`;
            b.onclick = () => verSala(i);
            menu.appendChild(b);
        });
        verSala(0);
        setInterval(() => { 
            salaActual = (salaActual + 1) % salas.length;
            verSala(salaActual);
        }, 6000);
        hablar("TANIA", "¡Bienvenidos al Imperio! Todo está más grande y mejorado. ¿Qué sala quieres ver?");
    }

    function verSala(i) {
        salaActual = i;
        document.querySelectorAll('.btn-sala').forEach(x => x.classList.remove('active'));
        document.getElementById('s-'+i).classList.add('active');
        
        const img = document.getElementById('webcam-img');
        const st = document.getElementById('status');
        
        img.style.display = "none";
        st.style.display = "block";
        st.innerHTML = "CARGANDO SALA: " + salas[i];
        
        // El navegador intentará cargar el archivo con el nombre exacto
        img.dataset.intento = "0";
        img.src = salas[i] + ".jpg";
    }

    function intentarRutaAlternativa(img) {
        let intento = parseInt(img.dataset.intento);
        const nombreBase = salas[salaActual];
        
        if (intento === 0) {
            img.dataset.intento = "1";
            img.src = nombreBase.replace(/\s/g, "") + ".jpg"; // Sin espacios: SPA.jpg
        } else if (intento === 1) {
            img.dataset.intento = "2";
            img.src = nombreBase.toLowerCase() + ".jpg"; // Minúsculas: spa.jpg
        } else {
            const st = document.getElementById('status');
            st.innerHTML = `<span style="color:red">ERROR</span><br>Falta el archivo:<br><b>${nombreBase}.jpg</b>`;
        }
    }

    // El evento onload de la imagen para mostrarla si carga bien
    document.getElementById('webcam-img').onload = function() {
        this.style.display = "block";
        document.getElementById('status').style.display = "none";
    };

    function chatear() {
        const input = document.getElementById('msg');
        if(!input.value.trim()) return;
        document.getElementById('logs').innerHTML += `<div style="text-align:right; margin-bottom:20px; color:var(--oro)"><b>Tú:</b> ${input.value}</div>`;
        
        setTimeout(() => {
            const girls = ["MIA", "TANIA", "COLO"];
            hablar(girls[Math.floor(Math.random()*3)], "¡Hola guapo! ¿Te gusta nuestra nueva altura?");
        }, 1000);
        
        input.value = "";
        document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;
    }

    function hablar(n, m) {
        const logs = document.getElementById('logs');
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        logs.innerHTML += `<div style="margin-bottom:20px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        logs.scrollTop = logs.scrollHeight;
    }

    function subir() { alert("Subida rápida habilitada."); }
    function pago(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
