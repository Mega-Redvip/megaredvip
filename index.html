<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | OFICIAL</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-azul: #00d9ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER: Logo Gigante Proporcional */
        header { height: 180px; background: #000; border-bottom: 5px solid var(--oro); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .logo-box { flex: 2; display: flex; justify-content: center; }
        .logo-img { height: 150px; width: auto; filter: drop-shadow(0 0 20px var(--oro)); object-fit: contain; } /* LOGO MUCHO MÁS GRANDE */
        
        .coin-box { flex: 1; display: flex; gap: 10px; justify-content: flex-end; }
        .coin { width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle, #fff9aa, var(--oro)); border: 3px solid #444; color: #000; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 0 15px rgba(212,175,55,0.5); }

        /* CONTENIDO */
        .main { display: flex; height: calc(100vh - 180px); padding: 15px; gap: 15px; }
        
        /* SALAS IZQUIERDA */
        .rooms { width: 260px; background: #0a0a0a; border: 1px solid #333; border-radius: 15px; overflow-y: auto; padding: 15px; }
        .p-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #444; color: #888; cursor: pointer; border-radius: 8px; text-align: left; font-size: 11px; text-transform: uppercase; }
        .p-btn.active { border-color: var(--oro); color: var(--oro); background: #221a00; border-width: 2px; }

        /* CENTRO: VISOR Y MURO */
        .center { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .visor { flex: 2.5; background: #000; border: 2px solid #1a1a1a; border-radius: 20px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #main-view { width: 100%; height: 100%; object-fit: cover; } /* Forzamos a que llene el visor */
        
        .muro { flex: 1; background: #050505; border: 1px solid #222; border-radius: 15px; padding: 15px; }
        .muro-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .up-btn { padding: 12px; border: 2px solid; background: transparent; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 11px; }

        /* DERECHA: CHICAS Y CHAT */
        .right { width: 340px; display: flex; flex-direction: column; gap: 15px; }
        .girls { display: flex; gap: 8px; height: 140px; }
        .g-img { width: 33.3%; height: 100%; object-fit: cover; border: 2px solid var(--oro); border-radius: 10px; }
        
        .chat { flex: 1; background: #020202; border: 1px solid #333; border-radius: 15px; padding: 15px; overflow-y: auto; font-size: 13px; }
        .msg { margin-bottom: 10px; border-left: 4px solid; padding-left: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--n-rojo); font-size:12px; font-weight:bold;">🔴 VIP LIVE<br>14,520 ONLINE</div>
    <div class="logo-box"><img src="Logo Mega Red Lunar.jpg" class="logo-img" alt="MEGA RED VIP"></div>
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main">
    <div class="rooms" id="rooms-list"></div>
    <div class="center">
        <div class="visor"><img id="main-view" src=""></div>
        <div class="muro">
            <div class="muro-btns">
                <button class="up-btn" style="color:var(--n-rojo); border-color:var(--n-rojo);" onclick="alert('Abriendo cámara...')">📹 VÍDEO</button>
                <button class="up-btn" style="color:var(--n-verde); border-color:var(--n-verde);" onclick="alert('Escribiendo estado...')">✍️ ESTADO</button>
                <button class="up-btn" style="color:var(--n-azul); border-color:var(--n-azul);" onclick="alert('Seleccionando fotos...')">📸 HISTORIA</button>
            </div>
            <div id="muro-info" style="color:#444; font-size:11px; text-align:center; padding-top:10px;">COMUNIDAD VIP ACTIVA EN RESISTENCIA</div>
        </div>
    </div>
    <div class="right">
        <div class="girls">
            <img src="Rubia.jpg" class="g-img"><img src="Morocha.jpg" class="g-img"><img src="Pelirroja.jpg" class="g-img">
        </div>
        <div class="chat" id="chat-box"></div>
    </div>
</div>

<script>
    let idx = 0;
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((name, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.innerHTML = `🚪 ${name.toUpperCase()}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        addChat("SISTEMA", "📍 CONEXIÓN VIP ESTABLECIDA EN RESISTENCIA", "#d4af37");
        setTimeout(() => addChat("MIA", "🔥 ¿Hay algún socio de **Resistencia** conectado ahora? ¡Manden tokens!", "#00ff66"), 3000);
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 20000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        const img = document.getElementById('main-view');
        // Usamos ruta relativa "./" para asegurar que GitHub encuentre las fotos en la misma carpeta
        img.src = "./" + rooms[idx] + ".jpg";
        img.onerror = () => { img.src = "https://via.placeholder.com/800x600/000/d4af37?text=" + rooms[idx]; };
    }

    function addChat(user, txt, color) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg" style="border-color:${color}"><b>${user}:</b> ${txt}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function pay(n) {
        // LINK DE PAYPAL CORREGIDO (Sin errores de sesión)
        window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&item_name=TOKENS_VIP&amount=${n}&currency_code=USD`, '_blank');
    }

    init();
</script>
</body>
</html>
