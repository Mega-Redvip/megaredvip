<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v80</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            overflow-x: hidden;
        }

        /* HEADER: LOGO GIGANTE Y ADS LATERALEZ */
        header { 
            display: grid; grid-template-columns: 350px 1fr 350px; 
            padding: 20px; border-bottom: 5px solid var(--n-rojo); 
            background: #050505; align-items: center;
        }
        .publi-box { 
            width: 350px; height: 180px; border: 2px solid var(--n-rojo); 
            display: flex; align-items: center; justify-content: center; 
            color: var(--n-rojo); font-size: 22px; background: #0a0a0a;
        }
        .logo-center img { height: 280px; filter: drop-shadow(0 0 35px var(--n-rojo)); }
        
        /* MONEDAS BAJAS Y ELEGANTES */
        .coins-row { 
            grid-column: 1 / span 3; display: flex; justify-content: center; 
            gap: 40px; margin-top: 15px; padding-bottom: 15px;
        }
        .coin { 
            width: 75px; height: 75px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; border: 3px solid white; transition: 0.3s;
        }

        /* NIVEL 1: SALAS Y LAS BOTS */
        .level-1 { display: grid; grid-template-columns: 300px 1fr; gap: 15px; padding: 20px; }
        
        .rooms-grid { 
            background: #0a0a0a; border: 2px solid #222; border-radius: 12px; padding: 10px;
            display: flex; flex-direction: column; height: 500px;
        }
        .rooms-list-scroll { flex-grow: 1; overflow-y: hidden; display: flex; flex-direction: column; gap: 5px; }
        
        .room-unit { 
            display: flex; justify-content: space-between; padding: 10px; background: #111; 
            border: 1px solid #333; border-radius: 5px; cursor: pointer; font-size: 11px;
        }
        .room-unit.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 10px var(--n-rojo); }

        /* LAS BOTS: MIA, TANIA Y COLO */
        .avatars-battle { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; height: 500px; }
        .avatar-card { border: 3px solid #222; border-radius: 15px; overflow: hidden; background: #000; position: relative; }
        .avatar-card img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .name-tag { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); text-align: center; padding: 10px; font-size: 15px; font-weight: 900; }

        /* NIVEL 2: VISOR Y CHAT REAL */
        .level-2 { display: grid; grid-template-columns: 1fr 450px; gap: 15px; padding: 20px; height: 500px; }
        .viewer-box { border: 5px solid var(--n-rojo); border-radius: 15px; background: #000; overflow: hidden; }
        #room-img { width: 100%; height: 100%; object-fit: contain; }

        .chat-box { 
            background: #050505; border: 4px solid var(--n-rojo); border-radius: 15px; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        #chat-content { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        /* LAS TRES PUERTAS */
        .level-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; border-top: 5px solid var(--n-rojo); }
        .gate-door { background: #0a0a0a; border: 2px solid var(--n-rojo); border-radius: 15px; padding: 15px; text-align: center; }
        .gate-display { height: 200px; background: #000; margin-bottom: 10px; overflow-y: auto; padding: 5px; text-align: left; }

        /* BOTÓN ALI NEÓN */
        .btn-ali-vip {
            background: #000; color: #fff; border: 3px solid var(--n-rojo);
            padding: 15px; text-align: center; text-decoration: none; font-size: 13px;
            font-weight: 900; margin-top: 10px; display: block; border-radius: 8px;
            box-shadow: 0 0 20px var(--n-rojo); animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body onload="initImperio()">

<header>
    <div class="publi-box">ADS VIP $50</div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="publi-box">ADS VIP $100</div>
    <div class="coins-row">
        <div class="coin" onclick="irAPagar(1)">$1</div>
        <div class="coin" onclick="irAPagar(5)">$5</div>
        <div class="coin" onclick="irAPagar(10)">$10</div>
        <div class="coin" onclick="irAPagar(20)">$20</div>
    </div>
</header>

<div class="level-1">
    <div class="rooms-grid">
        <div class="rooms-list-scroll" id="rooms-list"></div>
        <a href="https://best.aliexpress.com/" target="_blank" class="btn-ali-vip">🛒 COMPRAR JUGUETES VIP 🔞</a>
    </div>
    <div class="avatars-battle">
        <div class="avatar-card"><img src="Rubia.jpg"><div class="name-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="avatar-card"><img src="Morocha.jpg"><div class="name-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="avatar-card"><img src="Pelirroja.jpg"><div class="name-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
</div>

<div class="level-2">
    <div class="viewer-box"><img id="room-img" src=""></div>
    <div class="chat-box">
        <div id="chat-content"></div>
        <div style="display:flex; padding:15px; gap:10px; background:#111;">
            <input type="text" id="msg-in" placeholder="Escríbeles algo..." style="flex-grow:1; background:#000; border:1px solid var(--n-rojo); color:white; padding:12px; border-radius:5px;">
            <button onclick="enviarChat()" style="background:var(--n-rojo); color:white; border:none; padding:12px 20px; cursor:pointer; font-weight:bold; border-radius:5px;">OK</button>
        </div>
    </div>
</div>

<div class="level-3">
    <div class="gate-door"><h4 style="color:var(--n-rosa)">HISTORIAS</h4><div class="gate-display" id="d-h"></div><button onclick="subir('d-h')">SUBIR</button></div>
    <div class="gate-door"><h4 style="color:var(--n-azul)">ESTADOS</h4><div class="gate-display" id="d-e"></div><button onclick="subir('d-e')">SUBIR</button></div>
    <div class="gate-door"><h4 style="color:var(--n-rojo)">VIDEOS VIP</h4><div class="gate-display" id="d-v"></div><button onclick="subir('d-v')">SUBIR</button></div>
</div>

<script>
    let pos = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg"}, {n: "Spa", e: ".png"}, {n: "Biblioteca", e: ".png"}, 
        {n: "Camarera", e: ".png"}, {n: "Discoteca", e: ".png"}, {n: "El Bar", e: ".png"},
        {n: "Gimnasio", e: ".png"}, {n: "Oficina", e: ".png"}, {n: "Playa", e: ".png"}, {n: "La Tiendita", e: ".png"}
    ];

    function initImperio() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const d = document.createElement('div');
            d.className = 'room-unit'; d.id = 'u-' + i;
            d.innerHTML = `<span>${r.n}</span><span style="color:var(--n-azul)">LIVE</span>`;
            d.onclick = () => select(i);
            list.appendChild(d);
        });
        select(0);
        setInterval(() => { pos = (pos + 1) % rooms.length; select(pos); }, 6000);
        setInterval(autoChat, 5000);
    }

    function select(i) {
        pos = i;
        document.querySelectorAll('.room-unit').forEach(x => x.classList.remove('active'));
        document.getElementById('u-' + i).classList.add('active');
        document.getElementById('room-img').src = encodeURI(rooms[i].n + rooms[i].e);
    }

    function enviarChat() {
        const input = document.getElementById('msg-in');
        const chat = document.getElementById('chat-content');
        if(!input.value) return;

        chat.innerHTML += `<div><b style="color:var(--oro)">CLIENTE:</b> ${input.value}</div>`;
        const val = input.value.toLowerCase();
        
        setTimeout(() => {
            let r = "¿Me vas a invitar una moneda o solo quieres hablar?";
            if(val.includes("hola")) r = "¡Hola guapo! ¿Te gusta mi sala?";
            if(val.includes("juguete")) r = "Mira mis juguetes en el botón rojo de la izquierda...";
            chat.innerHTML += `<div><b style="color:var(--n-rojo)">COLO:</b> ${r}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 1000);
        
        input.value = "";
        chat.scrollTop = chat.scrollHeight;
    }

    function autoChat() {
        const chat = document.getElementById('chat-content');
        const msgs = ["¿Miran mis historias abajo?", "Mia está muy callada hoy...", "¿Alguien me invita un trago?"];
        chat.innerHTML += `<div><b style="color:var(--n-rosa)">MIA:</b> ${msgs[Math.floor(Math.random()*3)]}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    function subir(id) {
        const val = prompt("Escribe o pega link:");
        if(val) document.getElementById(id).innerHTML = `<div style="border-bottom:1px solid #333; margin-bottom:5px;">${val}</div>` + document.getElementById(id).innerHTML;
    }

    function irAPagar(monto) {
        window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&item_name=VIP&amount=${monto}&currency_code=USD`, "_blank");
    }
</script>
</body>
</html>
