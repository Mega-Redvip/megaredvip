<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v67</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            overflow-y: auto; overflow-x: hidden;
        }

        /* HEADER: LOGO Y MONEDAS ORIGINALES */
        header { 
            display: grid; grid-template-columns: 350px 1fr 350px; 
            align-items: center; padding: 20px; border-bottom: 5px solid var(--n-rojo); 
            background: #050505;
        }
        .header-side { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .publi-box { width: 300px; height: 100px; border: 2px solid var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 12px; }
        .logo-center img { height: 280px; filter: drop-shadow(0 0 30px var(--n-rojo)); }
        .coins { display: flex; gap: 20px; margin-top: 10px; }
        .coin { 
            width: 75px; height: 75px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 3px solid white;
        }

        /* DISEÑO DE TRES COLUMNAS */
        .main-layout { 
            display: grid; grid-template-columns: 300px 1fr 500px; 
            gap: 20px; padding: 25px; align-items: start;
        }

        /* 1. LISTADO DE SALAS (IZQUIERDA) */
        .rooms-sidebar { 
            background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 15px; 
            display: flex; flex-direction: column; gap: 8px;
        }
        .room-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px;
            cursor: pointer; transition: 0.2s; font-size: 11px;
        }
        .room-row:hover { border-color: var(--n-rojo); }
        .room-row.active { background: var(--n-rojo); color: white; font-weight: 900; box-shadow: 0 0 10px var(--n-rojo); }
        .user-count { color: var(--n-azul); font-weight: 900; background: #000; padding: 2px 8px; border-radius: 10px; font-size: 10px; }

        /* 2. VISOR Y CHAT (CENTRO) */
        .center-content { display: flex; flex-direction: column; gap: 20px; }
        .display-and-chat { display: grid; grid-template-columns: 1fr 350px; gap: 15px; height: 500px; }
        
        .main-screen { border: 4px solid var(--n-rojo); border-radius: 15px; overflow: hidden; background: #000; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }

        .chat-container { 
            background: #050505; border: 2px solid var(--n-rojo); border-radius: 15px; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        #chat-stream { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
        .chat-input { display: flex; padding: 10px; background: #111; gap: 5px; }
        .chat-input input { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 8px; border-radius: 5px; }
        .chat-input button { background: var(--n-rojo); border: none; color: white; padding: 0 15px; border-radius: 5px; cursor: pointer; font-weight: 900; }

        /* 3. BOTS (DERECHA - CUERPO COMPLETO SIN BORDES) */
        .bots-column { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; height: 500px; }
        .bot-box { display: flex; flex-direction: column; height: 100%; }
        .bot-img-wrap { 
            flex-grow: 1; border: 2px solid #222; border-radius: 10px; overflow: hidden; background: #000;
        }
        .bot-img-wrap img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* LLENA EL RECUADRO ELIMINANDO BORDES NEGROS */
            object-position: top center; 
        }
        .bot-name { text-align: center; padding: 5px; font-size: 12px; font-weight: 900; text-transform: uppercase; }

        /* MENSAJES */
        .m-bot { color: var(--n-rosa); border-bottom: 1px solid #111; padding-bottom: 5px; }
        .m-user { color: var(--oro); font-weight: 900; }

        /* MUROS INFERIORES */
        .bottom-walls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px; border-top: 5px solid var(--n-rojo); }
        .wall { background: #0a0a0a; border: 2px solid var(--n-rojo); border-radius: 15px; padding: 20px; text-align: center; }
        .wall-box { height: 200px; background: #000; margin-bottom: 15px; overflow-y: auto; padding: 10px; border-radius: 8px; }
        .wall button { width: 100%; padding: 10px; background: var(--n-rojo); color: white; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; }

    </style>
</head>
<body onload="init()">

<header>
    <div class="header-side"><div class="publi-box">AD VIP $20</div><div class="coins"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div></div></div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="header-side"><div class="publi-box">AD VIP $50</div><div class="coins"><div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div></div></div>
</header>

<div class="main-layout">
    <div class="rooms-sidebar" id="rooms-list"></div>

    <div class="center-content">
        <div class="display-and-chat">
            <div class="main-screen"><img id="main-view" src=""></div>
            <div class="chat-container">
                <div id="chat-stream"></div>
                <div class="chat-input">
                    <input type="text" id="user-msg" placeholder="Habla con las IA...">
                    <button onclick="send()">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bots-column">
        <div class="bot-box"><div class="bot-img-wrap"><img src="Rubia.jpg"></div><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-box"><div class="bot-img-wrap"><img src="Morocha.jpg"></div><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-box"><div class="bot-img-wrap"><img src="Pelirroja.jpg"></div><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
</div>

<div class="bottom-walls">
    <div class="wall"><h3>📱 ESTADOS</h3><div class="wall-box" id="w-e"></div><button onclick="post('w-e')">SUBIR CONTENIDO</button></div>
    <div class="wall"><h3>📖 HISTORIAS</h3><div class="wall-box" id="w-h"></div><button onclick="post('w-h')">SUBIR CONTENIDO</button></div>
    <div class="wall"><h3>🎬 VIDEOS</h3><div class="wall-box" id="w-v"></div><button onclick="post('w-v')">SUBIR CONTENIDO</button></div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym.mp3"}, {n: "Oficina", e: ".png", s: "oficina.mp3"},
        {n: "Playa", e: ".png", s: "playa.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda.mp3"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const div = document.createElement('div');
            div.className = 'room-row'; div.id = 'r-' + i;
            div.innerHTML = `<span>${r.n}</span><span class="user-count">0 ONLINE</span>`;
            div.onclick = () => select(i);
            list.appendChild(div);
        });
        select(0);
        setInterval(() => { idx = (idx + 1) % rooms.length; select(idx); }, 8000);
        setInterval(botAuto, 6000);
    }

    function select(i) {
        idx = i;
        document.querySelectorAll('.room-row').forEach(b => b.classList.remove('active'));
        document.getElementById('r-' + i).classList.add('active');
        document.getElementById('main-view').src = encodeURI(rooms[i].n + rooms[i].e);
        const a = document.getElementById('audio-player');
        a.src = rooms[i].s; a.play().catch(()=>{});
    }

    function send() {
        const i = document.getElementById('user-msg');
        if(!i.value) return;
        document.getElementById('chat-stream').innerHTML += `<div class="m-user"><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
    }

    function botAuto() {
        const msgs = ["¡Hola guapo! ¿Qué tal la sala?", "¿Me invitas unas monedas?", "Acabo de subir un video, ¡míralo!", "¡Qué calor hace aquí! 🔥"];
        const bots = ["MIA", "TANIA", "COLO"];
        const b = bots[Math.floor(Math.random()*3)];
        document.getElementById('chat-stream').innerHTML += `<div class="m-bot"><b>${b}:</b> ${msgs[Math.floor(Math.random()*msgs.length)]}</div>`;
    }

    function post(id) {
        const url = prompt("Enlace de imagen o video (o escribe un mensaje):");
        if(url) {
            const box = document.getElementById(id);
            if(url.includes('http')) {
                box.innerHTML = `<img src="${url}" style="width:100%; border-radius:5px; margin-bottom:10px;">` + box.innerHTML;
            } else {
                box.innerHTML = `<p style="padding:5px; border-bottom:1px solid #222">${url}</p>` + box.innerHTML;
            }
        }
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
