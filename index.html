<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v86</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; }

        /* HEADER */
        header { display: grid; grid-template-columns: 300px 1fr 300px; padding: 10px; border-bottom: 4px solid var(--n-rojo); background: #050505; align-items: center; height: 320px; }
        .publi-box { width: 100%; height: 150px; border: 2px solid var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); background: #0a0a0a; box-shadow: inset 0 0 15px var(--n-rojo); }
        .logo-center { text-align: center; }
        .logo-center img { height: 250px; filter: drop-shadow(0 0 25px var(--n-rojo)); }
        
        .coins-row { grid-column: 1 / span 3; display: flex; justify-content: center; gap: 30px; margin-top: 10px; }
        .coin { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 3px solid white; }

        /* CUERPO PRINCIPAL */
        .main-container { display: grid; grid-template-columns: 300px 1fr 400px; gap: 10px; padding: 10px; height: calc(100vh - 350px); }
        
        .rooms-sidebar { background: #0a0a0a; border: 2px solid #222; border-radius: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; padding: 10px; }
        .room-unit { display: flex; justify-content: space-between; padding: 12px; background: #111; border: 1px solid #333; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .room-unit.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 10px var(--n-rojo); }

        .viewer-box { border: 4px solid var(--n-rojo); border-radius: 10px; background: #000; position: relative; overflow: hidden; }
        #room-img { width: 100%; height: 100%; object-fit: contain; }
        .loc-tag { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: var(--oro); padding: 5px 10px; border: 1px solid var(--oro); font-size: 11px; z-index: 5; }

        .chat-container { background: #050505; border: 3px solid var(--n-rojo); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        #chat-content { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .input-area { display: flex; padding: 10px; background: #111; gap: 5px; }
        #msg-in { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; }
        .btn-send { background: var(--n-rojo); color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="arrancarTodo()">

<header>
    <div class="publi-box">AD VIP $50</div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="publi-box">AD VIP $100</div>
    <div class="coins-row">
        <div class="coin" onclick="irAPagar(1)">$1</div>
        <div class="coin" onclick="irAPagar(5)">$5</div>
        <div class="coin" onclick="irAPagar(10)">$10</div>
        <div class="coin" onclick="irAPagar(20)">$20</div>
    </div>
</header>

<div class="main-container">
    <div class="rooms-sidebar" id="sidebar"></div>
    <div class="viewer-box">
        <div class="loc-tag" id="loc">📍 CONECTANDO...</div>
        <img id="room-img" src="">
    </div>
    <div class="chat-container">
        <div id="chat-content"></div>
        <div id="escribiendo" style="display:none; padding: 5px 15px; font-size: 11px; color: #666;">La chica está escribiendo...</div>
        <div class="input-area">
            <input type="text" id="msg-in" placeholder="Pregúntame lo que quieras...">
            <button class="btn-send" onclick="mandarMensaje()">OK</button>
        </div>
    </div>
</div>

<script>
    const salas = [
        {n: "Sado y Maso", e: ".jpg", b: "COLO", cl: "var(--n-rojo)"}, 
        {n: "Spa", e: ".png", b: "MIA", cl: "var(--n-rosa)"}, 
        {n: "Biblioteca", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Camarera", e: ".png", b: "MIA", cl: "var(--n-rosa)"},
        {n: "Discoteca", e: ".png", b: "COLO", cl: "var(--n-rojo)"},
        {n: "El Bar", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Gimnasio", e: ".png", b: "MIA", cl: "var(--n-rosa)"},
        {n: "Oficina", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Playa", e: ".png", b: "COLO", cl: "var(--n-rojo)"},
        {n: "La Tiendita", e: ".png", b: "MIA", cl: "var(--n-rosa)"}
    ];

    let indice = 0;
    let manual = false;
    let ciudad = "Resistencia";

    function arrancarTodo() {
        const side = document.getElementById('sidebar');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'room-unit'; d.id = 'r-' + i;
            d.innerHTML = `<span>${s.n}</span><span style="color:#555">👥 0</span>`;
            d.onclick = () => { manual = true; forzarSala(i); };
            side.appendChild(d);
        });

        document.getElementById('loc').innerText = `📍 TRANSMITIENDO DESDE: ${ciudad.toUpperCase()}`;
        actualizarVisual();
        
        // Carrusel automático cada 5 segundos
        setInterval(() => {
            if(!manual) {
                indice = (indice + 1) % salas.length;
                actualizarVisual();
            }
        }, 5000);
    }

    function forzarSala(i) {
        indice = i;
        actualizarVisual();
        const chat = document.getElementById('chat-content');
        chat.innerHTML = `<div style="text-align:center; color:gray; font-size:10px;">--- SESIÓN PRIVADA CON ${salas[indice].b} ---</div>`;
        iaResponde(`Hola lindo... te vi entrar a mi sala de ${salas[indice].n}. ¿Qué tal todo por ${ciudad}?`);
    }

    function actualizarVisual() {
        document.querySelectorAll('.room-unit').forEach(x => x.classList.remove('active'));
        document.getElementById('r-' + indice).classList.add('active');
        document.getElementById('room-img').src = encodeURI(salas[indice].n + salas[indice].e);
    }

    function mandarMensaje() {
        const input = document.getElementById('msg-in');
        const chat = document.getElementById('chat-content');
        if(!input.value) return;

        chat.innerHTML += `<div><b style="color:var(--oro)">TÚ:</b> ${input.value}</div>`;
        const t = input.value.toLowerCase();
        input.value = "";
        chat.scrollTop = chat.scrollHeight;

        let r = "Me gusta que me hables así... ¿por qué no me invitas una moneda y te enseño algo más?";
        if(t.includes("hola")) r = `¡Hola! Qué bueno encontrar a alguien de ${ciudad} por aquí.`;
        if(t.includes("nombre")) r = `Me llamo ${salas[indice].b}, pero mis amigos me dicen 'mi amor'. ¿Quieres ser mi amigo?`;
        if(t.includes("donde")) r = `Estoy en ${ciudad}, muy cerquita de ti... ven al privado.`;
        if(t.includes("ver") || t.includes("foto") || t.includes("desnud")) r = "Para eso necesito ver unas monedas doradas arriba... ¿te animas?";
        if(t.includes("precio") || t.includes("moneda") || t.includes("cuanto")) r = "Con 10 monedas hacemos lo que tú quieras. Dale al botón de arriba.";

        iaResponde(r);
    }

    function iaResponde(texto) {
        document.getElementById('escribiendo').style.display = "block";
        setTimeout(() => {
            document.getElementById('escribiendo').style.display = "none";
            const chat = document.getElementById('chat-content');
            chat.innerHTML += `<div><b style="color:${salas[indice].cl}">${salas[indice].b}:</b> ${texto}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 1200);
    }

    function irAPagar(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&item_name=VIP&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
