<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v115</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; min-width: 1400px; }

        /* 1. CABEZAL SUPREMO */
        header { 
            display: grid; grid-template-columns: 250px 120px 1fr 120px 250px; 
            padding: 30px; background: #050505; border-bottom: 8px solid var(--n-rojo);
            align-items: center; gap: 20px;
        }
        .pub-rect { height: 180px; border: 4px dashed var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 18px; border-radius: 20px; text-shadow: 0 0 10px var(--n-rojo); }
        .logo-box img { width: 100%; max-height: 400px; object-fit: contain; filter: drop-shadow(0 0 50px var(--n-rojo)); }
        
        .coin-col { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .coin { 
            width: 100px; height: 100px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 30px; cursor: pointer; border: 6px solid white;
            box-shadow: 0 0 30px var(--oro); transition: 0.2s;
        }

        /* 2. SALAS Y VISOR (MÁXIMA ALTURA) */
        .mid-section { display: grid; grid-template-columns: 320px 1fr; gap: 20px; padding: 25px; height: 600px; }
        .rooms-list { display: flex; flex-direction: column; gap: 8px; background: #0a0a0a; border: 4px solid #222; border-radius: 25px; padding: 15px; }
        .room-btn { 
            flex: 1; padding: 0 20px; background: #111; border-radius: 12px; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
            border: 2px solid #444; font-size: 16px; color: white;
        }
        .room-btn.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 20px var(--n-rojo); }

        .viewer { border: 10px solid var(--n-rojo); border-radius: 40px; background: #000; overflow: hidden; position: relative; }
        #sala-img-main { width: 100%; height: 100%; object-fit: cover; display: block; }
        .tienda-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 30px 60px; background: var(--n-rojo); color: white; font-size: 35px; border-radius: 80px; border: 6px solid white; display: none; text-decoration: none; box-shadow: 0 0 70px var(--n-rojo); z-index: 100; }

        /* 3. BOTS GIGANTES (+3CM) Y CHAT ACHICADO (MITAD) */
        .interact-section { display: grid; grid-template-columns: 1fr 250px; gap: 25px; padding: 0 25px 25px; height: 1100px; }
        
        .bots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .bot-card { position: relative; background: #050505; border: 5px solid #222; border-radius: 35px; overflow: hidden; }
        .bot-card img { width: 100%; height: 100%; object-fit: contain; image-rendering: -webkit-optimize-contrast; }
        .bot-name { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, #000 50%, transparent); text-align: center; padding: 40px 10px 25px; font-size: 35px; font-weight: 900; }

        /* CHAT ACHICADO A LA MITAD */
        .chat-sidebar { background: #050505; border: 8px solid var(--n-rojo); border-radius: 35px; display: flex; flex-direction: column; }
        #chat-window { flex-grow: 1; padding: 25px; overflow-y: auto; font-size: 14px; font-family: sans-serif; }
        .chat-footer { padding: 15px; background: #111; display: flex; flex-direction: column; gap: 10px; border-radius: 0 0 30px 30px; }
        #chat-input { background: #000; border: 2px solid var(--n-rojo); color: white; padding: 12px; border-radius: 10px; outline: none; }

        /* 4. PUERTAS FINALES */
        .footer-gates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 25px; border-top: 10px solid var(--n-rojo); }
        .gate-card { background: #0a0a0a; border: 4px solid #333; border-radius: 25px; padding: 20px; text-align: center; }
        .gate-pre { height: 160px; background: #000; margin-bottom: 15px; border-radius: 20px; overflow: hidden; border: 2px solid #222; }
        .gate-pre img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onload="main()">

<header>
    <div class="pub-rect">PUBLICIDAD $50</div>
    <div class="coin-col"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <div class="logo-box" style="text-align:center;"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="coin-col"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="pub-rect">PUBLICIDAD $100</div>
</header>

<div class="mid-section">
    <div class="rooms-list" id="rooms-container"></div>
    <div class="viewer">
        <img id="sala-img-main" src="">
        <a href="https://best.aliexpress.com/" target="_blank" class="tienda-overlay" id="tienda-link">🔱 TIENDITA VIP 🔱</a>
    </div>
</div>

<div class="interact-section">
    <div class="bots-grid">
        <div class="bot-card"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-card"><img src="Morocha.jpg"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-card"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-sidebar">
        <div id="chat-window"></div>
        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Diles algo..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:10px; border-radius:10px; cursor:pointer; font-weight:bold;">ENVIAR OK</button>
        </div>
    </div>
</div>

<div class="footer-gates">
    <div class="gate-card"><h3 style="color:var(--n-rosa)">HISTORIAS</h3><div class="gate-pre" id="b-h"></div><button style="width:100%; padding:15px; background:var(--n-rosa); color:white; border:none; border-radius:15px; cursor:pointer; font-weight:bold;" onclick="up('b-h')">SUBIR ARCHIVO</button></div>
    <div class="gate-card"><h3 style="color:var(--n-azul)">ESTADOS</h3><div class="gate-pre" id="b-e"></div><button style="width:100%; padding:15px; background:var(--n-azul); color:white; border:none; border-radius:15px; cursor:pointer; font-weight:bold;" onclick="up('b-e')">SUBIR ARCHIVO</button></div>
    <div class="gate-card"><h3 style="color:var(--n-rojo)">VIDEOS</h3><div class="gate-pre" id="b-v"></div><button style="width:100%; padding:15px; background:var(--n-rojo); color:white; border:none; border-radius:15px; cursor:pointer; font-weight:bold;" onclick="up('b-v')">SUBIR ARCHIVO</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function main() {
        const container = document.getElementById('rooms-container');
        salas.forEach((s, i) => {
            let div = document.createElement('div');
            div.className = 'room-btn'; div.id = 'room-'+i;
            div.innerHTML = `<b>${s}</b><span style="color:lime; font-size:12px;">● LIVE</span>`;
            div.onclick = () => ver(i);
            container.appendChild(div);
        });
        ver(0);
        mensaje("MIA", "Hola bombón... bienvenida al Imperio. ¿Viste qué gatas estamos hoy?");
    }

    function ver(i) {
        document.querySelectorAll('.room-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('room-'+i).classList.add('active');
        const img = document.getElementById('sala-img-main');
        const btn = document.getElementById('tienda-link');
        
        if(salas[i] === "LA TIENDITA") {
            btn.style.display = 'block'; img.style.opacity = '0.2';
        } else {
            btn.style.display = 'none'; img.style.opacity = '1';
            // IMPORTANTE: El archivo debe llamarse exactamente igual (ej: SPA.jpg)
            img.src = salas[i] + ".jpg";
        }
    }

    function up(id) {
        const url = prompt("Pega el enlace de la imagen:");
        if(url) document.getElementById(id).innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function enviar() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        document.getElementById('chat-window').innerHTML += `<div style="text-align:right; color:var(--oro); margin-bottom:15px;"><b>Tú:</b> ${input.value}</div>`;
        input.value = "";
        setTimeout(() => { mensaje("TANIA", "No seas tacaño amor, mandame una moneda."); }, 1200);
    }

    function mensaje(n, m) {
        const win = document.getElementById('chat-window');
        const col = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        win.innerHTML += `<div style="margin-bottom:15px;"><b style="color:${col}">${n}:</b> ${m}</div>`;
        win.scrollTop = win.scrollHeight;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
