<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO 3D</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; 
            --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-y: auto; min-height: 100vh; display: flex; flex-direction: column; }

        /* HEADER REORGANIZADO */
        header { 
            height: 400px; background: #000; border-bottom: 6px solid var(--oro); 
            display: grid; grid-template-columns: 300px 1fr 300px; align-items: center; 
            padding: 20px 40px; position: relative;
        }

        /* COLUMNAS LATERALES (PUBLICIDAD + MONEDAS) */
        .header-side { display: flex; flex-direction: column; align-items: center; gap: 20px; }

        .ads-box {
            width: 250px; height: 140px; border: 3px dashed #333; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: #555; font-size: 12px; text-align: center; background: #050505;
        }

        /* MONEDAS 3D REALISTAS DEBAJO DE PUBLICIDAD */
        .coin-pair { display: flex; gap: 15px; }
        .coin { 
            width: 75px; height: 75px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 40%, #5c4928); 
            border: 3px solid #111; color: #000; font-size: 20px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: 900; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.8), inset 0 -3px 5px rgba(0,0,0,0.5);
            transition: 0.1s;
        }
        .coin:active { transform: translateY(4px); box-shadow: 0 4px 8px rgba(0,0,0,0.9); }

        /* LOGO CENTRAL TOTALMENTE LIBRE */
        .logo-center { display: flex; justify-content: center; align-items: center; }
        .logo-img { height: 320px; filter: drop-shadow(0 0 40px var(--oro)); object-fit: contain; }

        /* ESTRUCTURA DE LA PÁGINA (IGUAL A TU DISEÑO) */
        .main-app { display: grid; grid-template-columns: 350px 1fr 400px; gap: 20px; padding: 25px; }
        .rooms-panel { background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 15px; }
        .room-item { 
            display: flex; align-items: center; gap: 10px; background: #111; border: 1px solid #333; 
            border-radius: 10px; padding: 10px; margin-bottom: 8px; cursor: pointer;
        }
        .room-item.active { background: #fff; color: #000; }
        .room-thumb { width: 70px; height: 50px; border-radius: 5px; object-fit: cover; }

        .visor { 
            background: #000; border: 5px solid #1a1a1a; border-radius: 20px; 
            height: 500px; display: flex; align-items: center; justify-content: center; position: relative; 
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        .sala-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; border: 1px solid var(--n-turq); z-index: 10; }

        .chat-area { background: #020202; border: 2px solid #222; border-radius: 15px; padding: 15px; height: 350px; overflow-y: auto; }
        .bottom-walls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; }
        .wall { background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 10px; height: 200px; overflow-y: auto; }
        .up-btn { width: 100%; padding: 10px; margin-top: 5px; background: #1a1a1a; color: var(--oro); border: 1px solid var(--oro); cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="header-side">
        <div class="ads-box">PUBLICITE AQUÍ</div>
        <div class="coin-pair">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(3)">$3</div>
        </div>
    </div>

    <div class="logo-center">
        <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    </div>

    <div class="header-side">
        <div class="ads-box">PUBLICITE AQUÍ</div>
        <div class="coin-pair">
            <div class="coin" onclick="pay(5)">$5</div>
            <div class="coin" onclick="pay(10)">$10</div>
        </div>
    </div>
</header>

<div class="main-app">
    <div id="rooms-list" class="rooms-panel">
        <h3 style="color:var(--oro); margin-bottom:15px;">🚪 SALAS MEGA RED</h3>
    </div>

    <div class="visor">
        <div class="sala-tag">
            📍 <span id="s-nom">SALA</span> | 👤 <span id="s-users">0</span> ONLINE
        </div>
        <img id="main-view" src="">
    </div>

    <div class="right-panel">
        <div style="display:flex; gap:5px; margin-bottom:10px; height:100px;">
            <img src="Rubia.jpg" style="flex:1; border-radius:10px; object-fit:cover;">
            <img src="Morocha.jpg" style="flex:1; border-radius:10px; object-fit:cover;">
            <img src="Pelirroja.jpg" style="flex:1; border-radius:10px; object-fit:cover;">
        </div>
        <div id="chat-stream" class="chat-area"></div>
    </div>
</div>

<div class="bottom-walls">
    <div class="wall-box">
        <div class="wall" id="wall-h"><b>📖 HISTORIAS VIP</b><br></div>
        <button class="up-btn">📤 SUBIR HISTORIA</button>
    </div>
    <div class="wall-box">
        <div class="wall" id="wall-v"><b>🎬 VIDEOS PRIVADOS</b><br></div>
        <button class="up-btn">📤 SUBIR VIDEO</button>
    </div>
    <div class="wall-box">
        <div class="wall" id="wall-e"><b>📱 ESTADOS HOT</b><br></div>
        <button class="up-btn">📤 SUBIR ESTADO</button>
    </div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let idx = 0;
    // CONFIGURACIÓN DE SALAS Y SUS SONIDOS
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, 
        {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, 
        {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, 
        {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym_movimiento.mp3"}, 
        {n: "La Tiendita", e: ".png", s: "tienda_musica.mp3"}, 
        {n: "Oficina", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Playa", e: ".png", s: "playa_olas.mp3"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const d = document.createElement('div');
            d.className = 'room-item'; d.id = 'r-'+i;
            d.innerHTML = `<img src="${encodeURI(r.n+r.e)}" class="room-thumb"> <span>${r.n}</span>`;
            d.onclick = () => { idx = i; refresh(); };
            list.appendChild(d);
        });
        refresh();
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 8000);
        setInterval(botChat, 3000);
    }

    function refresh() {
        document.querySelectorAll('.room-item').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        const r = rooms[idx];
        document.getElementById('s-nom').innerText = r.n.toUpperCase();
        document.getElementById('main-view').src = encodeURI(r.n + r.e);
        document.getElementById('s-users').innerText = 100 + Math.floor(Math.random()*500);

        // CAMBIO DE SONIDO
        const player = document.getElementById('audio-player');
        player.src = r.s;
        player.play().catch(e => console.log("Esperando interacción para audio"));
    }

    function botChat() {
        const chat = document.getElementById('chat-stream');
        const msgs = ["🔞 Show privado en 2 min!", "🔥 Chequeen mi muro!", "💎 Tokens para baile hot"];
        const n = ["MIA", "TANIA", "COLO", "Admin_VIP"][Math.floor(Math.random()*4)];
        chat.innerHTML += `<div style="margin-bottom:5px; font-size:12px; border-left:3px solid var(--oro); padding-left:5px;"><b>${n}:</b> ${msgs[Math.floor(Math.random()*3)]}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
