<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v100</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 2fr 1fr; 
            padding: 20px; align-items: center; gap: 20px; background: #050505; border-bottom: 5px solid var(--n-rojo);
        }
        .publi-box { width: 100%; height: 100px; border: 3px dashed var(--n-rojo); display: flex; align-items: center; justify-content: center; background: #0a0a0a; color: var(--n-rojo); font-size: 16px; text-align: center; }
        .logo-box img { width: 100%; max-height: 200px; object-fit: contain; filter: drop-shadow(0 0 20px var(--n-rojo)); }
        .coin { width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; cursor: pointer; border: 4px solid white; }

        /* SECCIÓN SALAS */
        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 20px; }
        .sidebar { background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 15px; }
        .room-item { 
            padding: 10px; background: #151515; border-radius: 8px; margin-bottom: 8px; 
            cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #222;
        }
        .room-item.active { background: var(--n-rojo); border-color: white; }
        .room-item span { font-size: 12px; }

        /* VISOR DE SALAS */
        .viewer { border: 5px solid var(--n-rojo); border-radius: 15px; height: 450px; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #room-display { width: 100%; height: 100%; object-fit: cover; }

        /* PANEL BOTS AGRANDADO Y NÍTIDO */
        .interaction { display: grid; grid-template-columns: 1fr 450px; gap: 20px; padding: 0 20px 20px; }
        .bot-frame { display: grid; grid-template-columns: repeat(3, 1fr); height: 580px; border: 4px solid #222; border-radius: 20px; overflow: hidden; background: #000; }
        .bot-col { position: relative; border-right: 2px solid #222; background: #080808; }
        .bot-col img { 
            width: 100%; height: 100%; object-fit: contain; 
            filter: contrast(1.1) brightness(1.1); /* Mejora de nitidez visual */
        }
        .bot-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); text-align: center; padding: 15px; font-size: 20px; font-weight: 900; }

        /* CHAT */
        .chat-box { background: #050505; border: 4px solid var(--n-rojo); border-radius: 20px; height: 580px; display: flex; flex-direction: column; }
        #chat-window { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .chat-bar { display: flex; padding: 15px; background: #111; gap: 10px; }
        #chat-input { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 12px; border-radius: 5px; outline: none; }

        /* LAS TRES PUERTAS (SISTEMA DE CARGA) */
        .gates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; background: #050505; border-top: 5px solid var(--n-rojo); }
        .gate { background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 15px; text-align: center; }
        .gate-view { height: 140px; background: #000; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        .gate-view img { width: 100%; height: 100%; object-fit: cover; }
        .btn-gate { width: 100%; padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<header>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="publi-box">ADS VIP</div>
        <div style="display:flex; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    </div>
    <div class="logo-box"><img src="Logo Mega Red Lunar.jpg"></div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="publi-box">ADS VIP</div>
        <div style="display:flex; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    </div>
</header>

<div class="main-layout">
    <div class="sidebar" id="room-list"></div>
    <div class="viewer"><img id="room-display" src=""></div>
</div>

<div class="interaction">
    <div class="bot-frame">
        <div class="bot-col"><img src="Rubia.jpg"><div class="bot-label" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-col"><img src="Morocha.jpg"><div class="bot-label" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-col"><img src="Pelirroja.jpg"><div class="bot-label" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-box">
        <div id="chat-window"></div>
        <div class="chat-bar">
            <input type="text" id="chat-input" placeholder="Diles algo sensual..." onkeypress="if(event.key==='Enter') hablar()">
            <button onclick="hablar()" style="background:var(--n-rojo); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="gates">
    <div class="gate"><h4 style="color:var(--n-rosa); margin-bottom:5px;">HISTORIAS</h4><div class="gate-view" id="v-h"></div><button class="btn-gate" style="background:var(--n-rosa)" onclick="upload('v-h')">SUBIR</button></div>
    <div class="gate"><h4 style="color:var(--n-azul); margin-bottom:5px;">ESTADOS</h4><div class="gate-view" id="v-e"></div><button class="btn-gate" style="background:var(--n-azul)" onclick="upload('v-e')">SUBIR</button></div>
    <div class="gate"><h4 style="color:var(--n-rojo); margin-bottom:5px;">VIDEOS</h4><div class="gate-view" id="v-v"></div><button class="btn-gate" style="background:var(--n-rojo)" onclick="upload('v-v')">SUBIR</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    
    function init() {
        const list = document.getElementById('room-list');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'room-item'; d.id = 'idx-'+i;
            d.innerHTML = `<span>${s}</span><span style="color:#555; font-size:9px;">0 ONLINE NOW</span>`;
            d.onclick = () => verSala(i);
            list.appendChild(d);
        });
        verSala(0);
        botMsg("MIA", "Hola bombón... aprovechá que estamos solas en Resistencia por ahora. ¿Quién te gusta más de las tres?");
    }

    function verSala(i) {
        if(salas[i] === "LA TIENDITA") { window.open("https://best.aliexpress.com/", "_blank"); return; }
        document.querySelectorAll('.room-item').forEach(x => x.classList.remove('active'));
        document.getElementById('idx-'+i).classList.add('active');
        // RECUERDA: El archivo debe llamarse exactamente "SPA.jpg", "EL BAR.jpg", etc.
        document.getElementById('room-display').src = encodeURIComponent(salas[i]) + ".jpg";
    }

    function upload(id) {
        const url = prompt("Pega el enlace de la imagen:");
        if(url) document.getElementById(id).innerHTML = `<img src="${url}">`;
    }

    function hablar() {
        const input = document.getElementById('chat-input');
        const txt = input.value.trim();
        if(!txt) return;
        document.getElementById('chat-window').innerHTML += `<div style="align-self:flex-end; color:var(--oro);"><b>Tú:</b> ${txt}</div>`;
        input.value = "";
        
        setTimeout(() => {
            const r = ["Ay que atrevido... me encantas.", "Tania es una gata de cuarta, quedate conmigo mejor.", "Apurate a mandarnos una moneda que nos estamos aburriendo...", "Soy la más gatona de Chaco y te lo puedo demostrar."];
            botMsg("TANIA", r[Math.floor(Math.random()*r.length)]);
        }, 1500);
    }

    function botMsg(n, m) {
        const win = document.getElementById('chat-window');
        const color = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        win.innerHTML += `<div><b style="color:${color}">${n}:</b> ${m}</div>`;
        win.scrollTop = win.scrollHeight;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
