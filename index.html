<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v68</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            overflow-y: auto; overflow-x: hidden;
        }

        /* HEADER: LOGO, AUSPICIANTES Y MONEDAS (INTOCTO) */
        header { 
            display: grid; grid-template-columns: 350px 1fr 350px; 
            align-items: center; padding: 20px; border-bottom: 5px solid var(--n-rojo); 
            background: #050505;
        }
        .header-side { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .publi-box { width: 300px; height: 100px; border: 2px solid var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 12px; }
        .logo-center img { height: 280px; filter: drop-shadow(0 0 30px var(--n-rojo)); }
        .coins { display: flex; gap: 20px; margin-top: 10px; }
        .coin { 
            width: 75px; height: 75px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 3px solid white;
        }

        /* FILA SUPERIOR: 10 SALAS + 3 IAS PELEANDO */
        .top-action-row { 
            display: grid; grid-template-columns: 300px 1fr; 
            gap: 15px; padding: 20px; height: 550px;
        }

        /* LISTA DE 10 SALAS */
        .rooms-sidebar { 
            background: #0a0a0a; border: 2px solid #222; border-radius: 12px; padding: 10px;
            display: grid; grid-template-rows: repeat(10, 1fr); gap: 5px;
        }
        .room-unit { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; background: #111; border: 1px solid #333; border-radius: 5px;
            cursor: pointer; font-size: 10px; text-transform: uppercase;
        }
        .room-unit.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 10px var(--n-rojo); }
        .online-tag { color: var(--n-azul); font-weight: 900; font-size: 9px; }

        /* LAS 3 IAS LADO A LADO (SIN RECUADROS NEGROS) */
        .ias-battle-zone { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .ia-card { position: relative; border: 2px solid #222; border-radius: 15px; overflow: hidden; background: #000; }
        .ia-card img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* ELIMINA EL RECUADRO NEGRO */
            object-position: top center; 
        }
        .ia-status { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8);
            padding: 10px; text-align: center; font-size: 12px; font-weight: 900;
        }

        /* FILA MEDIA: IMAGEN SALA + CHAT INTERACTIVO */
        .middle-row { 
            display: grid; grid-template-columns: 1fr 450px; 
            gap: 15px; padding: 0 20px 20px 20px; height: 450px;
        }
        .room-viewer { border: 4px solid var(--n-rojo); border-radius: 15px; overflow: hidden; background: #000; }
        #main-display { width: 100%; height: 100%; object-fit: contain; }

        /* CHAT DE LAS TRES */
        .chat-complex { 
            background: #050505; border: 3px solid var(--n-rojo); border-radius: 15px; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        #chat-flow { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-input { display: flex; padding: 10px; background: #111; gap: 5px; }
        .chat-input input { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; }
        .chat-input button { background: var(--n-rojo); border: none; color: white; padding: 0 15px; border-radius: 5px; cursor: pointer; font-weight: 900; }

        /* ESTILOS CHAT */
        .msg { font-size: 13px; padding: 5px; border-radius: 4px; }
        .msg b { text-transform: uppercase; margin-right: 5px; }

        /* MUROS (LAS TRES PUERTAS) */
        .bottom-gates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px; border-top: 5px solid var(--n-rojo); }
        .gate { background: #0a0a0a; border: 2px solid var(--n-rojo); border-radius: 20px; padding: 25px; text-align: center; }
        .gate h3 { margin-bottom: 15px; color: var(--oro); font-size: 1.5em; }
        .gate-content { height: 200px; background: #000; margin-bottom: 15px; border-radius: 10px; overflow-y: auto; padding: 10px; border: 1px solid #222; }
        .gate button { width: 100%; padding: 15px; background: var(--n-rojo); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 1em; }

    </style>
</head>
<body onload="startImperio()">

<header>
    <div class="header-side"><div class="publi-box">AD VIP $20</div><div class="coins"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div></div></div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg" alt="LOGO"></div>
    <div class="header-side"><div class="publi-box">AD VIP $50</div><div class="coins"><div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div></div></div>
</header>

<div class="top-action-row">
    <div class="rooms-sidebar" id="rooms-menu"></div>

    <div class="ias-battle-zone">
        <div class="ia-card">
            <img src="Rubia.jpg">
            <div class="ia-status" style="color: var(--n-rosa);">MIA: "Yo soy la reina aquí"</div>
        </div>
        <div class="ia-card">
            <img src="Morocha.jpg">
            <div class="ia-status" style="color: var(--n-azul);">TANIA: "Esa rubia no sabe nada"</div>
        </div>
        <div class="ia-card">
            <img src="Pelirroja.jpg">
            <div class="ia-status" style="color: var(--n-rojo);">COLO: "Mírenme a mí, perras"</div>
        </div>
    </div>
</div>

<div class="middle-row">
    <div class="room-viewer"><img id="main-display" src=""></div>
    
    <div class="chat-complex">
        <div id="chat-flow"></div>
        <div class="chat-input">
            <input type="text" id="user-msg" placeholder="Diles algo guarro...">
            <button onclick="sendMsg()">ENVIAR</button>
        </div>
    </div>
</div>

<div class="bottom-gates">
    <div class="gate"><h3>HISTORIAS</h3><div class="gate-content" id="g-h"></div><button onclick="upload('g-h')">SUBIR HISTORIA</button></div>
    <div class="gate"><h3>ESTADOS</h3><div class="gate-content" id="g-e"></div><button onclick="upload('g-e')">SUBIR ESTADO</button></div>
    <div class="gate"><h3>VIDEOS</h3><div class="gate-content" id="g-v"></div><button onclick="upload('g-v')">SUBIR VIDEO</button></div>
</div>

<audio id="audio-bg" loop></audio>

<script>
    let current = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca.mp3"}, {n: "Camarera", e: ".png", s: "office.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym.mp3"}, {n: "Oficina", e: ".png", s: "office.mp3"},
        {n: "Playa", e: ".png", s: "playa.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda.mp3"}
    ];

    function startImperio() {
        const menu = document.getElementById('rooms-menu');
        rooms.forEach((r, i) => {
            const d = document.createElement('div');
            d.className = 'room-unit'; d.id = 'room-' + i;
            d.innerHTML = `<span>${r.n}</span><span class="online-tag">0 ONLINE</span>`;
            d.onclick = () => selectRoom(i);
            menu.appendChild(d);
        });
        selectRoom(0);
        setInterval(() => { current = (current + 1) % rooms.length; selectRoom(current); }, 6000);
        setInterval(iaBattle, 4000);
    }

    function selectRoom(i) {
        current = i;
        document.querySelectorAll('.room-unit').forEach(u => u.classList.remove('active'));
        document.getElementById('room-' + i).classList.add('active');
        document.getElementById('main-display').src = encodeURI(rooms[i].n + rooms[i].e);
        const a = document.getElementById('audio-bg');
        a.src = rooms[i].s; a.play().catch(()=>{});
    }

    function iaBattle() {
        const flow = document.getElementById('chat-flow');
        const insults = [
            {n: "MIA", c: "var(--n-rosa)", m: "¡Mírenme a mí, soy la más sexi de esta red!"},
            {n: "TANIA", c: "var(--n-azul)", m: "¡Por favor! Mia, pareces una principiante. Yo soy vulgar de verdad."},
            {n: "COLO", c: "var(--n-rojo)", m: "Peleen todo lo que quieran, los hombres me prefieren a mí..."},
            {n: "MIA", c: "var(--n-rosa)", m: "Tania, con esa cara no asustas a nadie. ¡Usuarios, miren mi cuerpo!"},
            {n: "TANIA", c: "var(--n-azul)", m: "¡Cállate! Mi boca hace cosas que tú ni imaginas."},
            {n: "COLO", c: "var(--n-rojo)", m: "Menos charla y más acción, ¿quién me invita una moneda?"}
        ];
        const b = insults[Math.floor(Math.random()*insults.length)];
        flow.innerHTML += `<div class="msg"><b style="color:${b.c}">${b.n}:</b> ${b.m}</div>`;
        flow.scrollTop = flow.scrollHeight;
    }

    function sendMsg() {
        const i = document.getElementById('user-msg');
        if(!i.value) return;
        document.getElementById('chat-flow').innerHTML += `<div class="msg"><b style="color:var(--oro)">TÚ:</b> ${i.value}</div>`;
        i.value = "";
    }

    function upload(id) {
        const url = prompt("Enlace de imagen/video o mensaje:");
        if(url) {
            const gate = document.getElementById(id);
            if(url.includes('http')) {
                gate.innerHTML = `<img src="${url}" style="width:100%; border-radius:5px; margin-bottom:10px;">` + gate.innerHTML;
            } else {
                gate.innerHTML = `<p style="padding:10px; border-bottom:1px solid #333;">${url}</p>` + gate.innerHTML;
            }
        }
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
