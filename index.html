<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v148</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: flex; justify-content: space-around; align-items: center; 
            padding: 10px; background: #050505; border-bottom: 6px solid var(--n-rojo); height: 280px;
        }
        .logo-v148 { height: 220px; width: 220px; object-fit: contain; }
        .coin { width: 75px; height: 75px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; border: 4px solid white; cursor: pointer; }

        /* SECCIÓN SALAS */
        .seccion-salas { display: grid; grid-template-columns: 280px 1fr; height: 480px; border-bottom: 6px solid var(--n-rojo); }
        .menu-l { overflow-y: auto; background: #080808; border-right: 2px solid #222; }
        .s-btn { padding: 15px; border-bottom: 1px solid #111; cursor: pointer; color: #444; font-size: 13px; }
        .s-btn.active { background: var(--n-rojo); color: white; }
        
        .visor-vip { background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        #sala-img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .st-msg { position: absolute; text-align: center; color: #555; }

        /* SECCIÓN 50/50: EL PUNTO MEDIO (520PX) */
        .seccion-ia { display: grid; grid-template-columns: 1fr 1fr; height: 520px; }

        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; border-right: 5px solid var(--n-rojo); }
        .bot-cell { 
            position: relative; 
            height: 520px; /* ALTURA FIJA QUE PEDISTE */
            background: #050505; 
            border-right: 1px solid #111;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        /* ESTO ASEGURA QUE SE VEAN ENTERAS Y NÍTIDAS */
        .bot-cell img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
        .bot-tag { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 24px; font-weight: 900; text-shadow: 2px 2px 5px #000; }

        .chat-wrap { display: flex; flex-direction: column; height: 520px; background: #0a0a0a; }
        #chat-logs { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 15px; }
        .chat-bar { padding: 15px; background: #111; display: flex; gap: 10px; }
        #chat-in { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; outline: none; }

        /* PUERTAS */
        .footer-p { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; background: #000; }
        .p-card { background: #080808; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; }
        .p-pre { height: 100px; background: #000; border: 1px dashed #444; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-pre img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="coin" onclick="pay(1)">$1</div>
    <div class="coin" onclick="pay(5)">$5</div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v148">
    <div class="coin" onclick="pay(10)">$10</div>
    <div class="coin" onclick="pay(20)">$20</div>
</header>

<div class="seccion-salas">
    <div class="menu-l" id="menu-l"></div>
    <div class="visor-vip">
        <div id="st-sala" class="st-msg">
            <p>CONECTANDO...</p>
            <small id="db-msg"></small>
        </div>
        <img id="sala-img" src="" onerror="motorBusqueda(this)">
    </div>
</div>

<div class="seccion-ia">
    <div class="grid-bots">
        <div class="bot-cell"><img src="Rubia.jpg"><div class="bot-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-cell"><img src="Morocha.jpg"><div class="bot-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-cell"><img src="Pelirroja.jpg"><div class="bot-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-wrap">
        <div id="chat-logs"></div>
        <div class="chat-bar">
            <input type="text" id="chat-in" placeholder="Escribe a las chicas..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 25px; border-radius:5px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="footer-p">
    <div class="p-card">
        <div class="p-pre" id="v-h"></div>
        <button onclick="up('v-h')" style="background:var(--n-rosa); color:white; width:100%; padding:10px; border:none; border-radius:5px; cursor:pointer;">HISTORIAS</button>
    </div>
    <div class="p-card">
        <div class="p-pre" id="v-e"></div>
        <button onclick="up('v-e')" style="background:var(--n-azul); color:white; width:100%; padding:10px; border:none; border-radius:5px; cursor:pointer;">ESTADOS</button>
    </div>
    <div class="p-card">
        <div class="p-pre" id="v-v"></div>
        <button onclick="up('v-v')" style="background:var(--n-rojo); color:white; width:100%; padding:10px; border:none; border-radius:5px; cursor:pointer;">VIDEOS</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    let sIdx = 0;

    function init() {
        const ml = document.getElementById('menu-l');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-btn'; d.id = 'sl-'+i;
            d.innerHTML = `<b>${s}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { sIdx = (sIdx + 1) % salas.length; ver(sIdx); }, 6000);
        msg("TANIA", "¡Hola! He ajustado el tamaño a 520px. Ahora nos verás de cuerpo completo y sin cortes.");
    }

    function ver(i) {
        sIdx = i;
        document.querySelectorAll('.s-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        const img = document.getElementById('sala-img');
        img.style.display = "none";
        document.getElementById('st-sala').style.display = "block";
        document.getElementById('db-msg').innerText = "Buscando archivo de sala...";
        img.dataset.r = "0";
        img.src = salas[i] + ".jpg";
    }

    function motorBusqueda(img) {
        let r = parseInt(img.dataset.r);
        const name = salas[sIdx];
        const formatos = [".png", ".JPG", ".PNG", ".jpeg", ".JPEG"];
        if(r < formatos.length) {
            img.dataset.r = r + 1;
            img.src = name + formatos[r];
        } else {
            document.getElementById('db-msg').innerHTML = `<span style="color:red">ERROR:</span> No existe <b>${name}</b> en JPG o PNG en la carpeta.`;
        }
    }

    document.getElementById('sala-img').onload = function() {
        this.style.display = "block";
        document.getElementById('st-sala').style.display = "none";
    };

    function enviar() {
        const i = document.getElementById('chat-in');
        if(!i.value.trim()) return;
        document.getElementById('chat-logs').innerHTML += `<div style="text-align:right; margin-bottom:12px; color:var(--oro)"><b>Tú:</b> ${i.value}</div>`;
        setTimeout(() => msg("MIA", "¡Recibido! ¿Qué te parece el nuevo diseño?"), 800);
        i.value = "";
        document.getElementById('chat-logs').scrollTop = document.getElementById('chat-logs').scrollHeight;
    }

    function msg(n, m) {
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-logs').innerHTML += `<div style="margin-bottom:12px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-logs').scrollTop = document.getElementById('chat-logs').scrollHeight;
    }

    function up(id) {
        let n = prompt("Nombre del archivo de imagen:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
