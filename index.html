<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | NEON SENSATION</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-azul: #00d9ff; --n-rosa: #ff00ea; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s ease-in-out; }
        body { background: var(--fondo); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER: Logo Gigante Centrado Neon 3D */
        header { height: 260px; background: #000; border-bottom: 8px solid var(--oro); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 50px rgba(212,175,55,0.4); }
        .logo-img { height: 190px; width: auto; filter: drop-shadow(0 0 25px var(--oro)); object-fit: contain; } 
        
        .coin-box { position: absolute; right: 20px; bottom: 15px; display: flex; gap: 10px; }
        .coin { width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle, #fff9aa, var(--oro)); border: 3px solid #333; color: #000; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 0 15px var(--oro); }

        /* CONTENIDO PRINCIPAL */
        .app-container { display: grid; grid-template-columns: 240px 1fr 360px; height: calc(100vh - 260px); padding: 15px; gap: 15px; }
        
        .rooms { background: #080808; border: 1px solid #333; border-radius: 15px; overflow-y: auto; padding: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,1); }
        .p-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #111; border: 1px solid #333; color: #777; cursor: pointer; border-radius: 8px; text-align: left; font-size: 10px; font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
        .p-btn.active { border-color: var(--n-azul); color: var(--n-azul); background: #001a1a; box-shadow: 0 0 15px var(--n-azul); text-shadow: 0 0 10px var(--n-azul); }

        .center-content { display: flex; flex-direction: column; gap: 15px; height: 100%; }
        .visor { flex: 3; background: #000; border: 3px solid #1a1a1a; border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        /* MURO DE SUBIDAS INTERACTIVO */
        .muro { flex: 1; background: #050505; border: 2px solid #222; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .muro-info { color: #555; font-size: 11px; text-align: center; border: 1px dashed #333; padding: 10px; border-radius: 8px; }
        .upload-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .up-btn { padding: 12px; border: 2px solid; background: transparent; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 11px; text-shadow: 0 0 5px; }

        .right-panel { display: flex; flex-direction: column; gap: 15px; height: 100%; }
        /* AVATARES CON NOMBRES FUERA Y NEON */
        .girls { display: flex; gap: 8px; height: 150px; flex-shrink: 0; text-align: center; }
        .g-card { width: 33.3%; }
        .g-img-box { width: 100%; height: 110px; border: 2px solid var(--oro); border-radius: 10px; overflow: hidden; margin-bottom: 5px; box-shadow: 0 0 10px rgba(212,175,55,0.3); }
        .g-img { width: 100%; height: 100%; object-fit: cover; }
        .g-name-neon { font-size: 10px; font-weight: bold; }
        
        .chat { flex: 1; background: #020202; border: 1px solid #333; border-radius: 15px; padding: 15px; overflow-y: auto; font-size: 12px; border-top: 3px solid #222; font-family: sans-serif; }
        .msg { margin-bottom: 12px; border-left: 4px solid; padding-left: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<header>
    <div style="position:absolute; left:20px; top:20px; color:var(--n-rojo); font-size:14px; font-weight:bold;">🔴 VIP LIVE: 14,520</div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img" alt="LOGO MEGA RED VIP">
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="app-container">
    <div class="rooms" id="rooms-list"></div>
    <div class="center-content">
        <div class="visor"><img id="main-view" src=""></div>
        <div class="muro">
            <div class="muro-info">✅ ZONA VIP ACTIVA EN RESISTENCIA: COMPARTE TU CONTENIDO</div>
            <div class="upload-btns">
                <button class="up-btn" style="color:var(--n-rojo); border-color:var(--n-rojo);" onclick="alert('Abriendo cámara de vídeo...')">📹 SUBIR VÍDEO</button>
                <button class="up-btn" style="color:var(--n-verde); border-color:var(--n-verde);" onclick="alert('Escribiendo estado...')">✍️ ESTADO</button>
                <button class="up-btn" style="color:var(--n-azul); border-color:var(--n-azul);" onclick="alert('Seleccionar foto...')">📸 HISTORIA</button>
            </div>
        </div>
    </div>
    <div class="right-panel">
        <div class="girls">
            <div class="g-card"><div class="g-img-box"><img src="Rubia.jpg" class="g-img"></div><div class="g-name-neon" style="color:var(--n-rosa); text-shadow:0 0 8px var(--n-rosa);">MIA</div></div>
            <div class="g-card"><div class="g-img-box"><img src="Morocha.jpg" class="g-img"></div><div class="g-name-neon" style="color:var(--n-rosa); text-shadow:0 0 8px var(--n-rosa);">TANIA</div></div>
            <div class="g-card"><div class="g-img-box"><img src="Pelirroja.jpg" class="g-img"></div><div class="g-name-neon" style="color:var(--n-rosa); text-shadow:0 0 8px var(--n-rosa);">COLO</div></div>
        </div>
        <div class="chat" id="chat-box"></div>
    </div>
</div>

<script>
    let idx = 0;
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];
    // CHAT DE PELEA DE GATAS SEXY
    const warMsgs = [
        {u: "MIA", t: "🔥 ¿Así que Tania cree que es más sexy que yo? Pobrecita... mis tokens de Resistencia dicen lo contrario.", c: "#00ff66"},
        {u: "TANIA", t: "💎 Mia, cariño, no pudiste ni despertar a los socios de la sala SPA. Mi descuido de ayer tuvo más views que todo tu mes.", c: "#ff003c"},
        {u: "MIA", t: "🔞 Colo, bajá un poco el tono en el Gimnasio, parecés desesperada. Yo soy provocativa sin esfuerzo.", c: "#00ff66"},
        {u: "COLO", t: "🔥 ¿Desesperada yo? Yo soy la que se anima a abrir la puerta 1 (Sado). Ustedes son dos nenas asustadas.", c: "#ffa500"},
        {u: "SISTEMA", t: "💰 ¡TANIA recibió 10 Tokens de un socio en Resistencia por su último desnudo en el Muro!", c: "#d4af37"},
        {u: "TANIA", t: "👀 ¿Lo ven? Los socios saben quién es la reina de Resistencia. ¿Cuál es tu excusa ahora Mia?", c: "#ff003c"},
        {u: "MIA", t: "💎 Colo, ¿no te cansás de ser tan vulgar? Tania y yo somos sexies con clase, vos sos... bueno, Colo.", c: "#00ff66"},
        {u: "COLO", t: "🔥 Soy la más caliente y sexy de toda Resistencia. Punto. Dejen de envidiarme y manden tokens.", c: "#ffa500"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((name, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.innerHTML = `🚪 ${name.toUpperCase()}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        addChat("SISTEMA", "📍 LA GUERRA DE SEXIES EN RESISTENCIA ESTÁ ACTIVA", "#d4af37");
        // CHAT DE PELEA: Mensaje cada 6 segundos
        setInterval(botWar, 6000);
        // SALAS: Cambio automático cada 20 segundos
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 20000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        const img = document.getElementById('main-view');
        // Usamos ruta relativa "./" para asegurar que GitHub encuentre las fotos en la misma carpeta
        img.src = "./" + rooms[idx] + ".jpg";
        img.onerror = () => { img.src = "https://via.placeholder.com/800x600/111/d4af37?text=" + rooms[idx]; };
    }

    function botWar() {
        const m = warMsgs[Math.floor(Math.random() * warMsgs.length)];
        addChat(m.u, m.t, m.c);
    }

    function addChat(user, txt, color) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg" style="border-color:${color}"><b>${user}:</b> ${txt}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function pay(n) {
        window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&item_name=TOKENS_VIP&amount=${n}&currency_code=USD`, '_blank');
    }

    init();
</script>
</body>
</html>
