<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | OFICIAL</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER: Logo al Medio y Gigante (+2cm) */
        header { height: 220px; background: #000; border-bottom: 6px solid var(--oro); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 10px; }
        .logo-box { width: 100%; display: flex; justify-content: center; align-items: center; }
        .logo-img { height: 180px; width: auto; filter: drop-shadow(0 0 25px var(--oro)); object-fit: contain; } 
        
        .coin-box { position: absolute; right: 20px; bottom: 15px; display: flex; gap: 10px; }
        .coin { width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle, #fff9aa, var(--oro)); border: 3px solid #333; color: #000; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 0 15px var(--oro); }

        /* CONTENIDO */
        .main { display: grid; grid-template-columns: 260px 1fr 350px; height: calc(100vh - 220px); padding: 15px; gap: 15px; }
        
        .rooms { background: #0a0a0a; border: 1px solid #333; border-radius: 15px; overflow-y: auto; padding: 15px; }
        .p-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #1a1a1a; border: 1px solid #444; color: #777; cursor: pointer; border-radius: 8px; text-align: left; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .p-btn.active { border-color: var(--oro); color: var(--oro); background: #221a00; border-width: 2px; }

        .visor { background: #000; border: 2px solid #1a1a1a; border-radius: 20px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; height: 100%; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        .right { display: flex; flex-direction: column; gap: 15px; height: 100%; }
        .girls { display: flex; gap: 8px; height: 130px; flex-shrink: 0; }
        .g-img { width: 33.3%; height: 100%; object-fit: cover; border: 2px solid var(--oro); border-radius: 10px; }
        
        .chat { flex: 1; background: #020202; border: 1px solid #333; border-radius: 15px; padding: 15px; overflow-y: auto; font-size: 13px; font-family: sans-serif; }
        .msg { margin-bottom: 12px; border-left: 4px solid; padding-left: 10px; line-height: 1.4; animation: blink 0.5s ease-in; }
        @keyframes blink { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div style="position:absolute; left:20px; top:20px; color:var(--n-rojo); font-size:14px;">🔴 VIP LIVE: 14,520</div>
    <div class="logo-box">
        <img src="Logo Mega Red Lunar.jpg" class="logo-img" alt="LOGO MEGA RED VIP" onerror="this.src='https://via.placeholder.com/800x200?text=MEGA+RED+VIP'">
    </div>
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main">
    <div class="rooms" id="rooms-list"></div>
    <div class="visor"><img id="main-view" src=""></div>
    <div class="right">
        <div class="girls">
            <img src="Rubia.jpg" class="g-img"><img src="Morocha.jpg" class="g-img"><img src="Pelirroja.jpg" class="g-img">
        </div>
        <div class="chat" id="chat-box"></div>
    </div>
</div>

<script>
    let idx = 0;
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];
    const frasesMia = [
        "🔥 ¿Hay algún socio de **Resistencia** activo ahora?",
        "💎 ¿Quién de Resistencia me invita un trago virtual?",
        "🔞 Subí fotos nuevas al muro, ¿ya las vieron?",
        "💰 ¡Alguien de Resistencia me mandó 10 tokens! ¿Quién más?",
        "👀 Estoy mirando quién está conectado... ¡manden señales!",
        "🚀 La sala de Discoteca se está poniendo buena...",
        "🌈 ¿Algún socio nuevo en la red hoy?"
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((name, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.innerHTML = `🚪 ${name.toUpperCase()}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        addChat("SISTEMA", "📍 CONECTADO DESDE RESISTENCIA", "#d4af37");
        
        // CHAT INFINITO: Envía mensajes cada 7 segundos
        setInterval(botTalk, 7000);
        // CAMBIO AUTOMÁTICO DE SALAS: Cada 20 segundos
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 20000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        const img = document.getElementById('main-view');
        // Usamos encodeURIComponent para que los espacios en "Sado y Maso.jpg" no rompan el link
        const fileName = rooms[idx] + ".jpg";
        img.src = "./" + fileName;
        img.onerror = () => { img.src = "https://via.placeholder.com/800x600/000/d4af37?text=" + rooms[idx]; };
    }

    function botTalk() {
        const r = Math.floor(Math.random() * frasesMia.length);
        addChat("MIA", frasesMia[r], "#00ff66");
    }

    function addChat(user, txt, color) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg" style="border-color:${color}"><b>${user}:</b> ${txt}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function pay(n) {
        // LINK DIRECTO SIN ERROR
        const url = "https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&item_name=TOKENS_VIP&amount=" + n + "&currency_code=USD";
        window.open(url, '_blank');
    }

    init();
</script>
</body>
</html>
