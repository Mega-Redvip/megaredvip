<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v95</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 2fr 1fr; 
            padding: 20px; align-items: center; gap: 20px; background: #050505; border-bottom: 5px solid var(--n-rojo);
        }
        .side-col { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .publi-box { 
            width: 100%; height: 110px; border: 3px dashed var(--n-rojo); 
            display: flex; align-items: center; justify-content: center; 
            background: #0a0a0a; color: var(--n-rojo); font-size: 18px; font-weight: 900;
        }
        .logo-box img { width: 100%; max-height: 250px; object-fit: contain; filter: drop-shadow(0 0 25px var(--n-rojo)); }
        
        .coins-row { display: flex; gap: 15px; }
        .coin { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 20px; cursor: pointer; border: 4px solid white; transition: 0.3s;
        }

        /* SECCIÓN MEDIA: 10 SALAS Y VISOR */
        .middle-section { display: grid; grid-template-columns: 400px 1fr; gap: 20px; padding: 20px; }
        .rooms-sidebar { background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 15px; height: 450px; overflow-y: auto; }
        .room-unit { 
            padding: 10px; background: #151515; border-radius: 8px; cursor: pointer; 
            border: 1px solid #222; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .room-unit:hover, .room-unit.active { background: var(--n-rojo); border-color: white; }
        .room-unit span { font-size: 14px; }
        .room-unit .online-now { font-size: 10px; color: #777; font-weight: bold; }
        .active .online-now { color: white; }

        .viewer-box { border: 5px solid var(--n-rojo); border-radius: 15px; background: #000; height: 450px; overflow: hidden; position: relative; }
        #main-img { width: 100%; height: 100%; object-fit: contain; }

        /* SECCIÓN BOTS GIGANTES Y CHAT */
        .interaction-area { 
            display: grid; grid-template-columns: 1fr 400px; 
            gap: 20px; padding: 0 20px 20px; 
        }

        /* PANEL TRIPLE BOT AGRANDADO */
        .triple-bot-frame { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            height: 600px; /* AGRANDADO */
            border: 5px solid #222; border-radius: 20px; overflow: hidden; background: #000;
        }
        .bot-col { border-right: 2px solid #222; position: relative; }
        .bot-col:last-child { border-right: none; }
        .bot-col img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .bot-tag { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); 
            text-align: center; padding: 15px; font-size: 22px; font-weight: 900;
        }

        /* CHAT ACTIVO */
        .chat-box { background: #050505; border: 4px solid var(--n-rojo); border-radius: 20px; height: 600px; display: flex; flex-direction: column; }
        #chat-stream { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; font-size: 15px; }
        .msg { margin-bottom: 5px; line-height: 1.4; }
        .u-msg { align-self: flex-end; background: #222; padding: 10px; border-radius: 10px; border-left: 4px solid var(--oro); color: var(--oro); }
        
        .chat-input { display: flex; padding: 15px; background: #111; gap: 10px; }
        #msg-in { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 12px; border-radius: 5px; outline: none; }
        .btn-send { background: var(--n-rojo); color: white; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; font-weight: 900; }

        /* PUERTAS INFERIORES */
        .gates-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; border-top: 5px solid var(--n-rojo); }
        .gate-card { background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 15px; text-align: center; }
        .gate-card h4 { margin-bottom: 10px; font-size: 14px; }
        .btn-up { width: 100%; padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="side-col">
        <div class="publi-box">PUBLICITE AQUÍ</div>
        <div class="coins-row">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(5)">$5</div>
        </div>
    </div>
    <div class="logo-box"><img src="Logo Mega Red Lunar.jpg" alt="Logo"></div>
    <div class="side-col">
        <div class="publi-box">PUBLICITE AQUÍ</div>
        <div class="coins-row">
            <div class="coin" onclick="pay(10)">$10</div>
            <div class="coin" onclick="pay(20)">$20</div>
        </div>
    </div>
</header>

<div class="middle-section">
    <div class="rooms-sidebar" id="rooms-list">
        </div>
    <div class="viewer-box">
        <img id="main-img" src="">
    </div>
</div>

<div class="interaction-area">
    <div class="triple-bot-frame">
        <div class="bot-col"><img src="Rubia.jpg"><div class="bot-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-col"><img src="Morocha.jpg"><div class="bot-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-col"><img src="Pelirroja.jpg"><div class="bot-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>

    <div class="chat-box">
        <div id="chat-stream"></div>
        <div class="chat-input">
            <input type="text" id="msg-in" placeholder="Diles algo..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-send" onclick="send()">ENVIAR</button>
        </div>
    </div>
</div>

<div class="gates-row">
    <div class="gate-card">
        <h4 style="color:var(--n-rosa)">SUBIR HISTORIAS</h4>
        <button class="btn-up" style="background:var(--n-rosa)" onclick="alert('Subir Archivo...')">UPLOAD</button>
    </div>
    <div class="gate-card">
        <h4 style="color:var(--n-azul)">SUBIR ESTADOS</h4>
        <button class="btn-up" style="background:var(--n-azul)" onclick="alert('Subir Archivo...')">UPLOAD</button>
    </div>
    <div class="gate-card">
        <h4 style="color:var(--n-rojo)">SUBIR VIDEOS</h4>
        <button class="btn-up" style="background:var(--n-rojo)" onclick="alert('Subir Archivo...')">UPLOAD</button>
    </div>
</div>

<script>
    const salas = [
        "SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", 
        "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"
    ];

    const bots = [
        { n: "MIA", cl: "var(--n-rosa)", p: "rubia" },
        { n: "TANIA", cl: "var(--n-azul)", p: "morocha" },
        { n: "COLO", cl: "var(--n-rojo)", p: "pelirroja" }
    ];

    function init() {
        const container = document.getElementById('rooms-list');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'room-unit';
            d.id = 'room-' + i;
            // Número real en CERO mientras no esté online
            d.innerHTML = `<span>${s}</span><span class="online-now">0 PERSONAS EN LÍNEA NOW</span>`;
            d.onclick = () => selectRoom(i);
            container.appendChild(d);
        });
        selectRoom(0);
        welcomeMsg();
    }

    function selectRoom(i) {
        document.querySelectorAll('.room-unit').forEach(r => r.classList.remove('active'));
        document.getElementById('room-' + i).classList.add('active');
        // Asumiendo que las imágenes tienen el mismo nombre que la sala + .jpg o .png
        document.getElementById('main-img').src = encodeURI(salas[i] + ".jpg");
        
        const stream = document.getElementById('chat-stream');
        stream.innerHTML += `<div style="text-align:center; color:#444; font-size:11px;">--- Entraste a la sala: ${salas[i]} ---</div>`;
    }

    function welcomeMsg() {
        setTimeout(() => {
            botChat("MIA", "¡Hola bombón! Recién abrimos, por eso está vacío... aprovechá que somos todas para vos sólita.");
        }, 1000);
    }

    function send() {
        const input = document.getElementById('msg-in');
        const val = input.value.trim();
        if(!val) return;

        const stream = document.getElementById('chat-stream');
        stream.innerHTML += `<div class="msg u-msg"><b>Tú:</b> ${val}</div>`;
        input.value = "";
        stream.scrollTop = stream.scrollHeight;

        // Lógica de respuesta "Humana"
        setTimeout(() => {
            const botRandom = bots[Math.floor(Math.random()*bots.length)];
            let r = "";
            const t = val.toLowerCase();

            if(t.includes("hola")) r = "¡Hola amor! ¿De dónde sos? Nosotras acá en Resistencia estamos aburridas...";
            else if(t.includes("donde")) r = "Somos de acá, de Chaco. ¿Querés venir a vernos o te da miedo?";
            else if(t.includes("hacen")) r = "Esperando que algún hombre de verdad nos invite unas monedas para empezar el show... ¿te animás?";
            else if(t.includes("moneda") || t.includes("cuanto")) r = "Con 10 monedas te hacemos un show las tres juntas que no te vas a olvidar más, ganso.";
            else r = "¿Por qué no dejas de hablar tanto y nos mandas un regalito? Así nos ponemos bien locas...";

            botChat(botRandom.n, r);
            
            // Otra bot se mete en la conversación para que parezca real
            setTimeout(() => {
                let otraBot = bots.find(b => b.n !== botRandom.n);
                botChat(otraBot.n, "No le des bola a ella, yo soy mucho más perra... haceme caso a mí.");
            }, 2000);

        }, 1500);
    }

    function botChat(name, msg) {
        const botObj = bots.find(b => b.n === name);
        const stream = document.getElementById('chat-stream');
        stream.innerHTML += `<div class="msg"><b style="color:${botObj.cl}">${name}:</b> ${msg}</div>`;
        stream.scrollTop = stream.scrollHeight;
    }

    function pay(m) {
        window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&item_name=VIP_Credits&amount=${m}&currency_code=USD`, "_blank");
    }
</script>
</body>
</html>
