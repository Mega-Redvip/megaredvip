<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v125</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* 1. HEADER CON PUBLICIDAD VIBRANTE */
        header { 
            display: grid; grid-template-columns: 250px 100px 1fr 100px 250px; 
            align-items: center; gap: 15px; padding: 15px;
            background: #050505; border-bottom: 5px solid var(--n-rojo); height: 260px;
        }
        .ad-neon { 
            height: 180px; border: 3px solid var(--n-rojo); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px; text-align: center; cursor: pointer;
            box-shadow: 0 0 15px var(--n-rojo); animation: parpadeo 2s infinite;
        }
        @keyframes parpadeo { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .logo-v125 { width: 100%; max-height: 230px; object-fit: contain; }

        .coin { 
            width: 60px; height: 60px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; border: 3px solid white; box-shadow: 0 0 10px var(--oro);
        }

        /* 2. SALAS (TODAS VISIBLES SIN SCROLL) */
        .salas-container { display: grid; grid-template-columns: 230px 1fr; gap: 10px; padding: 10px; height: 450px; }
        .grid-salas { display: flex; flex-direction: column; gap: 1px; background: #0a0a0a; border: 2px solid #222; padding: 4px; border-radius: 10px; }
        .btn-sala { 
            flex: 1; padding: 0 10px; background: #111; border: 1px solid #333; 
            color: #888; cursor: pointer; font-size: 11px; border-radius: 4px; 
            display: flex; align-items: center; justify-content: space-between;
        }
        .btn-sala.active { background: var(--n-rojo); color: white; border-color: white; box-shadow: 0 0 10px var(--n-rojo); }

        .visor-webcam { border: 6px solid var(--n-rojo); border-radius: 20px; background: #050505; overflow: hidden; position: relative; }
        #img-webcam { width: 100%; height: 100%; object-fit: cover; }

        /* 3. BOTS CON PIEL REALISTA Y CHAT TRIPLE */
        .seccion-interactiva { 
            display: grid; grid-template-columns: repeat(3, 1fr) 450px; 
            height: 350px; border-bottom: 5px solid var(--n-rojo);
        }
        .bot-virtual { position: relative; background: #000; overflow: hidden; }
        .bot-virtual img { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.9) contrast(1.1); /* QUITA EL BRILLO EXCESIVO */
            image-rendering: -webkit-optimize-contrast; /* DETALLE DE PIEL */
        }
        .bot-tag { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, black, transparent); text-align: center; padding: 10px; font-size: 18px; font-weight: 900; }

        .chat-ia { background: #080808; border-left: 4px solid var(--n-rojo); display: flex; flex-direction: column; }
        #chat-logs { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 13px; color: #ccc; }
        .chat-in { padding: 10px; background: #111; display: flex; gap: 8px; }
        #txt-ia { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 8px; border-radius: 5px; outline: none; }

        /* 4. PUERTAS VIP */
        .footer-vip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .puerta-box { background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 15px; text-align: center; }
        .frame-h { height: 100px; background: #000; border-radius: 8px; margin: 10px 0; overflow: hidden; }
        .frame-h img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="ad-neon" onclick="alert('Publicidad $50')">ANUNCIATE AQUÍ<br>AUSPICIANTE</div>
    <div style="display:flex; flex-direction:column; gap:5px;">
        <div class="coin" onclick="pago(1)">$1</div>
        <div class="coin" onclick="pago(5)">$5</div>
    </div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v125">
    <div style="display:flex; flex-direction:column; gap:5px;">
        <div class="coin" onclick="pago(10)">$10</div>
        <div class="coin" onclick="pago(20)">$20</div>
    </div>
    <div class="ad-neon" onclick="alert('Publicidad $100')">ESPACIO VIP<br>DISPONIBLE</div>
</header>

<div class="salas-container">
    <div class="grid-salas" id="lista-s"></div>
    <div class="visor-webcam">
        <img id="img-webcam" src="">
    </div>
</div>

<div class="seccion-interactiva">
    <div class="bot-virtual"><img src="Rubia.jpg"><div class="bot-tag" style="color:var(--n-rosa)">MIA</div></div>
    <div class="bot-virtual"><img src="Morocha.jpg"><div class="bot-tag" style="color:var(--n-azul)">TANIA</div></div>
    <div class="bot-virtual"><img src="Pelirroja.jpg"><div class="bot-tag" style="color:var(--n-rojo)">COLO</div></div>
    
    <div class="chat-ia">
        <div id="chat-logs"></div>
        <div class="chat-in">
            <input type="text" id="txt-ia" placeholder="Habla con ellas..." onkeypress="if(event.key==='Enter') enviarMsg()">
            <button onclick="enviarMsg()" style="background:var(--n-rojo); color:white; border:none; padding:0 10px; border-radius:4px; cursor:pointer; font-weight:bold;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-vip">
    <div class="puerta-box"><h5 style="color:var(--n-rosa)">HISTORIAS</h5><div class="frame-h" id="f1"></div><button onclick="subir('f1')">SUBIR</button></div>
    <div class="puerta-box"><h5 style="color:var(--n-azul)">ESTADOS</h5><div class="frame-h" id="f2"></div><button onclick="subir('f2')">SUBIR</button></div>
    <div class="puerta-box"><h5 style="color:var(--n-rojo)">VIDEOS</h5><div class="frame-h" id="f3"></div><button onclick="subir('f3')">SUBIR</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function init() {
        const m = document.getElementById('lista-s');
        salas.forEach((s, i) => {
            let b = document.createElement('div');
            b.className = 'btn-sala'; b.id = 's-'+i;
            b.innerHTML = `<b>${s}</b> <span style="color:lime">●</span>`;
            b.onclick = () => verSala(i);
            m.appendChild(b);
        });
        verSala(0);
        hablar("MIA", "¡Hola! Soy Mia. ¿Listos para divertirse?");
    }

    function verSala(i) {
        document.querySelectorAll('.btn-sala').forEach(x => x.classList.remove('active'));
        document.getElementById('s-'+i).classList.add('active');
        // REGLA DE ORO PARA IMÁGENES: El archivo debe llamarse igual que la sala + .jpg
        // Ejemplo: SPA.jpg o PLAYA.jpg (respeta mayúsculas si tu archivo las tiene)
        document.getElementById('img-webcam').src = salas[i] + ".jpg";
    }

    function enviarMsg() {
        const input = document.getElementById('txt-ia');
        const msj = input.value.toLowerCase();
        if(!msj) return;

        const logs = document.getElementById('chat-logs');
        logs.innerHTML += `<div style="text-align:right; margin-bottom:10px; color:var(--oro)"><b>Tú:</b> ${input.value}</div>`;
        input.value = "";
        logs.scrollTop = logs.scrollHeight;

        // IA TRIPLE: Responden según quién menciones o al azar
        setTimeout(() => {
            if(msj.includes("hola")) hablar("TANIA", "Hola bombón, ¿me extrañaste?");
            else if(msj.includes("mia")) hablar("MIA", "¿Me llamabas? Soy toda oídos...");
            else if(msj.includes("colo")) hablar("COLO", "Acá estoy, pelirroja y peligrosa. 😉");
            else hablar("TANIA", "No entiendo, pero si me das una moneda te escucho mejor...");
        }, 1200);
    }

    function hablar(n, m) {
        const logs = document.getElementById('chat-logs');
        const col = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        logs.innerHTML += `<div style="margin-bottom:10px;"><b style="color:${col}">${n}:</b> ${m}</div>`;
        logs.scrollTop = logs.scrollHeight;
    }

    function subir(id) {
        const url = prompt("Enlace de imagen:");
        if(url) document.getElementById(id).innerHTML = `<img src="${url}">`;
    }

    function pago(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
