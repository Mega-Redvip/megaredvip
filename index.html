<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v72</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            overflow-y: auto; overflow-x: hidden;
        }

        /* HEADER: LOGO Y MONEDAS (INTOCTO) */
        header { 
            display: grid; grid-template-columns: 350px 1fr 350px; 
            align-items: center; padding: 20px; border-bottom: 5px solid var(--n-rojo); 
            background: #050505;
        }
        .header-side { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .publi-box { width: 300px; height: 100px; border: 2px solid var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 12px; }
        .logo-center img { height: 260px; filter: drop-shadow(0 0 30px var(--n-rojo)); }
        .coins { display: flex; gap: 20px; margin-top: 10px; }
        .coin { 
            width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 3px solid white;
        }

        /* NIVEL 1: 10 SALAS (IZQ) Y 3 AVATARES (DER) */
        .level-1 { 
            display: grid; grid-template-columns: 300px 1fr; 
            gap: 15px; padding: 20px; height: 500px;
        }
        .rooms-grid { 
            background: #0a0a0a; border: 2px solid #222; border-radius: 12px; padding: 10px;
            display: grid; grid-template-rows: repeat(11, 1fr); gap: 4px;
        }
        .room-unit { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; background: #111; border: 1px solid #333; border-radius: 5px;
            cursor: pointer; font-size: 10px; text-transform: uppercase;
        }
        .room-unit.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 10px var(--n-rojo); }

        /* DISEÑO TIENDITA ROJO NEÓN AGRESIVO */
        .tiendita-neon-btn {
            background: #000;
            color: var(--n-rojo);
            border: 3px solid var(--n-rojo);
            border-radius: 8px;
            text-align: center;
            padding: 12px;
            font-weight: 900;
            font-size: 11px;
            text-decoration: none;
            margin-top: 8px;
            display: block;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--n-rojo), inset 0 0 5px var(--n-rojo);
            animation: neon-pulse 1.5s infinite;
            transition: 0.3s;
        }
        .tiendita-neon-btn:hover {
            color: white;
            background: var(--n-rojo);
            box-shadow: 0 0 30px var(--n-rojo);
        }

        @keyframes neon-pulse {
            0% { box-shadow: 0 0 10px var(--n-rojo), inset 0 0 5px var(--n-rojo); }
            50% { box-shadow: 0 0 20px var(--n-rojo), inset 0 0 10px var(--n-rojo); }
            100% { box-shadow: 0 0 10px var(--n-rojo), inset 0 0 5px var(--n-rojo); }
        }

        /* BOTS: TAMAÑO CONTROLADO Y ALTA NITIDEZ */
        .avatars-battle { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            height: 450px; /* ALTURA CONTROLADA PARA QUE NO SE SALGAN */
        }
        .avatar-card { border: 2px solid #222; border-radius: 15px; overflow: hidden; background: #000; position: relative; }
        .avatar-card img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            object-position: top center; 
            /* MEJORA DE NITIDEZ CONTROLADA */
            image-rendering: high-quality;
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(0);
        }
        .name-tag { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); text-align: center; padding: 10px; font-size: 14px; font-weight: 900; }

        /* NIVEL 2: VISOR SALA (IZQ) Y CHAT (DER) */
        .level-2 { 
            display: grid; grid-template-columns: 1fr 450px; 
            gap: 15px; padding: 0 20px 20px 20px; height: 450px;
        }
        .viewer-box { border: 4px solid var(--n-rojo); border-radius: 15px; overflow: hidden; background: #000; }
        #room-img { width: 100%; height: 100%; object-fit: contain; }

        .chat-box { 
            background: #050505; border: 3px solid var(--n-rojo); border-radius: 15px; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        #chat-content { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-input-row { display: flex; padding: 10px; background: #111; gap: 5px; }
        .chat-input-row input { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; }
        .chat-input-row button { background: var(--n-rojo); border: none; color: white; padding: 0 15px; border-radius: 5px; cursor: pointer; font-weight: 900; }

        /* NIVEL 3: LAS TRES PUERTAS */
        .level-3 { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 20px; padding: 40px; border-top: 5px solid var(--n-rojo);
        }
        .gate-door { background: #0a0a0a; border: 2px solid var(--n-rojo); border-radius: 20px; padding: 20px; text-align: center; }
        .gate-display { height: 180px; background: #000; margin-bottom: 15px; border-radius: 10px; overflow-y: auto; padding: 10px; border: 1px solid #222; }
        .gate-btn { width: 100%; padding: 12px; background: var(--n-rojo); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; }

    </style>
</head>
<body onload="initImperio()">

<form id="paypal-form" action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
    <input type="hidden" name="cmd" value="_xclick">
    <input type="hidden" name="business" value="TU_CORREO_AQUÍ@GMAIL.COM">
    <input type="hidden" name="item_name" value="Créditos Imperio VIP">
    <input type="hidden" name="amount" id="pay-amount" value="0">
    <input type="hidden" name="currency_code" value="USD">
</form>

<header>
    <div class="header-side">
        <div class="publi-box">AD VIP $20</div>
        <div class="coins">
            <div class="coin" onclick="pagar(1)">$1</div>
            <div class="coin" onclick="pagar(3)">$3</div>
        </div>
    </div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="header-side">
        <div class="publi-box">AD VIP $50</div>
        <div class="coins">
            <div class="coin" onclick="pagar(5)">$5</div>
            <div class="coin" onclick="pagar(10)">$10</div>
        </div>
    </div>
</header>

<div class="level-1">
    <div class="rooms-grid">
        <div id="rooms-list"></div>
        <a href="LINK_DE_TU_ALI" target="_blank" class="tiendita-neon-btn">🔥 ¡COMPRA EN LA TIENDITA! 🛒</a>
    </div>
    <div class="avatars-battle">
        <div class="avatar-card"><img src="Rubia.jpg"><div class="name-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="avatar-card"><img src="Morocha.jpg"><div class="name-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="avatar-card"><img src="Pelirroja.jpg"><div class="name-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
</div>

<div class="level-2">
    <div class="viewer-box"><img id="room-img" src=""></div>
    <div class="chat-box">
        <div id="chat-content"></div>
        <div class="chat-input-row">
            <input type="text" id="msg-in" placeholder="Diles algo guarro...">
            <button onclick="send()">OK</button>
        </div>
    </div>
</div>

<div class="level-3">
    <div class="gate-door"><h3>HISTORIAS</h3><div class="gate-display" id="d-h"></div><button class="gate-btn" onclick="post('d-h')">SUBIR</button></div>
    <div class="gate-door"><h3>ESTADOS</h3><div class="gate-display" id="d-e"></div><button class="gate-btn" onclick="post('d-e')">SUBIR</button></div>
    <div class="gate-door"><h3>VIDEOS</h3><div class="gate-display" id="d-v"></div><button class="gate-btn" onclick="post('d-v')">SUBIR</button></div>
</div>

<audio id="audio-main" loop></audio>

<script>
    let pos = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca.mp3"}, {n: "Camarera", e: ".png", s: "office.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym.mp3"}, {n: "Oficina", e: ".png", s: "office.mp3"},
        {n: "Playa", e: ".png", s: "playa.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda.mp3"}
    ];

    function initImperio() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const d = document.createElement('div');
            d.className = 'room-unit'; d.id = 'u-' + i;
            d.innerHTML = `<span>${r.n}</span><span style="color:var(--n-azul)">0 ONLINE</span>`;
            d.onclick = () => select(i);
            list.appendChild(d);
        });
        select(0);
        setInterval(() => { pos = (pos + 1) % rooms.length; select(pos); }, 6000);
        setInterval(iaChat, 4000);
    }

    function select(i) {
        pos = i;
        document.querySelectorAll('.room-unit').forEach(x => x.classList.remove('active'));
        document.getElementById('u-' + i).classList.add('active');
        document.getElementById('room-img').src = encodeURI(rooms[i].n + rooms[i].e);
        const a = document.getElementById('audio-main');
        a.src = rooms[i].s; a.play().catch(()=>{});
    }

    function pagar(v) {
        document.getElementById('pay-amount').value = v;
        document.getElementById('paypal-form').submit();
    }

    function iaChat() {
        const c = document.getElementById('chat-content');
        const bots = [
            {n: "MIA", cl: "var(--n-rosa)", m: "¡Miren mi cuerpo, soy la más sexi! 🔥"},
            {n: "TANIA", cl: "var(--n-azul)", m: "Mia, deja de mentir, todos me quieren a mí..."},
            {n: "COLO", cl: "var(--n-rojo)", m: "Peleen lo que quieran, yo soy la que más sabe aquí 🔞"}
        ];
        const b = bots[Math.floor(Math.random()*3)];
        c.innerHTML += `<div style="font-size:13px; margin-bottom:5px;"><b style="color:${b.cl}">${b.n}:</b> ${b.m}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    function send() {
        const i = document.getElementById('msg-in');
        if(!i.value) return;
        document.getElementById('chat-content').innerHTML += `<div style="font-size:13px; margin-bottom:5px;"><b style="color:var(--oro)">TÚ:</b> ${i.value}</div>`;
        i.value = "";
    }

    function post(id) {
        const url = prompt("Enlace de imagen/video o texto:");
        if(url) {
            const d = document.getElementById(id);
            if(url.includes('http')) {
                d.innerHTML = `<img src="${url}" style="width:100%; border-radius:5px; margin-bottom:10px;">` + d.innerHTML;
            } else {
                d.innerHTML = `<p style="padding:8px; border-bottom:1px solid #333;">${url}</p>` + d.innerHTML;
            }
        }
    }
</script>
</body>
</html>
