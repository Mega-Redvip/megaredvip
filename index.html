<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v103</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER GIGANTE - SIN ESPACIOS VACÍOS */
        header { 
            display: grid; grid-template-columns: 1fr 1.5fr 1fr; 
            padding: 10px 40px; background: #050505; border-bottom: 6px solid var(--n-rojo);
            align-items: center;
        }
        .ad-space { width: 100%; height: 180px; border: 4px dashed var(--n-rojo); display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--n-rojo); background: #0a0a0a; font-weight: 900; }
        .logo-main img { width: 100%; max-height: 380px; object-fit: contain; filter: drop-shadow(0 0 35px var(--n-rojo)); }
        
        .coins { display: flex; gap: 20px; justify-content: center; }
        .coin { 
            width: 130px; height: 130px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 40px; cursor: pointer; border: 6px solid white;
            box-shadow: 0 0 40px var(--oro); transition: 0.3s;
        }

        /* DISEÑO DE SALAS Y VISOR */
        .top-row { display: grid; grid-template-columns: 350px 1fr; gap: 15px; padding: 15px; height: 500px; }
        .rooms-list { background: #0a0a0a; border: 3px solid #222; border-radius: 20px; padding: 10px; overflow-y: auto; }
        .room-tab { 
            padding: 15px; background: #111; border-radius: 12px; margin-bottom: 8px; 
            cursor: pointer; display: flex; justify-content: space-between; border: 2px solid #333; font-size: 14px;
        }
        .room-tab.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 15px var(--n-rojo); }

        .viewer-window { border: 6px solid var(--n-rojo); border-radius: 20px; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        #sala-img { width: 100%; height: 100%; object-fit: cover; }
        .neon-shop { 
            position: absolute; padding: 30px 60px; background: var(--n-rojo); color: white;
            font-size: 35px; border-radius: 100px; text-decoration: none; border: 6px solid white;
            box-shadow: 0 0 60px var(--n-rojo); animation: glow 0.8s infinite alternate; display: none;
        }
        @keyframes glow { from { transform: scale(1); box-shadow: 0 0 20px var(--n-rojo); } to { transform: scale(1.1); box-shadow: 0 0 70px var(--n-rojo); } }

        /* SECCIÓN BOTS Y CHAT (REESTRUCTURADO) */
        .bottom-row { display: grid; grid-template-columns: 1fr 380px; gap: 15px; padding: 0 15px 15px; }
        
        /* BOTS: OCUPAN TODO EL ALTO Y ANCHO DISPONIBLE */
        .bots-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            height: 850px; /* Masivo para cuerpo completo */
            border: 4px solid #222; border-radius: 25px; overflow: hidden;
        }
        .bot-frame { position: relative; background: #050505; border-right: 2px solid #222; }
        .bot-frame img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* Cambiado a COVER para que llenen todo el espacio sin negro lateral */
            object-position: top center; 
        }
        .bot-name-tag { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 20px; font-size: 30px; font-weight: 900; }

        /* CHAT COMPACTO */
        .chat-sidebar { background: #050505; border: 5px solid var(--n-rojo); border-radius: 25px; display: flex; flex-direction: column; height: 850px; }
        #chat-history { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 16px; display: flex; flex-direction: column; gap: 12px; }
        .chat-controls { padding: 15px; background: #111; display: flex; gap: 10px; border-top: 2px solid #222; }
        #msg-input { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 12px; border-radius: 10px; }

        /* PUERTAS DE SUBIDA */
        .footer-gates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; border-top: 6px solid var(--n-rojo); }
        .gate-card { background: #0a0a0a; border: 3px solid #333; border-radius: 20px; padding: 15px; text-align: center; }
        .gate-img { height: 160px; background: #000; margin-bottom: 10px; border-radius: 10px; border: 1px solid #222; overflow: hidden; }
        .gate-img img { width: 100%; height: 100%; object-fit: cover; }
        .btn-up { width: 100%; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body onload="initApp()">

<header>
    <div>
        <div class="ad-space">ADS VIP $50</div>
        <div class="coins"><div class="coin" onclick="buy(1)">$1</div><div class="coin" onclick="buy(5)">$5</div></div>
    </div>
    <div class="logo-main" style="text-align:center;"><img src="Logo Mega Red Lunar.jpg"></div>
    <div>
        <div class="ad-space">ADS VIP $100</div>
        <div class="coins"><div class="coin" onclick="buy(10)">$10</div><div class="coin" onclick="buy(20)">$20</div></div>
    </div>
</header>

<div class="top-row">
    <div class="rooms-list" id="room-list"></div>
    <div class="viewer-window">
        <img id="sala-img" src="" onerror="this.src='https://via.placeholder.com/1200x600/111/ff003c?text=IMAGEN+NO+ENCONTRADA'">
        <a href="https://best.aliexpress.com/" target="_blank" class="neon-shop" id="shop-btn">TIENDITA VIP 🔱</a>
    </div>
</div>

<div class="bottom-row">
    <div class="bots-grid">
        <div class="bot-frame"><img src="Rubia.jpg"><div class="bot-name-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-frame"><img src="Morocha.jpg"><div class="bot-name-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-frame"><img src="Pelirroja.jpg"><div class="bot-name-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-sidebar">
        <div id="chat-history"></div>
        <div class="chat-controls">
            <input type="text" id="msg-input" placeholder="Diles algo..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:var(--n-rojo); color:white; border:none; padding:0 20px; border-radius:10px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="footer-gates">
    <div class="gate-card"><h4 style="color:var(--n-rosa)">HISTORIAS</h4><div class="gate-img" id="g-h"></div><button class="btn-up" style="background:var(--n-rosa)" onclick="up('g-h')">SUBIR</button></div>
    <div class="gate-card"><h4 style="color:var(--n-azul)">ESTADOS</h4><div class="gate-img" id="g-e"></div><button class="btn-up" style="background:var(--n-azul)" onclick="up('g-e')">SUBIR</button></div>
    <div class="gate-card"><h4 style="color:var(--n-rojo)">VIDEOS</h4><div class="gate-img" id="g-v"></div><button class="btn-up" style="background:var(--n-rojo)" onclick="up('g-v')">SUBIR</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function initApp() {
        const list = document.getElementById('room-list');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'room-tab'; d.id = 'room-'+i;
            d.innerHTML = `<span>${s}</span><span style="color:lime; font-size:10px;">0 ONLINE</span>`;
            d.onclick = () => changeRoom(i);
            list.appendChild(d);
        });
        changeRoom(0);
        botTalk("MIA", "Hola bombón... ¿viste qué gatona que estoy hoy? Las otras dos están celosas porque soy la reina de Chaco.");
    }

    function changeRoom(i) {
        document.querySelectorAll('.room-tab').forEach(r => r.classList.remove('active'));
        document.getElementById('room-'+i).classList.add('active');
        const img = document.getElementById('sala-img');
        const btn = document.getElementById('shop-btn');
        
        if(salas[i] === "LA TIENDITA") {
            btn.style.display = 'block';
            img.style.display = 'none';
        } else {
            btn.style.display = 'none';
            img.style.display = 'block';
            // IMPORTANTE: Asegúrate de que el nombre del archivo sea exacto.
            img.src = salas[i] + ".jpg";
        }
    }

    function up(id) {
        const url = prompt("Pega el enlace de la imagen:");
        if(url) document.getElementById(id).innerHTML = `<img src="${url}">`;
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        const hist = document.getElementById('chat-history');
        hist.innerHTML += `<div style="text-align:right; color:var(--oro); font-size:14px;"><b>Tú:</b> ${input.value}</div>`;
        const val = input.value.toLowerCase();
        input.value = "";
        
        setTimeout(() => {
            let r = "No seas tacaño, mandame una moneda y te muestro todo.";
            if(val.includes("hola")) r = "Hola mi amor, ¿sos de acá de Resistencia? Vení a verme.";
            botTalk("TANIA", r);
            setTimeout(() => botTalk("COLO", "¡No le des bola a esa pendeja! Yo soy mucho más cariñosa."), 2000);
        }, 1500);
    }

    function botTalk(n, m) {
        const hist = document.getElementById('chat-history');
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        hist.innerHTML += `<div><b style="color:${c}">${n}:</b> ${m}</div>`;
        hist.scrollTop = hist.scrollHeight;
    }

    function buy(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
