<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v92 - GUERRA DE PUTAS</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        /* HEADER SUPREMO - LÍNEAS LIMPIAS */
        header { 
            display: grid; grid-template-columns: 1fr 2fr 1fr; 
            padding: 25px; align-items: center; gap: 20px; background: #050505;
            border-bottom: 6px solid var(--n-rojo);
        }
        .side-col { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .publi-box { 
            width: 100%; height: 130px; border: 4px dashed var(--n-rojo); 
            display: flex; align-items: center; justify-content: center; 
            background: #0a0a0a; color: var(--n-rojo); font-size: 20px; text-align: center;
        }
        .logo-box img { width: 100%; max-height: 300px; object-fit: contain; filter: drop-shadow(0 0 35px var(--n-rojo)); }
        
        .coins-row { display: flex; gap: 25px; }
        .coin { 
            width: 80px; height: 80px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 24px; cursor: pointer; border: 5px solid white; transition: 0.3s;
        }
        .coin:hover { transform: scale(1.15) rotate(15deg); box-shadow: 0 0 20px var(--oro); }

        /* SECCIÓN MEDIA: SALAS Y VISOR */
        .middle-section { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 25px; }
        .rooms-sidebar { background: #0a0a0a; border: 3px solid #222; border-radius: 20px; padding: 15px; height: 500px; display: flex; flex-direction: column; }
        .rooms-scroll { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .room-unit { 
            padding: 15px; background: #151515; border-radius: 10px; cursor: pointer; 
            border: 1px solid #333; display: flex; justify-content: space-between; font-size: 13px;
        }
        .room-unit.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 15px var(--n-rojo); transform: translateX(10px); }

        .viewer-box { border: 6px solid var(--n-rojo); border-radius: 20px; background: #000; height: 500px; overflow: hidden; position: relative; }
        #main-img { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .geo-info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); color: var(--oro); padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 10; border: 2px solid var(--oro); }

        /* SECCIÓN BOTS Y CHAT: REDISEÑO TOTAL */
        .chat-area { 
            padding: 0 25px 25px; display: flex; flex-direction: column; gap: 20px; 
            background: #000; border-top: 5px solid var(--n-rojo);
        }

        /* TRES BOTS EN FILA HORIZONTAL */
        .bots-row { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 20px; margin-top: 20px;
        }
        .bot-frame { 
            height: 350px; /* Masivo y cuerpo entero */
            border: 4px solid #333; border-radius: 20px; overflow: hidden; 
            position: relative; background: #000; transition: 0.3s;
        }
        .bot-frame:hover { border-color: var(--oro); box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        .bot-frame img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* COMPLETA sin recortar */
            image-rendering: high-quality;
        }
        .bot-name-tag { 
            position: absolute; bottom: 0; width: 100%; 
            background: rgba(0,0,0,0.85); text-align: center; 
            font-size: 20px; padding: 12px; font-weight: 900; 
            border-top: 2px solid #333;
        }

        /* CHAT COMPACTO Y VULGAR */
        .chat-box { 
            background: #050505; border: 4px solid var(--n-rojo); 
            border-radius: 20px; display: flex; flex-direction: column; 
            height: 400px; /* Compacto */
            overflow: hidden; 
        }
        #chat-stream { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; font-size: 14px; }
        .chat-msg-bot { align-self: flex-start; max-width: 85%; line-height: 1.4; }
        .chat-msg-user { align-self: flex-end; background: #111; padding: 10px; border-radius: 10px; border-left: 4px solid var(--oro); font-weight: bold; max-width: 80%; }
        
        .chat-input { display: flex; padding: 15px; background: #0a0a0a; gap: 10px; border-top: 2px solid #222; }
        #msg-in { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 12px; border-radius: 8px; outline: none; }
        .btn-send { background: var(--n-rojo); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 900; }

        /* PUERTAS INFERIORES */
        .bottom-gates { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 20px; padding: 25px; background: #050505; 
            border-top: 5px solid var(--n-rojo); flex-shrink: 0;
        }
        .gate { background: #0a0a0a; border-radius: 15px; padding: 20px; text-align: center; border: 3px solid #333; transition: 0.3s; }
        .gate-h { border-color: var(--n-rosa); } .gate-e { border-color: var(--n-azul); } .gate-v { border-color: var(--n-rojo); }
        .gate-h:hover { box-shadow: 0 0 15px var(--n-rosa); }
        .gate-content { height: 180px; background: #000; margin-bottom: 15px; border-radius: 8px; overflow-y: auto; padding: 10px; text-align: left; }
        .btn-up { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="bootImperio()">

<header>
    <div class="side-col">
        <div class="publi-box">ANUNCIO VIP $50</div>
        <div class="coins-row">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(5)">$5</div>
        </div>
    </div>
    
    <div class="logo-box">
        <img src="Logo Mega Red Lunar.jpg" alt="Imperio Logo">
    </div>

    <div class="side-col">
        <div class="publi-box">ANUNCIO VIP $100</div>
        <div class="coins-row">
            <div class="coin" onclick="pay(10)">$10</div>
            <div class="coin" onclick="pay(20)">$20</div>
        </div>
    </div>
</header>

<div class="middle-section">
    <div class="rooms-sidebar">
        <div class="rooms-scroll" id="rooms-list"></div>
        <a href="https://best.aliexpress.com/" target="_blank" style="background:#000; color:#fff; border:2px solid var(--n-rojo); padding:10px; text-align:center; text-decoration:none; font-size:12px; font-weight:900; margin-top:10px; border-radius:5px;">🛒 COMPRAR JUGUETES 🔞</a>
    </div>
    <div class="viewer-box">
        <div class="geo-info" id="geo">📍 RESISTENCIA, ARGENTINA</div>
        <img id="main-img" src="">
    </div>
</div>

<div class="chat-area">
    <div class="bots-row">
        <div class="bot-frame"><img src="Rubia.jpg"><div class="bot-name-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-frame"><img src="Morocha.jpg"><div class="bot-name-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-frame"><img src="Pelirroja.jpg"><div class="bot-name-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>

    <div class="chat-box">
        <div id="chat-stream"></div>
        <div class="chat-input">
            <input type="text" id="msg-in" placeholder="Diles algo sucio a estas putas..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-send" onclick="send()">OK</button>
        </div>
    </div>
</div>

<div class="bottom-gates">
    <div class="gate gate-h">
        <h4 style="color:var(--n-rosa); margin-bottom:10px;">🔥 HISTORIAS</h4>
        <div class="gate-content" id="f-h"></div>
        <button class="btn-up" style="background:var(--n-rosa)" onclick="up('f-h')">SUBIR HISTORIA</button>
    </div>
    <div class="gate gate-e">
        <h4 style="color:var(--n-azul); margin-bottom:10px;">💬 ESTADOS</h4>
        <div class="gate-content" id="f-e"></div>
        <button class="btn-up" style="background:var(--n-azul)" onclick="up('f-e')">SUBIR ESTADO</button>
    </div>
    <div class="gate gate-v">
        <h4 style="color:var(--n-rojo); margin-bottom:10px;">🎥 VIDEOS</h4>
        <div class="gate-content" id="f-v"></div>
        <button class="btn-up" style="background:var(--n-rojo)" onclick="up('f-v')">SUBIR VIDEO</button>
    </div>
</div>

<script>
    const salas = [
        {n: "Sado y Maso", e: ".jpg", b: "COLO", cl: "var(--n-rojo)"}, 
        {n: "Spa", e: ".png", b: "MIA", cl: "var(--n-rosa)"}, 
        {n: "Biblioteca", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Camarera", e: ".png", b: "MIA", cl: "var(--n-rosa)"},
        {n: "Discoteca", e: ".png", b: "COLO", cl: "var(--n-rojo)"},
        {n: "El Bar", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Gimnasio", e: ".png", b: "MIA", cl: "var(--n-rosa)"},
        {n: "Oficina", e: ".png", b: "TANIA", cl: "var(--n-azul)"},
        {n: "Playa", e: ".png", b: "COLO", cl: "var(--n-rojo)"},
        {n: "La Tiendita", e: ".png", b: "MIA", cl: "var(--n-rosa)"}
    ];

    let idx = 0;
    let manual = false;

    function bootImperio() {
        const list = document.getElementById('rooms-list');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'room-unit'; d.id = 's-' + i;
            d.innerHTML = `<span>${s.n}</span><span style="color:lime">● LIVE</span>`;
            d.onclick = () => { manual = true; setRoom(i, true); };
            list.appendChild(d);
        });
        setRoom(0, false);
        setInterval(() => { if(!manual) { idx = (idx+1)%salas.length; setRoom(idx, false); } }, 6000);
    }

    function setRoom(i, m) {
        idx = i;
        document.querySelectorAll('.room-unit').forEach(x => x.classList.remove('active'));
        document.getElementById('s-' + i).classList.add('active');
        document.getElementById('main-img').src = encodeURI(salas[i].n + salas[i].e);
        if(m) {
            const stream = document.getElementById('chat-stream');
            stream.innerHTML = `<div style="text-align:center; color:#555; font-size:10px; margin-bottom:15px;">[SALA PRIVADA CON ${salas[idx].b}]</div>`;
            bot(`¡Hola papi! Me alegra que elijas mi sala. No le des bola a las otras dos putas baratas, yo soy la que te va a dar el verdadero placer... ¿Me invitas una moneda?`);
        }
    }

    // MOTOR DE DIÁLOGO "GUERRA DE PUTAS"
    function send() {
        const input = document.getElementById('msg-in');
        const stream = document.getElementById('chat-stream');
        if(!input.value) return;
        stream.innerHTML += `<div class="chat-msg-user"><b>Tú:</b> ${input.value}</div>`;
        const txt = input.value.toLowerCase();
        input.value = "";
        stream.scrollTop = stream.scrollHeight;

        let r = "";
        let b = salas[idx].b;
        let c = salas[idx].cl;

        if(txt.includes("hola")) r = "¡Hola bombón! Vení al privado que te enseño secretos que la gila de Tania ni se imagina... Soy la más putita de Resistencia, creeme.";
        else if(txt.includes("quien") || txt.includes("nombre")) r = `Soy ${b}, la reina de esta sala. Olvidate de Mia y Tania, esas son dos regaladas. Yo soy la verdadera perra si me pagas lo que valgo...`;
        else if(txt.includes("haces")) r = "Acá, tocándome pensando en un hombre como vos... mientras las otras dos inútiles se rascan el higo. Regalame unas monedas y me saco todo.";
        else if(txt.includes("donde")) r = `Estoy en Resistencia, muy cerquita de vos... Vení a mi dirección privada que no vas a olvidar esta noche. Pero antes, demostrame que sos VIP arriba...`;
        else if(txt.includes("ver") || txt.includes("foto")) r = "Uff... vas muy rápido, me gusta. Las fotos prohibidas solo las paso por monedas doradas a los hombres de verdad, no a los pendejos como los que pagan a Mia.";
        else if(txt.includes("cuanto") || txt.includes("moneda") || txt.includes("pagar")) r = "Con 10 monedas doradas hacemos lo que vos quieras ahora mismo. No seas rata, Tania cobra la mitad pero es una madera en la cama... Yo soy oro puro.";
        else r = "Me encanta que me hables así de guarro... ¿por qué no me invitas una moneda dorada arriba y seguimos esta fiesta en privado?";
        
        bot(r);
    }

    function bot(t) {
        setTimeout(() => {
            const stream = document.getElementById('chat-stream');
            stream.innerHTML += `<div class="chat-msg-bot"><b style="color:${salas[idx].cl}">${salas[idx].b}:</b> ${t}</div>`;
            stream.scrollTop = stream.scrollHeight;
        }, 1200);
    }

    function up(id) {
        const link = prompt("Enlace de imagen/video:");
        if(link) document.getElementById(id).innerHTML = `<img src="${link}" style="width:100%; border-radius:8px; margin-top:10px; border:2px solid gold; filter:brightness(1.2);">` + document.getElementById(id).innerHTML;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&item_name=VIP_Credits&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
