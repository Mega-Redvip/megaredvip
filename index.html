<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO FINAL</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; 
            --n-rosa: #ff00ff; --n-verde: #00ff66;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 320px 1fr 320px; 
            align-items: center; padding: 15px 30px; border-bottom: 4px solid var(--n-rojo); 
            background: #050505; box-shadow: 0 0 25px var(--n-rojo);
        }
        .header-side { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .publi-box { width: 260px; height: 80px; border: 2px solid var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 11px; text-transform: uppercase; }
        .coins { display: flex; gap: 15px; }
        .coin { 
            width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 2px solid white; font-size: 1em;
        }
        .logo-center img { height: 200px; filter: drop-shadow(0 0 25px var(--n-rojo)); }

        /* CUERPO PRINCIPAL */
        .main-container { 
            display: grid; grid-template-columns: 180px 1fr 420px; 
            gap: 20px; padding: 20px; height: 75vh;
        }

        /* 1. SALAS (CARRUSEL IZQUIERDO) */
        .rooms-list { display: flex; flex-direction: column; gap: 5px; }
        .room-btn { 
            padding: 10px; background: #111; border: 1px solid #333; color: #777; 
            font-size: 10px; text-transform: uppercase; cursor: pointer; text-align: center;
            border-radius: 4px; transition: 0.3s;
        }
        .room-btn.active { background: var(--n-rojo); border-color: white; color: white; box-shadow: 0 0 10px var(--n-rojo); font-weight: 900; transform: scale(1.05); }

        /* 2. VISOR CENTRAL */
        .viewer-area { display: flex; flex-direction: column; gap: 10px; }
        .main-screen { 
            border: 4px solid var(--n-rojo); border-radius: 15px; flex-grow: 1; 
            background: #000; overflow: hidden; box-shadow: 0 0 30px rgba(255,0,60,0.2);
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        .btn-ali { 
            display: none; width: 100%; padding: 15px; background: #ff4747; color: white; 
            text-decoration: none; text-align: center; font-weight: 900; border-radius: 8px;
            font-size: 1.1em; border: 3px solid white; animation: blink 1s infinite;
        }

        /* 3. BOTS (NITIDEZ Y CUERPO COMPLETO) */
        .right-panel { display: flex; flex-direction: column; gap: 15px; height: 100%; }
        .bots-display { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; height: 380px; }
        .bot-col { display: flex; flex-direction: column; gap: 5px; height: 100%; }
        .bot-frame { 
            flex-grow: 1; border: 2px solid #222; border-radius: 10px; 
            overflow: hidden; background: #080808; 
        }
        .bot-frame img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* Esto asegura que se vea entera y nítida */
            object-position: top; 
        }
        .bot-label { text-align: center; font-size: 11px; font-weight: 900; padding: 4px; border-radius: 4px; text-transform: uppercase; }

        .chat-area { 
            background: #050505; border: 2px solid var(--n-rojo); border-radius: 12px; 
            flex-grow: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 6px;
        }
        .msg { font-size: 12px; border-bottom: 1px solid #1a1a1a; padding-bottom: 4px; }

        /* MUROS */
        .bottom-walls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px 40px; border-top: 4px solid var(--n-rojo); }
        .wall-card { background: #0a0a0a; border: 2px solid var(--n-rojo); padding: 15px; border-radius: 15px; text-align: center; }
        .wall-space { height: 120px; background: #000; margin: 10px 0; border-radius: 8px; overflow-y: auto; padding: 8px; text-align: left; border: 1px solid #222; font-size: 11px; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body onload="init()">

<header>
    <div class="header-side">
        <div class="publi-box">AD SPACE $20</div>
        <div class="coins">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(3)">$3</div>
        </div>
    </div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="header-side">
        <div class="publi-box">AD SPACE $50</div>
        <div class="coins">
            <div class="coin" onclick="pay(5)">$5</div>
            <div class="coin" onclick="pay(10)">$10</div>
        </div>
    </div>
</header>

<div class="main-container">
    <div id="rooms-menu" class="rooms-list"></div>

    <div class="viewer-area">
        <div class="main-screen"><img id="main-view" src=""></div>
        <a id="ali-btn" href="TU_LINK_ALIEXPRESS" target="_blank" class="btn-ali">🛒 TIENDITA ALIEXPRESS</a>
    </div>

    <div class="right-panel">
        <div class="bots-display">
            <div class="bot-col">
                <div class="bot-frame"><img src="Rubia.jpg"></div>
                <div class="bot-label" style="background: rgba(255,0,255,0.2); color: var(--n-rosa);">MIA</div>
            </div>
            <div class="bot-col">
                <div class="bot-frame"><img src="Morocha.jpg"></div>
                <div class="bot-label" style="background: rgba(0,217,255,0.2); color: var(--n-azul);">TANIA</div>
            </div>
            <div class="bot-col">
                <div class="bot-frame"><img src="Pelirroja.jpg"></div>
                <div class="bot-label" style="background: rgba(255,0,60,0.2); color: var(--n-rojo);">COLO</div>
            </div>
        </div>
        <div id="chat-stream" class="chat-area"></div>
    </div>
</div>

<div class="bottom-walls">
    <div class="wall-card"><h3>📱 ESTADOS</h3><div class="wall-space" id="w-e"></div><button onclick="postTo('w-e')">SUBIR</button></div>
    <div class="wall-card"><h3>📖 HISTORIAS</h3><div class="wall-space" id="w-h"></div><button onclick="postTo('w-h')">SUBIR</button></div>
    <div class="wall-card"><h3>🎬 VIDEOS</h3><div class="wall-space" id="w-v"></div><button onclick="postTo('w-v')">SUBIR</button></div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let currentIdx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym_movimiento.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda_musica.mp3"}, 
        {n: "Oficina", e: ".png", s: "oficina_ambiente.mp3"}, {n: "Playa", e: ".png", s: "playa_olas.mp3"}
    ];

    function init() {
        const menu = document.getElementById('rooms-menu');
        rooms.forEach((r, i) => {
            const b = document.createElement('div');
            b.className = 'room-btn'; b.id = 'room-' + i;
            b.innerText = r.n;
            b.onclick = () => { selectRoom(i); };
            menu.appendChild(b);
        });
        
        selectRoom(0);
        // CARRUSEL AUTOMÁTICO: Cambia cada 6 segundos
        setInterval(() => {
            currentIdx = (currentIdx + 1) % rooms.length;
            selectRoom(currentIdx);
        }, 6000);

        setInterval(botChat, 4000);
    }

    function selectRoom(i) {
        currentIdx = i;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('room-' + i).classList.add('active');
        document.getElementById('main-view').src = encodeURI(rooms[i].n + rooms[i].e);
        document.getElementById('ali-btn').style.display = (rooms[i].n === "La Tiendita") ? "block" : "none";
        
        const player = document.getElementById('audio-player');
        player.src = rooms[i].s;
        player.play().catch(() => {});
    }

    function botChat() {
        const chat = document.getElementById('chat-stream');
        const bots = [
            {n: "MIA", c: "var(--n-rosa)", m: "¡Mis historias están que arden! 🔥"},
            {n: "TANIA", c: "var(--n-azul)", m: "¿Quién me invita un trago? Compra monedas arriba 💎"},
            {n: "COLO", c: "var(--n-rojo)", m: "Acabo de subir un video prohibido abajo... 🔞"}
        ];
        const b = bots[Math.floor(Math.random()*3)];
        chat.innerHTML = `<div class="msg"><b style="color:${b.c}">${b.n}:</b> ${b.m}</div>` + chat.innerHTML;
    }

    function postTo(id) {
        const v = prompt("Publica:");
        if(v) document.getElementById(id).innerHTML = `<div>${v}</div>` + document.getElementById(id).innerHTML;
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
