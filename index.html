<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v112</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; }

        /* 1. CABEZAL: LOGO GIGANTE + MONEDAS FUERA + PUBLICIDAD */
        header { 
            display: grid; grid-template-columns: 200px 100px 1fr 100px 200px; 
            padding: 20px; background: #050505; border-bottom: 6px solid var(--n-rojo);
            align-items: center; gap: 15px;
        }
        .publi { height: 150px; border: 3px dashed var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 14px; border-radius: 15px; }
        .logo-box img { width: 100%; max-height: 300px; object-fit: contain; filter: drop-shadow(0 0 30px var(--n-rojo)); }
        
        .coin-col { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .coin { 
            width: 85px; height: 85px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 24px; cursor: pointer; border: 4px solid white;
            box-shadow: 0 0 20px var(--oro);
        }

        /* 2. MEDIO: 10 SALAS (CARRUSEL VERTICAL FIJO) Y VISOR */
        .mid-section { display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 20px; height: 500px; }
        .rooms-scroll { 
            display: flex; flex-direction: column; gap: 6px; 
            background: #0a0a0a; border: 3px solid #222; border-radius: 20px; padding: 10px;
        }
        .room-opt { 
            flex: 1; padding: 0 15px; background: #111; border-radius: 10px; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
            border: 2px solid #333; font-size: 14px; transition: 0.2s;
        }
        .room-opt.active { background: var(--n-rojo); border-color: white; transform: scale(1.03); }

        .viewer { border: 6px solid var(--n-rojo); border-radius: 25px; background: #050505; overflow: hidden; position: relative; }
        #sala-display { width: 100%; height: 100%; object-fit: cover; }
        .tienda-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 25px 50px; background: var(--n-rojo); color: white; font-size: 28px; border-radius: 60px; text-decoration: none; border: 5px solid white; display: none; z-index: 10; box-shadow: 0 0 50px var(--n-rojo); }

        /* 3. ABAJO: BOTS (+3CM) Y CHAT (MISMO TAMAÑO) */
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px 20px; height: 750px; }
        
        /* BOTS: +3CM reales en visualización */
        .bots-triple { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .bot-card { position: relative; background: #000; border: 3px solid #222; border-radius: 20px; overflow: hidden; }
        .bot-card img { width: 100%; height: 100%; object-fit: contain; image-rendering: -webkit-optimize-contrast; }
        .bot-name { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, #000 40%, transparent); text-align: center; padding: 25px 10px 15px; font-size: 26px; font-weight: 900; }

        .chat-full { background: #050505; border: 6px solid var(--n-rojo); border-radius: 25px; display: flex; flex-direction: column; }
        #chat-content { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 17px; }
        .chat-ctrl { padding: 20px; background: #111; display: flex; gap: 12px; border-radius: 0 0 20px 20px; }
        #chat-input { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 15px; border-radius: 12px; outline: none; }

        /* 4. FINAL: LAS 3 PUERTAS */
        .footer-doors { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; border-top: 6px solid var(--n-rojo); }
        .door-item { background: #0a0a0a; border: 3px solid #333; border-radius: 20px; padding: 15px; text-align: center; }
        .door-img { height: 130px; background: #000; margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .door-img img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onload="start()">

<header>
    <div class="publi">PUBLICIDAD $50</div>
    <div class="coin-col"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <div class="logo-box" style="text-align:center;"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="coin-col"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="publi">PUBLICIDAD $100</div>
</header>

<div class="mid-section">
    <div class="rooms-scroll" id="menu-rooms"></div>
    <div class="viewer">
        <img id="sala-display" src="">
        <a href="https://best.aliexpress.com/" target="_blank" class="tienda-overlay" id="tienda-btn">🔱 TIENDITA VIP 🔱</a>
    </div>
</div>

<div class="bottom-grid">
    <div class="bots-triple">
        <div class="bot-card"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-card"><img src="Morocha.jpg"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-card"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-full">
        <div id="chat-content"></div>
        <div class="chat-ctrl">
            <input type="text" id="chat-input" placeholder="Háblales a las diosas..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--n-rojo); color:white; border:none; padding:0 25px; border-radius:12px; cursor:pointer; font-weight:bold;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-doors">
    <div class="door-item"><h5 style="color:var(--n-rosa)">HISTORIAS</h5><div class="door-img" id="d-h"></div><button style="width:100%; padding:10px; background:var(--n-rosa); color:white; border:none; border-radius:8px; cursor:pointer;" onclick="up('d-h')">SUBIR</button></div>
    <div class="door-item"><h5 style="color:var(--n-azul)">ESTADOS</h5><div class="door-img" id="d-e"></div><button style="width:100%; padding:10px; background:var(--n-azul); color:white; border:none; border-radius:8px; cursor:pointer;" onclick="up('d-e')">SUBIR</button></div>
    <div class="door-item"><h5 style="color:var(--n-rojo)">VIDEOS</h5><div class="door-img" id="d-v"></div><button style="width:100%; padding:10px; background:var(--n-rojo); color:white; border:none; border-radius:8px; cursor:pointer;" onclick="up('d-v')">SUBIR</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function start() {
        const menu = document.getElementById('menu-rooms');
        salas.forEach((s, i) => {
            let b = document.createElement('div');
            b.className = 'room-opt'; b.id = 'r-'+i;
            b.innerHTML = `<span>${s}</span><span style="color:lime; font-size:11px;">ONLINE</span>`;
            b.onclick = () => loadRoom(i);
            menu.appendChild(b);
        });
        loadRoom(0);
        msg("MIA", "Hola amor... bienvenida al Imperio. Las diosas de Resistencia te estaban esperando.");
    }

    function loadRoom(i) {
        document.querySelectorAll('.room-opt').forEach(x => x.classList.remove('active'));
        document.getElementById('r-'+i).classList.add('active');
        const img = document.getElementById('sala-display');
        const btn = document.getElementById('tienda-btn');
        
        if(salas[i] === "LA TIENDITA") {
            btn.style.display = 'block';
            img.style.opacity = '0.2';
        } else {
            btn.style.display = 'none';
            img.style.opacity = '1';
            // Cargamos la imagen con el nombre exacto de la sala
            img.src = encodeURI(salas[i] + ".jpg");
        }
    }

    function up(id) {
        const url = prompt("Pega el enlace de la imagen:");
        if(url) document.getElementById(id).innerHTML = `<img src="${url}">`;
    }

    function send() {
        const i = document.getElementById('chat-input');
        if(!i.value) return;
        document.getElementById('chat-content').innerHTML += `<div style="text-align:right; color:var(--oro); margin-bottom:12px;"><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
        setTimeout(() => { msg("TANIA", "No seas tacaño amor, mandame una moneda."); }, 1200);
    }

    function msg(n, m) {
        const c = document.getElementById('chat-content');
        const col = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        c.innerHTML += `<div style="margin-bottom:12px;"><b style="color:${col}">${n}:</b> ${m}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
