<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | RECONSTRUCCIÓN TOTAL</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Evita que nada se salga de la pantalla */
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* HEADER REDISEÑADO: LOGO GIGANTE Y MONEDAS A LOS LADOS */
        header { 
            height: 220px; background: #000; border-bottom: 5px solid var(--oro); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; position: relative; flex-shrink: 0; 
        }
        .logo-container { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
        .logo-img { height: 200px; filter: drop-shadow(0 0 30px var(--oro)); }
        
        .online-box { background: rgba(0,255,102,0.1); border: 2px solid var(--n-verde); padding: 10px; border-radius: 10px; color: var(--n-verde); text-align: center; width: 200px; }
        .online-num { font-size: 26px; font-weight: 900; display: block; }

        .coin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .coin { 
            width: 65px; height: 65px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff9aa, var(--oro) 50%, #5c4928); 
            border: 3px solid #111; color: #000; font-size: 18px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: 900; box-shadow: 0 4px 0 #333; 
        }

        /* CUERPO DE LA APP: 3 COLUMNAS FIJAS */
        .main-app { 
            display: grid; grid-template-columns: 220px 1fr 400px; gap: 15px; 
            padding: 15px; flex-grow: 1; min-height: 0; 
        }

        /* COLUMNA 1: NAVEGACIÓN */
        .left-col { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .nav-section { background: #0a0a0a; border: 1px solid #333; border-radius: 10px; padding: 10px; }
        .nav-title { color: var(--oro); font-size: 10px; margin-bottom: 8px; text-transform: uppercase; text-align: center; border-bottom: 1px solid #333; }
        .p-btn { 
            width: 100%; padding: 10px; margin-bottom: 5px; background: #111; border: 1px solid #444; 
            color: #fff; cursor: pointer; border-radius: 5px; text-align: left; font-size: 10px; 
            font-weight: 900; text-transform: uppercase; 
        }
        .p-btn.active { background: #fff !important; color: #000 !important; box-shadow: 0 0 10px #fff; }

        /* COLUMNA 2: VISOR CENTRAL (CARRUSEL) */
        .center-col { display: flex; flex-direction: column; min-height: 0; }
        .visor-container { 
            background: #000; border: 4px solid #1a1a1a; border-radius: 15px; 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; position: relative; 
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        .ali-neon { 
            display: none; position: absolute; bottom: 20px; background: var(--n-rojo); 
            color: #fff; padding: 15px 30px; font-size: 18px; font-weight: 900; 
            text-decoration: none; border-radius: 10px; box-shadow: 0 0 20px var(--n-rojo); 
            z-index: 100; animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.7; } }

        /* COLUMNA 3: CHICAS Y CHAT (TODO VISIBLE) */
        .right-side { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .girls-row { display: flex; gap: 5px; height: 220px; flex-shrink: 0; }
        .girl-card { flex: 1; display: flex; flex-direction: column; border: 1px solid #222; border-radius: 10px; overflow: hidden; }
        .girl-img-box { flex-grow: 1; overflow: hidden; }
        .girl-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .girl-name { font-size: 11px; font-weight: 900; text-align: center; padding: 5px; background: #000; }

        .chat-display { 
            flex-grow: 1; background: #050505; border: 2px solid #222; border-radius: 10px; 
            padding: 10px; overflow-y: auto; font-size: 13px; 
        }
        .msg { margin-bottom: 8px; border-left: 4px solid; padding-left: 10px; line-height: 1.2; font-weight: bold; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="online-box">
        <span class="online-num" id="user-count">2,841</span>
        <span style="font-size:10px;">CLIENTES ONLINE</span>
    </div>
    <div class="logo-container">
        <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    </div>
    <div class="coin-grid">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main-app">
    <div class="left-col">
        <div class="nav-section">
            <div class="nav-title">🎥 CONTENIDO</div>
            <button class="p-btn" style="color:var(--n-turq)">🎬 VIDEOS VIP</button>
            <button class="p-btn" style="color:var(--n-rojo)">🔥 ESTADOS</button>
            <button class="p-btn" style="color:var(--n-verde)">📖 HISTORIAS</button>
        </div>
        <div class="nav-section">
            <div class="nav-title">📍 SALAS</div>
            <div id="rooms-list"></div>
        </div>
    </div>

    <div class="center-col">
        <div class="visor-container">
            <img id="main-view" src="">
            <a href="https://tu-link-ali.com" target="_blank" class="ali-neon" id="ali-btn">🛒 COMPRAR JUGUETES</a>
        </div>
    </div>

    <div class="right-side">
        <div class="girls-row">
            <div class="girl-card">
                <div class="girl-img-box"><img src="Rubia.jpg"></div>
                <div class="girl-name" style="color:var(--n-turq);">MIA</div>
            </div>
            <div class="girl-card">
                <div class="girl-img-box"><img src="Morocha.jpg"></div>
                <div class="girl-name" style="color:var(--n-verde);">TANIA</div>
            </div>
            <div class="girl-card">
                <div class="girl-img-box"><img src="Pelirroja.jpg"></div>
                <div class="girl-name" style="color:var(--n-rojo);">COLO</div>
            </div>
        </div>
        <div class="chat-display" id="chat-stream"></div>
    </div>
</div>

<audio id="room-sound" loop></audio>

<script>
    let idx = 0; let userCity = "Resistencia";
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "Sado_y_Maso.mp3", c: "#ff003c"}, 
        {n: "Spa", e: ".png", s: "Spa.mp3", c: "#00d9ff"}, 
        {n: "Biblioteca", e: ".png", s: "Biblioteca.mp3", c: "#bc13fe"}, 
        {n: "Camarera", e: ".png", s: "Camarera.mp3", c: "#00ff66"}, 
        {n: "Discoteca", e: ".png", s: "Discoteca.mp3", c: "#ff00ff"}, 
        {n: "El Bar", e: ".png", s: "El_Bar.mp3", c: "#d4af37"},
        {n: "Gimnasio", e: ".png", s: "Gimnasio.mp3", c: "#00ff66"}, 
        {n: "La Tiendita", e: ".png", s: "La_Tiendita.mp3", c: "#ff4500"}, 
        {n: "Oficina", e: ".png", s: "Oficina.mp3", c: "#1e90ff"}, 
        {n: "Playa", e: ".png", s: "Playa.mp3", c: "#ffff00"}
    ];

    fetch('https://ipapi.co/json/').then(res => res.json()).then(data => { if(data.city) userCity = data.city; });

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.style.color = r.c; b.innerHTML = `🚪 ${r.n}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 6000);
        setInterval(botChat, 4000);
        setInterval(() => { 
            let base = 2800 + Math.floor(Math.random() * 200);
            document.getElementById('user-count').innerText = base.toLocaleString(); 
        }, 2000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('r-'+idx);
        if(btn) btn.classList.add('active');
        
        const r = rooms[idx];
        document.getElementById('main-view').src = encodeURIComponent(r.n) + r.e;
        document.getElementById('ali-btn').style.display = (r.n === "La Tiendita") ? "block" : "none";
        
        const p = document.getElementById('room-sound');
        p.src = r.s; p.play().catch(() => {});
    }

    function botChat() {
        const f = [
            {u:"MIA", c:"#00d9ff", t:`🔞 ¿Hay algún macho de ${userCity} para hacerme de todo?`},
            {u:"TANIA", c:"#00ff66", t:`🔥 En ${userCity} me aman a mí, miren mis estados.`},
            {u:"COLO", c:"#ff003c", t:`🔞 Recién me pagó uno de ${userCity} y quedé re caliente.`},
            {u:"MIA", c:"#00d9ff", t:"💎 Manden tokens pajeros, ¡el show no es gratis!"}
        ];
        const m = f[Math.floor(Math.random() * f.length)];
        const box = document.getElementById('chat-stream');
        box.innerHTML += `<div class="msg" style="border-left-color:${m.c}; color:${m.c}"><b>${m.u}:</b> ${m.t}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function pay(n) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount=${n}&currency_code=USD`, '_blank'); }
</script>
</body>
</html>
