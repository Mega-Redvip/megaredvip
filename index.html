<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v123</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* 1. HEADER CON SPONSORS */
        header { 
            display: grid; grid-template-columns: 200px 100px 1fr 100px 200px; 
            align-items: center; gap: 15px; padding: 15px;
            background: #050505; border-bottom: 5px solid var(--n-rojo); height: 280px;
        }
        .sponsor-box { 
            height: 180px; border: 2px dashed #444; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: #444; font-size: 12px; text-align: center; cursor: pointer;
        }
        .sponsor-box:hover { border-color: var(--oro); color: var(--oro); }
        .logo-v123 { width: 100%; max-height: 250px; object-fit: contain; filter: drop-shadow(0 0 15px var(--n-rojo)); }

        .coin { 
            width: 60px; height: 60px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; border: 3px solid white; box-shadow: 0 0 10px var(--oro);
        }

        /* 2. VISOR DE SALAS (CARRUSEL) */
        .salas-wrapper { display: grid; grid-template-columns: 220px 1fr; gap: 10px; padding: 15px; height: 380px; }
        .menu-salas { display: flex; flex-direction: column; gap: 3px; background: #0a0a0a; border: 2px solid #222; padding: 5px; border-radius: 10px; overflow-y: auto; }
        .btn-sala { padding: 10px; background: #111; border: 1px solid #333; color: #666; cursor: pointer; font-size: 11px; border-radius: 5px; text-align: left; }
        .btn-sala.active { background: var(--n-rojo); color: white; border-color: white; box-shadow: 0 0 10px var(--n-rojo); }

        .visor-marco { border: 6px solid var(--n-rojo); border-radius: 20px; background: #050505; overflow: hidden; position: relative; }
        #img-sala { width: 100%; height: 100%; object-fit: cover; }
        .error-img { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #333; font-size: 14px; text-align: center; width: 80%; }

        /* 3. BOTS Y CHAT (ALTURA FIJA 2CM MENOS) */
        .seccion-principal { 
            display: grid; grid-template-columns: repeat(3, 1fr) 450px; 
            height: 380px; /* Altura reducida y fija */
            border-bottom: 5px solid var(--n-rojo);
        }
        .bot-col { position: relative; background: #000; border-right: 1px solid #111; overflow: hidden; }
        .bot-col img { width: 100%; height: 100%; object-fit: cover; }
        .bot-tag { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, black, transparent); text-align: center; padding: 10px; font-size: 18px; }

        .chat-col { background: #080808; border-left: 4px solid var(--n-rojo); display: flex; flex-direction: column; }
        #chat-msjs { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 13px; }
        .chat-in { padding: 10px; background: #111; display: flex; gap: 5px; }
        #txt-chat { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 8px; border-radius: 5px; outline: none; }

        /* 4. PUERTAS E HISTORIAS (CONTENIDO SEGURO) */
        .footer-vip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; background: #050505; }
        .puerta-box { 
            background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 15px; 
            text-align: center; display: flex; flex-direction: column; gap: 10px;
        }
        .historia-preview { 
            height: 140px; width: 100%; background: #000; border: 1px solid #222; 
            border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .historia-preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn-subir { padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="sponsor-box" onclick="alert('Contacto para publicidad: $50')">ESPACIO DISPONIBLE<br>AUSPICIANTE</div>
    <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="coin" onclick="pago(1)">$1</div>
        <div class="coin" onclick="pago(5)">$5</div>
    </div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v123">
    <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="coin" onclick="pago(10)">$10</div>
        <div class="coin" onclick="pago(20)">$20</div>
    </div>
    <div class="sponsor-box" onclick="alert('Contacto para publicidad: $100')">ESPACIO DISPONIBLE<br>AUSPICIANTE</div>
</header>

<div class="salas-wrapper">
    <div class="menu-salas" id="lista-s"></div>
    <div class="visor-marco">
        <div id="debug-info" class="error-img"></div>
        <img id="img-sala" src="" onerror="showError(this.src)">
    </div>
</div>

<div class="seccion-principal">
    <div class="bot-col"><img src="Rubia.jpg"><div class="bot-tag" style="color:var(--n-rosa)">MIA</div></div>
    <div class="bot-col"><img src="Morocha.jpg"><div class="bot-tag" style="color:var(--n-azul)">TANIA</div></div>
    <div class="bot-col"><img src="Pelirroja.jpg"><div class="bot-tag" style="color:var(--n-rojo)">COLO</div></div>
    
    <div class="chat-col">
        <div id="chat-msjs"></div>
        <div class="chat-in">
            <input type="text" id="txt-chat" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 10px; border-radius:4px; cursor:pointer;">OK</button>
        </div>
    </div>
</div>

<div class="footer-vip">
    <div class="puerta-box">
        <h4 style="color:var(--n-rosa)">HISTORIAS</h4>
        <div class="historia-preview" id="h-historia"><span>VACÍO</span></div>
        <button class="btn-subir" style="background:var(--n-rosa)" onclick="subir('h-historia')">SUBIR HISTORIA</button>
    </div>
    <div class="puerta-box">
        <h4 style="color:var(--n-azul)">ESTADOS</h4>
        <div class="historia-preview" id="h-estado"><span>VACÍO</span></div>
        <button class="btn-subir" style="background:var(--n-azul)" onclick="subir('h-estado')">SUBIR ESTADO</button>
    </div>
    <div class="puerta-box">
        <h4 style="color:var(--n-rojo)">VIDEOS</h4>
        <div class="historia-preview" id="h-video"><span>VACÍO</span></div>
        <button class="btn-subir" style="background:var(--n-rojo)" onclick="subir('h-video')">SUBIR VIDEO</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function init() {
        const menu = document.getElementById('lista-s');
        salas.forEach((s, i) => {
            let b = document.createElement('div');
            b.className = 'btn-sala'; b.id = 'sala-'+i;
            b.innerHTML = `<b>${s}</b>`;
            b.onclick = () => verSala(i);
            menu.appendChild(b);
        });
        verSala(0);
        hablar("MIA", "Bienvenida al Imperio. Mira las salas arriba.");
    }

    function verSala(i) {
        document.querySelectorAll('.btn-sala').forEach(x => x.classList.remove('active'));
        document.getElementById('sala-'+i).classList.add('active');
        const img = document.getElementById('img-sala');
        const debug = document.getElementById('debug-info');
        
        debug.innerHTML = ""; // Limpiar error previo
        img.style.display = "block";
        img.src = salas[i] + ".jpg";
    }

    function showError(url) {
        const debug = document.getElementById('debug-info');
        const img = document.getElementById('img-sala');
        img.style.display = "none";
        debug.innerHTML = `<span style="color:red">⚠️ Error al cargar:</span><br>${url.split('/').pop()}<br><small>Asegúrate de que el archivo existe en la carpeta.</small>`;
    }

    function enviar() {
        const txt = document.getElementById('txt-chat');
        if(!txt.value) return;
        const box = document.getElementById('chat-msjs');
        box.innerHTML += `<div style="text-align:right; margin-bottom:10px; color:var(--oro)"><b>Tú:</b> ${txt.value}</div>`;
        txt.value = "";
        box.scrollTop = box.scrollHeight;
    }

    function hablar(n, m) {
        const box = document.getElementById('chat-msjs');
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        box.innerHTML += `<div style="margin-bottom:10px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function subir(id) {
        const url = prompt("Pega el enlace de la imagen o video:");
        if(url) {
            document.getElementById(id).innerHTML = `<img src="${url}">`;
        }
    }

    function pago(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
