<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v109</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER SUPREMO */
        header { 
            display: grid; grid-template-columns: 1fr 1.5fr 1fr; 
            padding: 10px 20px; background: #050505; border-bottom: 5px solid var(--n-rojo);
            align-items: center;
        }
        .logo-box img { width: 100%; max-height: 180px; object-fit: contain; filter: drop-shadow(0 0 20px var(--n-rojo)); }
        .coin-box { display: flex; gap: 8px; justify-content: center; }
        .coin { 
            width: 75px; height: 75px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 22px; cursor: pointer; border: 3px solid white;
            box-shadow: 0 0 15px var(--oro);
        }

        /* LAS 10 SALAS FIJAS (SIN FLECHAS) */
        .main-layout { display: grid; grid-template-columns: 250px 1fr 350px; gap: 10px; padding: 10px; height: 600px; }
        
        .rooms-static { 
            display: flex; flex-direction: column; gap: 4px; 
            background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 8px;
        }
        .room-btn { 
            flex: 1; padding: 0 10px; background: #111; border-radius: 6px; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid #333; font-size: 11px; transition: 0.2s;
        }
        .room-btn.active { background: var(--n-rojo); border-color: white; transform: scale(1.02); }

        /* VISOR DE SALAS */
        .viewer-box { 
            border: 5px solid var(--n-rojo); border-radius: 20px; 
            background: #050505; overflow: hidden; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        #sala-actual { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        
        .btn-tienda { 
            position: absolute; padding: 15px 30px; background: var(--n-rojo); color: white;
            font-size: 20px; border-radius: 40px; text-decoration: none; border: 3px solid white;
            box-shadow: 0 0 30px var(--n-rojo); display: none; z-index: 10;
        }

        /* CHAT PROPORCIONAL */
        .chat-side { 
            background: #050505; border: 4px solid var(--n-rojo); border-radius: 20px; 
            display: flex; flex-direction: column; height: 100%;
        }
        #chat-window { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 14px; font-family: sans-serif; }
        .chat-input-row { padding: 10px; background: #111; display: flex; gap: 5px; border-radius: 0 0 15px 15px; }
        #input-text { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 8px; border-radius: 5px; outline: none; }

        /* SECCIÓN BOTS: CUERPO COMPLETO Y NÍTIDAS */
        .bots-row { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; padding: 10px; height: 800px; /* Tamaño ideal para no pixelar */
        }
        .bot-frame { 
            position: relative; background: linear-gradient(180deg, #111, #000); 
            border: 3px solid #222; border-radius: 20px; overflow: hidden;
        }
        .bot-frame img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* Garantiza cuerpo completo sin estirar */
            image-rendering: -webkit-optimize-contrast;
            filter: brightness(1.1);
        }
        .bot-tag { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 15px; font-size: 22px; font-weight: 900; }

        /* FOOTER PUERTAS */
        .footer-doors { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; border-top: 4px solid var(--n-rojo); }
        .door-card { background: #0a0a0a; border: 2px solid #333; border-radius: 15px; padding: 10px; text-align: center; }
        .door-img { height: 110px; background: #000; margin-bottom: 5px; border-radius: 8px; overflow: hidden; border: 1px solid #222; }
        .door-img img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onload="boot()">

<header>
    <div>
        <div style="width:100%; height:60px; border:2px dashed var(--n-rojo); color:var(--n-rojo); display:flex; align-items:center; justify-content:center; font-size:12px;">ADS $50</div>
        <div class="coin-box"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    </div>
    <div class="logo-box" style="text-align:center;"><img src="Logo Mega Red Lunar.jpg"></div>
    <div>
        <div style="width:100%; height:60px; border:2px dashed var(--n-rojo); color:var(--n-rojo); display:flex; align-items:center; justify-content:center; font-size:12px;">ADS $100</div>
        <div class="coin-box"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    </div>
</header>

<div class="main-layout">
    <div class="rooms-static" id="room-menu"></div>
    <div class="viewer-box">
        <img id="sala-actual" src="">
        <a href="https://best.aliexpress.com/" target="_blank" class="btn-tienda" id="tienda-link">🔱 TIENDITA 🔱</a>
    </div>
    <div class="chat-side">
        <div id="chat-window"></div>
        <div class="chat-input-row">
            <input type="text" id="input-text" placeholder="Háblales..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--n-rojo); color:white; border:none; padding:0 12px; border-radius:5px; cursor:pointer;">OK</button>
        </div>
    </div>
</div>

<div class="bots-row">
    <div class="bot-frame"><img src="Rubia.jpg"><div class="bot-tag" style="color:var(--n-rosa)">MIA</div></div>
    <div class="bot-frame"><img src="Morocha.jpg"><div class="bot-tag" style="color:var(--n-azul)">TANIA</div></div>
    <div class="bot-frame"><img src="Pelirroja.jpg"><div class="bot-tag" style="color:var(--n-rojo)">COLO</div></div>
</div>

<div class="footer-doors">
    <div class="door-card"><h6 style="color:var(--n-rosa)">HISTORIAS</h6><div class="door-img" id="d-h"></div><button style="width:100%; background:var(--n-rosa); color:white; border:none; border-radius:5px; cursor:pointer;" onclick="up('d-h')">SUBIR</button></div>
    <div class="door-card"><h6 style="color:var(--n-azul)">ESTADOS</h6><div class="door-img" id="d-e"></div><button style="width:100%; background:var(--n-azul); color:white; border:none; border-radius:5px; cursor:pointer;" onclick="up('d-e')">SUBIR</button></div>
    <div class="door-card"><h6 style="color:var(--n-rojo)">VIDEOS</h6><div class="door-img" id="d-v"></div><button style="width:100%; background:var(--n-rojo); color:white; border:none; border-radius:5px; cursor:pointer;" onclick="up('d-v')">SUBIR</button></div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];

    function boot() {
        const menu = document.getElementById('room-menu');
        salas.forEach((s, i) => {
            let b = document.createElement('div');
            b.className = 'room-btn'; b.id = 's-'+i;
            b.innerHTML = `<span>${s}</span><span style="color:lime; font-size:9px;">LIVE</span>`;
            b.onclick = () => set(i);
            menu.appendChild(b);
        });
        set(0);
        msg("MIA", "Hola bombón... bienvenida al Imperio de Resistencia. ¿Viste qué gatas estamos hoy?");
    }

    function set(i) {
        document.querySelectorAll('.room-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('s-'+i).classList.add('active');
        const img = document.getElementById('sala-actual');
        const btn = document.getElementById('tienda-link');
        
        if(salas[i] === "LA TIENDITA") {
            btn.style.display = 'block';
            img.style.opacity = '0';
        } else {
            btn.style.display = 'none';
            img.style.opacity = '1';
            // IMPORTANTE: Asegúrate de que el nombre del archivo sea igual a la sala.
            img.src = encodeURI(salas[i] + ".jpg");
        }
    }

    function up(id) {
        const url = prompt("Enlace de imagen:");
        if(url) document.getElementById(id).innerHTML = `<img src="${url}">`;
    }

    function send() {
        const i = document.getElementById('input-text');
        if(!i.value) return;
        const w = document.getElementById('chat-window');
        w.innerHTML += `<div style="text-align:right; color:var(--oro); margin-bottom:10px;"><b>Tú:</b> ${i.value}</div>`;
        i.value = "";
        setTimeout(() => { msg("TANIA", "No seas tacaño, mandame una moneda y te muestro todo."); }, 1500);
    }

    function msg(n, m) {
        const w = document.getElementById('chat-window');
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        w.innerHTML += `<div style="margin-bottom:10px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        w.scrollTop = w.scrollHeight;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
