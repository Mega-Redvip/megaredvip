<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v150</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: flex; justify-content: space-around; align-items: center; 
            padding: 10px; background: #050505; border-bottom: 8px solid var(--n-rojo); height: 280px;
        }
        .logo-v150 { height: 230px; width: 230px; object-fit: contain; }
        .coin { width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; border: 5px solid white; cursor: pointer; box-shadow: 0 0 15px var(--oro); }

        /* SECCIÓN SALAS */
        .seccion-salas { display: grid; grid-template-columns: 280px 1fr; height: 500px; border-bottom: 8px solid var(--n-rojo); }
        .menu-lat { overflow-y: auto; background: #080808; border-right: 2px solid #333; }
        .s-item { padding: 20px; border-bottom: 1px solid #111; cursor: pointer; color: #555; font-size: 15px; }
        .s-item.active { background: var(--n-rojo); color: white; }
        
        .visor-vip { background: #000; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #sala-img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .error-log { position: absolute; text-align: center; color: #444; border: 1px dashed #333; padding: 20px; }

        /* SECCIÓN IA: 600PX SIN ESCALERA */
        .seccion-ia { display: grid; grid-template-columns: 1fr 1fr; height: 600px; }

        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; border-right: 8px solid var(--n-rojo); }
        .bot-box { 
            position: relative; 
            height: 600px; /* ALTURA 600PX */
            background: #050505; 
            border-right: 1px solid #222;
            display: flex; 
            align-items: flex-end; /* ANCLA LAS FOTOS AL SUELO */
            justify-content: center;
            overflow: hidden;
        }
        /* ESTO ELIMINA LA ESCALERA: Todas llegan al borde inferior */
        .bot-box img { 
            height: 100%; /* Ocupa todo el alto de 600px */
            width: auto;
            max-width: 100%;
            object-fit: contain; /* Se ven enteras, pies a cabeza */
            z-index: 2;
        }
        .bot-label { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 28px; font-weight: 900; text-shadow: 0 0 15px #000; z-index: 3; }

        .chat-container { display: flex; flex-direction: column; height: 600px; background: #0a0a0a; }
        #chat-window { flex-grow: 1; padding: 30px; overflow-y: auto; font-size: 17px; line-height: 1.5; }
        .chat-footer { padding: 20px; background: #111; display: flex; gap: 10px; }
        #msg-input { flex-grow: 1; background: #000; border: 3px solid var(--n-rojo); color: white; padding: 15px; border-radius: 10px; outline: none; font-size: 16px; }

        /* PUERTAS */
        .footer-puertas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; background: #000; }
        .p-wrap { background: #080808; border: 1px solid #333; border-radius: 20px; padding: 20px; text-align: center; }
        .p-preview { height: 120px; background: #000; border: 2px dashed #444; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-btn { width: 100%; padding: 20px; border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; }
    </style>
</head>
<body onload="boot()">

<header>
    <div class="coin" onclick="pay(1)">$1</div>
    <div class="coin" onclick="pay(5)">$5</div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v150">
    <div class="coin" onclick="pay(10)">$10</div>
    <div class="coin" onclick="pay(20)">$20</div>
</header>

<div class="seccion-salas">
    <div class="menu-lat" id="menu-lat"></div>
    <div class="visor-vip">
        <div id="st-sala" class="error-log">
            <p>CONECTANDO...</p>
            <small id="db-msg"></small>
        </div>
        <img id="sala-img" src="" onerror="forceSearch(this)">
    </div>
</div>

<div class="seccion-ia">
    <div class="grid-bots">
        <div class="bot-box"><img src="Rubia.jpg"><div class="bot-label" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-box"><img src="Morocha.jpg"><div class="bot-label" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-box"><img src="Pelirroja.jpg"><div class="bot-label" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-container">
        <div id="chat-window"></div>
        <div class="chat-footer">
            <input type="text" id="msg-input" placeholder="Diles algo a las chicas..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 35px; border-radius:10px; cursor:pointer; font-weight:bold;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-puertas">
    <div class="p-wrap">
        <div class="p-preview" id="v-h"></div>
        <button onclick="up('v-h')" style="background:var(--n-rosa)" class="p-btn">Historias</button>
    </div>
    <div class="p-wrap">
        <div class="p-preview" id="v-e"></div>
        <button onclick="up('v-e')" style="background:var(--n-azul)" class="p-btn">Estados</button>
    </div>
    <div class="p-wrap">
        <div class="p-preview" id="v-v"></div>
        <button onclick="up('v-v')" style="background:var(--n-rojo)" class="p-btn">Videos</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    let sIdx = 0;

    function boot() {
        const ml = document.getElementById('menu-lat');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-item'; d.id = 'sl-'+i;
            d.innerHTML = `<b>${s}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { sIdx = (sIdx + 1) % salas.length; ver(sIdx); }, 8000);
        mensaje("TANIA", "¡Hola! He subido nuestro tamaño a 600px y estamos todas alineadas desde abajo.");
    }

    function ver(i) {
        sIdx = i;
        document.querySelectorAll('.s-item').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        const img = document.getElementById('sala-img');
        img.style.display = "none";
        document.getElementById('st-sala').style.display = "block";
        document.getElementById('db-msg').innerText = "Cargando: " + salas[i];
        img.dataset.try = "0";
        img.src = salas[i] + ".jpg";
    }

    function forceSearch(img) {
        let t = parseInt(img.dataset.try);
        const name = salas[sIdx];
        const formats = [".png", ".JPG", ".PNG", ".jpeg", ".JPEG"];
        
        if(t < formats.length) {
            img.dataset.try = t + 1;
            // Prueba con espacios, sin espacios y diferentes extensiones
            if(t % 2 === 0) {
                img.src = name.replace(/\s/g, "") + formats[Math.floor(t/2)];
            } else {
                img.src = name + formats[Math.floor(t/2)];
            }
        } else {
            document.getElementById('db-msg').innerHTML = `<span style="color:red">ERROR:</span> No se encuentra el archivo.<br>Verifica que se llame <b>${name}.jpg</b> o <b>${name}.png</b>`;
        }
    }

    document.getElementById('sala-img').onload = function() {
        this.style.display = "block";
        document.getElementById('st-sala').style.display = "none";
    };

    function enviar() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        document.getElementById('chat-window').innerHTML += `<div style="text-align:right; margin-bottom:15px; color:var(--oro)"><b>Tú:</b> ${input.value}</div>`;
        setTimeout(() => mensaje("MIA", "¡Wow! Se ve todo mucho más grande ahora."), 800);
        input.value = "";
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function mensaje(n, m) {
        const color = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-window').innerHTML += `<div style="margin-bottom:15px;"><b style="color:${color}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function up(id) {
        let n = prompt("Nombre de la imagen:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
