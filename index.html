<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v181</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 280px 130px 1fr; 
            align-items: center; gap: 10px; padding: 10px;
            background: #050505; border-bottom: 5px solid var(--n-rojo); height: 300px;
        }
        .pub-neon { border: 3px solid var(--n-rojo); height: 180px; border-radius: 10px; display:flex; align-items:center; justify-content:center; text-align:center; animation: flicker 2s infinite alternate; font-size: 12px; }
        @keyframes flicker { 0%, 100% { box-shadow: 0 0 10px var(--n-rojo); color: var(--n-rojo); } 50% { box-shadow: 0 0 20px var(--oro); color: var(--oro); border-color: var(--oro); } }
        
        .logo-v181 { height: 260px; width: 260px; object-fit: contain; }
        .coin { width: 75px; height: 75px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; border: 4px solid white; cursor: pointer; box-shadow: 0 0 10px var(--oro); }

        /* GRID PRINCIPAL */
        .main-container { display: grid; grid-template-columns: 280px 1fr; border-bottom: 5px solid var(--n-rojo); }

        /* MENÚ DE SALAS COMPACTO Y ALINEADO (280PX) */
        .menu-visual { 
            background: #080808; 
            height: 500px; 
            border-right: 3px solid #333; 
            padding: 5px;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* QUITA LAS FLECHAS */
        }
        .s-card { 
            background: #111; border: 1px solid #333; border-radius: 5px; cursor: pointer; 
            overflow: hidden; 
            height: 60px; /* ALTURA FIJA PARA QUE QUEPAN TODAS */
            display: flex; align-items: center; transition: 0.2s; margin-bottom: 3px;
        }
        .s-card:last-child { margin-bottom: 0; }
        .s-card:hover { border-color: var(--n-rojo); background: #1a1a1a; }
        .s-card.active { background: var(--n-rojo); border-color: white; border-left: 5px solid white; }
        
        /* MINIATURAS NÍTIDAS */
        .s-card img { width: 60px; height: 60px; object-fit: contain; background: #000; padding: 2px; }
        .s-card-info { padding-left: 10px; flex-grow: 1; }

        /* BOTÓN LA TIENDITA SHOP NEÓN (RESTAURADO) */
        .btn-tiendita-neon { 
            position: relative;
            background-image: url('La Tiendita.png'); /* Fondo de la imagen */
            background-size: cover;
            background-position: center;
            height: 60px; /* Misma altura que las salas */
            border-radius: 5px;
            margin: 3px 0;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid var(--oro);
            display: flex; align-items: center; justify-content: center;
        }
        .btn-tiendita-neon::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); /* Capa oscura para legibilidad */
            z-index: 1;
        }
        .tiendita-txt {
            position: relative; z-index: 2;
            font-size: 11px; font-weight: 900; text-transform: uppercase;
            color: var(--n-rojo);
            text-shadow: 0 0 10px var(--n-rojo), 0 0 20px var(--n-rojo);
            animation: neonDestello 1.5s infinite alternate;
        }
        @keyframes neonDestello { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }

        /* VISOR Y CHAT SUPERIOR (500PX) */
        .visor-chat-area { display: grid; grid-template-columns: 1fr 350px; height: 500px; }
        .v-img-box { background: #000; display: flex; align-items: center; justify-content: center; border-right: 3px solid #333; overflow: hidden; }
        
        /* SOLUCIÓN AL PIXELADO: object-fit: contain */
        #sala-img-big { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; /* MANTIENE NITIDEZ ORIGINAL */
            object-position: center;
        }

        .chat-box { display: flex; flex-direction: column; background: #050505; border-left: 3px solid #333; }
        .chat-logs { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 11px; font-family: sans-serif; color: #ccc; }

        /* SECCIÓN IA (300PX - SIN CORTES) */
        .seccion-ia { display: grid; grid-template-columns: 1fr 350px; height: 300px; border-top: 5px solid var(--n-rojo); border-bottom: 5px solid var(--n-rojo); }
        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); }
        .bot-cell { 
            position: relative; 
            height: 300px; 
            overflow: hidden; 
            border-right: 1px solid #222; 
            display: flex; align-items: center; justify-content: center; background: #000;
        }
        /* BOTS NÍTIDAS Y ENTERAS (CON CONTAIN) */
        .bot-cell img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; /* Se ven enteras de pies a cabeza */
        }
        
        .chat-bots-wrap { display: flex; flex-direction: column; background: #0a0a0a; height: 300px; border-left: 3px solid #333; }
        #chat-bots-logs { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 12px; background: #050505; }

        /* PUERTAS */
        .puertas-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 15px; background: #000; }
        .puerta-box { background: #080808; border: 2px solid #222; border-radius: 10px; padding: 10px; text-align: center; }
        .visor-mini { height: 100px; background: #000; border: 1px dashed #444; border-radius: 5px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 9px; }
        .btn-up { width: 100%; padding: 10px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; font-size: 10px; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="pub-neon">ANÚNCIATE<br>AQUÍ</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v181">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="pub-neon">SOCIO<br>VIP</div>
</header>

<div class="main-container">
    <div class="menu-visual">
        <div id="target-salas-top"></div>
        <div class="btn-tiendita-neon" onclick="window.open('https://www.aliexpress.com','_blank')">
            <span class="tiendita-txt">LA TIENDITA SHOP</span>
        </div>
        <div id="target-salas-bottom"></div>
    </div>
    
    <div class="visor-chat-area">
        <div class="v-img-box">
            <img id="sala-img-big" src="">
        </div>
        <div class="chat-box">
            <div id="logs-sala" class="chat-logs"></div>
            <div style="padding:5px; background:#111; display:flex; gap:5px;">
                <input type="text" id="in-sala" placeholder="Escribe y Enter..." onkeypress="if(event.key==='Enter') enviarSala()" style="flex-grow:1; background:#000; border:1px solid var(--n-rojo); color:white; padding:8px; font-size:10px;">
                <button onclick="enviarSala()" style="background:var(--n-rojo); color:white; border:none; padding:0 10px; cursor:pointer; font-weight:bold; font-size:10px;">OK</button>
            </div>
        </div>
    </div>
</div>

<div class="ia-strip">
    <div class="grid-bots">
        <div class="bot-cell"><img src="Rubia.jpg"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); text-align:center; color:var(--n-rosa); padding:3px; font-size:10px;">MIA</div></div>
        <div class="bot-cell"><img src="Morocha.jpg"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); text-align:center; color:var(--n-azul); padding:3px; font-size:10px;">TANIA</div></div>
        <div class="bot-cell"><img src="Pelirroja.jpg"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); text-align:center; color:var(--n-rojo); padding:3px; font-size:10px;">COLO</div></div>
    </div>
    <div class="chat-bots-wrap">
        <div id="chat-ia-privado" style="flex-grow:1; background:#050505; padding:10px; overflow-y:auto; font-size:12px;"></div>
        <div style="padding:5px; background:#111; display:flex; gap:5px;">
            <input type="text" id="in-ia-privado" placeholder="Chat privado..." onkeypress="if(event.key==='Enter') responderIAPrivado()" style="flex-grow:1; background:#000; border:1px solid var(--n-rojo); color:white; padding:8px; font-size:10px;">
            <button onclick="responderIAPrivado()" style="background:var(--n-rojo); color:white; border:none; padding:0 15px; cursor:pointer; font-weight:bold; font-size:10px;">OK</button>
        </div>
    </div>
</div>

<div class="puertas-section">
    <div class="puerta-box"><div class="visor-mini" id="v-hist">HISTORIAS</div><button onclick="up('v-hist')" style="background:var(--n-rosa)" class="btn-up">SUBIR HISTORIA</button></div>
    <div class="puerta-box"><div class="visor-mini" id="v-est">ESTADOS</div><button onclick="up('v-est')" style="background:var(--n-azul)" class="btn-up">SUBIR ESTADO</button></div>
    <div class="puerta-box"><div class="visor-mini" id="v-vid">VIDEOS</div><button onclick="up('v-vid')" style="background:var(--n-rojo)" class="btn-up">SUBIR VIDEO</button></div>
</div>

<script>
    const salasTop = [
        { n: "SADO Y MASO", f: "Sado y Maso.jpg", i: "🔥", chat: "" },
        { n: "BIBLIOTECA", f: "Biblioteca.png", i: "📚", chat: "" },
        { n: "DISCOTECA", f: "Discoteca.png", i: "🔊", chat: "" }
    ];
    const salasBottom = [
        { n: "EL BAR", f: "El Bar.png", i: "🍸", chat: "" },
        { n: "OFICINA", f: "Oficina.png", i: "💼", chat: "" },
        { n: "PLAYA", f: "Playa.png", i: "⛱️", chat: "" }
    ];
    let allSalas = [...salasTop, ...salasBottom];
    let actualIdx = 0;

    function init() {
        const targetTop = document.getElementById('target-salas-top');
        salasTop.forEach((s, i) => injectCard(s, i, targetTop));
        const targetBottom = document.getElementById('target-salas-bottom');
        salasBottom.forEach((s, i) => injectCard(s, i + salasTop.length, targetBottom));
        setSala(0);
    }

    function injectCard(s, i, target) {
        let card = document.createElement('div');
        card.className = 's-card'; card.id = 'scard-'+i;
        card.innerHTML = `<img src="${s.f}"><div class="s-card-info"><b style="font-size:9px;">${s.i} ${s.n}</b><br><span style="color:#0f0; font-size:8px;">● 0 ONLINE</span></div>`;
        card.onclick = () => { actualIdx = i; setSala(i); };
        target.appendChild(card);
    }

    function setSala(i) {
        document.querySelectorAll('.s-card').forEach(c => c.classList.remove('active'));
        document.getElementById('scard-'+i).classList.add('active');
        document.getElementById('sala-img-big').src = allSalas[i].f;
        document.getElementById('logs-sala').innerHTML = allSalas[i].chat;
        document.getElementById('logs-sala').scrollTop = document.getElementById('logs-sala').scrollHeight;
    }

    function enviarSala() {
        const input = document.getElementById('in-sala');
        if(!input.value.trim()) return;
        const msg = `<div><b style="color:var(--oro)">Tú:</b> ${input.value}</div>`;
        allSalas[actualIdx].chat += msg;
        document.getElementById('logs-sala').innerHTML = allSalas[actualIdx].chat;
        input.value = "";
        
        setTimeout(() => {
            const rMsg = `<div><b style="color:var(--n-azul)">TANIA:</b> <span style="color:var(--n-azul)">¡Me encanta verte aquí! ¿Qué sigue?</span></div>`;
            allSalas[actualIdx].chat += rMsg;
            document.getElementById('logs-sala').innerHTML = allSalas[actualIdx].chat;
            document.getElementById('logs-sala').scrollTop = document.getElementById('logs-sala').scrollHeight;
        }, 1000);
    }

    function responderIAPrivado() {
        const input = document.getElementById('in-ia-privado');
        const logs = document.getElementById('chat-ia-privado');
        if(!input.value.trim()) return;
        logs.innerHTML += `<div><b style="color:var(--oro)">Tú:</b> ${input.value}</div>`;
        input.value = "";
        setTimeout(() => {
            logs.innerHTML += `<div><b style="color:var(--n-rosa)">MIA:</b> <span style="color:var(--n-rosa)">¡Hola guapo! Aquí estoy para lo que necesites.</span></div>`;
            logs.scrollTop = logs.scrollHeight;
        }, 1000);
    }

    function up(id) {
        let n = prompt("URL o nombre de archivo de la imagen:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
