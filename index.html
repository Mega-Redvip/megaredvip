<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | VISIÓN TOTAL</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; 
            --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* BLOQUEO DE SCROLL PARA MANTENER TODO EN PANTALLA */
        body { 
            background: var(--fondo); color: white; font-family: 'Segoe UI', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* HEADER COMPACTO */
        header { 
            height: 180px; background: #000; border-bottom: 3px solid var(--oro); 
            display: grid; grid-template-columns: 250px 1fr 250px; align-items: center; 
            padding: 5px 30px; flex-shrink: 0;
        }
        .ads-box { width: 100%; height: 70px; border: 1px dashed #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555; background: #050505; }
        .coin-pair { display: flex; gap: 10px; margin-top: 5px; justify-content: center; }
        .coin { width: 45px; height: 45px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); border: 2px solid #111; color: #000; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; }
        .logo-img { height: 160px; filter: drop-shadow(0 0 20px var(--oro)); object-fit: contain; }

        /* CUERPO PRINCIPAL AJUSTADO */
        .main-app { 
            display: grid; grid-template-columns: 450px 1fr 280px; 
            gap: 15px; padding: 15px; flex-grow: 1; overflow: hidden;
        }
        
        /* COLUMNA 1: 10 SALAS EN 2 COLUMNAS (TODO VISIBLE) */
        .rooms-grid { 
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(5, 1fr); 
            gap: 10px; background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 10px;
        }
        .room-item { 
            position: relative; border: 1px solid #333; border-radius: 8px; overflow: hidden; 
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column;
        }
        .room-item:hover { border-color: var(--oro); transform: scale(1.02); }
        .room-item.active { border: 2px solid #fff; box-shadow: 0 0 15px #fff; }
        .room-thumb { width: 100%; height: 85%; object-fit: cover; }
        .room-name { font-size: 11px; font-weight: 900; text-align: center; padding: 4px; background: rgba(0,0,0,0.8); text-transform: uppercase; }

        /* COLUMNA 2: VISOR GIGANTE */
        .visor-wrap { display: flex; flex-direction: column; gap: 10px; }
        .visor { 
            background: #000; border: 4px solid #1a1a1a; border-radius: 20px; 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        .btn-pay-now { position: absolute; bottom: 20px; padding: 12px 30px; background: var(--n-rojo); color: white; border-radius: 30px; border: 2px solid white; font-weight: 900; cursor: pointer; animation: pulse 1s infinite; }

        /* COLUMNA 3: CHICAS Y CHAT COMPACTO */
        .right-panel { display: flex; flex-direction: column; gap: 10px; }
        .girls-grid { display: grid; grid-template-columns: 1fr; gap: 5px; height: 320px; } /* Chicas una debajo de otra pero más grandes */
        .girl-box { border: 1px solid #222; border-radius: 10px; overflow: hidden; position: relative; }
        .girl-box img { width: 100%; height: 100%; object-fit: cover; }
        .chat-slim { 
            background: #050505; border: 1px solid #222; border-radius: 10px; 
            flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 11px; 
            display: flex; flex-direction: column-reverse; gap: 6px;
        }
        .tip { color: var(--oro); border-left: 2px solid var(--oro); padding-left: 5px; }

        /* MUROS ULTRA COMPACTOS AL PIE */
        .footer-walls { height: 100px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px 10px; flex-shrink: 0; }
        .wall-mini { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; cursor: pointer; }
        .wall-mini:hover { background: #111; border-color: var(--oro); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body onload="init()">

<header>
    <div class="header-side">
        <div class="ads-box">PUBLICIDAD $20</div>
        <div class="coin-pair"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div></div>
    </div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg" class="logo-img"></div>
    <div class="header-side">
        <div class="ads-box">PUBLICIDAD $50</div>
        <div class="coin-pair"><div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div></div>
    </div>
</header>

<div class="main-app">
    <div id="rooms-grid" class="rooms-grid"></div>

    <div class="visor-wrap">
        <div class="visor">
            <img id="main-view" src="">
            <div class="btn-pay-now" onclick="pay(15)">🚀 DESBLOQUEAR HD ($15)</div>
        </div>
    </div>

    <div class="right-panel">
        <div class="girls-grid">
            <div class="girl-box"><img src="Rubia.jpg"></div>
            <div class="girl-box"><img src="Morocha.jpg"></div>
            <div class="girl-box"><img src="Pelirroja.jpg"></div>
        </div>
        <div id="chat-stream" class="chat-slim"></div>
    </div>
</div>

<div class="footer-walls">
    <div class="wall-mini" onclick="pay(5)"><span>📖 HISTORIAS</span> <b>VER</b></div>
    <div class="wall-mini" onclick="pay(10)"><span>🎬 VIDEOS</span> <b>VER</b></div>
    <div class="wall-mini" onclick="pay(30)"><span>📱 VIP PASS</span> <b>UNIRSE</b></div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym_movimiento.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda_musica.mp3"}, 
        {n: "Oficina", e: ".png", s: "oficina_ambiente.mp3"}, {n: "Playa", e: ".png", s: "playa_olas.mp3"}
    ];

    function init() {
        const grid = document.getElementById('rooms-grid');
        rooms.forEach((r, i) => {
            const d = document.createElement('div');
            d.className = 'room-item'; d.id = 'r-'+i;
            d.innerHTML = `<img src="${encodeURI(r.n+r.e)}" class="room-thumb"> <div class="room-name">${r.n}</div>`;
            d.onclick = () => { idx = i; refresh(); };
            grid.appendChild(d);
        });
        refresh();
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 9000);
        setInterval(botChat, 2000);
    }

    function refresh() {
        document.querySelectorAll('.room-item').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        document.getElementById('main-view').src = encodeURI(rooms[idx].n + rooms[idx].e);
        const player = document.getElementById('audio-player');
        player.src = rooms[idx].s;
        player.play().catch(e => {});
    }

    function botChat() {
        const chat = document.getElementById('chat-stream');
        const msgs = ["$5 Tip!", "Private?", "Tokens!", "🔥 HOT", "Video!", "Nice!"];
        const n = ["Mia", "UserX", "Tania", "VIP", "Colo"][Math.floor(Math.random()*5)];
        chat.innerHTML = `<div class="tip"><b>${n}:</b> ${msgs[Math.floor(Math.random()*6)]}</div>` + chat.innerHTML;
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
