<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | PLATAFORMA OFICIAL</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; 
            --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            overflow-y: auto; min-height: 100vh; display: flex; flex-direction: column; 
        }

        /* HEADER: CORRECCIÓN DE LOGO RECORTADO */
        header { 
            height: 380px; background: #000; border-bottom: 6px solid var(--oro); 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            padding-top: 20px; flex-shrink: 0; position: relative; overflow: visible;
        }
        .logo-container { width: 100%; display: flex; justify-content: center; height: 320px; overflow: visible; }
        .logo-img { 
            height: 300px; /* Ajustado para que no toque el borde superior */
            filter: drop-shadow(0 0 50px var(--oro)); 
            object-fit: contain;
        }
        
        /* MONEDAS AJUSTADAS: 1, 3, 5, 10 */
        .header-tools { width: 100%; display: flex; justify-content: center; padding: 10px 0; }
        .coin-grid { display: flex; gap: 20px; }
        .coin { 
            width: 75px; height: 75px; border-radius: 50%; 
            background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 50%, #5c4928); 
            border: 3px solid #111; color: #000; font-size: 20px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: 900; box-shadow: 0 6px 0 #333; transition: 0.1s;
        }
        .coin:active { transform: translateY(3px); box-shadow: 0 3px 0 #333; }

        /* ESTRUCTURA PRINCIPAL */
        .main-app { display: grid; grid-template-columns: 300px 1fr 400px; gap: 20px; padding: 25px; }

        /* PANELES LATERALES */
        .panel { background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 18px; margin-bottom: 20px; }
        .panel-h { color: var(--oro); font-size: 13px; margin-bottom: 15px; border-left: 4px solid var(--oro); padding-left: 10px; text-transform: uppercase; }
        
        .p-btn { 
            width: 100%; padding: 12px; margin-bottom: 8px; background: #111; border: 1px solid #444; 
            color: #fff; cursor: pointer; border-radius: 8px; text-align: left; font-size: 11px; font-weight: 900; 
        }
        .p-btn.active { background: var(--oro) !important; color: #000 !important; }

        /* MUROS DE CONTENIDO (LO QUE ERA ESPACIO NEGRO) */
        .content-wall { height: 180px; background: #050505; border: 1px dashed #333; border-radius: 10px; margin-bottom: 15px; overflow-y: auto; padding: 10px; }
        .content-item { font-size: 10px; background: #111; padding: 5px; margin-bottom: 5px; border-radius: 4px; color: #888; border-left: 2px solid; }
        .up-btn { 
            width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #555; 
            color: var(--oro); font-size: 10px; cursor: pointer; font-weight: bold; border-radius: 5px;
        }

        /* VISOR CENTRAL */
        .visor-box { display: flex; flex-direction: column; gap: 15px; }
        .visor { 
            background: #000; border: 5px solid #1a1a1a; border-radius: 20px; 
            height: 600px; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; position: relative;
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        /* CONTADOR POR SALA REALISTA */
        .sala-tag { 
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.9); 
            padding: 12px 25px; border: 2px solid var(--n-turq); color: var(--n-turq); 
            border-radius: 30px; font-size: 14px; font-weight: 900; z-index: 10;
        }
        .users-live { color: var(--n-verde); font-size: 12px; margin-top: 4px; display: block; }

        /* ALI BUTTON NEÓN */
        .ali-neon { 
            display: none; position: absolute; bottom: 30px; background: #ff003c; 
            color: #fff; padding: 15px 30px; font-size: 18px; font-weight: 900; 
            text-decoration: none; border-radius: 10px; animation: pulse 1.5s infinite; z-index: 20;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 10px #ff003c; } 50% { box-shadow: 0 0 40px #ff003c; } 100% { box-shadow: 0 0 10px #ff003c; } }

        /* CHAT Y DERECHA */
        .right-side { display: flex; flex-direction: column; gap: 20px; }
        .girls-grid { display: flex; gap: 8px; height: 220px; }
        .girl-card { flex: 1; border: 1px solid #333; border-radius: 10px; overflow: hidden; position: relative; }
        .girl-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .chat-area { 
            background: #020202; border: 2px solid #222; border-radius: 15px; 
            padding: 15px; height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }
        .msg { border-left: 4px solid; padding-left: 10px; font-size: 13px; color: #eee; }

        /* AUSPICIANTES */
        .ads-footer { 
            margin: 40px; border: 4px solid #111; padding: 40px; border-radius: 25px; text-align: center;
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
        }
        .neon-text { 
            font-size: 40px; color: #fff; text-shadow: 0 0 10px var(--n-viola), 0 0 30px var(--n-viola);
            margin-bottom: 30px; text-transform: uppercase;
        }
    </style>
</head>
<body onload="init()">

<header>
    <div class="logo-container">
        <img src="Logo Mega Red Lunar.jpg" class="logo-img">
    </div>
    <div class="header-tools">
        <div class="coin-grid">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(3)">$3</div>
            <div class="coin" onclick="pay(5)">$5</div>
            <div class="coin" onclick="pay(10)">$10</div>
        </div>
    </div>
</header>

<div class="main-app">
    <div class="left-col">
        <div class="panel">
            <div class="panel-h">📖 HISTORIAS</div>
            <div id="wall-historias" class="content-wall"></div>
            <button class="up-btn" onclick="upload('Historias')">📤 SUBIR HISTORIA</button>
        </div>
        <div class="panel">
            <div class="panel-h">📱 ESTADOS</div>
            <div id="wall-estados" class="content-wall"></div>
            <button class="up-btn" onclick="upload('Estados')">📤 SUBIR ESTADO</button>
        </div>
        <div class="panel">
            <div class="panel-h">🎬 VIDEOS</div>
            <div id="wall-videos" class="content-wall"></div>
            <button class="up-btn" onclick="upload('Videos')">📤 SUBIR VIDEO</button>
        </div>
        <div class="panel">
            <div class="panel-h">🚪 SALAS MEGA RED</div>
            <div id="rooms-list"></div>
        </div>
    </div>

    <div class="visor-box">
        <div class="visor">
            <div class="sala-tag">
                📍 <span id="s-nom">CARGANDO...</span>
                <span class="users-live">👤 <span id="s-users">0</span> ONLINE AHORA</span>
            </div>
            <img id="main-view" src="">
            <a href="https://tu-link-ali.com" target="_blank" class="ali-neon" id="ali-btn">🔥 COMPRAR JUGUETES 🔥</a>
        </div>
    </div>

    <div class="right-side">
        <div class="girls-grid">
            <div class="girl-card"><img src="Rubia.jpg"></div>
            <div class="girl-card"><img src="Morocha.jpg"></div>
            <div class="girl-card"><img src="Pelirroja.jpg"></div>
        </div>
        <div id="chat-stream" class="chat-area"></div>
    </div>
</div>

<div class="ads-footer">
    <div class="neon-text">PUBLICITE AQUÍ</div>
    <p style="color:#444">CONTACTO: publicidad@megaredvip.com</p>
</div>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", c: "#ff003c"}, {n: "Spa", e: ".png", c: "#00d9ff"}, 
        {n: "Biblioteca", e: ".png", c: "#bc13fe"}, {n: "Camarera", e: ".png", c: "#00ff66"}, 
        {n: "Discoteca", e: ".png", c: "#ff00ff"}, {n: "El Bar", e: ".png", c: "#d4af37"},
        {n: "Gimnasio", e: ".png", c: "#00ff66"}, {n: "La Tiendita", e: ".png", c: "#ff4500"}, 
        {n: "Oficina", e: ".png", c: "#1e90ff"}, {n: "Playa", e: ".png", c: "#ffff00"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.style.color = r.c; b.innerHTML = r.n;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 7000);
        setInterval(botChat, 4000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        const r = rooms[idx];
        document.getElementById('s-nom').innerText = r.n.toUpperCase();
        document.getElementById('main-view').src = encodeURI(r.n + r.e);
        document.getElementById('ali-btn').style.display = (r.n === "La Tiendita") ? "block" : "none";
        // Contador realista por sala
        document.getElementById('s-users').innerText = 150 + Math.floor(Math.random()*400);
    }

    function botChat() {
        const chat = document.getElementById('chat-stream');
        const names = ["MIA", "TANIA", "COLO", "Admin_VIP", "User_88"];
        const texts = ["🔞 Show en vivo en 5 min!", "🔥 Chequeen mis historias nuevas", "💎 ¿Quién paga el próximo?", "Recién subí video a la sala VIP"];
        const n = names[Math.floor(Math.random()*names.length)];
        const t = texts[Math.floor(Math.random()*texts.length)];
        chat.innerHTML += `<div class="msg" style="border-left-color:var(--oro)"><b>${n}:</b> ${t}</div>`;
        chat.scrollTop = chat.scrollHeight;
        
        // Agregar contenido automático a los muros
        updateWalls(n, t);
    }

    function updateWalls(user, text) {
        const walls = ["wall-historias", "wall-estados", "wall-videos"];
        const wall = document.getElementById(walls[Math.floor(Math.random()*3)]);
        wall.innerHTML = `<div class="content-item" style="border-color:var(--n-turq)"><b>${user}</b>: Nuevo contenido subido...</div>` + wall.innerHTML;
    }

    function upload(sec) { alert("Accediendo a la cámara/archivos para subir a " + sec); }
    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
