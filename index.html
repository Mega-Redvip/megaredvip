<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v182</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 1fr 130px 280px 130px 1fr; 
            align-items: center; gap: 10px; padding: 10px;
            background: #050505; border-bottom: 5px solid var(--n-rojo); height: 300px;
        }
        .logo-v182 { height: 260px; width: 260px; object-fit: contain; }
        .coin { width: 75px; height: 75px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; border: 4px solid white; cursor: pointer; }

        /* BLOQUE SUPERIOR: 3 PANELES IGUALES (33.3%) */
        .top-container { 
            display: grid; 
            grid-template-columns: 33.33% 33.33% 33.33%; 
            height: 550px; 
            border-bottom: 5px solid var(--n-rojo);
        }

        /* 1. MENÚ */
        .menu-l { background: #080808; border-right: 2px solid #333; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; }
        .s-card { background: #111; border: 1px solid #333; height: 55px; display: flex; align-items: center; margin-bottom: 2px; cursor: pointer; border-radius: 4px; }
        .s-card img { width: 55px; height: 100%; object-fit: cover; opacity: 0.6; }
        .s-card.active { border-left: 5px solid var(--n-rojo); background: #1a1a1a; }

        /* BOTÓN TIENDITA NEÓN */
        .btn-tiendita { 
            height: 60px; background: url('La Tiendita.png') center; background-size: cover; 
            position: relative; display: flex; align-items: center; justify-content: center; border: 2px solid var(--oro); cursor: pointer;
        }
        .tiendita-txt { position: relative; z-index: 2; color: var(--n-rojo); font-size: 12px; text-shadow: 0 0 10px var(--n-rojo); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* 2. VISOR (Nítido, sin estirar de más) */
        .visor-box { background: #000; border-right: 2px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #sala-img-big { max-width: 100%; max-height: 100%; object-fit: contain; transform: scale(1.1); /* Ese poquito extra que pediste */ }

        /* 3. CHAT SALA */
        .chat-box { background: #050505; display: flex; flex-direction: column; }
        .chat-logs { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 12px; color: #aaa; }

        /* BLOQUE INFERIOR: 4 PANELES IGUALES (25% cada uno) */
        .bot-container { 
            display: grid; 
            grid-template-columns: 25% 25% 25% 25%; 
            height: 400px; 
            border-bottom: 5px solid var(--n-rojo);
        }
        .bot-card { border-right: 1px solid #222; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bot-card img { height: 100%; width: 100%; object-fit: contain; }
        .bot-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 5px; font-size: 12px; }

        /* CHAT BOTS (El 4to panel) */
        .chat-bots-wrap { background: #0a0a0a; display: flex; flex-direction: column; border-left: 2px solid #333; }
        #chat-ia-logs { flex-grow: 1; padding: 10px; overflow-y: auto; font-size: 13px; }

        /* FOOTER */
        .footer-sec { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; }
        .p-box { background: #080808; border: 1px solid #222; padding: 10px; text-align: center; border-radius: 8px; }
    </style>
</head>
<body onload="init()">

<header>
    <div style="border:1px solid #333; height:150px;">ADS</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin">$1</div><div class="coin">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v182">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin">$10</div><div class="coin">$20</div></div>
    <div style="border:1px solid #333; height:150px;">ADS</div>
</header>

<div class="top-container">
    <div class="menu-l" id="menu-target">
        <div id="salas-top"></div>
        <div class="btn-tiendita" onclick="window.open('https://www.aliexpress.com')">
            <span class="tiendita-txt">LA TIENDITA SHOP</span>
        </div>
        <div id="salas-bottom"></div>
    </div>

    <div class="visor-box">
        <img id="sala-img-big" src="">
    </div>

    <div class="chat-box">
        <div id="logs-sala" class="chat-logs"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input type="text" id="in-sala" onkeypress="if(event.key==='Enter') sendSala()" placeholder="Chat sala..." style="flex-grow:1; background:#000; color:white; border:1px solid var(--n-rojo); padding:8px;">
        </div>
    </div>
</div>

<div class="bot-container">
    <div class="bot-card"><img src="Rubia.jpg"><div class="bot-label" style="color:var(--n-rosa)">MIA</div></div>
    <div class="bot-card"><img src="Morocha.jpg"><div class="bot-label" style="color:var(--n-azul)">TANIA</div></div>
    <div class="bot-card"><img src="Pelirroja.jpg"><div class="bot-label" style="color:var(--n-rojo)">COLO</div></div>
    <div class="chat-bots-wrap">
        <div id="chat-ia-logs"></div>
        <input type="text" id="in-ia" onkeypress="if(event.key==='Enter') sendIA()" placeholder="Chat privado..." style="background:#000; color:white; border:none; padding:15px; border-top:1px solid #333;">
    </div>
</div>

<div class="footer-sec">
    <div class="p-box">HISTORIAS<br><button onclick="up('h')" style="background:var(--n-rosa); width:100%; margin-top:5px; border:none; color:white; padding:5px;">SUBIR</button></div>
    <div class="p-box">ESTADOS<br><button onclick="up('e')" style="background:var(--n-azul); width:100%; margin-top:5px; border:none; color:white; padding:5px;">SUBIR</button></div>
    <div class="p-box">VIDEOS<br><button onclick="up('v')" style="background:var(--n-rojo); width:100%; margin-top:5px; border:none; color:white; padding:5px;">SUBIR</button></div>
</div>

<script>
    const salas = [
        {n:"SADO Y MASO", f:"Sado y Maso.jpg", i:"🔥"},
        {n:"BIBLIOTECA", f:"Biblioteca.png", i:"📚"},
        {n:"DISCOTECA", f:"Discoteca.png", i:"🔊"},
        {n:"EL BAR", f:"El Bar.png", i:"🍸"},
        {n:"OFICINA", f:"Oficina.png", i:"💼"},
        {n:"PLAYA", f:"Playa.png", i:"⛱️"}
    ];

    function init() {
        const top = document.getElementById('salas-top');
        const bot = document.getElementById('salas-bottom');
        salas.forEach((s, i) => {
            let div = document.createElement('div');
            div.className = 's-card'; div.id = 'sc-'+i;
            div.innerHTML = `<img src="${s.f}"> <span style="padding-left:10px; font-size:10px;">${s.i} ${s.n}</span>`;
            div.onclick = () => setS(i);
            (i < 3) ? top.appendChild(div) : bot.appendChild(div);
        });
        setS(0);
    }

    function setS(i) {
        document.querySelectorAll('.s-card').forEach(c => c.classList.remove('active'));
        document.getElementById('sc-'+i).classList.add('active');
        document.getElementById('sala-img-big').src = salas[i].f;
    }

    function sendSala() {
        let i = document.getElementById('in-sala');
        if(i.value) {
            document.getElementById('logs-sala').innerHTML += `<div><b>Tú:</b> ${i.value}</div>`;
            i.value = "";
        }
    }

    function sendIA() {
        let i = document.getElementById('in-ia');
        if(i.value) {
            document.getElementById('chat-ia-logs').innerHTML += `<div><b style="color:var(--oro)">Tú:</b> ${i.value}</div>`;
            i.value = "";
        }
    }
</script>
</body>
</html>
