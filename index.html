<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO DIRECTO</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; --n-viola: #bc13fe; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER: LOGO GIGANTE CENTRAL */
        header { height: 260px; background: #000; border-bottom: 5px solid var(--oro); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; position: relative; flex-shrink: 0; }
        .logo-container { position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; }
        .logo-img { height: 250px; width: auto; filter: drop-shadow(0 0 40px var(--oro)); }
        
        /* ONLINE STATUS */
        .online-box { background: rgba(0,255,102,0.1); border: 2px solid var(--n-verde); padding: 10px; border-radius: 10px; color: var(--n-verde); text-align: center; width: 180px; }
        .online-num { font-size: 22px; display: block; font-weight: 900; }

        /* MONEDAS */
        .coin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; z-index: 10; }
        .coin { width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff9aa, var(--oro) 50%, #5c4928); border: 3px solid #111; color: #000; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 5px 0 #333; }

        /* LAYOUT */
        .main-app { display: grid; grid-template-columns: 240px 1fr 420px; gap: 15px; padding: 15px; flex-grow: 1; min-height: 0; }
        
        /* COLUMNA IZQUIERDA */
        .left-col { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .nav-section { background: #0a0a0a; border: 1px solid #222; border-radius: 10px; padding: 10px; }
        .nav-title { color: var(--oro); font-size: 11px; margin-bottom: 10px; text-transform: uppercase; text-align: center; border-bottom: 1px solid #333; }
        
        /* BOTONES DE SALA CON COLOR */
        .p-btn { width: 100%; padding: 12px; margin-bottom: 6px; background: #111; border: 1px solid #333; cursor: pointer; border-radius: 5px; text-align: left; font-size: 11px; font-weight: 900; text-transform: uppercase; transition: 0.2s; }
        .p-btn:hover { filter: brightness(1.5); transform: translateX(5px); }
        .p-btn.active { background: #fff; color: #000 !important; border-color: #fff; box-shadow: 0 0 15px #fff; }

        /* VISOR CENTRAL */
        .visor-container { background: #000; border: 4px solid #1a1a1a; border-radius: 15px; flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        .ali-neon { display: none; position: absolute; bottom: 30px; background: #ff003c; color: #fff; padding: 15px 30px; font-size: 18px; font-weight: 900; text-decoration: none; border-radius: 50px; animation: pulse 0.8s infinite; box-shadow: 0 0 20px var(--n-rojo); z-index: 100; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* COLUMNA DERECHA: AVATARES IDÉNTICOS */
        .right-side { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .girls-row { display: flex; gap: 5px; height: 350px; flex-shrink: 0; }
        .girl-card { flex: 1; display: flex; flex-direction: column; height: 100%; }
        .girl-img-box { width: 100%; height: 100%; overflow: hidden; }
        .girl-img-box img { width: 100%; height: 100%; object-fit: cover; } /* "cover" quita los márgenes negros y las hace iguales */
        .girl-name { font-size: 12px; font-weight: 900; text-align: center; padding: 5px 0; background: rgba(0,0,0,0.8); }

        /* CHAT VISIBLE */
        .chat-display { flex-grow: 1; background: #050505; border: 2px solid #222; border-radius: 10px; padding: 12px; overflow-y: auto; font-size: 13px; min-height: 0; }
        .msg { margin-bottom: 8px; border-left: 4px solid; padding-left: 10px; line-height: 1.2; }
    </style>
</head>
<body onload="init()">

<header>
    <div class="online-box">
        <span class="online-num" id="user-count">2,105</span>
        <span style="font-size:10px; font-weight:bold;">CLIENTES VIP ONLINE</span>
    </div>
    <div class="logo-container"><img src="Logo Mega Red Lunar.jpg" class="logo-img"></div>
    <div class="coin-grid">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="main-app">
    <div class="left-col">
        <div class="nav-section">
            <div class="nav-title">👑 CONTENIDO EXCLUSIVO</div>
            <button class="p-btn" style="color:var(--n-turq)">⭐ HISTORIAS</button>
            <button class="p-btn" style="color:var(--n-verde)">🎬 VIDEOS</button>
            <button class="p-btn" style="color:var(--n-rojo)">🔥 ESTADOS</button>
        </div>
        <div class="nav-section">
            <div class="nav-title">📍 SALAS EN VIVO</div>
            <div id="rooms-list"></div>
        </div>
    </div>

    <div class="center-col" style="display:flex; flex-direction:column;">
        <div class="visor-container">
            <img id="main-view" src="">
            <a href="https://tu-link-ali.com" target="_blank" class="ali-neon" id="ali-btn">🔥 COMPRAR JUGUETES 🔥</a>
        </div>
    </div>

    <div class="right-side">
        <div class="girls-row">
            <div class="girl-card">
                <div class="girl-img-box"><img src="Rubia.jpg"></div>
                <div class="girl-name" style="color:var(--n-turq);">MIA</div>
            </div>
            <div class="girl-card">
                <div class="girl-img-box"><img src="Morocha.jpg"></div>
                <div class="girl-name" style="color:var(--n-verde);">TANIA</div>
            </div>
            <div class="girl-card">
                <div class="girl-img-box"><img src="Pelirroja.jpg"></div>
                <div class="girl-name" style="color:var(--n-rojo);">COLO</div>
            </div>
        </div>
        <div class="chat-display" id="chat-stream"></div>
    </div>
</div>

<audio id="room-sound" loop></audio>

<script>
    let idx = 0; let userCity = "Resistencia";
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "Sado_y_Maso.mp3", c: "#ff003c"}, 
        {n: "Spa", e: ".png", s: "Spa.mp3", c: "#00d9ff"}, 
        {n: "Biblioteca", e: ".png", s: "Biblioteca.mp3", c: "#bc13fe"}, 
        {n: "Camarera", e: ".png", s: "Camarera.mp3", c: "#00ff66"}, 
        {n: "Discoteca", e: ".png", s: "Discoteca.mp3", c: "#ff00ff"}, 
        {n: "El Bar", e: ".png", s: "El_Bar.mp3", c: "#d4af37"},
        {n: "Gimnasio", e: ".png", s: "Gimnasio.mp3", c: "#00ff66"}, 
        {n: "La Tiendita", e: ".png", s: "La_Tiendita.mp3", c: "#ff4500"}, 
        {n: "Oficina", e: ".png", s: "Oficina.mp3", c: "#1e90ff"}, 
        {n: "Playa", e: ".png", s: "Playa.mp3", c: "#ffff00"}
    ];

    fetch('https://ipapi.co/json/').then(res => res.json()).then(data => { if(data.city) userCity = data.city; });

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((r, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.style.color = r.c;
            b.innerHTML = `🚪 ${r.n}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        setInterval(botChat, 4000);
        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 6000);
        setInterval(() => { 
            let base = 2100 + Math.floor(Math.random() * 300);
            document.getElementById('user-count').innerText = base.toLocaleString(); 
        }, 2000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => {
            const rId = b.id.split('-')[1];
            b.classList.remove('active');
            b.style.color = rooms[rId].c; 
        });
        const btn = document.getElementById('r-'+idx);
        if(btn) btn.classList.add('active');
        
        const r = rooms[idx];
        document.getElementById('main-view').src = encodeURIComponent(r.n) + r.e;
        document.getElementById('ali-btn').style.display = (r.n === "La Tiendita") ? "block" : "none";
        
        const p = document.getElementById('room-sound');
        p.src = r.s; p.play().catch(() => {});
    }

    function botChat() {
        const f = [
            {u:"MIA", c:"#00d9ff", t:`🔞 ¿Hay algún macho de ${userCity} conectado? Me estoy tocando...`},
            {u:"TANIA", c:"#00ff66", t:`🔥 En ${userCity} son todos unos calientes, ¡miren mis videos!`},
            {u:"COLO", c:"#ff003c", t:`🔞 Recién me hicieron de todo uno de ${userCity}, quedé exhausta.`},
            {u:"MIA", c:"#00d9ff", t:"💎 ¡El que no manda tokens no ve nada! Muevan la billetera."}
        ];
        const m = f[Math.floor(Math.random() * f.length)];
        const box = document.getElementById('chat-stream');
        box.innerHTML += `<div class="msg" style="border-left-color:${m.c}; color:${m.c}"><b>${m.u}:</b> ${m.t}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function pay(n) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount=${n}&currency_code=USD`, '_blank'); }
</script>
</body>
</html>
