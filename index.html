<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | LIVE</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-azul: #00d9ff; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER: Logo imponente al 50% de ancho */
        header { height: 140px; background: #000; border-bottom: 4px solid var(--oro); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .logo-box { flex: 2; display: flex; justify-content: center; }
        .logo-img { height: 110px; width: auto; max-width: 50vw; filter: drop-shadow(0 0 15px var(--oro)); object-fit: contain; } 
        
        .coin-box { flex: 1; display: flex; gap: 12px; justify-content: flex-end; }
        .coin { width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, #fff9aa, var(--oro)); border: 2px solid #555; color: #000; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* CUERPO */
        .app-container { display: flex; height: calc(100vh - 140px); padding: 15px; gap: 15px; }
        
        .sidebar { width: 250px; background: #0a0a0a; border: 1px solid #333; border-radius: 12px; overflow-y: auto; padding: 15px; }
        .p-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #1a1a1a; border: 1px solid #444; color: #999; cursor: pointer; border-radius: 8px; text-align: left; font-size: 11px; font-weight: bold; }
        .p-btn.active { border-color: var(--oro); color: var(--oro); background: #221a00; border-width: 2px; }

        .main-content { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .visor { flex: 3; background: #000; border-radius: 20px; border: 2px solid #1a1a1a; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #main-view { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* MURO ACTIVO */
        .muro { flex: 1.2; background: #050505; border: 1px solid #333; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .muro-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .up-btn { padding: 12px; border: 2px solid; background: transparent; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 11px; }

        .right-panel { width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .girls-static { display: flex; gap: 8px; height: 140px; flex-shrink: 0; }
        .g-img { width: 33.3%; height: 100%; object-fit: cover; border: 2px solid var(--oro); border-radius: 10px; }
        
        .chat-area { flex: 1; background: #020202; border: 1px solid #333; border-radius: 15px; padding: 15px; overflow-y: auto; font-size: 13px; border-left: 2px solid #222; }
        .msg { margin-bottom: 10px; border-left: 4px solid; padding-left: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--n-rojo); font-size:12px; font-weight:bold; text-align:center;">🔴 VIP LIVE<br>14,520 SOCIOS</div>
    <div class="logo-box"><img src="Logo Mega Red Lunar.jpg" class="logo-img" alt="MEGA RED VIP"></div>
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="app-container">
    <div class="sidebar" id="rooms-list"></div>
    <div class="main-content">
        <div class="visor"><img id="main-view" src=""></div>
        <div class="muro">
            <div class="muro-nav">
                <button class="up-btn" style="color:var(--n-rojo); border-color:var(--n-rojo);" onclick="alert('Abriendo carrete de vídeos...')">📹 VÍDEO</button>
                <button class="up-btn" style="color:var(--n-verde); border-color:var(--n-verde);" onclick="alert('Escribiendo nuevo estado...')">✍️ ESTADO</button>
                <button class="up-btn" style="color:var(--n-azul); border-color:var(--n-azul);" onclick="alert('Seleccionando fotos...')">📸 HISTORIA</button>
            </div>
            <div style="color:#555; font-size:11px; text-align:center; padding:10px; border:1px dashed #222; border-radius:10px;">COMUNIDAD VIP: COMPARTE TU CONTENIDO CON LA RED</div>
        </div>
    </div>
    <div class="right-panel">
        <div class="girls-static">
            <img src="Rubia.jpg" class="g-img"><img src="Morocha.jpg" class="g-img"><img src="Pelirroja.jpg" class="g-img">
        </div>
        <div class="chat-area" id="chat-box"></div>
    </div>
</div>

<script>
    let currentIdx = 0;
    let userCity = "esta zona";
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];

    async function fetchGeo() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            if(d.city && d.city !== "San Miguel de Tucumán") {
                userCity = d.city;
            } else {
                userCity = "Resistencia"; // Valor por defecto si falla o da error
            }
            addChat("SISTEMA", `📍 SOCIO DETECTADO EN: ${userCity.toUpperCase()}`, "#d4af37");
            setTimeout(() => addChat("MIA", `🔥 ¿Hay algún socio de **${userCity}** conectado? ¡Manden tokens!`, "#00ff66"), 3000);
        } catch(e) { 
            userCity = "Resistencia";
            addChat("MIA", "🔥 ¿Hay alguien de Resistencia conectado ahora?", "#00ff66");
        }
    }

    function initApp() {
        fetchGeo();
        const container = document.getElementById('rooms-list');
        rooms.forEach((name, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'room-'+i;
            b.innerHTML = `🚪 ${name.toUpperCase()}`;
            b.onclick = () => { currentIdx = i; updateVisor(); };
            container.appendChild(b);
        });
        updateVisor();
        setInterval(() => { currentIdx = (currentIdx + 1) % rooms.length; updateVisor(); }, 18000);
    }

    function updateVisor() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('room-'+currentIdx).classList.add('active');
        const img = document.getElementById('main-view');
        img.src = "./" + rooms[currentIdx] + ".jpg";
        // Si no encuentra la imagen, pone una de respaldo con el nombre
        img.onerror = () => { img.src = "https://via.placeholder.com/800x600/000/d4af37?text=" + rooms[currentIdx]; };
    }

    function addChat(user, txt, color) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg" style="border-color:${color}"><b>${user}:</b> ${txt}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function pay(n) {
        window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&item_name=TOKENS_VIP&amount=${n}&currency_code=USD`, '_blank');
    }

    initApp();
</script>
</body>
</html>
