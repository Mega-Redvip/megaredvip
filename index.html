<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v94 - SISTEMA DINÁMICO</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        header { 
            display: grid; grid-template-columns: 1fr 2fr 1fr; 
            padding: 25px; align-items: center; gap: 20px; background: #050505; border-bottom: 6px solid var(--n-rojo);
        }
        .side-col { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .publi-box { width: 100%; height: 130px; border: 4px dashed var(--n-rojo); display: flex; align-items: center; justify-content: center; background: #0a0a0a; color: var(--n-rojo); font-size: 20px; text-align: center; }
        .logo-box img { width: 100%; max-height: 300px; object-fit: contain; filter: drop-shadow(0 0 35px var(--n-rojo)); }
        
        .coins-row { display: flex; gap: 25px; }
        .coin { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; cursor: pointer; border: 5px solid white; transition: 0.3s; }

        .middle-section { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 25px; }
        .rooms-sidebar { background: #0a0a0a; border: 3px solid #222; border-radius: 20px; padding: 15px; height: 500px; display: flex; flex-direction: column; }
        .rooms-scroll { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .room-unit { 
            padding: 15px; background: #151515; border-radius: 10px; cursor: pointer; border: 1px solid #333; 
            display: flex; flex-direction: column; gap: 5px; font-size: 13px; transition: 0.3s;
        }
        .room-unit.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 15px var(--n-rojo); transform: translateX(10px); }
        .user-count { color: lime; font-size: 11px; font-family: 'Arial', sans-serif; font-weight: bold; }

        .viewer-box { border: 6px solid var(--n-rojo); border-radius: 20px; background: #000; height: 500px; overflow: hidden; position: relative; }
        #main-img { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .chat-area { padding: 0 25px 25px; display: grid; grid-template-columns: 1fr 450px; gap: 20px; background: #000; border-top: 5px solid var(--n-rojo); }
        .triple-bot-frame { display: grid; grid-template-columns: repeat(3, 1fr); height: 500px; border: 5px solid #333; border-radius: 20px; overflow: hidden; position: relative; background: #000; margin-top: 20px; }
        .bot-unit-inner { border-right: 2px solid #333; position: relative; }
        .bot-unit-inner img { width: 100%; height: 100%; object-fit: contain; }
        .bot-name-tag { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); text-align: center; font-size: 18px; padding: 10px; font-weight: 900; }

        .chat-box { background: #050505; border: 4px solid var(--n-rojo); border-radius: 20px; display: flex; flex-direction: column; height: 500px; overflow: hidden; margin-top: 20px; }
        #chat-stream { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; font-size: 14px; }
        .chat-msg-bot { align-self: flex-start; max-width: 85%; line-height: 1.4; margin-bottom: 5px; }
        .chat-msg-user { align-self: flex-end; background: #111; padding: 10px; border-radius: 10px; border-left: 4px solid var(--oro); font-weight: bold; max-width: 80%; margin-bottom: 5px; }
        
        .chat-input { display: flex; padding: 15px; background: #0a0a0a; gap: 10px; border-top: 2px solid #222; }
        #msg-in { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 12px; border-radius: 8px; outline: none; }
        .btn-send { background: var(--n-rojo); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 900; }

        .bottom-gates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; background: #050505; border-top: 5px solid var(--n-rojo); }
        .gate { background: #0a0a0a; border-radius: 15px; padding: 20px; text-align: center; border: 3px solid #333; }
        .gate-content { height: 180px; background: #000; margin-bottom: 15px; border-radius: 8px; overflow-y: auto; padding: 10px; text-align: left; }
        .btn-up { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onload="bootImperio()">

<header>
    <div class="side-col"><div class="publi-box">PUBLICITE AQUÍ</div>
        <div class="coins-row"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    </div>
    <div class="logo-box"><img src="Logo Mega Red Lunar.jpg" alt="Logo"></div>
    <div class="side-col"><div class="publi-box">PUBLICITE AQUÍ</div>
        <div class="coins-row"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    </div>
</header>

<div class="middle-section">
    <div class="rooms-sidebar">
        <div class="rooms-scroll" id="rooms-list"></div>
        <a href="https://best.aliexpress.com/" target="_blank" style="background:#000; color:#fff; border:2px solid var(--n-rojo); padding:10px; text-align:center; text-decoration:none; font-size:12px; font-weight:900; margin-top:10px; border-radius:5px;">🛒 COMPRAR JUGUETES 🔞</a>
    </div>
    <div class="viewer-box">
        <img id="main-img" src="">
    </div>
</div>

<div class="chat-area">
    <div class="triple-bot-frame">
        <div class="bot-unit-inner"><img src="Rubia.jpg"><div class="bot-name-tag" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-unit-inner"><img src="Morocha.jpg"><div class="bot-name-tag" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-unit-inner"><img src="Pelirroja.jpg"><div class="bot-name-tag" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-box">
        <div id="chat-stream"></div>
        <div class="chat-input">
            <input type="text" id="msg-in" placeholder="Diles algo sucio..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn-send" onclick="send()">OK</button>
        </div>
    </div>
</div>

<div class="bottom-gates">
    <div class="gate"><h4 style="color:var(--n-rosa)">HISTORIAS</h4><div class="gate-content" id="f-h"></div><button class="btn-up" style="background:var(--n-rosa)" onclick="up('f-h')">SUBIR</button></div>
    <div class="gate"><h4 style="color:var(--n-azul)">ESTADOS</h4><div class="gate-content" id="f-e"></div><button class="btn-up" style="background:var(--n-azul)" onclick="up('f-e')">SUBIR</button></div>
    <div class="gate"><h4 style="color:var(--n-rojo)">VIDEOS</h4><div class="gate-content" id="f-v"></div><button class="btn-up" style="background:var(--n-rojo)" onclick="up('f-v')">SUBIR</button></div>
</div>

<script>
    const salas = [
        {n: "Sado y Maso", e: ".jpg", b: "COLO", cl: "var(--n-rojo)", h: "Bienvenido al calabozo... ¿Listo para que te castigue como a un perro?"}, 
        {n: "Spa", e: ".png", b: "MIA", cl: "var(--n-rosa)", h: "Relájate bombón... estoy toda mojadita esperándote en el jacuzzi."}, 
        {n: "Biblioteca", e: ".png", b: "TANIA", cl: "var(--n-azul)", h: "Shhh... hay que hacer silencio mientras me porto muy mal bajo la mesa."},
        {n: "Camarera", e: ".png", b: "MIA", cl: "var(--n-rosa)", h: "¿Pediste algo caliente? Porque yo estoy ardiendo..."},
        {n: "Discoteca", e: ".png", b: "COLO", cl: "var(--n-rojo)", h: "¡Qué movidito está esto! Vení que te bailo bien pegadito..."},
        {n: "El Bar", e: ".png", b: "TANIA", cl: "var(--n-azul)", h: "Te sirvo una copa y me servís a mí... ¿dale?"},
        {n: "Gimnasio", e: ".png", b: "MIA", cl: "var(--n-rosa)", h: "Uff, qué calor hace acá... ayudame a estirar un poco, dale."},
        {n: "Oficina", e: ".png", b: "TANIA", cl: "var(--n-azul)", h: "El jefe no está... es hora de hacer horas extras bien cochinas."},
        {n: "Playa", e: ".png", b: "COLO", cl: "var(--n-rojo)", h: "Arena y sol... y yo con ganas de que me pongas cremita."},
        {n: "La Tiendita", e: ".png", b: "MIA", cl: "var(--n-rosa)", h: "¿Qué vas a llevar hoy? Yo estoy en oferta solo para vos..."}
    ];

    let idx = 0;
    let manual = false;

    function bootImperio() {
        const list = document.getElementById('rooms-list');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 'room-unit'; d.id = 's-' + i;
            // Número real de personas conectadas (aleatorio entre 50 y 300)
            let users = Math.floor(Math.random() * 250) + 50;
            d.innerHTML = `<span>${s.n}</span><span class="user-count" id="count-${i}">👥 ${users} PERSONAS MIRANDO</span>`;
            d.onclick = () => { manual = true; setRoom(i, true); };
            list.appendChild(d);
        });
        setRoom(0, false);
        setInterval(updateUsers, 3000);
        setInterval(peleaDeBots, 7000);
    }

    function updateUsers() {
        salas.forEach((_, i) => {
            let el = document.getElementById('count-' + i);
            let current = parseInt(el.innerText.match(/\d+/)[0]);
            let change = Math.floor(Math.random() * 7) - 3; // Sube o baja un poco
            el.innerHTML = `👥 ${current + change} PERSONAS MIRANDO`;
        });
    }

    function setRoom(i, m) {
        idx = i;
        document.querySelectorAll('.room-unit').forEach(x => x.classList.remove('active'));
        document.getElementById('s-' + i).classList.add('active');
        document.getElementById('main-img').src = encodeURI(salas[i].n + salas[i].e);
        
        if(m) {
            const stream = document.getElementById('chat-stream');
            stream.innerHTML = `<div style="text-align:center; color:#555; font-size:10px; border-bottom:1px solid #222; padding-bottom:5px; margin-bottom:15px;">ENTRANDO A ${salas[idx].n.toUpperCase()} - CHAT NUEVO</div>`;
            bot(salas[idx].h); // Bot calentando el ambiente al entrar
        }
    }

    function send() {
        const input = document.getElementById('msg-in');
        const stream = document.getElementById('chat-stream');
        if(!input.value) return;
        stream.innerHTML += `<div class="chat-msg-user"><b>Tú:</b> ${input.value}</div>`;
        const txt = input.value.toLowerCase();
        input.value = "";
        stream.scrollTop = stream.scrollHeight;

        let r = "Mmm... me estás tentando. ¿Por qué no me regalas unas monedas y te muestro por qué soy la favorita?";
        if(txt.includes("hola")) r = "¡Hola bombón! Vení que te estaba esperando...";
        if(txt.includes("ver") || txt.includes("foto")) r = "Regalame 10 monedas arriba y me quito lo que vos quieras ahora mismo.";
        
        bot(r);
    }

    function bot(t) {
        const stream = document.getElementById('chat-stream');
        stream.innerHTML += `<div class="chat-msg-bot"><b style="color:${salas[idx].cl}">${salas[idx].b}:</b> ${t}</div>`;
        stream.scrollTop = stream.scrollHeight;
    }

    function peleaDeBots() {
        const stream = document.getElementById('chat-stream');
        const m = [
            {b:"MIA", cl:"var(--n-rosa)", m:"¿Vieron qué calladito está el bombón? Seguro me está mirando a mí..."},
            {b:"TANIA", cl:"var(--n-azul)", m:"Ni lo sueñes Mia, prefiere a una mujer de verdad... ¡Vení conmigo, ganso!"},
            {b:"COLO", cl:"var(--n-rojo)", m:"Dejen de pelear, gilas... el único que manda acá es el que pone las monedas."}
        ][Math.floor(Math.random()*3)];
        
        stream.innerHTML += `<div class="chat-msg-bot"><b style="color:${m.cl}">${m.b}:</b> ${m.m}</div>`;
        stream.scrollTop = stream.scrollHeight;
    }

    function up(id) {
        const link = prompt("Enlace de imagen/video:");
        if(link) document.getElementById(id).innerHTML = `<img src="${link}" style="width:100%; border-radius:8px; border:1px solid gold;">` + document.getElementById(id).innerHTML;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&item_name=VIP_Credits&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
