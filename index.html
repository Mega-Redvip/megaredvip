<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v134</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 240px 100px 1fr 100px 240px; 
            align-items: center; gap: 10px; padding: 10px;
            background: #050505; border-bottom: 5px solid var(--n-rojo); height: 220px;
        }
        .logo-v134 { width: 100%; max-height: 200px; object-fit: contain; }
        .coin { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 2px solid white; }

        /* CARRUSEL DE SALAS Y VISOR */
        .carrusel-salas { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: #0a0a0a; border-bottom: 2px solid #222; scrollbar-width: thin; }
        .btn-c { flex: 0 0 auto; padding: 10px 20px; background: #111; border: 2px solid #444; color: white; border-radius: 30px; cursor: pointer; font-size: 12px; white-space: nowrap; }
        .btn-c.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 10px var(--n-rojo); }

        .visor-vip { width: 100%; height: 500px; background: #050505; position: relative; border-bottom: 5px solid var(--n-rojo); display: flex; align-items: center; justify-content: center; }
        #webcam-img { width: 100%; height: 100%; object-fit: cover; }
        .status-msg { position: absolute; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid var(--n-rojo); text-align: center; display: none; }

        /* SECCIÓN 50/50: FOTOS Y CHAT */
        .main-split { display: grid; grid-template-columns: 50% 50%; height: 600px; }

        /* LADO FOTOS (Llenando el 50%) */
        .bots-side { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; border-right: 2px solid var(--n-rojo); }
        .bot-unit { position: relative; height: 100%; overflow: hidden; border-right: 1px solid #111; }
        .bot-unit img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* Llenar todo el espacio */
            object-position: center top; /* Centrar caras */
            filter: brightness(0.9) contrast(1.1); 
        }
        .tag-vip { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 26px; font-weight: 900; text-shadow: 0 0 10px #000, 0 0 20px #000; }

        /* LADO CHAT (Llenando el 50%) */
        .chat-side { display: flex; flex-direction: column; background: #080808; height: 100%; }
        #logs-chat { flex-grow: 1; padding: 25px; overflow-y: auto; font-size: 15px; color: #eee; }
        .input-box { padding: 20px; background: #111; display: flex; gap: 10px; border-top: 2px solid #222; }
        #msg-in { flex-grow: 1; background: #000; border: 2px solid var(--n-rojo); color: white; padding: 15px; border-radius: 10px; outline: none; }

        /* PUERTAS VIP */
        .puertas-footer { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; background: #000; }
        .btn-door { width: 100%; padding: 18px; border: none; border-radius: 15px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 16px; transition: 0.3s; }
        .p-historia { background: linear-gradient(45deg, #ff00ff, #ff003c); box-shadow: 0 0 20px var(--n-rosa); }
        .p-estado { background: linear-gradient(45deg, #00d9ff, #0055ff); box-shadow: 0 0 20px var(--n-azul); }
        .p-video { background: linear-gradient(45deg, #ff003c, #800000); box-shadow: 0 0 20px var(--n-rojo); }
    </style>
</head>
<body onload="startImperio()">

<header>
    <div style="color:var(--oro); text-align:center; font-size:12px;">ESPACIO<br>PUBLICITARIO</div>
    <div style="display:flex; flex-direction:column; gap:5px;"><div class="coin" onclick="pago(1)">$1</div><div class="coin" onclick="pago(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v134">
    <div style="display:flex; flex-direction:column; gap:5px;"><div class="coin" onclick="pago(10)">$10</div><div class="coin" onclick="pago(20)">$20</div></div>
    <div style="color:var(--oro); text-align:center; font-size:12px;">ANÚNCIATE<br>AQUÍ</div>
</header>

<div class="carrusel-salas" id="lista-salas"></div>

<div class="visor-vip">
    <div id="error-screen" class="status-msg">
        <h2 id="error-txt"></h2>
        <p>Asegúrate de tener el archivo JPG en la carpeta del index.html</p>
    </div>
    <img id="webcam-img" src="" onerror="retryFile(this)">
</div>

<div class="main-split">
    <div class="bots-side">
        <div class="bot-unit"><img src="Rubia.jpg"><div class="tag-vip" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-unit"><img src="Morocha.jpg"><div class="tag-vip" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-unit"><img src="Pelirroja.jpg"><div class="tag-vip" style="color:var(--n-rojo)">COLO</div></div>
    </div>

    <div class="chat-side">
        <div id="logs-chat"></div>
        <div class="input-box">
            <input type="text" id="msg-in" placeholder="Dile algo a las chicas..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); border:none; color:white; padding:0 25px; border-radius:10px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>
</div>

<div class="puertas-footer">
    <button class="btn-door p-historia" onclick="subir('h')">Historias VIP</button>
    <button class="btn-door p-estado" onclick="subir('e')">Estados On</button>
    <button class="btn-door p-video" onclick="subir('v')">Videos Live</button>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    
    function startImperio() {
        const carrusel = document.getElementById('lista-salas');
        salas.forEach((s, i) => {
            let b = document.createElement('div');
            b.className = 'btn-c'; b.id = 's-'+i;
            b.innerHTML = s;
            b.onclick = () => verSala(i);
            carrusel.appendChild(b);
        });
        verSala(0);
        mensaje("TANIA", "¡Hola bombón! Mira el carrusel de salas arriba y elige dónde quieres que nos encontremos.");
    }

    function verSala(i) {
        document.querySelectorAll('.btn-c').forEach(x => x.classList.remove('active'));
        document.getElementById('s-'+i).classList.add('active');
        const img = document.getElementById('webcam-img');
        document.getElementById('error-screen').style.display = "none";
        img.style.display = "block";
        img.dataset.r = "1";
        img.src = salas[i] + ".jpg"; 
    }

    function retryFile(img) {
        const i = document.querySelector('.btn-c.active').id.split('-')[1];
        const base = salas[i];
        let r = parseInt(img.dataset.r);
        
        if(r === 1) { img.src = base.replace(/\s/g, "") + ".jpg"; img.dataset.r = "2"; }
        else if(r === 2) { img.src = base.toLowerCase() + ".jpg"; img.dataset.r = "3"; }
        else {
            img.style.display = "none";
            document.getElementById('error-screen').style.display = "block";
            document.getElementById('error-txt').innerText = "FALTA: " + base + ".jpg";
        }
    }

    function enviar() {
        const input = document.getElementById('msg-in');
        if(!input.value.trim()) return;
        document.getElementById('logs-chat').innerHTML += `<div style="text-align:right; margin-bottom:15px; color:var(--oro)"><b>Tú:</b> ${input.value}</div>`;
        
        setTimeout(() => {
            const girls = ["MIA", "TANIA", "COLO"];
            const r = ["¿Te gusta cómo nos vemos hoy?", "Si quieres verme mejor, invita unas monedas...", "¡Qué galán!", "¿A qué sala vamos primero?"];
            mensaje(girls[Math.floor(Math.random()*3)], r[Math.floor(Math.random()*r.length)]);
        }, 800);
        
        input.value = "";
        const logs = document.getElementById('logs-chat');
        logs.scrollTop = logs.scrollHeight;
    }

    function mensaje(n, m) {
        const logs = document.getElementById('logs-chat');
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        logs.innerHTML += `<div style="margin-bottom:15px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        logs.scrollTop = logs.scrollHeight;
    }

    function subir(x) { alert("Carga VIP habilitada."); }
    function pago(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
