<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | NEON WAR</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; --n-violeta: #bc13fe; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER: Logo XL Centrado */
        header { height: 180px; background: #000; border-bottom: 4px solid var(--oro); display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
        .logo-img { height: 140px; width: auto; filter: drop-shadow(0 0 20px var(--oro)); }
        .coin-box { position: absolute; right: 20px; bottom: 10px; display: flex; gap: 8px; }
        .coin { width: 55px; height: 55px; border-radius: 50%; background: radial-gradient(circle, #fff9aa, var(--oro)); border: 2px solid #333; color: #000; font-size: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 0 10px var(--oro); }

        /* BARRA DE INTERACCIÓN CLIENTE */
        .muro-interactivo { background: #111; border-bottom: 2px solid #333; padding: 10px; display: flex; justify-content: center; gap: 15px; z-index: 100; }
        .up-btn { padding: 10px 20px; border: 2px solid; background: transparent; font-weight: 900; cursor: pointer; border-radius: 20px; font-size: 11px; text-transform: uppercase; }

        /* PANEL DE SUBIDA (Lugar para subir cosas) */
        #upload-panel { display: none; background: #1a1a1a; padding: 15px; border-bottom: 2px solid var(--oro); text-align: center; }
        #upload-panel input, #upload-panel textarea { width: 80%; padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #444; background: #000; color: white; }

        /* CUERPO PRINCIPAL */
        .main-content { display: grid; grid-template-columns: 220px 1fr 350px; flex-grow: 1; padding: 10px; gap: 10px; overflow: hidden; }
        
        .rooms { background: #080808; border: 1px solid #222; border-radius: 12px; overflow-y: auto; padding: 5px; }
        .p-btn { width: 100%; padding: 10px; margin-bottom: 5px; background: #151515; border: 1px solid #333; color: #555; cursor: pointer; border-radius: 6px; text-align: left; font-size: 9px; font-weight: bold; }
        .p-btn.active { border-color: var(--n-turq); color: var(--n-turq); background: #001212; box-shadow: 0 0 8px var(--n-turq); }

        .visor { background: #000; border: 2px solid #1a1a1a; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }

        /* DERECHA: AVATARES Y CHAT */
        .right-panel { display: flex; flex-direction: column; gap: 10px; height: 100%; }
        .girls { display: flex; gap: 5px; height: 120px; text-align: center; }
        .g-card { flex: 1; }
        .g-img-box { height: 85px; border: 2px solid var(--oro); border-radius: 8px; overflow: hidden; margin-bottom: 3px; }
        .g-img { width: 100%; height: 100%; object-fit: cover; }
        .g-name { font-size: 10px; font-weight: 900; }
        
        .chat { flex: 1; background: #020202; border: 1px solid #333; border-radius: 12px; padding: 12px; overflow-y: auto; font-size: 11px; }
        .msg { margin-bottom: 10px; border-left: 4px solid; padding-left: 8px; line-height: 1.3; }
    </style>
</head>
<body>

<header>
    <div style="position:absolute; left:20px; top:15px; color:var(--n-rojo); font-weight:bold; font-size:11px;">🔴 VIVO: 14,520 SOCIOS</div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-img" alt="LOGO">
    <div class="coin-box">
        <div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div>
        <div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div>
    </div>
</header>

<div class="muro-interactivo">
    <button class="up-btn" style="color:var(--n-rojo); border-color:var(--n-rojo);" onclick="toggleUpload('VIDEO')">📹 SUBIR VÍDEO</button>
    <button class="up-btn" style="color:var(--n-verde); border-color:var(--n-verde);" onclick="toggleUpload('ESTADO')">✍️ SUBIR ESTADO</button>
    <button class="up-btn" style="color:var(--n-turq); border-color:var(--n-turq);" onclick="toggleUpload('HISTORIA')">📸 SUBIR HISTORIA</button>
</div>

<div id="upload-panel">
    <h4 id="upload-title" style="color:var(--oro); margin-bottom:10px;"></h4>
    <input type="file" id="file-input">
    <textarea id="text-input" placeholder="Escribe algo para las chicas..."></textarea><br>
    <button class="up-btn" style="color:var(--n-verde); border-color:var(--n-verde); margin-top:10px;" onclick="simularSubida()">PUBLICAR AHORA</button>
</div>

<div class="main-content">
    <div class="rooms" id="rooms-list"></div>
    <div class="visor"><img id="main-view" src=""></div>
    <div class="right-panel">
        <div class="girls">
            <div class="g-card"><div class="g-img-box"><img src="Rubia.jpg" class="g-img"></div><div class="g-name" style="color:var(--n-turq); text-shadow:0 0 5px var(--n-turq);">MIA</div></div>
            <div class="g-card"><div class="g-img-box"><img src="Morocha.jpg" class="g-img"></div><div class="g-name" style="color:var(--n-verde); text-shadow:0 0 5px var(--n-verde);">TANIA</div></div>
            <div class="g-card"><div class="g-img-box"><img src="Pelirroja.jpg" class="g-img"></div><div class="g-name" style="color:var(--n-rojo); text-shadow:0 0 5px var(--n-rojo);">COLO</div></div>
        </div>
        <div class="chat" id="chat-box"></div>
    </div>
</div>

<script>
    let idx = 0;
    const rooms = ["Sado y Maso", "Biblioteca", "Camarera", "Discoteca", "La Tiendita", "Playa", "Spa", "El Bar", "Oficina", "Gimnasio"];
    
    const warMsgs = [
        {u: "MIA", t: "🔥 ¿Tania se cree sexy? Pobrecita... mis socios de Resistencia me prefieren a mí. ¡Miren este bibe!", c: "#00d9ff"},
        {u: "COLO", t: "🔞 ¡Basta de hablar! ¿Quién me manda 5 tokens y me saco todo en la sala SADO ahora?", c: "#ff003c"},
        {u: "TANIA", t: "💎 Mia, callate. Sos una nena. Yo soy la verdadera perra de Resistencia. ¿Quién quiere ver mi video?", c: "#00ff66"},
        {u: "CLIENTE_VIP", t: "¡COLO sos una bomba! Ya te mandé 10 tokens, hacé lo que prometiste.", c: "#bc13fe"},
        {u: "MIA", t: "💅 Tania, no te mira nadie. Mis curvas mandan en esta red. ¡Manden más Oro!", c: "#00d9ff"},
        {u: "COLO", t: "🔥 Soy la más vulgar y la más caliente. El que no me mande tokens es porque no es hombre.", c: "#ff003c"},
        {u: "CLIENTE_X", t: "Tania, mostrame un poquito el Bar y te doy todo lo que quieras...", c: "#bc13fe"},
        {u: "TANIA", t: "🔞 Vení por acá bombón... Mia y la Colo se van a morir de envidia.", c: "#00ff66"}
    ];

    function init() {
        const list = document.getElementById('rooms-list');
        rooms.forEach((name, i) => {
            const b = document.createElement('button');
            b.className = 'p-btn'; b.id = 'r-'+i;
            b.innerHTML = `🚪 ${name.toUpperCase()}`;
            b.onclick = () => { idx = i; refresh(); };
            list.appendChild(b);
        });
        refresh();
        
        // CHAT ACTIVO: Cada 8 segundos
        setInterval(() => {
            const m = warMsgs[Math.floor(Math.random() * warMsgs.length)];
            addChat(m.u, m.t, m.c);
        }, 8000);

        setInterval(() => { idx = (idx + 1) % rooms.length; refresh(); }, 18000);
    }

    function refresh() {
        document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('r-'+idx).classList.add('active');
        const img = document.getElementById('main-view');
        // USAMOS NOMBRE DIRECTO SIN CARPETAS PARA EVITAR ERRORES
        img.src = rooms[idx] + ".jpg";
        img.onerror = () => { img.src = "https://via.placeholder.com/800x600/000/d4af37?text=" + rooms[idx]; };
    }

    function addChat(user, txt, color) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div class="msg" style="border-color:${color}"><b>${user}:</b> ${txt}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function toggleUpload(tipo) {
        const panel = document.getElementById('upload-panel');
        const title = document.getElementById('upload-title');
        panel.style.display = 'block';
        title.innerText = "SUBIR " + tipo + " PARA LAS CHICAS";
    }

    function simularSubida() {
        const txt = document.getElementById('text-input').value;
        if(txt) {
            addChat("TÚ (SOCIO)", txt, "#bc13fe");
            setTimeout(() => addChat("COLO", "🔥 ¡Me encanta lo que subiste! Mandame 5 tokens y te respondo...", "#ff003c"), 2000);
            document.getElementById('upload-panel').style.display = 'none';
            document.getElementById('text-input').value = "";
        } else { alert("Escribe algo antes de publicar"); }
    }

    function pay(n) {
        window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&item_name=TOKENS_VIP&amount=${n}&currency_code=USD`, '_blank');
    }

    init();
</script>
</body>
</html>
