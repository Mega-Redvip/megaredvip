<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v151</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER CON PUBLICIDAD RECUPERADA */
        header { 
            display: grid; grid-template-columns: 1fr 130px 250px 130px 1fr; 
            align-items: center; gap: 20px; padding: 15px;
            background: #050505; border-bottom: 8px solid var(--n-rojo); height: 320px;
        }
        .pub-box { border: 3px solid var(--n-rojo); height: 240px; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #333; font-size: 40px; }
        .logo-v151 { height: 250px; width: 250px; object-fit: contain; }
        .coin { width: 85px; height: 85px; border-radius: 50%; background: radial-gradient(circle, #fff, var(--oro)); color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; border: 4px solid white; cursor: pointer; box-shadow: 0 0 15px var(--oro); }

        /* SECCIÓN SALAS */
        .seccion-salas { display: grid; grid-template-columns: 280px 1fr; height: 480px; border-bottom: 8px solid var(--n-rojo); }
        .menu-l { overflow-y: auto; background: #080808; border-right: 2px solid #333; }
        .s-btn { padding: 18px; border-bottom: 1px solid #111; cursor: pointer; color: #555; transition: 0.3s; }
        .s-btn.active { background: var(--n-rojo); color: white; }
        
        .visor-vip { background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        #sala-img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .status-msg { position: absolute; text-align: center; border: 2px dashed #444; padding: 25px; color: #666; }

        /* SECCIÓN IA: 600PX REALES Y SIMÉTRICOS */
        .seccion-ia { display: grid; grid-template-columns: 50% 50%; height: 600px; }

        .grid-bots { display: grid; grid-template-columns: repeat(3, 1fr); background: #000; border-right: 8px solid var(--n-rojo); }
        .bot-cell { 
            position: relative; 
            height: 600px; /* FORZADO */
            border-right: 1px solid #222;
            overflow: hidden;
            background: #050505;
        }
        /* ESTO ELIMINA LA ESCALERA Y AGRANDA A 600PX */
        .bot-cell img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Llena el espacio de 600px sin deformarse */
            object-position: top center; /* Asegura que se vea la cara */
        }
        .bot-name { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 28px; font-weight: 900; text-shadow: 0 0 15px #000; z-index: 5; }

        .chat-wrap { display: flex; flex-direction: column; height: 600px; background: #0a0a0a; }
        #chat-window { flex-grow: 1; padding: 25px; overflow-y: auto; font-size: 16px; border-bottom: 1px solid #222; }
        .chat-input-area { padding: 20px; background: #111; display: flex; gap: 10px; }
        #chat-in { flex-grow: 1; background: #000; border: 3px solid var(--n-rojo); color: white; padding: 15px; border-radius: 8px; outline: none; }

        /* PUERTAS */
        .footer-puertas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 35px; background: #000; }
        .p-box { background: #080808; border: 1px solid #333; border-radius: 20px; padding: 15px; text-align: center; }
        .p-pre { height: 110px; background: #000; border: 2px dashed #444; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-btn { width: 100%; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body onload="initImperio()">

<header>
    <div class="pub-box">AD</div>
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    <img src="Logo Mega Red Lunar.jpg" class="logo-v151">
    <div style="display:flex; flex-direction:column; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    <div class="pub-box">AD</div>
</header>

<div class="seccion-salas">
    <div class="menu-l" id="menu-l"></div>
    <div class="visor-vip">
        <div id="st-sala" class="status-msg">
            <p>CONECTANDO...</p>
            <small id="db-msg"></small>
        </div>
        <img id="sala-img" src="" onerror="repararRuta(this)">
    </div>
</div>

<div class="seccion-ia">
    <div class="grid-bots">
        <div class="bot-cell"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-cell"><img src="Morocha.jpg"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-cell"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-wrap">
        <div id="chat-window"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-in" placeholder="Escribe a las chicas..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()" style="background:var(--n-rojo); color:white; border:none; padding:0 25px; border-radius:8px; cursor:pointer; font-weight:bold;">ENVIAR</button>
        </div>
    </div>
</div>

<div class="footer-puertas">
    <div class="p-box">
        <div class="p-pre" id="v-h"></div>
        <button onclick="up('v-h')" style="background:var(--n-rosa)" class="p-btn">Historias</button>
    </div>
    <div class="p-box">
        <div class="p-pre" id="v-e"></div>
        <button onclick="up('v-e')" style="background:var(--n-azul)" class="p-btn">Estados</button>
    </div>
    <div class="p-box">
        <div class="p-pre" id="v-v"></div>
        <button onclick="up('v-v')" style="background:var(--n-rojo)" class="p-btn">Videos</button>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    let actual = 0;

    function initImperio() {
        const ml = document.getElementById('menu-l');
        salas.forEach((s, i) => {
            let d = document.createElement('div');
            d.className = 's-btn'; d.id = 'sl-'+i;
            d.innerHTML = `<b>${s}</b> <span style="float:right; color:lime">●</span>`;
            d.onclick = () => ver(i);
            ml.appendChild(d);
        });
        ver(0);
        setInterval(() => { actual = (actual + 1) % salas.length; ver(actual); }, 7000);
        msg("MIA", "¡Hola! He vuelto a poner los anuncios y ahora medimos 600px exactos.");
    }

    function ver(i) {
        actual = i;
        document.querySelectorAll('.s-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('sl-'+i).classList.add('active');
        const img = document.getElementById('sala-img');
        img.style.display = "none";
        document.getElementById('st-sala').style.display = "block";
        document.getElementById('db-msg').innerText = "Cargando: " + salas[i] + ".jpg";
        img.dataset.try = "0";
        img.src = salas[i] + ".jpg";
    }

    function repararRuta(img) {
        let t = parseInt(img.dataset.try);
        const n = salas[actual];
        const ext = [".png", ".JPG", ".PNG", ".jpeg"];
        if(t < ext.length) {
            img.dataset.try = t + 1;
            img.src = n + ext[t];
        } else {
            document.getElementById('db-msg').innerHTML = `<span style="color:red">ERROR:</span> No está <b>${n}.jpg</b>`;
        }
    }

    document.getElementById('sala-img').onload = function() {
        this.style.display = "block";
        document.getElementById('st-sala').style.display = "none";
    };

    function enviar() {
        const i = document.getElementById('chat-in');
        if(!i.value.trim()) return;
        document.getElementById('chat-window').innerHTML += `<div style="text-align:right; margin-bottom:15px; color:var(--oro)"><b>Tú:</b> ${i.value}</div>`;
        setTimeout(() => msg("TANIA", "¡Te leemos perfecto!"), 800);
        i.value = "";
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function msg(n, m) {
        const c = n === "MIA" ? "var(--n-rosa)" : n === "TANIA" ? "var(--n-azul)" : "var(--n-rojo)";
        document.getElementById('chat-window').innerHTML += `<div style="margin-bottom:15px;"><b style="color:${c}">${n}:</b> ${m}</div>`;
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function up(id) {
        let n = prompt("Nombre del archivo:");
        if(n) document.getElementById(id).innerHTML = `<img src="${n}" style="width:100%; height:100%; object-fit:cover;">`;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
