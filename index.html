<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | EDICIÓN NITIDEZ v58</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; 
            --n-rosa: #ff00ff; --n-verde: #00ff66;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 300px 1fr 300px; 
            align-items: center; padding: 20px; border-bottom: 4px solid var(--n-rojo); 
            background: #050505; box-shadow: 0 0 20px var(--n-rojo);
        }
        .header-side { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .publi-box { width: 250px; height: 90px; border: 2px solid var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 11px; }
        .coins { display: flex; gap: 15px; }
        .coin { 
            width: 65px; height: 65px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 2px solid white;
        }
        .logo-center img { height: 220px; filter: drop-shadow(0 0 20px var(--n-rojo)); }

        /* CUERPO */
        .main-content { display: grid; grid-template-columns: 180px 1fr 450px; gap: 20px; padding: 20px; }

        /* LISTA DE SALAS (CARRUSEL VERTICAL) */
        .rooms-list { display: flex; flex-direction: column; gap: 6px; }
        .room-btn { 
            padding: 12px; background: #111; border: 1px solid #333; color: white; 
            font-size: 10px; text-transform: uppercase; cursor: pointer; text-align: center;
            transition: 0.2s;
        }
        .room-btn:hover { border-color: var(--n-rojo); }
        .room-btn.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 10px var(--n-rojo); font-weight: 900; }

        /* VISOR CENTRAL */
        .viewer-box { display: flex; flex-direction: column; gap: 10px; }
        .screen { border: 4px solid var(--n-rojo); border-radius: 15px; height: 580px; background: #000; overflow: hidden; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        .btn-ali { display: none; width: 100%; padding: 15px; background: #ff4747; color: white; text-decoration: none; text-align: center; font-weight: 900; border-radius: 10px; animation: blink 1s infinite; }

        /* AVATARES (NITIDEZ Y CUERPO COMPLETO) */
        .right-panel { display: flex; flex-direction: column; gap: 15px; }
        .bots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; height: 450px; }
        .bot-card { display: flex; flex-direction: column; gap: 5px; }
        .bot-img-wrap { 
            flex-grow: 1; border: 2px solid #222; border-radius: 10px; overflow: hidden; 
            background: #080808; position: relative;
        }
        .bot-img-wrap img { width: 100%; height: 100%; object-fit: contain; object-position: center; } /* Contain para no recortar */
        .bot-name-tag { text-align: center; font-size: 12px; font-weight: 900; padding: 5px; border-radius: 5px; text-transform: uppercase; }

        /* CHAT */
        .chat-box { 
            background: #050505; border: 1px solid var(--n-rojo); border-radius: 10px; 
            height: 280px; padding: 12px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 6px;
        }
        .msg { font-size: 12px; border-bottom: 1px solid #111; padding-bottom: 3px; line-height: 1.4; }
        .c-mia { color: var(--n-rosa); }
        .c-tania { color: var(--n-azul); }
        .c-colo { color: var(--n-rojo); }
        .c-user { color: var(--oro); font-style: italic; }

        /* MUROS */
        .bottom-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; border-top: 3px solid var(--n-rojo); }
        .wall-box { background: #0a0a0a; border: 1px solid var(--n-rojo); padding: 15px; border-radius: 15px; text-align: center; }
        .wall-area { height: 180px; background: #000; margin: 10px 0; border-radius: 8px; overflow-y: auto; padding: 8px; font-size: 11px; text-align: left; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    </style>
</head>
<body onload="init()">

<header>
    <div class="header-side">
        <div class="publi-box">PUBLI VIP $20</div>
        <div class="coins">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(3)">$3</div>
        </div>
    </div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="header-side">
        <div class="publi-box">PUBLI VIP $50</div>
        <div class="coins">
            <div class="coin" onclick="pay(5)">$5</div>
            <div class="coin" onclick="pay(10)">$10</div>
        </div>
    </div>
</header>

<div class="main-content">
    <div id="rooms-side" class="rooms-list"></div>

    <div class="viewer-box">
        <div class="screen">
            <img id="main-view" src="">
        </div>
        <a id="ali-link" href="TU_LINK_ALIEXPRESS" target="_blank" class="btn-ali">🛒 COMPRAR EN LA TIENDITA</a>
    </div>

    <div class="right-panel">
        <div class="bots-grid">
            <div class="bot-card">
                <div class="bot-img-wrap"><img src="Rubia.jpg"></div>
                <div class="bot-name-tag" style="background: rgba(255,0,255,0.2); color: var(--n-rosa);">MIA</div>
            </div>
            <div class="bot-card">
                <div class="bot-img-wrap"><img src="Morocha.jpg"></div>
                <div class="bot-name-tag" style="background: rgba(0,217,255,0.2); color: var(--n-azul);">TANIA</div>
            </div>
            <div class="bot-card">
                <div class="bot-card">
                <div class="bot-img-wrap"><img src="Pelirroja.jpg"></div>
                <div class="bot-name-tag" style="background: rgba(255,0,60,0.2); color: var(--n-rojo);">COLO</div>
            </div>
        </div>
        <div id="chat-stream" class="chat-box"></div>
    </div>
</div>

<div class="bottom-section">
    <div class="wall-box">
        <h3>📱 ESTADOS</h3>
        <div class="wall-area" id="wall-e"></div>
        <button style="width:100%; padding:8px; cursor:pointer;" onclick="postTo('wall-e')">SUBIR ESTADO</button>
    </div>
    <div class="wall-box">
        <h3>📖 HISTORIAS</h3>
        <div class="wall-area" id="wall-h"></div>
        <button style="width:100%; padding:8px; cursor:pointer;" onclick="postTo('wall-h')">SUBIR HISTORIA</button>
    </div>
    <div class="wall-box">
        <h3>🎬 VIDEOS</h3>
        <div class="wall-area" id="wall-v"></div>
        <button style="width:100%; padding:8px; cursor:pointer;" onclick="postTo('wall-v')">SUBIR VIDEO</button>
    </div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym_movimiento.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda_musica.mp3"}, 
        {n: "Oficina", e: ".png", s: "oficina_ambiente.mp3"}, {n: "Playa", e: ".png", s: "playa_olas.mp3"}
    ];

    function init() {
        const side = document.getElementById('rooms-side');
        side.innerHTML = ''; // Limpiar para asegurar carrusel
        rooms.forEach((r, i) => {
            const b = document.createElement('div');
            b.className = 'room-btn';
            b.id = 'r-' + i;
            b.innerText = r.n;
            b.onclick = function() { selectRoom(i); };
            side.appendChild(b);
        });
        selectRoom(0);
        setInterval(botCycle, 4000);
        setInterval(userEntry, 6000);
    }

    function selectRoom(i) {
        idx = i;
        document.querySelectorAll('.room-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('r-' + i).classList.add('active');
        
        const img = document.getElementById('main-view');
        img.src = encodeURI(rooms[i].n + rooms[i].e);
        
        const ali = document.getElementById('ali-link');
        ali.style.display = (rooms[i].n === "La Tiendita") ? "block" : "none";

        const player = document.getElementById('audio-player');
        player.src = rooms[i].s;
        player.play().catch(() => {});
    }

    function botCycle() {
        const chat = document.getElementById('chat-stream');
        const bots = [
            {n: "MIA", cl: "c-mia", m: "¡Mis historias están que arden! 🔥"},
            {n: "TANIA", cl: "c-tania", m: "¿Quién me invita un trago? Compra monedas arriba 💎"},
            {n: "COLO", cl: "c-colo", m: "Acabo de subir un video prohibido abajo... 🔞"}
        ];
        const b = bots[Math.floor(Math.random()*3)];
        chat.innerHTML = `<div class="msg"><b class="${b.cl}">${b.n}:</b> ${b.m}</div>` + chat.innerHTML;
    }

    function userEntry() {
        const chat = document.getElementById('chat-stream');
        const names = ["Socio_Chaco", "Vip_44", "Anonimo", "User_Oro"];
        const u = names[Math.floor(Math.random()*names.length)];
        const r = rooms[Math.floor(Math.random()*rooms.length)].n;
        chat.innerHTML = `<div class="msg" style="color:#555"><span class="c-user">● ${u}</span> entró en <b>${r}</b></div>` + chat.innerHTML;
    }

    function postTo(id) {
        const txt = prompt("Escribe lo que quieres publicar:");
        if(txt) {
            const wall = document.getElementById(id);
            wall.innerHTML = `<div style="border-bottom:1px solid #222; padding:5px; margin-bottom:5px;">${txt}</div>` + wall.innerHTML;
        }
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
