<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO TOTAL</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-verde: #00ff66; --n-turq: #00d9ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* HEADER: LOGO GIGANTE */
        header { 
            height: 280px; background: #000; border-bottom: 6px solid var(--oro); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; flex-shrink: 0; position: relative; 
        }
        .logo-img { height: 260px; filter: drop-shadow(0 0 50px var(--oro)); position: absolute; left: 50%; transform: translateX(-50%); }
        
        .online-box { background: rgba(0,255,102,0.1); border: 3px solid var(--n-verde); padding: 15px; border-radius: 12px; color: var(--n-verde); text-align: center; }
        .online-num { font-size: 28px; font-weight: 900; display: block; }

        .coin-grid { display: grid; grid-template-columns: repeat(2, 70px); gap: 10px; }
        .coin { width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff9aa, var(--oro) 50%, #5c4928); border: 2px solid #111; color: #000; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; box-shadow: 0 5px 0 #333; }

        /* CUERPO PRINCIPAL */
        .main-app { display: grid; grid-template-columns: 240px 1fr 400px; gap: 15px; padding: 15px; flex-grow: 1; min-height: 0; }

        /* COLUMNA IZQUIERDA: SECCIONES Y SALAS */
        .left-col { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .panel { background: #0a0a0a; border: 1px solid #333; border-radius: 10px; padding: 10px; }
        .p-btn { 
            width: 100%; padding: 12px; margin-bottom: 5px; background: #111; border: 1px solid #444; 
            color: #fff; cursor: pointer; border-radius: 5px; text-align: left; font-size: 10px; font-weight: 900; 
        }
        .p-btn.active { background: #fff !important; color: #000 !important; border-color: #fff; }

        /* VISOR CENTRAL: CARRUSEL */
        .visor-container { background: #000; border: 5px solid #1a1a1a; border-radius: 20px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        .sala-tag { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 10px 20px; border: 2px solid var(--n-turq); color: var(--n-turq); border-radius: 30px; font-size: 12px; font-weight: 900; z-index: 10; }

        /* COLUMNA DERECHA: CHICAS Y CHAT */
        .right-side { display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .girls-row { display: flex; gap: 5px; height: 220px; flex-shrink: 0; }
        .girl-card { flex: 1; border: 1px solid #222; border-radius: 10px; overflow: hidden; position: relative; }
        .girl-card img { width: 100%; height: 100%; object-fit: cover; }
        .girl-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 3px; font-size: 10px; font-weight: 900; }

        .chat-display { 
            flex-grow: 1; background: #020202; border: 2px solid #333; border-radius: 10px; 
            padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
        }
        .msg { border-left: 4px solid; padding-left: 10px; font-size: 13px; font-weight: bold; }
    </style>
</head>
