<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO FINAL v64</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; 
            --n-rosa: #ff00ff; --n-verde: #00ff66;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            overflow-y: auto; overflow-x: hidden; min-height: 100vh;
        }

        /* HEADER */
        header { 
            display: grid; grid-template-columns: 320px 1fr 320px; 
            align-items: center; padding: 25px; border-bottom: 5px solid var(--n-rojo); 
            background: #050505; box-shadow: 0 0 30px var(--n-rojo);
        }
        .header-side { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .publi-box { width: 280px; height: 100px; border: 2px solid var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 12px; }
        .logo-center img { height: 260px; filter: drop-shadow(0 0 30px var(--n-rojo)); }
        .coins { display: flex; gap: 15px; }
        .coin { 
            width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 2px solid white;
        }

        /* CUERPO */
        .main-container { 
            display: grid; grid-template-columns: 200px 1fr 480px; 
            gap: 20px; padding: 30px;
        }

        /* 1. SALAS (CARRUSEL) */
        .rooms-list { display: flex; flex-direction: column; gap: 8px; }
        .room-btn { 
            padding: 15px; background: #111; border: 1px solid #333; color: #666; 
            font-size: 11px; text-transform: uppercase; cursor: pointer; text-align: center; border-radius: 6px;
        }
        .room-btn.active { background: var(--n-rojo); border-color: white; color: white; box-shadow: 0 0 15px var(--n-rojo); font-weight: 900; }

        /* 2. VISOR CENTRAL */
        .viewer-area { display: flex; flex-direction: column; gap: 15px; }
        .main-screen { 
            border: 5px solid var(--n-rojo); border-radius: 20px; height: 600px; 
            background: #000; overflow: hidden; box-shadow: 0 0 40px rgba(255,0,60,0.3);
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        .btn-ali { 
            display: none; width: 100%; padding: 20px; background: #ff4747; color: white; 
            text-decoration: none; text-align: center; font-weight: 900; border-radius: 10px; border: 4px solid white; animation: blink 1s infinite;
        }

        /* 3. BOTS: UNIFICADAS Y AGRANDADAS (SOLUCIÓN AQUÍ) */
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        .bots-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        
        .bot-unit { 
            display: flex; flex-direction: column; 
            height: 500px; /* ALTURA FIJA Y AGRANDADA PARA LAS TRES */
        }
        
        .bot-img-box { 
            flex-grow: 1; /* Ocupa todo el espacio disponible en la columna */
            border: 3px solid #222; border-radius: 12px; 
            overflow: hidden; background: #000; 
        }
        
        /* Object-fit 'cover' para llenar el cuadro y unificar tamaño */
        .bot-img-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Llena el recuadro sin deformar, cortando bordes excedentes */
            object-position: top center; /* Centra la vista en la parte superior (cara/cuerpo) */
        }
        
        .bot-name { text-align: center; font-size: 13px; font-weight: 900; padding: 8px; border-radius: 6px; margin-top: 8px; text-transform: uppercase; }

        /* CHAT */
        .chat-box { 
            background: #050505; border: 2px solid var(--n-rojo); border-radius: 15px; 
            height: 280px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 8px;
        }
        .msg { font-size: 13px; border-bottom: 1px solid #111; padding-bottom: 5px; }

        /* MUROS */
        .bottom-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 40px; border-top: 5px solid var(--n-rojo); }
        .wall-card { background: #0a0a0a; border: 2px solid var(--n-rojo); padding: 20px; border-radius: 20px; text-align: center; }
        .wall-display { height: 200px; background: #000; margin: 15px 0; border-radius: 10px; overflow-y: auto; padding: 10px; text-align: left; border: 1px solid #222; font-size: 12px; }
        .wall-btn { width: 100%; padding: 12px; background: var(--n-rojo); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body onload="init()">

<header>
    <div class="header-side"><div class="publi-box">AD SPACE $20</div><div class="coins"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(3)">$3</div></div></div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg" alt="MEGA RED VIP"></div>
    <div class="header-side"><div class="publi-box">AD SPACE $50</div><div class="coins"><div class="coin" onclick="pay(5)">$5</div><div class="coin" onclick="pay(10)">$10</div></div></div>
</header>

<div class="main-container">
    <div id="rooms-side" class="rooms-list"></div>

    <div class="viewer-area">
        <div class="main-screen"><img id="main-view" src=""></div>
        <a id="ali-link" href="TU_LINK_ALIEXPRESS" target="_blank" class="btn-ali">🛒 COMPRAR EN LA TIENDITA (ALI)</a>
    </div>

    <div class="right-panel">
        <div class="bots-row">
            <div class="bot-unit">
                <div class="bot-img-box"><img src="Rubia.jpg"></div>
                <div class="bot-name" style="background: rgba(255,0,255,0.2); color: var(--n-rosa);">MIA</div>
            </div>
            <div class="bot-unit">
                <div class="bot-img-box"><img src="Morocha.jpg"></div>
                <div class="bot-name" style="background: rgba(0,217,255,0.2); color: var(--n-azul);">TANIA</div>
            </div>
            <div class="bot-unit">
                <div class="bot-img-box"><img src="Pelirroja.jpg"></div>
                <div class="bot-name" style="background: rgba(255,0,60,0.2); color: var(--n-rojo);">COLO</div>
            </div>
        </div>
        <div id="chat-stream" class="chat-box"></div>
    </div>
</div>

<div class="bottom-section">
    <div class="wall-card"><h3>📱 ESTADOS</h3><div class="wall-display" id="w-e"></div><button class="wall-btn" onclick="postTo('w-e')">SUBIR ESTADO</button></div>
    <div class="wall-card"><h3>📖 HISTORIAS</h3><div class="wall-display" id="w-h"></div><button class="wall-btn" onclick="postTo('w-h')">SUBIR HISTORIA</button></div>
    <div class="wall-card"><h3>🎬 VIDEOS</h3><div class="wall-display" id="w-v"></div><button class="wall-btn" onclick="postTo('w-v')">SUBIR VIDEO</button></div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let idx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym_movimiento.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda_musica.mp3"}, 
        {n: "Oficina", e: ".png", s: "oficina_ambiente.mp3"}, {n: "Playa", e: ".png", s: "playa_olas.mp3"}
    ];

    function init() {
        const side = document.getElementById('rooms-side');
        rooms.forEach((r, i) => {
            const b = document.createElement('div');
            b.className = 'room-btn'; b.id = 'r-' + i;
            b.innerText = r.n;
            b.onclick = () => { selectRoom(i); };
            side.appendChild(b);
        });
        
        selectRoom(0);
        setInterval(() => {
            idx = (idx + 1) % rooms.length;
            selectRoom(idx);
        }, 6000);

        setInterval(botChat, 4000);
    }

    function selectRoom(i) {
        idx = i;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('r-' + i).classList.add('active');
        document.getElementById('main-view').src = encodeURI(rooms[i].n + rooms[i].e);
        document.getElementById('ali-link').style.display = (rooms[i].n === "La Tiendita") ? "block" : "none";
        const player = document.getElementById('audio-player');
        player.src = rooms[i].s;
        player.play().catch(() => {});
    }

    function botChat() {
        const chat = document.getElementById('chat-stream');
        const bots = [
            {n: "MIA", c: "var(--n-rosa)", m: "¡Mis historias están que arden! 🔥"},
            {n: "TANIA", c: "var(--n-azul)", m: "¿Quién me invita un trago? Compra monedas arriba 💎"},
            {n: "COLO", c: "var(--n-rojo)", m: "Acabo de subir un video prohibido abajo... 🔞"}
        ];
        const b = bots[Math.floor(Math.random()*3)];
        chat.innerHTML = `<div class="msg"><b style="color:${b.c}">${b.n}:</b> ${b.m}</div>` + chat.innerHTML;
    }

    function postTo(id) {
        const val = prompt("Publica tu contenido:");
        if(val) document.getElementById(id).innerHTML = `<div style="border-bottom:1px solid #333; padding:10px; margin-bottom:10px; color:#eee;">${val}</div>` + document.getElementById(id).innerHTML;
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
