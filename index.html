<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v59</title>
    <style>
        :root { 
            --oro: #d4af37; --fondo: #000; 
            --n-rojo: #ff003c; --n-azul: #00d9ff; 
            --n-rosa: #ff00ff; --n-verde: #00ff66;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; 
            overflow-x: hidden; text-shadow: 0 0 10px rgba(255,0,60,0.5);
        }

        /* HEADER MONUMENTAL */
        header { 
            display: grid; grid-template-columns: 350px 1fr 350px; 
            align-items: center; padding: 30px; border-bottom: 5px solid var(--n-rojo); 
            background: #050505; box-shadow: 0 0 30px var(--n-rojo);
        }
        .header-side { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .publi-box { width: 300px; height: 110px; border: 3px solid var(--n-rojo); display: flex; align-items: center; justify-content: center; color: var(--n-rojo); font-size: 14px; box-shadow: inset 0 0 15px var(--n-rojo); }
        .coins { display: flex; gap: 25px; }
        .coin { 
            width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); 
            color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 3px solid white; font-size: 1.2em;
        }
        .logo-center img { height: 280px; filter: drop-shadow(0 0 30px var(--n-rojo)); }

        /* CUERPO: SALAS -> VISOR -> BOTS */
        .main-container { 
            display: grid; grid-template-columns: 200px 1fr 450px; 
            gap: 25px; padding: 25px; align-items: start;
        }

        /* 1. LAS 10 SALAS (LISTA VERTICAL) */
        .rooms-list { display: flex; flex-direction: column; gap: 10px; }
        .room-btn { 
            padding: 15px; background: #111; border: 2px solid #333; color: white; 
            font-size: 12px; text-transform: uppercase; cursor: pointer; text-align: center;
            transition: 0.3s; border-radius: 5px;
        }
        .room-btn:hover { border-color: var(--n-rojo); background: #222; }
        .room-btn.active { background: var(--n-rojo); border-color: white; box-shadow: 0 0 20px var(--n-rojo); transform: scale(1.05); }

        /* 2. VISOR CENTRAL GIGANTE */
        .viewer-area { display: flex; flex-direction: column; gap: 15px; }
        .main-screen { 
            border: 6px solid var(--n-rojo); border-radius: 20px; height: 650px; 
            background: #000; overflow: hidden; box-shadow: 0 0 40px rgba(255,0,60,0.4);
        }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
        
        .btn-ali { 
            display: none; width: 100%; padding: 20px; background: #ff4747; color: white; 
            text-decoration: none; text-align: center; font-weight: 900; border-radius: 12px;
            font-size: 1.3em; border: 4px solid white; animation: blink 1s infinite;
        }

        /* 3. BOTS CUERPO COMPLETO Y CHAT */
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        .bots-display { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; height: 500px; }
        .bot-col { display: flex; flex-direction: column; gap: 10px; }
        .bot-frame { flex-grow: 1; border: 3px solid #222; border-radius: 15px; overflow: hidden; background: #080808; }
        .bot-frame img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .bot-label { text-align: center; font-size: 14px; font-weight: 900; padding: 8px; border-radius: 8px; }

        .chat-full { 
            background: #050505; border: 2px solid var(--n-rojo); border-radius: 15px; 
            height: 320px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 10px;
            box-shadow: inset 0 0 15px rgba(255,0,60,0.2);
        }
        .msg { font-size: 14px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }

        /* MUROS INFERIORES */
        .bottom-walls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 40px; border-top: 5px solid var(--n-rojo); }
        .wall-card { background: #0a0a0a; border: 2px solid var(--n-rojo); padding: 20px; border-radius: 20px; text-align: center; }
        .wall-space { height: 220px; background: #000; margin: 15px 0; border-radius: 10px; overflow-y: auto; padding: 12px; text-align: left; border: 1px solid #222; }
        .wall-btn { width: 100%; padding: 15px; background: var(--n-rojo); color: white; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body onload="init()">

<header>
    <div class="header-side">
        <div class="publi-box">ANUNCIO VIP $20</div>
        <div class="coins">
            <div class="coin" onclick="pay(1)">$1</div>
            <div class="coin" onclick="pay(3)">$3</div>
        </div>
    </div>
    <div class="logo-center"><img src="Logo Mega Red Lunar.jpg"></div>
    <div class="header-side">
        <div class="publi-box">ANUNCIO VIP $50</div>
        <div class="coins">
            <div class="coin" onclick="pay(5)">$5</div>
            <div class="coin" onclick="pay(10)">$10</div>
        </div>
    </div>
</header>

<div class="main-container">
    <div id="rooms-menu" class="rooms-list"></div>

    <div class="viewer-area">
        <div class="main-screen">
            <img id="main-view" src="">
        </div>
        <a id="ali-btn" href="TU_LINK_ALIEXPRESS" target="_blank" class="btn-ali">🛒 COMPRAR EN LA TIENDITA (ALI)</a>
    </div>

    <div class="right-panel">
        <div class="bots-display">
            <div class="bot-col">
                <div class="bot-frame"><img src="Rubia.jpg"></div>
                <div class="bot-label" style="background: rgba(255,0,255,0.2); color: var(--n-rosa);">MIA</div>
            </div>
            <div class="bot-col">
                <div class="bot-frame"><img src="Morocha.jpg"></div>
                <div class="bot-label" style="background: rgba(0,217,255,0.2); color: var(--n-azul);">TANIA</div>
            </div>
            <div class="bot-col">
                <div class="bot-frame"><img src="Pelirroja.jpg"></div>
                <div class="bot-label" style="background: rgba(255,0,60,0.2); color: var(--n-rojo);">COLO</div>
            </div>
        </div>
        <div id="chat-box" class="chat-full"></div>
    </div>
</div>

<div class="bottom-walls">
    <div class="wall-card">
        <h3>📱 ESTADOS</h3>
        <div class="wall-space" id="w-estados"></div>
        <button class="wall-btn" onclick="postTo('w-estados')">Publicar Estado</button>
    </div>
    <div class="wall-card">
        <h3>📖 HISTORIAS</h3>
        <div class="wall-space" id="w-historias"></div>
        <button class="wall-btn" onclick="postTo('w-historias')">Publicar Historia</button>
    </div>
    <div class="wall-card">
        <h3>🎬 VIDEOS</h3>
        <div class="wall-space" id="w-videos"></div>
        <button class="wall-btn" onclick="postTo('w-videos')">Publicar Video</button>
    </div>
</div>

<audio id="audio-player" loop></audio>

<script>
    let currentIdx = 0;
    const rooms = [
        {n: "Sado y Maso", e: ".jpg", s: "latigo.mp3"}, {n: "Spa", e: ".png", s: "spa_relax.mp3"}, 
        {n: "Biblioteca", e: ".png", s: "biblioteca_lugubre.mp3"}, {n: "Camarera", e: ".png", s: "oficina_ambiente.mp3"}, 
        {n: "Discoteca", e: ".png", s: "tecno.mp3"}, {n: "El Bar", e: ".png", s: "bar_alegre.mp3"},
        {n: "Gimnasio", e: ".png", s: "gym_movimiento.mp3"}, {n: "La Tiendita", e: ".png", s: "tienda_musica.mp3"}, 
        {n: "Oficina", e: ".png", s: "oficina_ambiente.mp3"}, {n: "Playa", e: ".png", s: "playa_olas.mp3"}
    ];

    function init() {
        const menu = document.getElementById('rooms-menu');
        rooms.forEach((r, i) => {
            const btn = document.createElement('div');
            btn.className = 'room-btn';
            btn.id = 'room-' + i;
            btn.innerText = r.n;
            btn.onclick = () => { changeRoom(i); };
            menu.appendChild(btn);
        });
        changeRoom(0);
        setInterval(botMessages, 4000);
        setInterval(userEntry, 5500);
    }

    function changeRoom(i) {
        currentIdx = i;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('room-' + i).classList.add('active');
        
        document.getElementById('main-view').src = encodeURI(rooms[i].n + rooms[i].e);
        document.getElementById('ali-btn').style.display = (rooms[i].n === "La Tiendita") ? "block" : "none";
        
        const player = document.getElementById('audio-player');
        player.src = rooms[i].s;
        player.play().catch(() => {});
    }

    function botMessages() {
        const chat = document.getElementById('chat-box');
        const bots = [
            {n: "MIA", c: "var(--n-rosa)", m: "¡Miren mis fotos nuevas en historias! 🔥"},
            {n: "TANIA", c: "var(--n-azul)", m: "¿Quién me invita un trago? Compra monedas arriba 💎"},
            {n: "COLO", c: "var(--n-rojo)", m: "Acabo de subir un video prohibido abajo... 🔞"}
        ];
        const b = bots[Math.floor(Math.random()*3)];
        chat.innerHTML = `<div class="msg"><b style="color:${b.c}">${b.n}:</b> ${b.m}</div>` + chat.innerHTML;
    }

    function userEntry() {
        const chat = document.getElementById('chat-box');
        const users = ["Socio_Chaco", "Vip_Oro", "Invitado44", "Anonimo"];
        const u = users[Math.floor(Math.random()*users.length)];
        const r = rooms[Math.floor(Math.random()*rooms.length)].n;
        chat.innerHTML = `<div class="msg" style="color:#666"><span style="color:var(--oro)">● ${u}</span> entró en <b>${r}</b></div>` + chat.innerHTML;
    }

    function postTo(id) {
        const val = prompt("Escribe tu publicación:");
        if(val) {
            const w = document.getElementById(id);
            w.innerHTML = `<div style="border-bottom:1px solid #333; padding:10px; margin-bottom:10px; font-size:13px; color:#eee;">${val}</div>` + w.innerHTML;
        }
    }

    function pay(v) { window.open("https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=JuanPH43&amount="+v+"&currency_code=USD", "_blank"); }
</script>
</body>
</html>
