<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEGA RED VIP | IMPERIO v99</title>
    <style>
        :root { --oro: #d4af37; --fondo: #000; --n-rojo: #ff003c; --n-azul: #00d9ff; --n-rosa: #ff00ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); color: white; font-family: 'Arial Black', sans-serif; overflow-x: hidden; }

        /* HEADER SUPREMO */
        header { 
            display: grid; grid-template-columns: 1fr 2fr 1fr; 
            padding: 20px; align-items: center; gap: 20px; background: #050505; border-bottom: 5px solid var(--n-rojo);
        }
        .publi-box { width: 100%; height: 110px; border: 3px dashed var(--n-rojo); display: flex; align-items: center; justify-content: center; background: #0a0a0a; color: var(--n-rojo); font-size: 18px; text-align: center; }
        .logo-box img { width: 100%; max-height: 220px; object-fit: contain; filter: drop-shadow(0 0 20px var(--n-rojo)); }
        .coin { width: 75px; height: 75px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fff, var(--oro) 45%, #5c4928); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 22px; cursor: pointer; border: 4px solid white; }

        /* SECCIÓN 10 SALAS */
        .main-container { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 20px; }
        .sidebar { background: #0a0a0a; border: 2px solid #222; border-radius: 15px; padding: 10px; height: 550px; overflow-y: auto; }
        .room-btn { 
            padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; margin-bottom: 6px; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .room-btn:hover, .room-btn.active { background: var(--n-rojo); border-color: white; }
        .room-btn span { font-size: 12px; }
        .online-tag { font-size: 10px; color: #666; font-weight: bold; }
        .active .online-tag { color: white; }

        /* VISOR DE SALA CON RESPALDO */
        .viewer { border: 5px solid var(--n-rojo); border-radius: 15px; height: 550px; background: #050505; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #room-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        #room-fallback { font-size: 40px; color: #222; text-align: center; font-weight: 900; }

        /* PANEL DE BOTS REFORMADO */
        .bot-section { display: grid; grid-template-columns: 1fr 400px; gap: 20px; padding: 0 20px 20px; }
        .bot-gallery { display: grid; grid-template-columns: repeat(3, 1fr); height: 500px; border: 4px solid #222; border-radius: 20px; overflow: hidden; background: #000; }
        .bot-card { position: relative; border-right: 2px solid #222; background: #080808; }
        .bot-card img { width: 100%; height: 100%; object-fit: contain; image-rendering: -webkit-optimize-contrast; }
        .bot-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); text-align: center; padding: 12px; font-size: 20px; font-weight: 900; }

        /* CHAT SENSAL Y COMPETITIVO */
        .chat-wrap { background: #050505; border: 4px solid var(--n-rojo); border-radius: 20px; height: 500px; display: flex; flex-direction: column; }
        #chat-content { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .bot-bubble { margin-bottom: 5px; }
        .user-bubble { align-self: flex-end; background: #222; padding: 8px 12px; border-radius: 10px; border-left: 4px solid var(--oro); color: var(--oro); max-width: 85%; }

        .chat-bar { display: flex; padding: 12px; background: #111; gap: 10px; }
        #chat-input { flex-grow: 1; background: #000; border: 1px solid var(--n-rojo); color: white; padding: 10px; border-radius: 5px; outline: none; }
        .send-btn { background: var(--n-rojo); color: white; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; font-weight: 900; }
    </style>
</head>
<body onload="start()">

<header>
    <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="publi-box">ANUNCIO VIP</div>
        <div style="display:flex; gap:10px;"><div class="coin" onclick="pay(1)">$1</div><div class="coin" onclick="pay(5)">$5</div></div>
    </div>
    <div class="logo-box"><img src="Logo Mega Red Lunar.jpg" alt="IMPERIO"></div>
    <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="publi-box">ANUNCIO VIP</div>
        <div style="display:flex; gap:10px;"><div class="coin" onclick="pay(10)">$10</div><div class="coin" onclick="pay(20)">$20</div></div>
    </div>
</header>

<div class="main-container">
    <div class="sidebar" id="room-menu"></div>
    <div class="viewer">
        <div id="room-fallback">CARGANDO SALA...</div>
        <img id="room-img" onload="this.style.display='block'; document.getElementById('room-fallback').style.display='none'" onerror="this.style.display='none'; document.getElementById('room-fallback').style.display='block'">
    </div>
</div>

<div class="bot-section">
    <div class="bot-gallery">
        <div class="bot-card"><img src="Rubia.jpg"><div class="bot-name" style="color:var(--n-rosa)">MIA</div></div>
        <div class="bot-card"><img src="Morocha.jpg"><div class="bot-name" style="color:var(--n-azul)">TANIA</div></div>
        <div class="bot-card"><img src="Pelirroja.jpg"><div class="bot-name" style="color:var(--n-rojo)">COLO</div></div>
    </div>
    <div class="chat-wrap">
        <div id="chat-content"></div>
        <div class="chat-bar">
            <input type="text" id="chat-input" placeholder="Dile algo sensual..." onkeypress="if(event.key==='Enter') hablar()">
            <button class="send-btn" onclick="hablar()">ENVIAR</button>
        </div>
    </div>
</div>

<script>
    const salas = ["SADO Y MASO", "SPA", "BIBLIOTECA", "CAMARERA", "DISCOTECA", "EL BAR", "GIMNASIO", "OFICINA", "PLAYA", "LA TIENDITA"];
    const botInfo = [
        {n: "MIA", cl: "var(--n-rosa)", s: "cariñosa"},
        {n: "TANIA", cl: "var(--n-azul)", s: "pretenciosa"},
        {n: "COLO", cl: "var(--n-rojo)", s: "juguetona"}
    ];

    function start() {
        const menu = document.getElementById('room-menu');
        salas.forEach((s, i) => {
            let b = document.createElement('div');
            b.className = 'room-btn'; b.id = 'b-' + i;
            b.innerHTML = `<span>${s}</span><span class="online-tag">0 PERSONAS ONLINE NOW</span>`;
            b.onclick = () => verSala(i);
            menu.appendChild(b);
        });
        verSala(0);
        botMsg("MIA", "Hola mi amor... qué bueno tenerte acá. Soy la reina de Resistencia, ¿me vas a consentir?");
    }

    function verSala(i) {
        if(salas[i] === "LA TIENDITA") {
            window.open("https://best.aliexpress.com/", "_blank");
        }
        document.querySelectorAll('.room-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('b-' + i).classList.add('active');
        
        const img = document.getElementById('room-img');
        const fallback = document.getElementById('room-fallback');
        fallback.innerText = salas[i];
        img.src = salas[i] + ".jpg"; // Busca el archivo .jpg
    }

    function hablar() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;

        const content = document.getElementById('chat-content');
        content.innerHTML += `<div class="user-bubble"><b>Tú:</b> ${text}</div>`;
        input.value = "";

        setTimeout(() => {
            const b = botInfo[Math.floor(Math.random()*botInfo.length)];
            let r = "";
            if(text.toLowerCase().includes("quien")) {
                r = "Obvio que yo soy la más gatona de Chaco, las otras son unas nenas.";
                botMsg(b.n, r);
                setTimeout(() => botMsg("TANIA", "¡Seguí soñando, querida! Mis curvas son de otro planeta, ¿no ves bombón?"), 1500);
            } else {
                r = "Mmm que atrevido... me encantan los hombres así. ¿Me vas a regalar una moneda?";
                botMsg(b.n, r);
            }
        }, 1000);
    }

    function botMsg(name, msg) {
        const b = botInfo.find(x => x.n === name);
        const content = document.getElementById('chat-content');
        content.innerHTML += `<div class="bot-bubble"><b style="color:${b.cl}">${name}:</b> ${msg}</div>`;
        content.scrollTop = content.scrollHeight;
    }

    function pay(m) { window.open(`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jp_herraez@hotmail.com&amount=${m}&currency_code=USD`, "_blank"); }
</script>
</body>
</html>
